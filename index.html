<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学中医 · 中医院校教材学习平台</title>
<style>
  :root{
    --bg: #FBF6EC;
    --bg-panel: #FFFDF8;
    --sidebar: #F3E9D2;
    --border: #E0CFA0;
    --ink: #2B2620;
    --ink-soft: #6b5f4d;
    --red: #8C2F27;
    --red-deep: #6e211a;
    --gold: #B8860B;
    --gold-soft: #d9b45c;
    --green-ok: #3f7a52;
    --red-bad: #b3413a;
    --radius: 10px;
    --shadow: 0 2px 10px rgba(60,45,10,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
    background:var(--bg);
    color:var(--ink);
    display:flex;
    min-height:100vh;
  }
  h1,h2,h3,h4{font-family:"Noto Serif SC","Songti SC","SimSun",serif;}
  a{color:inherit;}

  /* ---------- Sidebar ---------- */
  #sidebar{
    width:300px;
    flex-shrink:0;
    background:var(--sidebar);
    border-right:1px solid var(--border);
    height:100vh;
    overflow-y:auto;
    position:sticky;
    top:0;
    padding:0 0 30px 0;
  }
  #brand{
    padding:22px 18px 14px 18px;
    border-bottom:2px solid var(--red);
    background:linear-gradient(180deg,#f8ecd2,transparent);
  }
  #brand h1{
    margin:0;
    font-size:26px;
    color:var(--red);
    letter-spacing:2px;
  }
  #brand p{
    margin:6px 0 0 0;
    font-size:12.5px;
    color:var(--ink-soft);
    line-height:1.6;
  }
  #search-box{
    margin:12px 16px;
  }
  #search-box input{
    width:100%;
    padding:8px 10px;
    border:1px solid var(--border);
    border-radius:8px;
    background:#fff;
    font-size:13px;
  }
  #home-btn{
    display:block;
    margin:0 16px 10px 16px;
    padding:8px 10px;
    background:var(--red);
    color:#fff;
    text-align:center;
    border-radius:8px;
    cursor:pointer;
    font-size:13.5px;
    letter-spacing:1px;
  }
  #home-btn:hover{background:var(--red-deep);}

  .subject{
    margin:4px 8px;
  }
  .subject-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 10px;
    cursor:pointer;
    border-radius:8px;
    font-size:14.5px;
    font-weight:600;
  }
  .subject-head:hover{background:#eaddbb;}
  .subject-head .badge{
    font-size:10px;
    font-weight:500;
    padding:2px 7px;
    border-radius:20px;
    margin-left:6px;
    white-space:nowrap;
  }
  .badge.ready{background:#e2f1e6;color:var(--green-ok);}
  .badge.building{background:#f4e6e0;color:var(--red-bad);}
  .subject-head .arrow{
    transition:transform .15s;
    color:var(--ink-soft);
    font-size:11px;
  }
  .subject.open .arrow{transform:rotate(90deg);}
  .chapter-list{
    display:none;
    padding:2px 0 6px 6px;
    border-left:2px solid var(--border);
    margin-left:12px;
  }
  .subject.open .chapter-list{display:block;}
  .chapter-item{
    padding:7px 10px;
    font-size:13px;
    border-radius:6px;
    cursor:pointer;
    color:var(--ink-soft);
    line-height:1.4;
  }
  .chapter-item:hover{background:#eee0c2;color:var(--ink);}
  .chapter-item.active{
    background:var(--red);
    color:#fff;
  }
  .chapter-item .dot{
    display:inline-block;width:5px;height:5px;border-radius:50%;
    margin-right:6px;background:var(--gold-soft);vertical-align:middle;
  }

  /* ---------- Main ---------- */
  #main{
    flex:1;
    min-width:0;
    padding:30px 40px 60px 40px;
    max-width:980px;
  }
  #welcome h2{color:var(--red);font-size:26px;margin-bottom:6px;}
  #welcome p.lead{color:var(--ink-soft);font-size:14.5px;line-height:1.9;}
  .subject-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:14px;
    margin-top:20px;
  }
  .subject-card{
    background:var(--bg-panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px;
    box-shadow:var(--shadow);
    cursor:pointer;
  }
  .subject-card:hover{border-color:var(--red);}
  .subject-card h3{margin:0 0 6px 0;font-size:16px;color:var(--ink);}
  .subject-card p{margin:0;font-size:12.5px;color:var(--ink-soft);line-height:1.6;}
  .subject-card .stat{margin-top:10px;font-size:11.5px;}

  #chapter-view{display:none;}
  .crumb{font-size:12.5px;color:var(--ink-soft);margin-bottom:8px;}
  .crumb b{color:var(--red);}
  #chapter-title{
    font-size:24px;
    color:var(--red-deep);
    margin:0 0 4px 0;
    border-bottom:3px solid var(--gold-soft);
    padding-bottom:10px;
  }
  .tabs{
    display:flex;
    gap:6px;
    margin:18px 0 18px 0;
    border-bottom:1px solid var(--border);
  }
  .tab-btn{
    padding:9px 18px;
    cursor:pointer;
    font-size:14px;
    border-radius:8px 8px 0 0;
    color:var(--ink-soft);
    background:transparent;
    border:1px solid transparent;
  }
  .tab-btn.active{
    background:var(--bg-panel);
    color:var(--red);
    font-weight:600;
    border:1px solid var(--border);
    border-bottom:1px solid var(--bg-panel);
    margin-bottom:-1px;
  }
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}

  .lecture-block{
    background:var(--bg-panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:26px 30px;
    box-shadow:var(--shadow);
    line-height:2;
    font-size:15px;
  }
  .lecture-block h4{
    color:var(--red);
    font-size:17px;
    margin:22px 0 10px 0;
    padding-left:10px;
    border-left:4px solid var(--red);
  }
  .lecture-block h4:first-child{margin-top:0;}
  .lecture-block p{margin:10px 0;text-align:justify;}
  .lecture-block ul{margin:8px 0;padding-left:22px;}
  .lecture-block li{margin:4px 0;}
  .lecture-block table{border-collapse:collapse;width:100%;margin:14px 0;font-size:13.5px;}
  .lecture-block th,.lecture-block td{border:1px solid var(--border);padding:7px 10px;text-align:center;}
  .lecture-block th{background:#f4e9d0;color:var(--red-deep);}
  .placeholder-box{
    background:var(--bg-panel);
    border:1px dashed var(--border);
    border-radius:var(--radius);
    padding:50px 30px;
    text-align:center;
    color:var(--ink-soft);
  }
  .placeholder-box .icon{font-size:34px;margin-bottom:10px;}

  .keypoint-list{list-style:none;margin:0;padding:0;}
  .keypoint-list li{
    background:var(--bg-panel);
    border:1px solid var(--border);
    border-left:4px solid var(--gold);
    border-radius:8px;
    padding:12px 16px;
    margin-bottom:10px;
    font-size:14.5px;
    line-height:1.8;
    box-shadow:var(--shadow);
  }
  .keypoint-list li b{color:var(--red-deep);}

  .quiz-toolbar{
    display:flex;gap:10px;align-items:center;margin-bottom:16px;
  }
  .quiz-toolbar button{
    padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13.5px;
    background:var(--red);color:#fff;
  }
  .quiz-toolbar button.secondary{background:#e8dcc0;color:var(--ink);}
  #quiz-score{font-size:14px;font-weight:600;color:var(--red-deep);}
  .q-card{
    background:var(--bg-panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px 20px;
    margin-bottom:14px;
    box-shadow:var(--shadow);
  }
  .q-head{font-size:14px;margin-bottom:10px;line-height:1.7;}
  .q-tag{
    display:inline-block;font-size:10.5px;padding:1px 8px;border-radius:20px;
    background:#eee0c2;color:var(--red-deep);margin-right:8px;vertical-align:middle;
  }
  .q-opt{display:block;margin:6px 0;font-size:13.5px;cursor:pointer;line-height:1.6;}
  .q-opt input{margin-right:8px;}
  .q-blank input[type=text]{
    padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:13.5px;width:220px;
  }
  .q-case textarea{
    width:100%;min-height:70px;border:1px solid var(--border);border-radius:6px;padding:8px;font-size:13.5px;font-family:inherit;
  }
  .q-explain{
    margin-top:10px;padding:10px 12px;background:#faf3e2;border-radius:8px;font-size:13px;color:var(--ink-soft);display:none;
    border-left:3px solid var(--gold);
  }
  .q-card.correct{border-color:var(--green-ok);}
  .q-card.wrong{border-color:var(--red-bad);}
  .q-result-tag{float:right;font-size:12px;font-weight:600;}
  .q-result-tag.correct{color:var(--green-ok);}
  .q-result-tag.wrong{color:var(--red-bad);}
  .case-reveal-btn{
    margin-top:8px;padding:5px 12px;font-size:12.5px;border-radius:6px;border:1px solid var(--border);
    background:#fff;cursor:pointer;color:var(--red-deep);
  }

  #menu-toggle{display:none;}
  @media (max-width:860px){
    #sidebar{
      position:fixed;left:0;top:0;z-index:40;transform:translateX(-100%);
      transition:transform .2s;width:82vw;max-width:320px;
    }
    #sidebar.show{transform:translateX(0);}
    #main{padding:20px 16px 60px 16px;max-width:100%;}
    #menu-toggle{
      display:inline-block;background:var(--red);color:#fff;border:none;
      padding:8px 14px;border-radius:8px;margin-bottom:14px;font-size:13.5px;cursor:pointer;
    }
    .lecture-block{padding:18px 16px;}
  }
</style>
</head>
<body>

<div id="sidebar">
  <div id="brand">
    <h1>学中医</h1>
    <p>全国中医药院校规划教材 · 分学科 · 分章节<br>讲义精讲 &nbsp;|&nbsp; 重点提示 &nbsp;|&nbsp; 章节模拟测试</p>
  </div>
  <div id="search-box"><input type="text" id="search-input" placeholder="搜索学科或章节..." oninput="onSearch()"></div>
  <div id="home-btn" onclick="showHome()">🏠 返回首页总览</div>
  <div id="subject-list"></div>
</div>

<div id="main">
  <button id="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('show')">☰ 学科目录</button>

  <div id="welcome">
    <h2>学中医 · 中医执业与院校考试学习平台</h2>
    <p class="lead">
      本站以全国中医药高等院校规划教材为纲，覆盖中医基础理论、中药学、方剂学、中医诊断学、中医内科学、伤寒论、内经讲义、金匮要略、针灸学九门核心学科，按教材章节整理讲义正文、重点提示与模拟测试，供系统学习与考前复习使用。<br>
      当前 <b style="color:var(--red)">中医基础理论</b> 已完整上线，其余学科的章节目录框架已经搭建完成，内容正在持续建设中，可点击左侧目录预览章节结构。
    </p>
    <div class="subject-grid" id="subject-grid"></div>
  </div>

  <div id="chapter-view">
    <div class="crumb" id="crumb"></div>
    <h2 id="chapter-title"></h2>
    <div class="tabs" id="tabs" style="display:none;">
      <div class="tab-btn active" data-tab="lecture" onclick="switchTab('lecture')">📖 讲义正文</div>
      <div class="tab-btn" data-tab="keypoints" onclick="switchTab('keypoints')">⭐ 重点提示</div>
      <div class="tab-btn" data-tab="quiz" onclick="switchTab('quiz')">📝 章节模拟测试</div>
    </div>
    <div class="tab-panel active" id="panel-lecture"></div>
    <div class="tab-panel" id="panel-keypoints"></div>
    <div class="tab-panel" id="panel-quiz"></div>
  </div>
</div>

<script>
/* ============================================================
   学中医 数据层
   ready:true  的学科含完整 lecture / keypoints / quiz
   ready:false 的学科目前只搭建了章节目录框架，内容建设中
   ============================================================ */
const SUBJECTS = [
{
  id:'jichu', name:'中医基础理论', ready:true,
  desc:'阴阳五行、藏象、精气血津液神、经络、体质、病因病机与防治原则——中医学的理论根基。',
  chapters:[
    {title:"绪论", ready:true,
      lecture:[
        {type:"h4",text:"一、中医学的概念与学科属性"},
        {type:"p",text:"中医学是发祥于中国古代、以中国传统文化为背景、以整体观念为主导思想、以脏腑经络的生理和病理为基础、以辨证论治为诊疗特点的一门医学理论体系。它既是研究人体生命活动和疾病发生发展及其防治规律的医学科学，又是中国传统文化的重要组成部分，具有自然科学与人文社会科学相互渗透的双重属性。"},
        {type:"h4",text:"二、中医学理论体系的形成"},
        {type:"p",text:"中医学理论体系奠基于先秦两汉时期。《黄帝内经》的问世，标志着中医学理论体系的初步形成，该书从整体观念出发，系统构建了藏象、经络、精气血津液、病因病机、诊法治则等基本理论框架。《难经》则补充发挥了《内经》的脉学、命门与三焦等理论，与《内经》互相羽翼。东汉张仲景著《伤寒杂病论》（后世分为《伤寒论》与《金匮要略》两书），创立了六经辨证与脏腑辨证相结合的论治体系，确立了辨证论治的基本原则，被后世誉为“方书之祖”，张仲景本人也被尊为“医圣”。同期成书的《神农本草经》是我国现存最早的药学专著，首创药物“三品分类法”，奠定了中药学的理论基础。以上四部经典的相继问世，标志着中医学理论体系已经形成。"},
        {type:"h4",text:"三、中医学理论体系的发展"},
        {type:"p",text:"魏晋隋唐时期，王叔和著《脉经》，为现存最早的脉学专著；皇甫谧著《针灸甲乙经》，为现存最早的针灸学专著；巢元方著《诸病源候论》，是第一部病因证候学专著；孙思邈著《千金要方》《千金翼方》，收集整理了大量方药与临证经验，极大丰富了方药学内容。宋金元时期学术争鸣兴盛，涌现出以刘完素（河间，倡“火热论”，为寒凉派代表）、张从正（子和，倡“攻邪论”，为攻邪派代表）、李杲（东垣，倡“脾胃论”，为补土派代表）、朱震亨（丹溪，倡“相火论”“阳有余阴不足论”，为滋阴派代表）为代表的“金元四大家”，从不同角度发展了中医病机与治疗理论。明清时期，温病学说逐渐从伤寒体系中独立发展成熟：吴又可著《温疫论》，首创“戾气”（疠气）致病学说；叶天士著《温热论》，创立卫气营血辨证纲领；吴鞠通著《温病条辨》，创立三焦辨证体系；薛生白著《湿热病篇》，专论湿热病证治。温病四大家的出现，使中医外感热病学说形成了与伤寒学说并立又互补的完整体系。近现代以来，中医学在继承传统的基础上，结合现代科学方法与临床实践不断发展，并逐渐走向世界。"},
        {type:"h4",text:"四、中医学理论体系的基本特点"},
        {type:"p",text:"中医学理论体系的基本特点，可概括为“整体观念”与“辨证论治”两个方面，二者贯穿于中医学的生理、病理、诊法、辨证与治疗的全过程。"},
        {type:"h4",text:"（一）整体观念"},
        {type:"p",text:"整体观念是中医学关于人体自身的完整性以及人与自然、社会环境之间相互联系的学术思想，主要体现在三个方面：其一，人体是一个有机整体。人体以五脏为中心，通过经络系统将六腑、五体、九窍、四肢百骸等联系成一个结构上不可分割、功能上相互协调、病理上相互影响的整体，在诊治时可以“视其外应，以知其内脏”。其二，人与自然环境的统一性（天人相应）。四时气候、昼夜晨昏、地理环境等变化都会影响人体的生理活动与病理变化，养生防病须遵循“因时制宜”“因地制宜”的原则。其三，人与社会环境的统一性。人的社会地位、经济状况、人际关系等变化，往往通过影响人的精神情志活动而影响身心健康，诊治时应重视“因人制宜”。"},
        {type:"h4",text:"（二）辨证论治"},
        {type:"p",text:"辨证论治是中医学认识疾病和治疗疾病的基本原则，是中医学理论体系的另一基本特点。“病”是对疾病全过程的病理本质与规律的概括；“证”是疾病发展过程中某一阶段或某一类型病理本质（病位、病性、邪正关系）的概括；“症”则是疾病的具体临床表现（症状和体征），是判断病、证的依据。“辨证”，是将四诊（望、闻、问、切）所收集的症状、体征等资料，通过分析、综合，辨清疾病的病因、病性、病位及邪正关系，概括、判断为某种性质证候的思维过程；“论治”，则是根据辨证的结论，确定相应治疗原则和方法的过程。辨证是决定治疗的前提和依据，论治是辨证的目的，也是检验辨证是否正确的实践标准，二者相互联系、不可分割，统称为“辨证论治”。在辨证论治思想指导下，中医临床强调“同病异治”与“异病同治”：同一疾病，由于发病的时间、地域及患者体质反应性不同，或处于不同的病程阶段，所表现的证候可以不同，因而治法也随之不同；不同的疾病，在其发展过程中若出现了性质相同的证，则可以采用相同的治法。由此可见，中医临床“辨证”重于“辨病”，treat 的核心对象始终是“证”而非“病名”本身。"}
      ],
      keypoints:[
        "中医学理论体系形成的标志：《黄帝内经》《难经》《伤寒杂病论》《神农本草经》四部经典相继问世（重点记忆《内经》标志理论体系初步形成）。",
        "《伤寒杂病论》确立辨证论治原则，被誉为“方书之祖”，作者张仲景被尊为“医圣”。",
        "《神农本草经》是现存最早的药学专著，首创药物“三品分类法”。",
        "王叔和《脉经》——现存最早脉学专著；皇甫谧《针灸甲乙经》——现存最早针灸学专著；巢元方《诸病源候论》——第一部病因证候学专著。",
        "“金元四大家”：刘完素（河间，寒凉派，火热论）、张从正（子和，攻邪派）、李杲（东垣，补土派，脾胃论）、朱震亨（丹溪，滋阴派，相火论）——考试极易考人名与流派、代表著作的对应关系。",

        {type:"single", q:"被后世誉为“方书之祖”的著作是：", options:["《千金要方》","《伤寒杂病论》","《温病条辨》","《太平惠民和剂局方》"], answer:1, explain:"张仲景《伤寒杂病论》创造性地融理法方药于一体，确立了辨证论治原则，被誉为“方书之祖”。"},

        {type:"multi", q:"下列属于“金元四大家”的医家有：", options:["刘完素","张从正","李杲","朱震亨","张仲景"], answer:[0,1,2,3], explain:"金元四大家指刘完素、张从正、李杲、朱震亨。张仲景是东汉医家，著《伤寒杂病论》，不属于金元时期医家。"},
        {type:"multi", q:"下列属于温病学说代表医家及其著作的组合，正确的有：", options:["吴又可——《温疫论》","叶天士——《温热论》","吴鞠通——《温病条辨》","张仲景——《伤寒论》"], answer:[0,1,2], explain:"张仲景《伤寒论》属于外感寒邪辨证体系（六经辨证），不属于温病学说范畴，故D不选。"},
        {type:"multi", q:"整体观念主要体现在：", options:["人体自身是一个有机整体","人与自然环境的统一性","人与社会环境的统一性","辨证与论治相互结合、不可分割"], answer:[0,1,2], explain:"D项“辨证与论治相互结合”属于辨证论治的内涵，不属于整体观念的范畴，是本题干扰项。"},
        {type:"blank", q:"我国现存最早的一部药学专著是《____》。", answer:["神农本草经"], explain:"《神农本草经》约成书于东汉时期，是我国现存最早的药学专著，首创药物“三品分类法”。"},
        {type:"blank", q:"首创“卫气营血辨证”体系的温病学家是____。", answer:["叶天士"], explain:"叶天士著《温热论》，创立卫气营血辨证纲领，是温病辨证学说的重要奠基人之一。"},
        {type:"blank", q:"中医学诊治疾病过程中，“辨证”重于____的思想，体现为“同病异治”“异病同治”。（请填二字）", answer:["辨病"], explain:"中医辨证论治强调证同治同、证异治异，诊疗的核心着眼点是“证”而非病名，即辨证重于辨病。"},
        {type:"case", q:"病例分析：患者甲、乙均被诊断为“感冒”，甲证属风寒束表，治以辛温解表法；乙证属风热犯表，治以辛凉解表法。请运用中医理论说明此现象体现了怎样的诊疗思想，并简述理由。", answer:"此现象体现了中医“同病异治”的诊疗思想。甲、乙同为“感冒”病，但由于感邪性质不同（甲为风寒、乙为风热），患者所表现出的证候不同（风寒表证与风热表证），因此治法随之各异——甲宜辛温解表，乙宜辛凉解表。这说明中医临床诊治疾病的着眼点始终在于辨“证”而非仅仅辨“病名”，证同则治同、证异则治异，正是辨证论治原则“辨证重于辨病”这一核心思想的具体体现。", explain:""},
        {type:"case", q:"请简述“整体观念”在中医学中的具体体现（至少答出三个方面，并举例说明）。", answer:"整体观念主要体现在三个方面：①人体是一个有机整体——人体以五脏为中心，通过经络系统将六腑、五体、九窍、四肢百骸联系成一个结构上不可分割、功能上相互协调、病理上相互影响的整体，例如“心开窍于舌”，心的病变可通过舌象反映出来；②人与自然环境的统一性（天人相应）——四时气候、昼夜晨昏、地理环境等变化都会影响人体的生理与病理活动，例如“春夏养阳、秋冬养阴”即体现顺应四时的养生原则；③人与社会环境的统一性——社会地位、经济状况、人际关系等变化常通过影响人的情志活动而影响身心健康，诊治时应“因人制宜”，充分考虑患者的社会心理因素。", explain:""}

    {title:"第一章 中医学的哲学基础", ready:true,
      lecture:[
        {type:"h4",text:"一、精气学说"},
        {type:"p",text:"精气学说是研究精气的内涵及其运动变化规律，并用以阐释宇宙万物的构成本原、发生发展及变化机理的一种古代哲学思想，是中医学理论体系构建的重要方法论之一。精气学说认为，精（气）是构成宇宙万物的本原；气的运动称为“气机”，其基本形式概括为升、降、出、入四种；气运动产生的各种变化称为“气化”。精气学说渗透到医学领域后，被用以阐释人体生命的本原及生理功能：人体之精气来源于禀受父母的先天之精与后天摄入的水谷之精相合，是构成人体、维持生命活动的最基本物质。"},
        {type:"h4",text:"二、阴阳学说"},
        {type:"p",text:"阴阳，是对自然界相互关联的某些事物或现象对立双方属性的概括，含有对立统一的内涵。一般而言，凡具有推动、温煦、兴奋、上升、外向、明亮等特性的事物和现象归属于阳；凡具有凝聚、滋润、抑制、下降、内守、晦暗等特性的事物和现象归属于阴。阴阳学说的基本内容包括：阴阳对立制约（阴阳双方相互斗争、相互制约）、阴阳互根互用（阴阳双方相互依存、不能脱离对方单独存在，“阳根于阴，阴根于阳”，并相互资生、相互为用）、阴阳交感与互藏（阴阳二气在运动中相互感应、交合，且阴中有阳、阳中有阴）、阴阳消长（阴阳双方的量在一定限度内此消彼长的运动变化）、阴阳转化（事物的总体属性在一定条件下向其相反方向转化，即“重阴必阳，重阳必阴”“寒极生热，热极生寒”）以及阴阳的自和与平衡。"},
        {type:"p",text:"阴阳学说在中医学中的应用极为广泛：说明人体的组织结构（如“背为阳，腹为阴”，“五脏为阴，六腑为阳”）；概括人体的生理功能（“阴平阳秘，精神乃治”，阴阳协调是健康的标志）；阐释人体的病理变化（“阳胜则热，阴胜则寒”，“阳虚则寒，阴虚则热”）；用于疾病的诊断（分析四诊资料的阴阳属性，作为八纲辨证的总纲）；并指导疾病的治疗——损其有余、补其不足，对于阴阳偏衰者，采用“阳病治阴，阴病治阳”之法（即王冰所言“壮水之主，以制阳光；益火之源，以消阴翳”）。"},
        {type:"h4",text:"三、五行学说"},
        {type:"p",text:"五行，即木、火、土、金、水五种基本物质及其运动变化。五行学说以五行的特性来分析和归纳事物的属性，将自然界及人体千变万化的事物和现象按其属性分别归属于木、火、土、金、水五行系统，借以说明人体脏腑组织之间的生理联系，以及人体与外界环境的统一性。五行特性：“木曰曲直”——具有生长、升发、条达、舒畅的特性；“火曰炎上”——具有温热、升腾向上的特性；“土爰稼穑”——具有生化、承载、受纳的特性；“金曰从革”——具有清洁、肃降、收敛的特性；“水曰润下”——具有寒凉、滋润、向下、静藏的特性。"},
        {type:"table", headers:["五行","木","火","土","金","水"],
          rows:[
            ["五脏","肝","心","脾","肺","肾"],
            ["五腑","胆","小肠","胃","大肠","膀胱"],
            ["五体","筋","脉","肉","皮毛","骨"],
            ["五官","目","舌","口","鼻","耳"],
            ["五志","怒","喜","思","悲（忧）","恐"],
            ["五色","青","赤","黄","白","黑"],
            ["五味","酸","苦","甘","辛","咸"],
            ["五季","春","夏","长夏","秋","冬"]
          ]
        },
        {type:"p",text:"五行之间存在相生与相克的关系。相生，即相互资生、促进，顺序为：木生火、火生土、土生金、金生水、水生木，其中“生我者为母，我生者为子”；相克，即相互克制、制约，顺序为：木克土、土克水、水克火、火克金、金克木，其中“克我者为所不胜，我克者为所胜”。五行之间还存在“制化”关系，即相生之中有相克、相克之中有相生，从而维持整体的协调平衡。当五行生克关系发生异常时，则出现“相乘”与“相侮”：相乘，是五行中一行对其所胜一行的过度克制，次序与相克相同但程度过甚（如“木旺乘土”）；相侮，是五行中一行反过来克制其所不胜的一行，又称“反克”，次序与相克相反（如“木亢侮金”）。"},
        {type:"p",text:"五行学说在中医学中的应用主要体现在：说明五脏的生理功能及其相互关系（如肝属木、脾属土，“肝木克脾土”说明肝之疏泄对脾之运化的制约作用）；说明五脏病变的相互影响，即“母病及子”“子病犯母”“相乘”“相侮”等传变规律；指导疾病的诊断（如面见青色、喜食酸味、脉见弦象，可诊为肝病）；指导疾病的治疗，如根据相生规律确立“虚则补其母，实则泻其子”的治则，衍生出“滋水涵木法”（补肾以养肝）、“培土生金法”（补脾以益肺）、“金水相生法”（补肺以滋肾）等具体治法；又如《难经》所言“见肝之病，知肝传脾，当先实脾”，即是根据五行相克规律“先安未受邪之地”、预防疾病传变的治未病思想的体现。"}
      ],
      keypoints:[
        "精气学说：精气是宇宙万物的本原，气机运动的基本形式为升、降、出、入。",
        "阴阳属性判断口诀：动、热、亮、上、外、进属阳；静、寒、暗、下、内、退属阴。",
        "阴阳学说基本内容：对立制约、互根互用、交感互藏、消长、转化、自和。易考点：区分“消长”（量变）与“转化”（质变，需在“重”“极”条件下发生）。",
        "“阴平阳秘，精神乃治”概括人体正常生理状态即阴阳协调平衡的状态。",
        "治疗原则“阳病治阴，阴病治阳”专用于阴阳偏衰（虚证），即王冰“壮水之主以制阳光，益火之源以消阴翳”。",
        "五行特性口诀：木曰曲直、火曰炎上、土爰稼穑、金曰从革、水曰润下。",
        "五行相生顺序：木→火→土→金→水→木（生我者为母，我生者为子）；相克顺序：木→土→水→火→金→木（克我者为所不胜，我克者为所胜）。",
        "相乘与相侮的区别：相乘顺相克次序而克制太过；相侮逆相克次序而反向克制。二者常同时并见，需结合具体次序判断。",
        "五脏五行归属：肝木、心火、脾土、肺金、肾水，是理解脏腑生克传变关系的基础。",
        "治疗上“虚则补其母，实则泻其子”是五行学说指导脏腑病变治疗的重要原则，常见治法：滋水涵木法（补肾养肝）、培土生金法（补脾益肺）、金水相生法（补肺滋肾）。",
        "《难经》“见肝之病，知肝传脾，当先实脾”体现五行学说“治未病、既病防变”的临床应用思路，而非单纯的补母泻子之法。"
      ],
      quiz:[
        {type:"single", q:"“重阴必阳，重阳必阴”所体现的阴阳关系是：", options:["阴阳对立制约","阴阳互根互用","阴阳消长平衡","阴阳相互转化"], answer:3, explain:"“重”“极”是阴阳转化发生的条件，事物在一定条件下向其相反方向转化，属于阴阳转化的范畴。"},
        {type:"single", q:"“阳病治阴，阴病治阳”这一治疗原则主要针对的病机是：", options:["阴阳互损","阴阳格拒","阴阳偏衰","阴阳转化"], answer:2, explain:"此法专用于阴或阳一方虚损不足（偏衰）者，采用“补其不足”之法，即壮水制阳、益火消阴，而非用于阴阳偏盛的实证。"},
        {type:"single", q:"五行特性中，“土爰稼穑”所描述的是：", options:["生长升发的特性","温热向上的特性","生化承载受纳的特性","清洁肃降收敛的特性"], answer:2, explain:"“稼穑”本指农作物的播种与收获，引申为土具有生化、承载、受纳万物的特性。"},
        {type:"single", q:"按五行归属，“肾”对应五行中的：", options:["木","火","土","水"], answer:3, explain:"五脏与五行的对应关系为：肝属木、心属火、脾属土、肺属金、肾属水。"},
        {type:"single", q:"下列选项中，属于五行“相乘”现象的是：", options:["木克土的正常制约关系","木气亢盛而过度克伐脾土","木气亢盛反向克制肺金","土克水的正常制约关系"], answer:1, explain:"相乘是五行中一行对其所胜一行的过度克制，次序与相克相同（木克土）但程度过甚，属病理性异常；C项“木反克金”次序与相克相反，属于“相侮”而非“相乘”；A、D两项均为正常相克，非乘非侮。"},
        {type:"multi", q:"下列属于阴阳学说基本内容的有：", options:["阴阳对立制约","阴阳互根互用","阴阳消长与转化","五行生克制化"], answer:[0,1,2], explain:"D项“五行生克制化”属于五行学说的内容范畴，不属于阴阳学说的基本内容。"},
        {type:"multi", q:"五行学说在中医学中的应用包括：", options:["说明五脏的生理功能及相互关系","说明五脏病变的相互传变影响","指导疾病的诊断（如面色、脉象与五脏的对应）","指导疾病的治疗（如培土生金法）"], answer:[0,1,2,3], explain:"以上四项均为五行学说在中医学生理、病理、诊断、治疗各方面的具体应用。"},
        {type:"multi", q:"下列属于“阳”的特性或表现的有：", options:["温煦","推动","上升外向","凝聚抑制"], answer:[0,1,2], explain:"D项“凝聚抑制”属于“阴”的特性，而非阳的特性，为本题干扰项。"},
        {type:"blank", q:"按五行归类，与“肝”相对应的五行属性是____。", answer:["木"], explain:"五脏之中肝属木，木性生长、升发、条达，与肝喜条达、主疏泄的生理特性相应。"},
        {type:"blank", q:"《难经》所言“见肝之病，知肝传脾，当先实脾”，体现的中医治疗思想是____（请填四字）。", answer:["治未病","既病防变"], explain:"此语依据五行相克（木克土）传变规律，主张预先培补脾土、防止肝病传脾，体现了“治未病、既病防变”的重要思想。"},
        {type:"blank", q:"根据五行相生规律，通过“补脾以益肺”来治疗肺脏虚弱病证的治法，称为____法。", answer:["培土生金"], explain:"脾属土，肺属金，土能生金，故补脾益气以充养肺气的治法称为“培土生金法”，常用于肺脾两虚之证。"},
        {type:"case", q:"病例分析：患者素有肝病，医家诊治时提出“见肝之病，知肝传脾，当先实脾”。请运用五行学说说明其理论依据及临床意义。", answer:"依据五行学说，肝属木、脾属土，木能克土，肝与脾之间存在“相克”的生理制约关系。当肝脏发生病变（如肝气郁结、肝阳偏亢）时，肝木容易过度克伐脾土，形成“木乘土”的病理传变，导致脾的运化功能受损，出现纳呆、腹胀、便溏等脾虚见证。医家提出“当先实脾”，即在治疗肝病的同时，预先培补脾气，增强脾土抵御肝木克伐的能力，防止病情由肝传脾、进一步发展恶化。这体现了五行学说中依据生克规律“先安未受邪之地”、未病先防、既病防变的治疗思想，是中医治未病理论在脏腑传变中的具体运用。", explain:""},
        {type:"case", q:"简述阴阳学说中“阴阳互根互用”的含义，并举一例说明其在中医学中的应用。", answer:"“阴阳互根”是指阴阳双方各以对方的存在作为自己存在的前提和条件，即“阳根于阴，阴根于阳”，任何一方都不能脱离另一方而单独存在，所谓“孤阴不生，独阳不长”；“阴阳互用”则指阴阳双方不仅相互依存，还存在相互资生、相互促进的关系。举例：中医学认为“气属阳，血属阴”，气能生血、行血、摄血，血能载气、养气，气血之间相互滋生、相互为用，正体现了阴阳互根互用的关系；临床上治疗气血两虚证时常“补气以生血”（如当归补血汤重用黄芪），正是这一理论的具体运用。", explain:""}
      ]
    },
    {title:"第二章 藏象", ready:true,
      lecture:[
        {type:"h4",text:"一、藏象学说概论"},
        {type:"p",text:"“藏象”一词首见于《素问·六节藏象论》。“藏”是指藏于体内的脏腑组织器官，“象”是指表现于外的生理病理现象。藏象学说，即通过观察人体外部征象来研究人体内脏的生理活动规律及其相互关系的学说。藏象学说将人体内脏分为五脏（心、肝、脾、肺、肾）、六腑（胆、胃、小肠、大肠、膀胱、三焦）和奇恒之腑（脑、髓、骨、脉、胆、女子胞）三大类。五脏的共同生理特点是化生和贮藏精气，故“藏而不泻”“满而不能实”；六腑的共同生理特点是受盛和传化水谷，故“泻而不藏”“实而不能满”；奇恒之腑则形态多似腑（中空管腔或囊状），功能却似脏（贮藏精气），故名“奇恒”。"},
        {type:"h4",text:"二、五脏——心"},
        {type:"p",text:"心居胸腔，膈膜之上，有心包卫护于外。心的主要生理功能为主血脉、主藏神，故称心为“君主之官”“生之本”“五脏六腑之大主”。“主血脉”，指心气推动和调控血液在脉道中运行，流注全身，发挥营养和滋润作用；“主藏神”（主神志），指心具有主宰人体五脏六腑、形体官窍的一切生理活动，以及主司精神、意识、思维活动的功能。心在体合脉，其华在面，开窍于舌，在志为喜，在液为汗，与自然界夏气相通应；心与小肠相表里。"},
        {type:"h4",text:"三、五脏——肺"},
        {type:"p",text:"肺位于胸腔，左右各一，上连喉咙，开窍于鼻，为诸脏之华盖，其主要生理功能为主气司呼吸、主宣发与肃降、通调水道、朝百脉、主治节，故称肺为“相傅之官”“气之本”。“宣发”是指肺气向上向外的布散作用，“肃降”是指肺气向下向内的清肃通降作用，二者相反相成；“通调水道”是指肺的宣发肃降作用对体内水液的输布、运行和排泄起着疏通调节的作用，故有“肺为水之上源”之说；“朝百脉、主治节”是指全身血液都要通过经脉汇聚于肺，经肺的呼吸进行气体交换后再输布全身，且肺具有辅助心脏治理调节全身气、血、水液的作用。肺在体合皮，其华在毛，开窍于鼻，在志为悲（忧），在液为涕，与自然界秋气相通应；肺与大肠相表里。"},
        {type:"h4",text:"四、五脏——脾"},
        {type:"p",text:"脾位于中焦，主要生理功能为主运化、主统血，为“后天之本”“气血生化之源”。“主运化”包括运化食物和运化水液两方面，指脾具有把水谷化为精微并将其吸收、转输至全身的生理功能；“主统血”指脾具有统摄血液在脉道内运行、防止其溢出脉外的功能。脾气宜升，以升为健，“脾主升清”将水谷精微上输于心肺头目，并维持内脏位置的相对恒定。脾在体合肌肉、主四肢，其华在唇，开窍于口，在志为思，在液为涎，与自然界长夏之气相通应；脾与胃相表里。"},
        {type:"h4",text:"五、五脏——肝"},
        {type:"p",text:"肝位于腹部，主要生理功能为主疏泄、主藏血，肝气升发，喜条达而恶抑郁，体阴而用阳，故称肝为“刚脏”“将军之官”“罢极之本”。“主疏泄”指肝具有疏通、畅达全身气机，进而促进精血津液运行输布、脾胃运化、情志调畅、男子排精与女子排卵行经等功能；“主藏血”指肝具有贮藏血液、调节血量及防止出血的功能。肝在体合筋，其华在爪，开窍于目，在志为怒，在液为泪，与自然界春气相通应；肝与胆相表里。"},
        {type:"h4",text:"六、五脏——肾"},
        {type:"p",text:"肾位于腰部脊柱两侧，左右各一，为“先天之本”“封藏之本”，主要生理功能为主藏精、主水、主纳气。“主藏精”指肾具有贮存、封藏精气的功能，肾精可化生肾气，肾气分阴阳，肾阴、肾阳对全身脏腑组织起着滋养濡润和温煦推动的作用，为各脏阴阳之本，故称肾为“五脏阴阳之根本”；肾精还主司人体的生长、发育与生殖。“主水”指肾具有主持和调节全身水液代谢的功能。“主纳气”指肾具有摄纳肺所吸入的自然界清气、防止呼吸表浅的功能。肾在体合骨，生髓，其华在发，开窍于耳及二阴，在志为恐，在液为唾，与自然界冬气相通应；肾与膀胱相表里。"},
        {type:"table", headers:["脏","在体","开窍","其华","在志","在液","时应"],
          rows:[
            ["心","脉","舌","面","喜","汗","夏"],

        {type:"h4",text:"七、六腑的生理功能"},
        {type:"ul", items:[
          "胆——贮藏和排泄胆汁，助脾胃运化水谷，又主决断，与人的精神情志活动有关，为“中精之腑”；因其内藏精汁而不直接传化水谷糟粕，故胆又兼属奇恒之腑，是唯一具有双重属性的腑。",
          "胃——主受纳、腐熟水谷，为“太仓”“水谷之海”；胃气以降为顺，主通降，与脾之升清相辅相成，脾胃合称“后天之本”。",
          "小肠——主受盛化物，泌别清浊，将食物残渣下输大肠，水液渗入膀胱。",
          "大肠——主传导糟粕，为“传导之官”，并参与水液吸收，形成粪便排出体外。",
          "膀胱——贮尿排尿，其功能有赖于肾气的蒸腾气化。",
          "三焦——为水液和元气运行的通道，总司全身气机和气化，按部位分为上焦（心肺，主宣发布散，其气如雾）、中焦（脾胃，主腐熟运化，其气如沤）、下焦（肝肾、大小肠、膀胱，主分别清浊、排泄二便，其气如渎）。"
        ]},
        {type:"h4",text:"八、奇恒之腑"},
        {type:"p",text:"奇恒之腑包括脑、髓、骨、脉、胆、女子胞，其形态多中空似腑，功能却贮藏精气似脏。脑为“元神之府”，由髓汇聚而成，主宰人的精神意识思维活动及感觉运动功能；髓分骨髓、脊髓、脑髓，具有充养脑髓、滋养骨骼、化生血液的作用；脉为血府，是气血运行的通道；女子胞（胞宫）主行月经、孕育胎儿，其生理功能与肾气、天癸、冲任二脉及心肝脾的作用密切相关。"},
        {type:"h4",text:"九、脏腑之间的关系——脏与脏"},
        {type:"ul", items:[
          "心与肺：体现在心主血、肺主气的相互为用，心主行血，肺主呼吸，二者协调保证气血的正常运行，“肺朝百脉”即赖心气的推动。",
          "心与脾：体现在血液生成（脾为生血之源，心主行血）与运行（心主血，脾统血）两方面的相互为用。",
          "心与肝：体现在血液运行（心主血脉，肝藏血）与精神情志（心藏神，肝藏魂、主疏泄）两方面的相互为用。",
          "心与肾：主要体现为“心肾相交”“水火既济”——心属火居上，肾属水居下，心火下降以温肾水，肾水上济以润心火，维持动态平衡；若失调则为“心肾不交”。",
          "肺与脾：体现在气的生成（肺主呼吸之气，脾为生气之源）与水液代谢（肺主通调水道，脾主运化水液）两方面。",
          "肺与肝：体现在气机升降的调节，肝气主升发，肺气主肃降，二者相互制约、协调全身气机。",
          "肺与肾：体现在呼吸运动（肺主呼气，肾主纳气，“肺为气之主，肾为气之根”）、水液代谢（“金水相生”）及阴液相互滋生方面。",
          "肝与脾：体现在疏泄与运化（肝主疏泄协调脾胃气机升降）以及藏血与统血方面的关系。",
          "肝与肾：“肝肾同源”（乙癸同源）——肝藏血，肾藏精，精血同源互化；肝肾阴阳之间也相互制约、相互依存。",
          "脾与肾：体现“先天与后天相互资生”——脾之运化赖肾阳温煦，肾中精气赖脾运化水谷精微不断充养。"
        ]},
        {type:"h4",text:"十、脏腑之间的关系——脏与腑、腑与腑"},
        {type:"p",text:"脏与腑之间通过经脉相互络属，构成表里关系：心与小肠相表里，肺与大肠相表里，脾与胃相表里，肝与胆相表里，肾与膀胱相表里，心包与三焦相表里。脏行气于腑，腑输精于脏，生理上相互为用，病理上相互影响、相互传变（如心火可下移小肠、脾胃升降失常可相互影响）。腑与腑之间以通为用、以降为顺，主要体现在饮食物消化、吸收和排泄过程中的相互配合：胃主受纳腐熟，小肠泌别清浊，大肠传导糟粕，三焦为水谷通行与气化的场所，膀胱贮尿排尿，胆助脾胃运化，共同完成“泻而不藏”“动而不静”的生理过程。"}
      ],
      keypoints:[
        "五脏共同生理特点：“藏而不泻”“满而不能实”；六腑共同生理特点：“泻而不藏”“实而不能满”。",
        "心主血脉、主藏神，为“君主之官”“五脏六腑之大主”；肺主气司呼吸、主宣发肃降、通调水道、朝百脉主治节，为“相傅之官”，“肺为水之上源”。",
        "脾主运化、主统血、主升清，为“后天之本”“气血生化之源”；肝主疏泄、主藏血，体阴而用阳，为“刚脏”“将军之官”。",
        "肾主藏精、主水、主纳气，为“先天之本”“封藏之本”，“五脏阴阳之根本”。",
        "五脏在体、开窍、其华、在志、在液、时应对应关系是极高频考点：心-脉-舌-面-喜-汗-夏；肺-皮-鼻-毛-悲（忧）-涕-秋；脾-肉-口-唇-思-涎-长夏；肝-筋-目-爪-怒-泪-春；肾-骨-耳及二阴-发-恐-唾-冬。",
        "六腑：胆（贮藏排泄胆汁，主决断）、胃（受纳腐熟，主通降）、小肠（受盛化物，泌别清浊）、大肠（传导糟粕）、膀胱（贮尿排尿）、三焦（通行元气与水液，总司气化）。",
        "胆既属六腑又属奇恒之腑，是唯一具有双重属性的腑。",
        "三焦部位划分：上焦如雾（心肺，主宣发）、中焦如沤（脾胃，主运化）、下焦如渎（肝肾肠膀胱，主排泄）。",
        "奇恒之腑包括脑、髓、骨、脉、胆、女子胞，形态似腑而功能似脏，“藏而不泻”。",
        "脏腑表里关系：心-小肠、肺-大肠、脾-胃、肝-胆、肾-膀胱、心包-三焦。",
        "“心肾相交/水火既济”是心与肾关系的核心；“肝肾同源（乙癸同源）”是肝与肾关系的核心。",
        "“肺为气之主，肾为气之根”概括肺肾在呼吸运动中的相互协作关系（肺主呼气，肾主纳气）。"
      ],
      quiz:[
        {type:"single", q:"五脏的共同生理特点是：", options:["泻而不藏","藏而不泻","以通为用","以降为顺"], answer:1, explain:"五脏化生和贮藏精气，其共同生理特点为“藏而不泻”“满而不能实”。"},
        {type:"single", q:"被称为“五脏六腑之大主”的是：", options:["心","肺","脾","肾"], answer:0, explain:"心主血脉、主藏神，主宰全身脏腑形体官窍的生理活动，故称“君主之官”“五脏六腑之大主”。"},
        {type:"single", q:"“肺为水之上源”是指肺具有下列哪项功能？", options:["主气司呼吸","通调水道","朝百脉","主治节"], answer:1, explain:"肺的宣发肃降作用对体内水液的输布、运行和排泄起疏通调节作用，故称“肺为水之上源”。"},
        {type:"single", q:"具有“泌别清浊”功能的腑是：", options:["胃","小肠","大肠","三焦"], answer:1, explain:"小肠主受盛化物，并将食物残渣中的精微与糟粕加以分离，即“泌别清浊”。"},
        {type:"single", q:"六腑中兼具奇恒之腑属性的是：", options:["胃","胆","三焦","膀胱"], answer:1, explain:"胆内藏精汁而不直接传化水谷糟粕，故既属六腑，又归属奇恒之腑，是唯一具有双重属性的腑。"},
        {type:"single", q:"肝与肾在生理上的关系，常用哪一术语概括？", options:["水火既济","精血同源","培土生金","子病犯母"], answer:1, explain:"“肝肾同源”又称“乙癸同源”，主要体现在肝血与肾精之间相互滋生、相互转化的关系上。"},
        {type:"multi", q:"下列属于肺的生理功能的有：", options:["主气司呼吸","主宣发肃降","通调水道","主运化水液"], answer:[0,1,2], explain:"D项“主运化水液”是脾的功能，肺仅参与水液的“通调”而非“运化”，故不选D。"},
        {type:"multi", q:"下列脏腑表里关系组合正确的有：", options:["心与小肠相表里","肺与大肠相表里","脾与胆相表里","肾与膀胱相表里"], answer:[0,1,3], explain:"C项应为“脾与胃”相表里，胆与肝相表里，脾与胆并非表里关系，故C错误。"},
        {type:"multi", q:"三焦按部位划分包括：", options:["上焦","中焦","下焦","外焦"], answer:[0,1,2], explain:"三焦按部位分为上、中、下三焦，并无“外焦”的说法。"},
        {type:"multi", q:"下列属于奇恒之腑的有：", options:["脑","髓","女子胞","小肠"], answer:[0,1,2], explain:"小肠属于六腑，不属于奇恒之腑；奇恒之腑包括脑、髓、骨、脉、胆、女子胞。"},
        {type:"blank", q:"心开窍于____（请填单一器官名称）。", answer:["舌"], explain:"心在体合脉，开窍于舌，其华在面，舌象变化常能反映心的功能状态。"},
        {type:"blank", q:"脾之华在____。", answer:["唇"], explain:"脾在体合肌肉、主四肢，其华在唇，脾气健运则口唇红润有泽。"},
        {type:"blank", q:"“肾者，____之本”，是指肾藏先天之精，为脏腑阴阳之根本。（请填二字）", answer:["先天"], explain:"肾主藏精，内寓元阴元阳，为脏腑阴阳之根本，故称肾为“先天之本”。"},
        {type:"case", q:"病例分析：患者面色萎黄，食欲不振，腹胀便溏，四肢乏力，舌淡苔白。请从藏象学说角度分析其病位及诊断依据。", answer:"该患者病位主要在脾，当属脾气虚证。依据：①脾主运化，脾失健运则食欲不振、腹胀便溏；②脾主四肢肌肉，脾气虚弱则气血生化不足，不能充养四肢与肌肉，故四肢乏力；③脾其华在唇、开窍于口，脾虚则气血不能上荣于面，故面色萎黄；④舌淡苔白为脾气虚弱、运化无力、水谷精微不能化生气血的常见舌象表现。综合分析，四诊资料相互印证，可诊断为脾气虚证。", explain:""},
        {type:"case", q:"简述“心肾相交”（水火既济）的含义及其临床意义。", answer:"“心肾相交”是指心与肾之间存在的一种生理协调关系。心居上焦属火，心火当下降以温煦肾水，防止肾水寒凝；肾居下焦属水，肾水当上济以滋养心火，防止心火过亢，二者相互制约、相互为用，维持水火既济、阴阳平衡的状态。若心肾之间失去这种协调关系，肾水不能上济心火，或心火不能下温肾水，则出现“心肾不交”之证，临床可见心烦失眠、腰膝酸软、遗精盗汗等症状。心肾相交理论体现了藏象学说中脏与脏之间相互依存、相互制约的整体联系，对指导临床治疗心肾不交类疾病（如交泰丸的应用）具有重要意义。", explain:""}
      ]
    },
    {title:"第三章 精气血津液神", ready:true,
      lecture:[
        {type:"h4",text:"一、精"},
        {type:"p",text:"精，是构成人体和维持人体生命活动的最基本物质，是生命之本原。人体之精来源于禀受父母的先天之精和后天摄入的水谷之精，二者相合藏于肾中，称为“肾精”。精的生理功能包括：繁衍生命（先天之精化为生殖之精，主司生殖）、濡养脏腑组织、化血（精血同源）、化气（精气互化）、化神（精能生神养神）。先天之精与后天之精相互依存、相互资生，共同维持人体的生长发育与生殖机能。"},
        {type:"h4",text:"二、气"},
        {type:"p",text:"气，是人体内活力很强、运行不息的极精微物质，是构成人体和维持人体生命活动的最基本物质之一。人身之气来源于先天之精气（源于父母，藏于肾）、水谷之精气（源于脾胃运化）和自然界之清气（源于肺之呼吸），三者相合而成一身之气，即“真气”“正气”。气的运动称为“气机”，基本形式为升、降、出、入；气运动所产生的各种变化称为“气化”。气的生理功能可概括为六个方面：推动作用（推动人体的生长发育、脏腑经络的生理活动、血液的生成运行及津液的输布代谢）、温煦作用（温煦机体、维持体温恒定）、防御作用（护卫肌表、抵御外邪）、固摄作用（统摄血液、控制汗尿精液等排泄、固摄脏腑位置）、气化作用（推动和调控体内精气血津液等的新陈代谢及相互转化）以及营养作用。"},
        {type:"p",text:"人体之气按其组成、分布和功能特点，主要分为四种：元气（又称原气、真气，为人身最根本、最重要的气，源于肾中先天之精，赖后天水谷精气培育，是人体生命活动的原动力）、宗气（由肺吸入的自然清气与脾胃运化的水谷精气结合而成，积于胸中“气海”，其功能一是上出喉咙以司呼吸，二是贯注心脉以行气血）、营气（行于脉中，具有化生血液、营养全身的功能，与卫气相对而言属阴，称“营阴”）、卫气（行于脉外，具有护卫肌表、温养脏腑肌肉皮毛、调节控制腠理开合与汗液排泄的功能，属阳，称“卫阳”）。"},
        {type:"h4",text:"三、血"},
        {type:"p",text:"血，即血液，是运行于脉中而循环流注全身、富有营养和滋润作用的红色液态物质。血液化生的物质基础主要是水谷精微和肾精，与脾胃运化、心肺气化、肾精化血等功能密切相关，故有“脾胃为气血生化之源”之说。血液的正常运行，主要依赖心气的推动、肺气的宣降、脾气的统摄、肝气的疏泄调节及肝血的贮藏调节，多脏协同、共同维持血行脉中、周流不息。血的生理功能主要有二：一是濡养全身，为脏腑经络形体官窍的生理活动提供营养；二是化神养神，血是神志活动的物质基础，故说“血脉和利，精神乃居”。"},
        {type:"h4",text:"四、津液"},
        {type:"p",text:"津液，是机体一切正常水液的总称，包括各脏腑组织器官的正常体液及其正常分泌物，如胃液、肠液、唾液、关节液等。津和液同源于水谷，但性状、分布和功能有所不同：津，质地较清稀，流动性大，布散于体表皮肤肌肉和孔窍，并渗入血脉，起滋润作用；液，质地较稠厚，流动性小，灌注于骨节、脏腑、脑髓等组织，起濡养作用。津液的代谢是一个复杂的生理过程，主要依赖胃的受纳、脾的运化转输、肺的宣发肃降通调水道、肾的蒸腾气化、肝的疏泄以及三焦通行水道等多脏腑协同作用完成，故《内经》称“水精四布，五经并行”。津液的生理功能包括：滋润濡养、化生血液、调节阴阳、排泄代谢废物。"},
        {type:"h4",text:"五、神"},
        {type:"p",text:"神，有广义、狭义之分。广义之神，是指整个人体生命活动的外在表现，即通过形体动作、面色、眼神、言语应答、姿态等表现出来的生命活动状态；狭义之神，是指人的精神、意识、思维活动。神由先天之精气化生（“两精相搏谓之神”），并依赖后天水谷精气的不断充养。神对形体及生命活动具有统率和主宰作用，“得神者昌，失神者亡”，神的旺衰存亡直接反映着人体生命活动的盛衰存亡，故望神是中医诊断的重要内容之一。"},
        {type:"h4",text:"六、精气血津液神之间的关系"},
        {type:"p",text:"精、气、血、津液、神是人体生命活动的基本物质及其功能体现，彼此之间存在相互化生、相互为用的密切关系。气与血的关系可概括为“气为血之帅，血为气之母”：气为血之帅，体现在气能生血、气能行血、气能摄血三方面；血为气之母，体现在血能养气、血能载气两方面。气与津液的关系与气血关系相似，即气能生津、行津、摄津，津能载气。精与血的关系称为“精血同源”，肝肾精血之间可相互资生、相互转化。精、气、神被称为人身“三宝”，精可化气、气可生精，精气可化神养神，神又能驭精御气统血，三者相互为用、密不可分。"}
      ],

        "“气为血之帅，血为气之母”：气能生血、行血、摄血；血能养气、载气——高频考点。",

        {type:"multi", q:"下列关于精气血津液神相互关系的表述，正确的有：", options:["气能生血","血能载气","精血同源","神能生精"], answer:[0,1,2], explain:"D项表述颠倒，应为“精能化神”，即精是神的物质基础，而非“神能生精”，故不选D。"},
        {type:"blank", q:"人体之气按其组成、分布和功能特点，可分为元气、____、营气、卫气四种。", answer:["宗气"], explain:"宗气积于胸中，是联系先天元气与后天营卫之气的重要枢纽，主司呼吸并贯注心脉以行气血。"},
        {type:"blank", q:"“脾胃为气血生化之源”，主要是指脾胃通过____功能化生水谷精微，进而生成气血。（请填二字）", answer:["运化"], explain:"脾胃主运化水谷，是气血生化的物质来源，故称脾胃为“气血生化之源”。"},
        {type:"blank", q:"精、气、____被称为人身“三宝”。", answer:["神"], explain:"精、气、神是人体生命活动的三大基本要素，彼此相互化生、相互为用，故称“人身三宝”。"},
        {type:"case", q:"病例分析：患者面色苍白，气短懒言，动则汗出，神疲乏力，舌淡脉弱。请从气与血的关系角度分析其病机。", answer:"该患者当属气血两虚证，可从“气为血之帅，血为气之母”的关系加以分析。气虚则推动、温煦、固摄功能减弱，故见气短懒言、动则汗出（卫气不足、固摄失职）、神疲乏力；气虚生化无力，不能资助血液化生，久之则致血虚；血虚不能上荣于面，故见面色苍白；血虚又不能很好地载气、养气，气血互损，形成气血两虚之候，舌淡脉弱正是气血不足、不能充养舌脉的表现。治疗当以益气养血为法。", explain:""},
        {type:"case", q:"简述“气能生血、行血、摄血”的具体含义。", answer:"“气能生血”是指气是血液生成的动力，血液的化生依赖脾胃运化水谷精微、肾精化血等过程，这些过程均需依赖气的推动和气化作用才能完成，气旺则化生血液的功能亦强；“气能行血”是指血液的运行有赖于气的推动，如心气推动血行、肺气宣降助血敷布、肝气疏泄调畅血行，气行则血行，气滞则血瘀；“气能摄血”是指气具有统摄、控制血液在脉中正常运行、防止其逸出脉外的作用，主要体现为脾气统血的功能，气虚不摄则可导致各种出血病证。三者共同体现了“气为血之帅”的理论内涵。", explain:""}

    {title:"第四章 经络", ready:true,
      lecture:[
        {type:"h4",text:"一、经络学说概述"},
        {type:"p",text:"经络，是经脉和络脉的总称，是运行全身气血、联络脏腑肢节、沟通上下内外的通路系统。“经”，有路径的含义，是经络系统的主干，多循行于人体深部，纵行分布；“络”，有网络的含义，是经脉的分支，循行于较浅部位，纵横交错，网络全身，无处不至。经络系统由经脉和络脉组成：经脉包括十二正经（十二经脉）、奇经八脉，以及附属于十二经脉的十二经别、十二经筋、十二皮部；络脉则包括十五络脉及浮络、孙络等细小分支。"},
        {type:"h4",text:"二、十二经脉"},
        {type:"p",text:"十二经脉，即手三阴经（手太阴肺经、手厥阴心包经、手少阴心经）、手三阳经（手阳明大肠经、手少阳三焦经、手太阳小肠经）、足三阳经（足阳明胃经、足少阳胆经、足太阳膀胱经）、足三阴经（足太阴脾经、足厥阴肝经、足少阴肾经），是经络系统的主体，故又称“正经”。十二经脉的走向与交接规律为：“手之三阴，从胸走手；手之三阳，从手走头；足之三阳，从头走足；足之三阴，从足走腹（胸）”，相邻两经在四肢末端、头面部、胸腹部交接，构成一个“阴阳相贯，如环无端”的循环径路。十二经脉在体表的分布规律：手足阳经分布于四肢外侧和头面躯干，阳明在前、少阳在中、太阳在后；手足阴经分布于四肢内侧和胸腹，太阴在前、厥阴在中、少阴在后（下肢内踝上八寸以下例外，为厥阴在前、太阴在中）。十二经脉的表里关系：手足三阴三阳经通过经别和别络互相沟通，组成六对表里关系——手太阴肺经与手阳明大肠经、足阳明胃经与足太阴脾经、手少阴心经与手太阳小肠经、足太阳膀胱经与足少阴肾经、手厥阴心包经与手少阳三焦经、足少阳胆经与足厥阴肝经相为表里，相为表里的两经分别络属于相为表里的脏腑，生理上密切联系，病理上相互影响，治疗上可相互为用。十二经脉的气血流注次序为：肺→大肠→胃→脾→心→小肠→膀胱→肾→心包→三焦→胆→肝，再回流至肺，构成周而复始、如环无端的气血循环流注系统。"},
        {type:"h4",text:"三、奇经八脉"},
        {type:"p",text:"奇经八脉，即督脉、任脉、冲脉、带脉、阴跷脉、阳跷脉、阴维脉、阳维脉的总称，因其“别道奇行”，与十二正经不同，既不直接隶属于十二脏腑，又无表里配合关系，故称“奇经”。其主要功能是进一步密切十二经脉之间的联系，对十二经脉气血起着蓄积和渗灌的调节作用。其中，督脉行于腰背正中，上至头面，为“阳脉之海”，总督一身之阳经；任脉行于胸腹正中，上至颏部，为“阴脉之海”，总任一身之阴经，且与妊娠密切相关，故称“任主胞胎”；冲脉与任、督脉同起于胞中，能调节十二经气血，故有“十二经脉之海”“血海”之称；带脉横行腰腹，如束带状，能约束纵行诸经。"},
        {type:"h4",text:"四、经别、别络、经筋、皮部"},
        {type:"p",text:"十二经别，是从十二经脉别出的重要支脉，多循行于胸腹和头部，具有加强十二经脉中相为表里两经之间联系、补充十二经脉在体内外循行不足的作用。十五络脉，是从十二经脉及任、督二脉各别出一络，再加脾之大络，共十五条，分布于人体前后及身侧，具有加强表里两经在体表联系、渗灌气血以濡养全身的作用。十二经筋，是十二经脉之气濡养筋肉骨节的体系，具有连缀四肢百骸、主司关节运动的作用。十二皮部，是十二经脉功能活动反映于体表的部位，也是络脉之气散布之所在，是经络系统在皮肤的分区。"},
        {type:"h4",text:"五、经络的生理功能及经络学说的应用"},
        {type:"p",text:"经络的生理功能主要包括：沟通联系作用（联系脏腑与体表、脏腑与脏腑之间、经脉与经脉之间，使人体成为一个有机整体）、运输渗灌作用（运行气血、营养全身）、感应传导作用（感应及传导针刺或其他刺激，即“得气”现象）、调节作用（调节脏腑组织功能活动的相对平衡）。经络学说在中医学中的应用十分广泛：说明病理变化——外邪可循经络由表入里传变，脏腑病变也可通过经络反映于体表相应部位（如肝病可见胁痛、心病可见胸痛牵引肩背）；指导疾病的诊断——根据疾病所在部位及其循行经络、所络属的脏腑进行“分经辨证”（如头痛可依部位分辨其所属经脉）；指导疾病的治疗——针灸推拿强调“循经取穴”，即“经脉所过，主治所及”，中药归经理论也是经络学说在中药学中的具体应用体现。"}
      ],

        {type:"case", q:"病例分析：患者胁肋胀痛，情志不畅，烦躁易怒。请从经络学说角度分析可能涉及的经脉，并说明理由。", answer:"该患者症状可能涉及足厥阴肝经与足少阳胆经。理由：足厥阴肝经循行“抵小腹，挟胃，属肝，络胆……布胁肋”，肝主疏泄，性喜条达而恶抑郁，若情志不遂、肝气郁结、经气不利，可循经出现胁肋胀痛；肝郁化火，则见烦躁易怒。胆附于肝，足少阳胆经亦循行于胁肋部位，肝胆互为表里、经气相通，故肝郁常可累及胆经，出现该经循行部位的症状。临床辨证当属肝气郁结（或肝郁化火）证，治疗可循肝、胆经取穴，并配合疏肝理气之法。", explain:""},
        {type:"case", q:"简述经络学说在指导针灸治疗方面的具体应用，即“经脉所过，主治所及”的含义。", answer:"经络具有沟通联系、运输渗灌气血及感应传导的功能，针灸治疗正是基于这一理论展开的。“经脉所过，主治所及”是指某一经脉循行所经过的部位发生病变时，可选取该经脉上的腧穴进行治疗，即腧穴的治疗作用与其所属经脉的循行分布密切相关。例如，牙痛、咽喉肿痛等头面部病证，可选取手阳明大肠经在上肢循行部位的腧穴（如合谷穴）进行治疗，这是因为手阳明大肠经“上颈贯颊，入下齿中”，其经脉循行经过病变部位，故能“经脉所过，主治所及”。这种“循经取穴”的选穴原则，是经络学说指导针灸临床、确立配穴处方的重要理论依据。", explain:""}

    {title:"第五章 体质", ready:true,
      lecture:[
        {type:"h4",text:"一、体质的基本概念"},
        {type:"p",text:"体质，是人体生命过程中，在先天禀赋和后天获得的基础上所形成的形态结构、生理功能和心理状态方面综合的、相对稳定的固有特质，表现为个体在生长发育过程中所形成的与自然、社会环境相适应的人体个性特征。体质由先天禀赋和后天调养两方面因素共同决定：先天禀赋是体质形成的基础；后天的饮食营养、生活起居、精神情志、地理环境及疾病、药物等因素则对体质的形成和发展产生重要影响。体质具有相对稳定性、动态可变性、连续性及个体差异性等特点。"},
        {type:"h4",text:"二、体质的构成与标志"},
        {type:"p",text:"体质由形态结构、生理功能、心理特征三个方面的差异性构成。形态结构的差异，包括体表形态（体形、体格、体重等）及内部结构（脏腑组织的强弱大小等）的差异；生理功能的差异，包括脏腑经络等机能水平的差异，如脏腑之盛衰、气血之盈亏、阴阳之偏颇等；心理特征的差异，主要体现在性格、气质、认知反应方式等方面，与五脏精气盛衰及气血阴阳偏颇密切相关。"},
        {type:"h4",text:"三、体质的分类"},
        {type:"p",text:"中医体质学说的分类方法较多，其中较为经典、临床应用最广的是以阴阳气血盛衰及心理特征为依据的九分法（王琦体质分类），将人的体质分为九种：平和质（阴阳气血调和，体态适中，面色红润，精力充沛，是最为理想的体质状态）、气虚质（元气不足，以疲乏、气短、自汗等气虚表现为主要特征）、阳虚质（阳气不足，以畏寒怕冷、手足不温等虚寒表现为主要特征）、阴虚质（阴液亏少，以口燥咽干、手足心热等虚热表现为主要特征）、痰湿质（痰湿凝聚，以形体肥胖、腹部肥满、口黏苔腻等为主要特征）、湿热质（湿热内蕴，以面垢油腻、口苦、苔黄腻等为主要特征）、血瘀质（血行不畅，以肤色晦黯、舌质紫黯等血瘀表现为主要特征）、气郁质（气机郁滞，以神情抑郁、忧虑脆弱等气郁表现为主要特征）、特禀质（先天失常，包括过敏体质、遗传病体质、胎传体质等特殊禀赋类型）。除平和质外，其余八种统称为“偏颇体质”。"},
        {type:"h4",text:"四、体质学说的应用"},
        {type:"p",text:"体质学说在中医学中的应用主要体现在五个方面：说明个体对某些病因的易感性（如阳虚质易感寒邪，阴虚质易感热邪，痰湿质易感湿邪，即“同气相求”）；阐释发病的原理（体质是疾病发生的内在依据，“正气存内，邪不可干”，体质强弱决定发病与否及发病后的证候类型与传变趋向）；指导辨证（同一致病因素或同一疾病，由于体质不同，可以形成不同性质的证候，即“证”的“从化”，如同感风寒之邪，阳盛之体易从热化，阳虚之体易从寒化）；指导治疗（强调“因人制宜”，根据体质特点选择相宜的治法方药，如阳虚质忌用寒凉、阴虚质忌用温燥）；以及指导养生防病（根据不同体质类型采取相应的饮食、起居、运动调摄方法，改善偏颇体质，是中医“治未病”思想的重要体现）。"}

        {type:"blank", q:"中医体质分类中，被认为是最理想的体质状态，称为____质。", answer:["平和"], explain:"平和质阴阳气血调和，是九种体质分类中最为理想的健康体质状态。"},
        {type:"blank", q:"阳盛之体感受外邪后易从____化，阳虚之体感邪后易从寒化。（请填一字）", answer:["热"], explain:"体质影响病邪的“从化”方向：阳盛之体易从热化，阳虚之体易从寒化，这是体质学说指导辨证的重要体现。"},
        {type:"case", q:"病例分析：甲、乙二人同感风寒之邪，甲素体阳盛，乙素体阳虚。请分析二者感邪后可能出现的不同证候转归，并说明理论依据。", answer:"甲、乙二人虽同感风寒之邪，但由于体质不同，其证候转归也会有所不同：甲素体阳盛，感受风寒之邪后，邪气容易随体质从阳而化热，可能较快转化为里热证候，出现高热、口渴、便秘等阳热之象；乙素体阳虚，感受同样的风寒之邪后，机体阳气不足，无力鼓邪外出、抗邪化热，邪气反而容易随体质从阴而化寒，多表现为病程缠绵、畏寒肢冷等虚寒证候，甚至可能直中三阴。这一现象即中医体质学说中所说的“从化”，说明体质是疾病发生发展及证候转归的重要内在决定因素，同一致病因素作用于不同体质的人，可产生不同性质的病理反应，这也是“因人制宜”辨证论治原则的理论依据之一。", explain:""},
        {type:"case", q:"简述体质学说对中医养生防病（治未病）的指导意义。", answer:"体质学说认为不同体质类型的人群具有不同的生理特点和易患病倾向，如阳虚质之人易感寒邪、易患寒证，阴虚质之人易感热邪、易患燥热之证，痰湿质之人易患代谢相关疾病等。运用体质学说指导养生防病，可以：其一，根据体质类型采取相应的饮食调养措施，如阳虚质者宜食温补之品、忌食生冷寒凉；其二，根据体质特点选择适宜的运动及起居方式，如气郁质者宜多参加户外活动以疏畅情志；其三，对偏颇体质及早进行调理干预，改善其易患病的内在倾向，从而达到未病先防、既病防变的目的。这正是中医“治未病”思想在体质学说中的具体体现，也是个体化健康管理的重要理论基础。", explain:""}
      ]

    {title:"第六章 病因", ready:true,
      lecture:[
        {type:"h4",text:"一、六淫总论"},
        {type:"p",text:"六淫，即风、寒、暑、湿、燥、火（热）六种外感病邪的统称。六气（风寒暑湿燥火）本是自然界正常的气候变化，当气候变化异常（太过、不及或非其时而有其气），超过人体适应能力，或人体正气不足、抵抗力下降时，六气便成为致病因素，称为“六淫”。六淫致病具有以下共同特点：外感性（多从肌表、口鼻侵入人体）、季节性（与季节气候密切相关，如春季多风病、夏季多暑病）、地域性（与居住环境密切相关）、相兼性（可单独或两种以上邪气同时侵犯人体，如风寒、湿热并见）以及转化性（在一定条件下可相互转化，如风寒入里可化热）。"},
        {type:"h4",text:"二、六淫各邪的性质与致病特点"},
        {type:"ul", items:[
          "风邪：阳邪，其性开泄，易袭阳位（易侵犯人体上部、阳经和肌表，导致头痛、汗出、恶风）；善行而数变（病位游走不定、发病急、变化快，如行痹的关节游走性疼痛）；主动（症状具有动摇不定的特点，如眩晕、震颤、抽搐）；为百病之长（常为外邪致病的先导，多兼夹其他邪气侵犯人体，如风寒、风热、风湿）。",
          "寒邪：阴邪，易伤阳气（寒为阴邪，最易损伤人体阳气，出现畏寒、肢冷等阳虚表现）；寒性凝滞（凝结阻滞气血运行，不通则痛，故寒邪致病常见疼痛）；寒性收引（收缩牵引，寒邪侵袭可使气机、腠理、经络、筋脉收缩挛急，如恶寒无汗、肢体拘急）。",
          "暑邪：阳邪，其性炎热（暑为夏季主气，暑邪致病多表现出阳热症状，如高热、面赤、脉洪）；暑性升散，易伤津耗气（暑邪侵犯人体，易致腠理开泄而多汗，汗多伤津，津伤气耗，可见口渴、气短、乏力）；暑多挟湿（暑季多雨潮湿，暑邪常兼夹湿邪侵犯人体，表现为暑湿证）。暑邪具有明显的季节性，仅见于夏季，纯属外邪，是六淫中唯一没有内生病因与之相对应的邪气。",
          "湿邪：阴邪，易损伤阳气、阻遏气机（湿性重浊黏滞，最易损伤脾阳，导致脾失健运）；湿性重浊（症状具有沉重、秽浊的特点，如头身困重、面垢眵多）；湿性黏滞（病程缠绵，症状黏腻不爽，反复发作，如湿疹、湿痹）；湿性趋下，易袭阴位（湿邪为病多见于人体下部，如下肢浮肿、带下、淋浊）。",
          "燥邪：燥性干涩，易伤津液（燥邪致病最易损伤人体津液，出现口鼻干燥、咽干口渴、皮肤干涩皲裂、便秘尿少等干燥症状）；燥易伤肺（肺为娇脏，喜润恶燥，与外界大气直接相通，故燥邪多从口鼻而入，最易损伤肺津肺阴，出现干咳少痰、痰中带血等）。",
          "火（热）邪：阳邪，其性炎上（火热病证多表现在人体上部，如目赤、口舌生疮、咽喉肿痛）；易扰心神（心属火，火热之邪易扰动心神，出现心烦失眠、狂躁不安甚至神昏谵语）；易伤津耗气（火热之邪最易迫津外泄、消灼阴液，故常伴口渴喜饮、大便干结，且“壮火食气”）；易生风动血（热盛引动肝风，出现四肢抽搐、颈项强直，即“热极生风”；火热邪气还可灼伤脉络，迫血妄行，导致各种出血）；易致肿疡（火热之邪入于血分，聚于局部，腐蚀血肉，发为痈肿疮疡）。"
        ]},
        {type:"h4",text:"三、疠气"},
        {type:"p",text:"疠气，是一类具有强烈传染性的外感病邪，又称“戾气”“异气”“毒气”“乖戾之气”等，明代医家吴又可率先提出“疠气”致病学说（见于《温疫论》）。疠气致病具有发病急骤、病情危笃、传染性强、易于流行、一气一病、症状相似等特点。疠气的产生与气候异常、环境污染和饮食不洁、预防隔离工作不当以及社会因素等有关。"},
        {type:"h4",text:"四、七情内伤"},
        {type:"p",text:"七情，即喜、怒、忧、思、悲、恐、惊七种正常的情志活动，是人体对外界客观事物的不同反映，一般不会致病。只有当情志活动过于强烈、持久，超过了人体本身的生理和心理适应调节能力时，才能成为致病因素，导致脏腑气血功能紊乱而发病，称为“七情内伤”。其致病特点：直接伤及内脏（七情与五脏有相应的对应关系，“怒伤肝、喜伤心、思伤脾、忧悲伤肺、恐伤肾”，但情志致病并非机械对应，常涉及多脏，尤以心、肝、脾三脏最为常见）；影响脏腑气机（不同情志变化对气机的影响各不相同，即“百病生于气也”——怒则气上、喜则气缓、悲则气消、恐则气下、惊则气乱、思则气结）；影响病情变化（情志异常波动可使病情加重或迅速恶化）。"},
        {type:"h4",text:"五、饮食失宜与劳逸失度"},
        {type:"p",text:"饮食失宜是导致疾病发生的重要病因之一，主要包括饮食不节（过饥或过饱，损伤脾胃）、饮食不洁（误食腐败变质或不洁食物，损伤脾胃或引发中毒、寄生虫病等）以及饮食偏嗜（过食寒热、五味偏嗜或嗜酒无度、偏嗜某类食物，导致阴阳失调或某些营养物质缺乏）。劳逸适度有利于身体健康，但过度劳累或过度安逸均可成为致病因素：过劳包括劳力过度（过度体力劳动，耗伤形体之气，出现少气懒言、四肢困乏）、劳神过度（思虑劳神过度，耗伤心血、损伤脾气，出现心悸健忘、失眠多梦、纳呆腹胀）、房劳过度（性生活不节，耗伤肾精肾气，出现腰膝酸软、眩晕耳鸣、遗精滑泄）；过逸则指长期不参加劳动和体育锻炼，可致气血运行不畅、脾胃呆滞、正气虚弱、抗病力下降。"},
        {type:"h4",text:"六、病理产物性病因"},
        {type:"p",text:"痰饮、瘀血、结石等是在疾病过程中形成的病理产物，又能反过来作用于人体、成为新的致病因素，故称为“病理产物性病因”，又称“继发性病因”。痰饮是人体水液代谢障碍所形成的病理产物，稠浊者为痰，清稀者为饮，多与肺脾肾三脏功能失调、三焦气化不利有关，痰饮形成后可随气流窜全身，致病广泛，故有“百病多由痰作祟”之说。瘀血是指体内血液停积于经脉或器官之内、运行不畅或离经之血积存于体内而形成的病理产物，多因气滞、气虚、血寒、血热、外伤等原因导致，其致病特点为疼痛（多为刺痛，痛处固定不移，拒按，夜间加重）、肿块（色紫暗，或有硬结包块）、出血（血色紫暗或夹有血块）以及肌肤甲错、舌质紫暗或有瘀斑瘀点等表现。结石是指湿热、痰浊等邪气蕴结体内、久经煎熬而形成的沙石样病理产物，常见于胆、肾、膀胱等部位，其形成与饮食不节、情志失调、外感湿热之邪、服药不当及体质因素等有关。"},
        {type:"h4",text:"七、其他病因"},
        {type:"p",text:"其他病因主要包括外伤（创伤、烧烫伤、冻伤、虫兽咬伤等）、诸虫（蛔虫、蛲虫、绦虫等寄生虫）、药邪（用药不当或药物毒性损伤人体）以及先天因素（胎弱、胎毒等禀赋异常）等，均可导致人体发病，临床应结合病史详加辨析。"}
      ],
      keypoints:[
        "六淫致病共同特点：外感性、季节性、地域性、相兼性、转化性。",
        "风为百病之长，其性开泄，善行数变，主动——考试高频“定性”题。",
        "寒性凝滞、收引，最易损伤阳气；暑为夏季主气，纯属外邪、无内暑，暑多挟湿，易伤津耗气。",
        "湿性重浊、黏滞、趋下，易困脾阳；燥性干涩，最易伤肺伤津。",

        "劳逸失度包括劳力过度、劳神过度、房劳过度及过逸（安逸过度）。",

      quiz:[
        {type:"single", q:"六淫之中，“善行而数变”是哪种邪气的致病特点？", options:["风邪","寒邪","湿邪","燥邪"], answer:0, explain:"风邪善行而数变，表现为病位游走不定、发病急、变化快，如行痹的关节游走性疼痛。"},
        {type:"single", q:"最易损伤人体阳气，其性凝滞、收引的邪气是：", options:["风邪","寒邪","暑邪","湿邪"], answer:1, explain:"寒为阴邪，最易损伤人体阳气，且寒性凝滞（致痛）、收引（致挛急）。"},
        {type:"single", q:"六淫中唯一具有明显季节性、无内生病因与之相对应的邪气是：", options:["风邪","湿邪","暑邪","燥邪"], answer:2, explain:"暑邪仅出现在夏季，纯属外邪，无“内暑”之说；其他外邪均有相应的内生病理（如内风、内寒、内湿、内燥、内火）。"},
        {type:"single", q:"七情中，“思伤”对应的脏腑是：", options:["心","肝","脾","肾"], answer:2, explain:"情志与五脏对应关系为：怒伤肝、喜伤心、思伤脾、悲（忧）伤肺、恐伤肾。"},
        {type:"single", q:"首创“疠气”致病学说的医家是：", options:["张仲景","吴又可","叶天士","朱震亨"], answer:1, explain:"明代医家吴又可著《温疫论》，首创“戾气”（疠气）致病学说。"},
        {type:"single", q:"瘀血致病最典型的疼痛特点是：", options:["胀痛，痛无定处","刺痛，痛处固定拒按","隐痛，喜温喜按","绞痛，遇冷加重"], answer:1, explain:"瘀血阻滞、不通则痛，其疼痛特点为刺痛，痛处固定不移，拒按，且夜间常加重。"},
        {type:"multi", q:"下列属于六淫致病共同特点的有：", options:["外感性","季节性","相兼性","转化性"], answer:[0,1,2,3], explain:"六淫致病的共同特点包括外感性、季节性、地域性、相兼性、转化性。"},
        {type:"multi", q:"关于七情内伤对气机的影响，下列表述正确的有：", options:["怒则气上","喜则气缓","思则气结","恐则气升"], answer:[0,1,2], explain:"D项表述错误，应为“恐则气下”而非“气升”，恐惧过度可致气机下陷，出现二便失禁等表现。"},
        {type:"multi", q:"下列属于病理产物性病因（继发性病因）的有：", options:["痰饮","瘀血","结石","六淫"], answer:[0,1,2], explain:"六淫属于外感性原发病因，而非疾病过程中形成的病理产物，故不属于病理产物性病因，D不选。"},
        {type:"blank", q:"六淫中，“其性炎上、易扰心神、易生风动血”的邪气是____邪。", answer:["火","热","火热","火(热)","火（热）"], explain:"火（热）邪属阳邪，其性炎上，易扰心神、伤津耗气、生风动血、致肿疡，是致病最广的一种外邪。"},
        {type:"blank", q:"“怒则气____”，说明大怒可致肝气上逆的病机。（请填一字）", answer:["上"], explain:"《素问·举痛论》言“怒则气上”，暴怒伤肝，可致肝气上逆，出现头痛、面红目赤，甚则呕血、昏厥等。"},
        {type:"blank", q:"瘀血、痰饮、结石等在疾病过程中形成后又反过来作用于人体、成为新致病因素的病因，统称为____性病因。（请填四字）", answer:["病理产物"], explain:"痰饮、瘀血、结石既是脏腑功能失调的病理产物，又能进一步作为致病因素引发新的病变，故称“病理产物性病因”，又称继发性病因。"},
        {type:"case", q:"病例分析：患者胸胁刺痛，痛处固定不移，拒按，夜间痛甚，舌质紫暗，可见瘀斑，脉涩。请分析其病因病机。", answer:"该患者当属瘀血为患。瘀血是血液运行不畅、停积于经脉或脏腑组织之内而形成的病理产物，其致病具有鲜明特点：本例胸胁刺痛、痛处固定不移、拒按，是瘀血阻滞、不通则痛的典型表现；夜间痛甚，是因夜属阴，血属阴，夜间阳气内敛、血行更加滞涩之故；舌质紫暗、可见瘀斑，脉涩，均为血行不畅、瘀血内阻之征。综合分析，四诊资料相互印证，可诊断为瘀血阻滞（胸胁瘀血）证，治疗当以活血化瘀、通络止痛为法。", explain:""},
        {type:"case", q:"简述“七情内伤”致病的主要特点。", answer:"七情内伤致病主要有以下特点：其一，直接伤及内脏，七情与五脏存在相应的对应关系（怒伤肝、喜伤心、思伤脾、悲忧伤肺、恐伤肾），但情志致病并非机械对应，往往涉及多脏，其中尤以心、肝、脾三脏受累最为多见；其二，影响脏腑气机，不同情志变化对气机的影响各不相同，如怒则气上、喜则气缓、悲则气消、恐则气下、惊则气乱、思则气结；其三，影响病情变化，情志的异常波动往往可使原有病情加重或诱发疾病突然恶化，如情绪剧烈波动可诱发中风、胸痹等急重病证发作。", explain:""}
      ]
    },
    {title:"第七章 发病", ready:true,
      lecture:[
        {type:"h4",text:"一、发病的基本原理"},
        {type:"p",text:"中医发病学说认为，疾病的发生关系到邪气和正气两个方面。正气，是指人体的机能活动（包括脏腑经络功能活动及其对疾病的抵抗力、康复能力）以及对外界环境的适应能力、抗邪能力；邪气，泛指各种致病因素。正气不足是疾病发生的内在根据，即“正气存内，邪不可干”；邪气是发病的重要条件，即“邪之所凑，其气必虚”。中医发病学说强调正气在发病过程中的主导地位，同时也不忽视邪气的重要作用，二者相互斗争的结果决定疾病是否发生以及发生后的病情轻重与转归。"},
        {type:"h4",text:"二、影响发病的因素"},
        {type:"p",text:"影响发病的因素主要包括：环境因素（气候变化异常、地域环境、生活工作环境等）；体质因素（体质强弱决定正气盛衰及对邪气的易感性和耐受性）；精神状态（情志舒畅则气血调和、正气充盛，情志失调则易致正气受损而发病）。三者相互作用，共同影响着疾病是否发生以及发病后的证候类型。"},
        {type:"h4",text:"三、发病类型"},
        {type:"p",text:"中医学根据邪正斗争的具体情况，将发病类型概括为：感邪即发（又称卒发、顿发，指感邪后立即发病，多见于新感外邪较盛、情志剧变、疫疠之气及中毒等）；伏而后发（指感邪后未即时发病，邪气潜伏体内，经一定时日或诱因作用后方才发病，如伏暑、伏寒、破伤风的潜伏期）；徐发（又称缓发，指感邪后缓慢发病，多见于外感湿邪或内伤久病，起病徐缓者）；继发（指在原发疾病的基础上，继而发生新的疾病，如肝阳上亢继发中风）；合病与并病（合病指两经或两个部位以上同时发病；并病指一经病证未罢又出现另一经病证）；以及复发（指疾病初愈或缓解后，由于诱因引发再度发作，可分为疾病少愈即复发、休止与复发交替、发作与缓解交替三种情形）。"}
      ],
      keypoints:[
        "发病的基本原理：正气不足是内因，邪气侵袭是重要条件——“正气存内，邪不可干”“邪之所凑，其气必虚”。",
        "中医发病观强调“正气”在发病过程中的主导地位。",
        "影响发病的因素：环境因素、体质因素、精神状态。",
        "发病类型六种：感邪即发、伏而后发、徐发、继发、合病与并病、复发。",
        "“伏而后发”的典型例子：伏暑、伏寒、破伤风（潜伏期发病）。",
        "“继发”指在原有疾病基础上产生新的病证，如肝阳上亢继发中风。",
        "复发的三种形式：疾病少愈即复发、休止与复发交替、发作与缓解交替。",
        "合病（两经或两部位同时发病）与并病（一经未罢又见他经病证）的区别是常见易混淆考点。"
      ],
      quiz:[
        {type:"single", q:"中医发病学说认为，疾病发生的内在根据是：", options:["邪气","正气不足","气候异常","情志过激"], answer:1, explain:"“正气存内，邪不可干”，正气不足是疾病发生的内在根据，邪气侵袭只是发病的重要条件。"},
        {type:"single", q:"“邪之所凑，其气必虚”所说明的发病观点是：", options:["正气强弱决定发病与否","邪气是发病的决定因素","环境因素最重要","体质与发病无关"], answer:0, explain:"此句从相反角度说明，凡邪气能够侵袭致病之处，必是正气相对虚弱之所，强调正气强弱是发病的关键。"},
        {type:"single", q:"感邪后未即时发病，经一定时日或诱因作用后方才发病，称为：", options:["感邪即发","伏而后发","继发","复发"], answer:1, explain:"“伏而后发”指邪气潜伏体内一段时间后，遇诱因而发病，如伏暑、伏寒、破伤风的潜伏期。"},
        {type:"single", q:"在原发疾病基础上继而发生新的病证（如肝阳上亢继发中风），属于哪种发病类型？", options:["合病","并病","继发","复发"], answer:2, explain:"“继发”是指在原发疾病的基础上，继而发生新的疾病，与原发病之间存在因果关系。"},
        {type:"multi", q:"下列属于中医发病类型的有：", options:["感邪即发","伏而后发","徐发","合病与并病"], answer:[0,1,2,3], explain:"中医发病类型包括感邪即发、伏而后发、徐发、继发、合病与并病、复发六种。"},
        {type:"multi", q:"下列属于“复发”表现形式的有：", options:["疾病少愈即复发","休止与复发交替","发作与缓解交替","合病与并病同时出现"], answer:[0,1,2], explain:"D项“合病与并病”是独立于复发之外的另一种发病类型，不属于复发的表现形式，故不选。"},
        {type:"blank", q:"疾病发生与发展的根本，在于人体____与邪气之间的斗争关系及其结果。（请填二字）", answer:["正气"], explain:"中医发病学说强调正气在发病过程中的主导地位，正气与邪气斗争的结果决定疾病是否发生及病情轻重。"},
        {type:"blank", q:"一经病证未罢又出现另一经病证，称为____。（请填二字）", answer:["并病"], explain:"“并病”指一经病证未罢又出现另一经病证；与之相区别的“合病”是指两经或两个部位以上同时发病。"},
        {type:"case", q:"简述“正气存内，邪不可干”与“邪之所凑，其气必虚”这两句话所体现的中医发病观。", answer:"这两句话共同体现了中医学“正气为本”的发病观。“正气存内，邪不可干”强调，只要人体正气充盛、脏腑功能协调、抗病能力强健，即使存在致病邪气，也难以侵犯人体致病，突出了正气在防御疾病中的主导作用；“邪之所凑，其气必虚”则从相反角度说明，凡是邪气能够侵袭并导致疾病发生的部位或个体，必定存在正气相对虚弱的内在基础，强调了正气不足是疾病发生的内在根据。二者相辅相成，共同说明中医发病学说虽不否认邪气是发病的重要条件，但更加强调正气的强弱在决定疾病是否发生过程中起主导和决定性作用，这也是中医“治未病”、重视扶正固本理念的重要理论依据。", explain:""}
      ]
    },
    {title:"第八章 病机", ready:true,
      lecture:[
        {type:"h4",text:"一、病机学说概述"},
        {type:"p",text:"病机，即疾病发生、发展、变化及转归的内在机理，是研究疾病发生发展变化及其转归的机制和规律的理论。中医病机学说以整体观念为指导，认为疾病的发生发展变化，与邪正斗争、阴阳失调、精气血津液的功能失常以及脏腑经络功能失调等密切相关，其中邪正盛衰与阴阳失调是病机中最基本、最普遍的一般规律。"},
        {type:"h4",text:"二、邪正盛衰"},
        {type:"p",text:"邪正盛衰，是指在疾病过程中，机体正气与致病邪气相互斗争，双方力量对比发生消长盛衰变化，这种变化关系到疾病的虚实变化，并影响疾病的发展转归。就虚实而言，“邪气盛则实，精气夺则虚”：实，主要指邪气亢盛而正气未衰，邪正相搏、斗争剧烈，多表现为病理反应比较剧烈、亢奋有余的证候，常见于外感病初中期，或由痰、食、水、血等滞留体内所形成的病证；虚，主要指正气不足、抗病能力低下，病理反应较为虚弱、衰退不足，常见于素体虚弱或疾病后期、多种慢性病证。就疾病转归而言：正胜邪退，指正气奋起抗邪、逐渐战胜邪气，使病邪对机体的作用消失或终止，是疾病好转、痊愈的基本机理；邪胜正衰，指邪气亢盛、正气渐衰，机体抗邪能力日渐低下，是疾病恶化、加重甚至死亡的基本机理；邪正相持，指邪气亢盛、正气不甚虚弱，但又不能祛邪外出，形成邪正相持局面，导致病程迁延、疾病缠绵难愈。"},
        {type:"h4",text:"三、阴阳失调"},
        {type:"p",text:"阴阳失调，是指机体阴阳消长失去平衡协调的统称，是疾病发生发展变化的内在根据，主要表现为以下病机变化：阴阳偏盛，即阴或阳的一方偏于亢盛。“阳胜则热”，阳邪侵犯人体或情志过极化火，导致阳气偏盛、机能亢奋、产热过剩，出现实热证候，且“阳胜则阴病”，阳偏盛发展到一定程度必然耗伤阴液；“阴胜则寒”，阴邪侵犯人体或阴寒内盛，导致阴气偏盛、机能抑制，出现实寒证候，且“阴胜则阳病”，阴偏盛发展到一定程度也会损伤阳气。阴阳偏衰，即阴或阳的一方虚损不足。“阳虚则寒”，阳气不足、温煦推动功能减退，出现面色㿠白、畏寒肢冷等虚寒证候；“阴虚则热”，阴液不足、滋润宁静功能减退、阴不制阳，出现潮热盗汗、五心烦热等虚热证候。阴阳互损，是指阴或阳任何一方虚损到一定程度，因阴阳互根互用关系，导致对方也随之虚损不足，形成阴阳两虚的病机：阳损及阴，指阳气虚损累及阴液化生不足，在阳虚基础上又见阴虚；阴损及阳，指阴液亏损累及阳气化生不足，在阴虚基础上又见阳虚。阴阳格拒，是阴阳盛衰发展到极点、相互排斥的病理状态，包括阴盛格阳（阴寒内盛至极，壅闭于内，逼迫阳气浮越于外，出现内真寒外假热的证候）和阳盛格阴（阳热内盛至极，深伏于里，阻隔阳气不能外达，出现内真热外假寒的证候）。阴阳亡失，包括亡阴（体内阴液大量消耗或丢失，出现汗出如油、身热肢温、脉数疾等危重证候）和亡阳（体内阳气极度衰微欲脱，出现冷汗淋漓、四肢厥冷、脉微欲绝等危重证候），二者均属病情危重之象，需及时救治。"},
        {type:"h4",text:"四、精气血津液失常"},
        {type:"p",text:"精气血津液失常，是指精、气、血、津液的生成、代谢及其相互关系失调所引起的一系列病机变化。精的失常，包括精虚（先天禀赋不足或后天失养导致精亏）与精瘀（精的施泄障碍）；气的失常，包括气虚（元气不足，脏腑功能减退）与气机失调（具体形式包括气滞、气逆、气陷、气闭、气脱）；血的失常，包括血虚、血瘀、血热、血寒及各种出血病证；津液的失常，包括津液不足（滋润濡养功能减退）与津液输布排泄障碍（导致水湿痰饮内生）。此外，精气血津液之间还存在相互影响的病机变化，如气血两虚、气滞血瘀、气随血脱、津枯血燥等，临床辨证须综合分析。"},
        {type:"h4",text:"五、疾病传变"},
        {type:"p",text:"疾病传变，是指疾病在机体脏腑经络组织中的转移和变化，主要包括病位传变与病性转化两方面。病位传变，包括表里出入（外邪由表入里，病情由轻转重；里邪出表，病情由重转轻）、六经传变（伤寒病按六经次序传变）、卫气营血传变（温病按卫、气、营、血由浅入深传变）以及脏腑传变（一脏之病可传及他脏，遵循五行生克关系所决定的“母病及子”“子病犯母”“相乘”“相侮”等规律，以及脏与腑之间的表里传变）。病性转化，主要包括寒热转化（寒证化热、热证转寒）和虚实转化（因虚致实、因实致虚、虚实夹杂）。掌握疾病传变规律，对于早期诊断、控制病情发展、确立“先安未受邪之地”的治未病策略具有重要临床指导意义，如《难经》所言“见肝之病，知肝传脾，当先实脾”。"}
      ],
      keypoints:[
        "病机是疾病发生发展变化及转归的内在机理，邪正盛衰与阴阳失调是最基本的一般规律。",

        "“阳虚则寒，阴虚则热”概括阴阳偏衰的病机——虚寒证与虚热证的病机基础，高频考点。",

      quiz:[
        {type:"single", q:"概括虚实病机基本内涵的经典表述是：", options:["“阳胜则热，阴胜则寒”","“邪气盛则实，精气夺则虚”","“阳虚则寒，阴虚则热”","“重阴必阳，重阳必阴”"], answer:1, explain:"《素问·通评虚实论》“邪气盛则实，精气夺则虚”是虚实病机的经典概括。"},
        {type:"single", q:"阴寒内盛至极、壅闭于内，逼迫阳气浮越于外，出现内真寒外假热的病机，称为：", options:["阳盛格阴","阴盛格阳","阴损及阳","阳损及阴"], answer:1, explain:"阴盛格阳是阴寒内盛至极、阳气被格拒于外所形成的真寒假热证。"},
        {type:"single", q:"“阳虚则寒”的临床表现主要属于：", options:["实寒证","虚寒证","实热证","虚热证"], answer:1, explain:"阳虚则寒是由于阳气不足、温煦推动功能减退所致，属虚寒证范畴，而非邪盛的实寒证。"},
        {type:"single", q:"患者大量出血后突然出现气息微弱、汗出肢冷、脉微欲绝，属于哪种病机？", options:["气滞","气随血脱","血瘀","气逆"], answer:1, explain:"大量出血导致气无所依附而随血外脱，是“气随血脱”的危重病机表现。"},
        {type:"single", q:"依据五行生克关系，“肝病及心”属于：", options:["母病及子","子病犯母","相乘","相侮"], answer:0, explain:"肝属木，心属火，木生火，肝为母、心为子，肝病影响到心，属于“母病及子”。"},
        {type:"single", q:"温病按卫、气、营、血由浅入深传变，属于哪种传变形式？", options:["表里出入","六经传变","卫气营血传变","脏腑传变"], answer:2, explain:"卫气营血传变是温病学说特有的病位传变规律，反映了温热病邪由浅入深的传变过程。"},
        {type:"multi", q:"下列属于气机失调具体表现形式的有：", options:["气滞","气逆","气陷","气闭"], answer:[0,1,2,3], explain:"气机失调的具体形式包括气滞、气逆、气陷、气闭、气脱，共五种。"},
        {type:"multi", q:"下列属于阴阳互损病机的有：", options:["阳损及阴","阴损及阳","阴盛格阳","最终导致阴阳两虚"], answer:[0,1,3], explain:"C项“阴盛格阳”属于阴阳格拒的范畴，而非阴阳互损，故不选C。"},
        {type:"multi", q:"疾病病位传变的形式包括：", options:["表里出入","六经传变","卫气营血传变","寒热转化"], answer:[0,1,2], explain:"D项“寒热转化”属于病性转化的范畴，而非病位传变形式，故不选D。"},
        {type:"multi", q:"下列属于亡阳证表现的有：", options:["冷汗淋漓","四肢厥冷","脉微欲绝","身热肢温、脉数疾"], answer:[0,1,2], explain:"D项“身热肢温、脉数疾”是亡阴证的表现，亡阳证多表现为冷汗淋漓、四肢厥冷、脉微欲绝等阳气外脱之象。"},

        {type:"blank", q:"阳气虚损累及阴液化生不足，在阳虚的基础上又出现阴虚，称为____及阴。（请填二字）", answer:["阳损"], explain:"“阳损及阴”是阴阳互损病机的一种类型，最终可发展为阴阳两虚。"},
        {type:"blank", q:"脏腑传变中，“见肝之病，知肝传脾”体现的治疗思想是“先安未受____之地”。（请填一字）", answer:["邪"], explain:"此语体现了根据脏腑传变规律、预先培补未受邪脏腑之气以防止疾病传变的治未病思想。"},
        {type:"case", q:"病例分析：患者身热壮盛，面赤，口渴喜冷饮，便秘尿黄，舌红苔黄，脉洪数有力。请分析其阴阳病机及证候性质。", answer:"该患者当属阳偏盛（实热证）。其病机分析：身热壮盛、面赤，为阳热亢盛、上炎于外之象；口渴喜冷饮、便秘尿黄，为阳热内盛、耗伤津液、腑气不通之征；舌红苔黄、脉洪数有力，均为里热炽盛、正邪交争剧烈的典型表现。综合分析，患者机能亢奋、产热过剩，邪正相搏剧烈，属于“阳胜则热”的实热病机，四诊资料均无虚象，故辨证为实热证，而非虚热证。治疗当以清热泻火、生津止渴为法。", explain:""},
        {type:"case", q:"简述“正胜邪退”与“邪胜正衰”两种邪正盛衰变化对疾病转归的不同影响。", answer:"“正胜邪退”是指在邪正斗争过程中，人体正气奋起抗邪，逐渐抑制或战胜邪气，使病邪对机体的损害作用逐渐消失或终止，脏腑功能和精气血津液的耗伤得以逐渐恢复，是疾病向好转和痊愈方向转归的基本机理，临床上多见于患者体质较强、正气充足、及时得到恰当治疗的情况；“邪胜正衰”则是指邪气亢盛而正气渐衰，机体抗邪能力日益低下，不能制止邪气的进一步发展，是许多疾病病情逐渐恶化、加重，甚至导致脏腑功能衰竭、阴阳离决而死亡的基本机理，临床上多见于患者体质虚弱、邪气过盛或失治误治的情况。二者是邪正斗争过程中截然相反的两种转归趋势，临床辨治的核心目标之一，即是通过扶正祛邪等治法，努力促成“正胜邪退”这一有利转归。", explain:""}
      ]

    {title:"第九章 防治原则", ready:true,
      lecture:[
        {type:"h4",text:"一、预防——治未病"},
        {type:"p",text:"预防，即采取一定措施，防止疾病的发生与发展，中医学历来强调“治未病”，包括未病先防和既病防变两个方面。未病先防，是指在疾病未发生之前，采取各种措施做好预防工作，以防止疾病的发生，主要方法包括调养正气、提高机体抗病能力（如顺应自然、调摄精神、护肾保精、体魄锻炼、饮食起居有节等养生方法）以及避免病邪侵害（如避其邪气、讲究卫生、避免外伤及虫兽伤等）。既病防变，是指在疾病发生之后，力求做到早期诊断、早期治疗，防止疾病的发展与传变，主要包括早期诊治（疾病初起，病位较浅，病情单一，正气未衰，此时及时诊治可防止疾病深入发展）以及先安未受邪之地（根据五行生克、经络脏腑传变规律，预知疾病可能传变的部位，采取预防性措施，如“见肝之病，知肝传脾，当先实脾”）。"},
        {type:"h4",text:"二、治则概述"},
        {type:"p",text:"治则，即治疗疾病时所必须遵循的基本原则，是在整体观念和辨证论治精神指导下，对治疗疾病具有普遍指导意义的准则。它不同于具体的治疗方法（治法），而是治法的总纲，对临床立法、处方、用药均具有指导意义。中医治则主要包括：正治与反治、治标与治本、扶正与祛邪、调整阴阳以及三因制宜等方面。"},
        {type:"h4",text:"三、正治与反治"},
        {type:"p",text:"正治，又称“逆治”，是指采用与疾病证候性质相反的药物进行治疗的一种常用治疗原则，适用于疾病的征象与其本质相一致的病证，是临床最常用的治则，主要包括：寒者热之（寒性病证用温热药物治疗）、热者寒之（热性病证用寒凉药物治疗）、虚则补之（虚损病证用补益药物治疗）、实则泻之（实证用攻邪泻实药物治疗）。反治，又称“从治”，是指顺从疾病假象而治的一种治疗原则，适用于疾病的征象与其本质不完全一致（即出现假象）的病证，主要包括：热因热用（用温热药治疗具有假热症状的病证，适用于阴盛格阳的真寒假热证）、寒因寒用（用寒凉药治疗具有假寒症状的病证，适用于阳盛格阴的真热假寒证）、塞因塞用（用补益药治疗具有闭塞不通症状的病证，适用于因虚而致闭阻的真虚假实证，如脾虚气弱引起的腹胀）、通因通用（用通利药治疗具有通泻症状的病证，适用于因实而致通泻的真实假虚证，如食积腹泻）。反治法实质上仍是针对疾病本质而治，与正治法在本质上是一致的，均是“治病求本”这一根本原则的体现。"},
        {type:"h4",text:"四、治标与治本"},
        {type:"p",text:"标本是一个相对的概念，用以说明病变过程中各种矛盾的主次关系，“本”一般指疾病的本质与主要矛盾方面，“标”一般指疾病的现象与次要矛盾方面。治病求本是中医治疗疾病的根本原则，但在复杂病情下，须根据标本缓急采取不同的治疗策略：“急则治标”，指标病紧急、可危及生命或影响本病治疗时，应先治标病，如大出血时先止血；“缓则治本”，指病情缓和、不急迫时，应治疗疾病的根本原因，如阴虚发热者治以滋阴；“标本兼治”，指标本俱急或标本俱不太急时，可标本同治，如气虚感冒者益气解表并行。"},
        {type:"h4",text:"五、扶正与祛邪"},
        {type:"p",text:"扶正，即扶助正气，增强体质，提高机体抗病能力，适用于以正气虚为主要矛盾的虚性病证，常用方法有补益气血阴阳及调养脏腑等。祛邪，即祛除邪气，损其有余，适用于以邪气盛为主要矛盾的实性病证，常用方法有发表、攻下、清热、消导、化痰、利水、活血化瘀等。运用扶正祛邪治则时，须仔细辨别虚实主次，掌握先后与主次：单纯扶正（适用于纯虚证）、单纯祛邪（适用于纯实证）、扶正兼祛邪（适用于正虚为主兼有邪实之虚实夹杂证）、祛邪兼扶正（适用于邪实为主兼有正虚之虚实夹杂证）以及先祛邪后扶正、先扶正后祛邪等具体运用方式，总的原则是“扶正不留邪，祛邪不伤正”。"},
        {type:"h4",text:"六、调整阴阳"},
        {type:"p",text:"调整阴阳，即根据机体阴阳失调的具体状况，损其有余、补其不足，恢复阴阳的相对平衡协调状态，是中医治疗疾病的根本法则之一。对于阴阳偏盛的实证，采用“损其有余”之法，如阳偏盛之实热证用寒凉药清泻其阳热，阴偏盛之实寒证用温热药温散其阴寒；对于阴阳偏衰的虚证，采用“补其不足”之法，如阳虚证补阳以制阴，阴虚证补阴以制阳，即“阳病治阴，阴病治阳”，也就是王冰所谓“壮水之主，以制阳光；益火之源，以消阴翳”；对于阴阳互损、阴阳两虚之证，则宜阴阳并补，但仍需分清主次。此外，还应重视“损其有余”时不可伤及不足的一方，“补其不足”时不可助长有余的一方，做到调整有度、恰到好处。"},
        {type:"h4",text:"七、三因制宜"},
        {type:"p",text:"三因制宜，即因时、因地、因人制宜，是指治疗疾病应根据季节、地域及患者体质等具体情况，制定适宜的治疗方法，体现了中医学“辨证论治”和“整体观念”的具体运用。因时制宜，是指根据不同季节气候特点考虑治疗用药的原则，如“用寒远寒，用热远热”，夏季慎用温热药，冬季慎用寒凉药；因地制宜，是指根据不同地区的地理环境特点考虑治疗用药的原则，如西北高原地区气候寒冷干燥、用药多偏温燥，东南沿海地区气候温暖潮湿、用药多偏清化；因人制宜，是指根据患者的年龄、性别、体质、生活习惯等个体差异考虑治疗用药的原则，如小儿脏腑娇嫩、用药宜轻灵，老年人气血亏虚、用药宜和缓，孕妇用药当慎用峻烈破血、走窜滑利之品。"}
      ],
      keypoints:[
        "“治未病”包括未病先防与既病防变两方面，是中医预防医学思想的核心。",
        "未病先防的关键在于调养正气、避免病邪侵害；既病防变强调早期诊治与“先安未受邪之地”。",
        "正治（逆治）与反治（从治）是“治病求本”原则下的两种具体应用方式，本质一致。",
        "正治四法：寒者热之、热者寒之、虚则补之、实则泻之。",
        "反治四法：热因热用（真寒假热）、寒因寒用（真热假寒）、塞因塞用（真虚假实）、通因通用（真实假虚）——需与病证真假属性对应记忆。",
        "“急则治标，缓则治本，标本兼治”是处理标本关系的基本原则。",
        "扶正适用于虚证，祛邪适用于实证；总原则是“扶正不留邪，祛邪不伤正”。",
        "调整阴阳：阴阳偏盛用“损其有余”，阴阳偏衰用“补其不足”。",
        "王冰“壮水之主，以制阳光”针对阴虚阳亢证（滋阴以制阳）；“益火之源，以消阴翳”针对阳虚阴盛证（补阳以消阴）——治则名言高频考点。",
        "三因制宜：因时制宜、因地制宜、因人制宜。",
        "因时制宜“用寒远寒，用热远热”体现顺应四时气候的用药原则；因人制宜需考虑年龄、性别、体质等个体差异。"
      ],
      quiz:[
        {type:"single", q:"“寒者热之”属于：", options:["正治","反治","标本兼治","三因制宜"], answer:0, explain:"“寒者热之”是用温热药治疗寒性病证，症状与本质相一致，属于正治（逆治）法。"},
        {type:"single", q:"用寒凉药物治疗具有假寒症状的真热假寒证，属于哪种治则？", options:["热因热用","寒因寒用","塞因塞用","通因通用"], answer:1, explain:"“寒因寒用”是用寒凉药治疗具有假寒症状的病证，适用于阳盛格阴所致的真热假寒证。"},
        {type:"single", q:"治疗脾虚气弱所致的腹胀，用补益药治疗，属于：", options:["塞因塞用","通因通用","寒因寒用","热因热用"], answer:0, explain:"塞因塞用适用于因虚而致闭塞不通的真虚假实证，如脾虚气弱引起的腹胀，当以补益脾气之法治疗。"},
        {type:"single", q:"大出血时应先止血以防脱证，体现的治则是：", options:["缓则治本","急则治标","标本兼治","三因制宜"], answer:1, explain:"标病紧急、可危及生命时应先治标，此即“急则治标”原则的体现。"},
        {type:"single", q:"王冰“壮水之主，以制阳光”所对应的治法是：", options:["补阳以消阴","滋阴以制阳","发汗解表","活血化瘀"], answer:1, explain:"“壮水之主，以制阳光”是指通过滋阴的方法来抑制阳亢，适用于阴虚阳亢的虚热证。"},
        {type:"single", q:"“用寒远寒，用热远热”体现的治疗原则是：", options:["因时制宜","因地制宜","因人制宜","扶正祛邪"], answer:0, explain:"此语强调根据季节气候特点用药，是“因时制宜”原则的具体体现。"},
        {type:"multi", q:"下列属于反治法的有：", options:["热因热用","寒因寒用","塞因塞用","虚则补之"], answer:[0,1,2], explain:"D项“虚则补之”属于正治法范畴，症状与本质一致，而非反治法。"},
        {type:"multi", q:"运用扶正祛邪治则的具体方式包括：", options:["单纯扶正","单纯祛邪","扶正兼祛邪","先攻后补或先补后攻"], answer:[0,1,2,3], explain:"以上四种均为临床根据虚实主次灵活运用扶正祛邪治则的具体方式。"},
        {type:"multi", q:"下列属于“三因制宜”内容的有：", options:["因时制宜","因地制宜","因人制宜","因病制宜"], answer:[0,1,2], explain:"三因制宜特指因时、因地、因人三方面，并无“因病制宜”这一固定说法，D为干扰项。"},
        {type:"blank", q:"中医预防思想“治未病”包括未病先防和____两方面。（请填四字）", answer:["既病防变"], explain:"“治未病”思想包括未病先防和既病防变两个方面，共同构成中医预防医学的核心内容。"},
        {type:"blank", q:"通因通用适用于因实而致通泻症状的____证。（请填四字，提示：症状与本质相反）", answer:["真实假虚"], explain:"通因通用是用通利药治疗具有通泻症状的病证，适用于因实邪内阻而反见通泻假象的真实假虚证，如食积腹泻。"},
        {type:"blank", q:"因地制宜是指根据不同地区的____特点，考虑治疗用药原则。（请填四字）", answer:["地理环境"], explain:"因地制宜强调根据不同地域的地理环境和气候特点来确定适宜的治疗用药方案。"},
        {type:"case", q:"病例分析：患者素体阳虚，近日又感外寒，出现四肢厥冷、面色苍白，却又见面赤如妆、口不甚渴。请分析其病机与治则。", answer:"该患者当属阴盛格阳（真寒假热）证。其病机为患者素体阳虚，复感外寒，导致阴寒之邪极盛于内、壅闭于里，逼迫体内本已不足的虚阳浮越于外，从而出现面赤如妆的假热之象；而四肢厥冷、面色苍白、口不甚渴则是阴寒内盛的真寒本质表现。治疗上不可被表面的“面赤”假热之象所迷惑而误用寒凉之品，而应根据“寒因寒用”的反治法则，采用温热药物治疗（如四逆汤类温阳散寒、引火归元），以针对其阴盛格阳的真寒本质进行治疗，这正是“治病求本”原则在反治法中的具体运用。", explain:""},
        {type:"case", q:"简述“三因制宜”治疗原则的内容及意义。", answer:"“三因制宜”是指因时、因地、因人制宜，是中医治疗疾病应根据具体情况灵活变通的重要原则，体现了中医学整体观念与辨证论治精神的具体运用。“因时制宜”是指根据不同季节气候特点确定治疗用药原则，如“用寒远寒，用热远热”，夏季慎用温热药，冬季慎用寒凉药；“因地制宜”是指根据不同地区的地理环境和气候特点确定治疗用药原则，如西北高原地区气候寒冷干燥、用药多偏温燥，东南沿海地区气候温暖潮湿、用药多偏清化；“因人制宜”是指根据患者的年龄、性别、体质、生活习惯等个体差异确定治疗用药原则，如小儿脏腑娇嫩、用药宜轻灵，老年人气血亏虚、用药宜和缓，孕妇当慎用峻烈破血、走窜滑利之品。三因制宜原则的意义在于强调治疗疾病不能千篇一律、机械套用，而应结合天时、地理、个体等多方面因素综合考虑，制定最适合患者具体情况的个体化治疗方案，这也是中医临床辨证论治精髓的重要体现。", explain:""}
      ]
    }
  ]

  chapters:[
    {title:"总论 · 中药的起源与中药学发展", ready:true,
      lecture:[
        {type:"h4",text:"一、中药的起源"},
        {type:"p",text:"中药的发现和应用凝聚了中华民族数千年来同疾病作斗争的经验总结，起源于原始社会。在漫长的生产劳动和生活实践中，先民通过观察动植物、辨别食物与毒物，逐渐积累了辨识药物、认识药性、总结疗效的经验，所谓“神农尝百草，一日而遇七十毒”的传说，正是这一漫长探索过程的生动写照。中药的发现经历了从口尝身受到有意识地积累、总结、传授的漫长过程，是中华民族长期医疗实践经验的结晶。"},
        {type:"h4",text:"二、中药学发展概况"},
        {type:"p",text:"秦汉时期，《神农本草经》问世，是我国现存最早的药学专著，全书载药365种，首创“三品分类法”（上品120种，多为补养无毒之品，可久服；中品120种，或补或攻，有毒无毒，须斟酌使用；下品125种，多为祛邪破积之品，毒性较大，不可久服），并总结了“四气五味”“七情合和”等基本药性理论，奠定了中药学的理论基础。魏晋南北朝时期，梁代陶弘景著《本草经集注》，首创按药物自然属性分类的方法，并首创“诸病通用药”分类法。唐代由政府颁布的《新修本草》（又称《唐本草》），是世界上第一部由国家颁布的药典。宋代唐慎微著《经史证类备急本草》（简称《证类本草》），集宋以前本草学之大成。金元时期，张元素著《医学启源》，重视药物的归经与升降浮沉理论，李东垣、王好古等进一步发展了药物归经、引经报使理论。明代李时珍历时27年编成《本草纲目》，全书载药1892种，附方11000余首，采用“以纲统目”的分类体系，是我国古代药学发展的最高成就，被誉为“东方药物巨典”，对世界医药学和自然科学的发展产生了深远影响。清代赵学敏著《本草纲目拾遗》，新增药物716种，补充了大量民间药和外来药。近现代以来，随着中西医结合及现代科学技术的发展，中药学在继承传统的基础上不断创新发展，中药资源普查、中药现代化研究、中药新药开发等工作持续推进。"}

        {type:"single", q:"《神农本草经》“三品分类法”中，多为补养无毒、可以久服的一类是：", options:["上品","中品","下品","以上都不是"], answer:0, explain:"上品药物多无毒或毒性极小，具有补养作用，可以久服，如人参、甘草等。"},

        {type:"blank", q:"明代医家____历时27年编成《本草纲目》。", answer:["李时珍"], explain:"李时珍历时27年，参考历代医药及有关文献八百余种，编成《本草纲目》。"},
        {type:"case", q:"简述《神农本草经》“三品分类法”的具体内容及其意义。", answer:"《神农本草经》首创药物“三品分类法”，将全书所载365种药物分为上、中、下三品：上品120种，多为补养无毒之品，无毒或毒性极小，可以久服而不伤正气，如人参、甘草等；中品120种，或补或攻，兼有无毒、有毒之品，须斟酌其性而适当使用，如当归、黄连等；下品125种，多为祛邪破积、毒性较强之品，不可长期服用，如大黄、附子等。这一分类方法是中药学史上最早的药物分类法，初步体现了根据药物毒性大小及适用范围进行分级使用的原则，对后世药物分类及安全用药具有重要的启发意义。", explain:""}

    {title:"总论 · 中药的产地与采集", ready:true,
      lecture:[
        {type:"h4",text:"一、中药的产地"},
        {type:"p",text:"天然药材的分布与生长离不开一定的自然条件，同一种药材由于产地不同，其品种质量优劣往往差异很大，历代医家在长期医疗实践中逐渐认识到药材产地与疗效之间的密切关系，由此形成了“道地药材”的概念。道地药材，是指历史悠久、产地适宜、品种优良、产量较大、炮制考究、疗效突出、带有地域特点的中药材，如“四大怀药”（河南怀山药、怀地黄、怀牛膝、怀菊花）、“浙八味”（浙江产白术、白芍、玄参、麦冬、浙贝母、延胡索）、东北的人参、鹿茸，四川的黄连、川芎、附子，广东的陈皮，云南的三七等，均是著名的道地药材。"},
        {type:"h4",text:"二、中药的采集"},
        {type:"p",text:"药用部分不同，合理的采集时节和方法也各不相同，直接影响药材的产量和质量。全草类药材一般在植物生长旺盛期或花初开时采收（如荆芥、薄荷）；叶类药材多在花蕾将开放或正在盛开时采收（如大青叶、枇杷叶）；花类药材一般在花正开放时采收，过迟则易致花瓣脱落、香味散失、有效成分损失（如金银花宜在含苞待放时采摘）；果实种子类药材通常在果实成熟时或将成熟时采收（如枸杞子、五味子）；根及根茎类药材一般在秋末或早春植物生长期采集，此时植物养分多贮藏于地下部分，药材质量最佳（如黄芩、桔梗）；树皮及根皮类药材通常在春夏之交采收（如厚朴、黄柏）；动物类药材因其种类不同，采收各异，一般以其活动季节及药用部分的成熟程度为采收原则。"}
      ],
      keypoints:[
        "“道地药材”指历史悠久、产地适宜、品种优良、疗效突出、带有地域特点的中药材。",
        "常见道地药材举例：“四大怀药”（河南）、“浙八味”（浙江）、东北人参鹿茸、四川黄连川芎附子、广东陈皮、云南三七。",
        "全草、叶类药材多在植物生长旺盛期或花初开、花蕾期采收。",
        "花类药材宜在花正开放或含苞待放时采收，防止香气与有效成分散失。",
        "果实种子类药材多在成熟或将成熟时采收。",
        "根及根茎类药材宜在秋末或早春植物生长期采集，此时养分贮藏地下、药效最佳。"
      ],
      quiz:[
        {type:"single", q:"“浙八味”是指产于哪个省份的道地药材？", options:["河南","浙江","四川","云南"], answer:1, explain:"“浙八味”是浙江所产白术、白芍、玄参、麦冬、浙贝母、延胡索等著名道地药材的统称。"},
        {type:"single", q:"根及根茎类药材一般在何时采收质量最佳？", options:["春夏之交","花正开放时","秋末或早春","果实成熟时"], answer:2, explain:"秋末或早春时节，植物养分多贮藏于地下根及根茎部分，此时采收药材质量最佳。"},
        {type:"single", q:"四川所产的著名道地药材不包括：", options:["黄连","川芎","附子","三七"], answer:3, explain:"三七为云南著名道地药材，而非四川；四川著名道地药材包括黄连、川芎、附子等。"},
        {type:"single", q:"花类药材（如金银花）一般应在何时采摘，以保证有效成分不散失？", options:["花完全盛开后","含苞待放时","花瓣脱落后","成熟结果后"], answer:1, explain:"花类药材若采收过迟，易致花瓣脱落、香味散失、有效成分损失，故金银花等宜在含苞待放时采摘。"},
        {type:"multi", q:"下列关于药材采收时节的表述，正确的有：", options:["全草类多在生长旺盛期采收","花类宜在花正开放或含苞待放时采收","果实种子类多在成熟或将成熟时采收","根及根茎类宜在夏季生长旺盛期采收"], answer:[0,1,2], explain:"D项错误，根及根茎类药材一般宜在秋末或早春采集，而非夏季生长旺盛期，此时地上部分虽茂盛，但根部养分尚未充分贮藏。"},
        {type:"blank", q:"历史悠久、产地适宜、品种优良、疗效突出、带有地域特点的中药材，称为____药材。（请填二字）", answer:["道地"], explain:"“道地药材”是中医药长期临床实践中对药材产地与疗效关系的经验总结。"},
        {type:"case", q:"简述“道地药材”的概念及其在中药材质量评价中的意义。", answer:"“道地药材”是指历史悠久、产地适宜、品种优良、产量较大、炮制考究、疗效突出、带有地域特点的中药材，如东北人参、四川黄连、云南三七等。其意义在于：药材的产地与其品种、生态环境密切相关，直接影响药材中有效成分的含量和药效的发挥，同一种药材若产自不同地域，其质量优劣可能存在显著差异。因此，道地药材的概念是中医药长期临床实践中对药材产地与疗效关系的经验总结，强调“择地而生、择地而用”，对保证中药材的质量、疗效及临床用药的可靠性具有重要指导意义，也是当代中药材规范化种植及质量控制的重要理论依据。", explain:""}
      ]
    },
    {title:"总论 · 中药的炮制", ready:true,
      lecture:[
        {type:"h4",text:"一、炮制的目的"},
        {type:"p",text:"中药炮制，是指药物在应用或制成各种剂型前，根据医疗、调剂、制剂的不同要求，以及药材自身的性质，所采取的一系列传统制药技术。其目的主要包括：降低或消除药物的毒性或副作用（如生半夏、生南星有毒，经炮制后可减低毒性）；改变或缓和药物的性能（如生地黄性寒凉血，炮制为熟地黄后转为温补肝肾）；增强药物疗效（如延胡索醋炙后可增强活血止痛之效）；改变或增强药物作用的部位或趋向（如砂仁盐炙后可引药下行，增强温肾功效）；便于调剂和制剂（如矿物、贝壳类药材煅制后便于粉碎）；利于贮存及保存药效（如许多药材经过干燥、蒸煮等炮制处理后可防止霉变虫蛀）；矫臭矫味，便于服用（如动物类药材经炮制后可去除腥味）。"},
        {type:"h4",text:"二、炮制的方法"},
        {type:"p",text:"中药炮制的方法多种多样，主要可归纳为以下几类：修治（纯净处理、粉碎处理、切制处理，如挑选、洗涤、切片等）；水制（用水或其他液体辅料处理药材的方法，如漂洗、浸泡、闷润、水飞等，水飞法常用于矿物、贝壳类药物如朱砂、雄黄，可使药物粉碎得更细腻并除去杂质）；火制（将药物直接或间接用火加热处理的方法，包括炒、炙、煅、煨、烘焙等——炒法又分清炒（炒黄、炒焦、炒炭）与加辅料炒（麸炒、砂炒、米炒等）；炙法是加入液体辅料（酒、醋、蜜、盐水、姜汁等）拌炒的方法，如蜜炙甘草、酒炙当归、醋炙延胡索、盐炙杜仲；煅法适用于矿物、贝壳类质地坚硬的药物，如煅牡蛎、煅龙骨）；水火共制（既要用水又要用火，或用蒸汽加热处理的方法，包括蒸、煮、婵等，如酒蒸何首乌、蒸制熟地黄）；以及其他制法（如发酵、发芽、制霜等特殊炮制方法，如六神曲的发酵制法、麦芽的发芽炮制法）。"}

        {type:"case", q:"简述中药炮制“炙法”的含义及常用辅料，并各举一例说明其炮制意义。", answer:"“炙法”是指将净选或切制后的药物加入一定的液体辅料拌炒的炮制方法，其常用辅料及意义包括：酒炙——如酒炙当归，借酒性活血通络之力，增强药物活血化瘀的功效；醋炙——如醋炙延胡索，借醋性收敛入肝之力，增强药物活血止痛、疏肝解郁的功效；蜜炙——如蜜炙甘草，借蜂蜜甘缓补中之性，增强药物补中益气、润肺止咳的功效；盐炙——如盐炙杜仲、盐炙砂仁，借盐味咸能入肾之性，引药下行，增强药物补益肝肾或温肾纳气的功效；姜炙——如姜炙厚朴，借生姜温散之性，增强药物温中止呕、化痰的功效。可见，炙法炮制的核心意义在于借助不同辅料的药性特点，调整、增强或改变原药物的功效趋向，以更好地满足临床辨证用药的需要。", explain:""}

    {title:"总论 · 药性理论", ready:true,
      lecture:[
        {type:"h4",text:"一、四气"},
        {type:"p",text:"四气，即寒、热、温、凉四种药性，又称“四性”，是药物作用于机体所发生的不同反应和治疗效果的概括，其中温热与寒凉是两类不同的性质，而寒与凉、热与温则分别只是程度上的不同（“凉次于寒”“温次于热”）。四气的确定，是从药物作用于机体所产生的反应中概括出来的，是与所治疗疾病的寒热性质相对而言：能够减轻或消除热证的药物，一般属于寒性或凉性，如黄芩、板蓝根能清热解毒，治疗热证，表明其药性属寒；能够减轻或消除寒证的药物，一般属于温性或热性，如附子、干姜能温里散寒，治疗寒证，表明其药性属热。此外，还有一些药物寒热之性不甚显著，称为“平性”药，但严格而言，平性也有偏温偏凉的差异，故仍称“四气”而不称“五气”。四气对临床用药具有重要指导意义：治疗热性病证宜选用寒凉性药物（“热者寒之”），治疗寒性病证宜选用温热性药物（“寒者热之”）。"},
        {type:"h4",text:"二、五味"},
        {type:"p",text:"五味，即辛、甘、酸、苦、咸五种不同的药味，是药物真实滋味的反映，也是药物作用规律的高度概括，此外还有淡味、涩味，习惯上仍称“五味”。辛味“能散能行”，具有发散、行气、活血的作用，多用于治疗表证及气滞血瘀之证，如麻黄发散风寒、木香行气止痛；甘味“能补能缓能和”，具有补益、缓急、调和药性的作用，多用于治疗虚证及调和药性、缓急止痛，如人参大补元气、甘草调和诸药；酸味（涩味）“能收能涩”，具有收敛固涩的作用，多用于治疗体虚多汗、久泻久痢、遗精滑精等滑脱不禁之证，如五味子敛肺止咳、乌梅涩肠止泻；苦味“能泄能燥能坚”，具有清泄火热、通泄大便、燥湿、坚阴（泻火存阴）的作用，多用于热证、便秘、湿证等，如黄连苦寒清热燥湿、大黄苦寒泻下通便；咸味“能软能下”，具有软坚散结、泻下通便的作用，多用于瘰疬痰核、瘿瘤、癥瘕痞块及热结便秘等证，如牡蛎软坚散结、芒硝泻下通便。淡味“能渗能利”，具有渗湿利水的作用，多用于水肿、小便不利之证，如茯苓、猪苓淡渗利湿。"},
        {type:"h4",text:"三、升降浮沉"},
        {type:"p",text:"升降浮沉，是药物对人体作用的不同趋向性，是说明药物作用性质的另一重要概念。升，即上升提举，趋向于上；降，即下降平抑，趋向于下；浮，即向外发散，趋向于外（表）；沉，即向内收敛泄利，趋向于内（里）。一般而言，升浮性药物大多能够上行向外，具有升阳、发表、散寒、催吐等作用，如麻黄发汗解表、升麻升阳举陷；沉降性药物大多能够下行向内，具有潜阳、降逆、收敛、清热、渗利、泻下、止咳平喘等作用，如代赭石重镇降逆、大黄泻下通便。药物升降浮沉的性质，与其性味、质地及炮制、配伍等因素密切相关：一般而言，凡味属辛甘、性属温热的药物，大多属升浮；凡味属酸苦咸涩、性属寒凉的药物，大多属沉降；此外，花、叶、皮、枝等质轻的药物大多主升浮（如“诸花皆升”，但旋覆花例外，其性沉降），种子、果实、矿物、贝壳等质重的药物大多主沉降（如“诸子皆降”，但苍耳子、蔓荆子例外，其性升浮）；炮制及配伍也可以改变药物升降浮沉的性质，如酒炒则升、姜制则散、醋炒则收敛、盐炒则下行。"},
        {type:"h4",text:"四、归经"},
        {type:"p",text:"归经，是指药物对于机体某部分的选择性作用，即主要对某些脏腑经络发生明显作用，而对其他脏腑经络作用较小或没有作用，这种药物作用的定位概念，即称“归经”。归经理论是在脏象学说和经络学说的基础上，以药物所治疗病证的脏腑经络定位为依据总结出来的，如桔梗、杏仁能治疗胸闷咳喘等肺经病证，故归肺经；柴胡、龙胆草能治疗胁痛、口苦等肝经病证，故归肝经。归经理论对临床辨证用药具有重要指导意义，可以帮助医者更加准确地依据脏腑经络的病位选择用药，提高治疗的针对性。"},
        {type:"h4",text:"五、毒性"},
        {type:"p",text:"中药的毒性，是指药物对机体产生的不良作用及损害性。古代文献中，“毒药”一词有广义与狭义之分：广义的“毒”泛指药物的偏性，“是药三分毒”，即认为一切药物都具有一定的偏性，这种偏性正是药物发挥治疗作用的基础；狭义的“毒”则专指药物对人体产生的毒性作用和损害性，即现代所说的中药毒性。产生中药毒性的原因主要包括：药物本身所含的毒性成分（如乌头碱、马钱子碱等）、剂量过大、炮制不当、配伍不当、用药时间过长以及个体差异等。为保证临床用药安全，应严格遵循国家药典规定的剂量、炮制规范及配伍禁忌，对有毒药物尤应审慎使用。"}

        {type:"blank", q:"四气是指____、热、温、凉四种药性。（请填一字）", answer:["寒"], explain:"四气即寒、热、温、凉四种药性，反映药物纠正机体寒热病理偏向的作用。"},
        {type:"blank", q:"“诸子皆降”的例外药物包括苍耳子和____子。（请填二字）", answer:["蔓荆"], explain:"苍耳子、蔓荆子虽属果实种子类，但其性升浮，善于疏散风热，是“诸子皆降”的例外。"},
        {type:"blank", q:"归经理论是在脏象学说和____学说的基础上总结出来的。（请填二字）", answer:["经络"], explain:"归经理论以脏象学说和经络学说为基础，结合药物所治病证的脏腑经络定位总结而成。"},
        {type:"case", q:"病例分析：某患者因外感风寒，恶寒发热、无汗、脉浮紧，医家选用麻黄治疗。请从四气五味及升降浮沉理论分析麻黄的药性特点及其治疗依据。", answer:"麻黄药性辛、微苦，温，归肺、膀胱经。从四气来看，麻黄性温，能够温散风寒，针对本例风寒外束的病机，符合“寒者热之”的用药原则；从五味来看，麻黄味辛，“能散能行”，具有发散解表的作用，善于宣肺发汗、散风寒之邪；从升降浮沉来看，麻黄质轻、味辛性温，其作用趋向属于升浮，能够开泄腠理、发汗解表，使外束之风寒之邪随汗而解。综合来看，麻黄辛温升浮、发汗力强的药性特点，正与本例风寒束表、腠理闭塞、无汗恶寒的病机相契合，故为治疗风寒表实证的要药。", explain:""},
        {type:"case", q:"简述中药“归经”理论的含义及其临床意义。", answer:"归经，是指药物对于机体某一部分（脏腑经络）的选择性作用，即药物主要对某些脏腑经络发生明显作用，而对其他脏腑经络作用较小或没有作用。归经理论是在中医脏象学说和经络学说的基础上，以药物所治疗病证的脏腑经络定位为依据总结出来的，例如桔梗、杏仁能治疗胸闷、咳喘等肺系病证，故归肺经；柴胡、龙胆草能治疗胁痛、口苦等肝胆病证，故归肝（胆）经。归经理论的临床意义在于：它为临床辨证用药提供了更为精准的定位依据，医者可以根据辨证得出的病位（脏腑经络），结合归经理论选择针对性更强的药物，从而提高治疗的准确性和有效性，这也是中药学“辨证选药”思想的重要理论基础之一。", explain:""}
      ]
    },
    {title:"总论 · 中药的配伍", ready:true,
      lecture:[
        {type:"h4",text:"一、配伍的含义"},
        {type:"p",text:"配伍，是指根据病情需要和药物性能，有选择地将两种以上的药物配合应用。药物配伍应用是中医临床用药的主要形式，通过合理配伍，可以增强药物疗效、扩大治疗范围、适应复杂病情、调节或制约药物的偏性和毒副作用，从而更好地发挥药物的治疗作用。"},
        {type:"h4",text:"二、配伍关系——七情"},
        {type:"p",text:"前人在长期临床实践中，将中药配伍关系归纳为“七情”，即单行、相须、相使、相畏、相杀、相恶、相反七种情况。单行，是指单独使用一种药物即可发挥治疗效果，不需要其他药物辅助，如独参汤单用人参治疗气虚欲脱之证；相须，是指两种性能功效相类似的药物配合应用，可以增强原有疗效，如石膏配知母以增强清热泻火之功；相使，是指以一种药物为主，另一种药物为辅，两药合用，辅药可以提高主药的疗效，如黄芪配茯苓治疗脾虚水肿，茯苓能增强黄芪补气利水的功效；相畏，是指一种药物的毒性或副作用能被另一种药物减轻或消除，如生半夏畏生姜（生姜能减轻或消除生半夏的毒性）；相杀，是指一种药物能减轻或消除另一种药物的毒性或副作用，如生姜杀生半夏之毒，实际上相畏与相杀是同一配伍关系从不同角度的表述；相恶，是指两种药物合用后，一种药物能使另一种药物原有功效降低甚至丧失，如人参恶莱菔子，莱菔子能削弱人参的补气作用；相反，是指两种药物合用后能产生或增强毒性反应或副作用，属于配伍禁忌，如“十八反”“十九畏”中所列举的药物组合。"},
        {type:"h4",text:"三、配伍关系在临床中的应用意义"},
        {type:"p",text:"七情配伍理论中，相须、相使体现了药物配伍协同增效的关系，是临床复方配伍用药、增强疗效的重要依据，也是“药对”配伍研究的理论基础；相畏、相杀体现了药物配伍减毒的关系，在使用有毒药物时，常通过配伍相畏相杀的药物以降低毒性、保证用药安全；相恶体现了药物配伍后功效减弱、相互拮抗的关系，临床用药时应尽量避免；相反体现了药物配伍禁忌，属于绝对不能配伍应用的情况，是临床安全用药必须遵循的重要原则。因此，掌握七情配伍理论，对于指导临床合理组方、增强疗效、降低毒副作用、保证用药安全具有重要的现实意义。"}
      ],
      keypoints:[
        "配伍七情：单行、相须、相使、相畏、相杀、相恶、相反。",
        "单行——单独用药即可起效，如独参汤单用人参。",
        "相须——性能相类似药物配合，增强疗效，如石膏配知母。",
        "相使——一主一辅，辅药提高主药疗效，如黄芪配茯苓。",
        "相畏/相杀——是同一配伍关系的两种角度表述：“甲药畏乙药”即“乙药杀甲药之毒”，如生半夏畏生姜（生姜杀半夏毒）。",
        "相恶——一药能使另一药原有功效降低甚至丧失，如人参恶莱菔子。",
        "相反——合用后产生或增强毒性，属配伍禁忌，如十八反十九畏所列药物组合。",
        "相须、相使体现协同增效，是复方配伍增强疗效的理论依据；相反是临床绝对禁忌的配伍关系。"
      ],
      quiz:[
        {type:"single", q:"独参汤单用人参治疗气虚欲脱之证，体现的配伍关系是：", options:["相须","相使","相恶","单行"], answer:3, explain:"单行是指单独使用一种药物即可发挥治疗效果，独参汤单用人参救急即为典型例子。"},
        {type:"single", q:"石膏配知母以增强清热泻火之功，属于哪种配伍关系？", options:["相须","相使","相畏","相反"], answer:0, explain:"相须是指两种性能功效相类似的药物配合应用，可以相互增强原有疗效。"},
        {type:"single", q:"生半夏畏生姜，是指：", options:["生姜能增强半夏的功效","生姜能减轻或消除半夏的毒性","半夏能削弱生姜的功效","二者合用产生毒性"], answer:1, explain:"相畏是指一种药物的毒性或副作用能被另一种药物减轻或消除，生姜能减轻或消除生半夏的毒性。"},
        {type:"single", q:"人参恶莱菔子，是指莱菔子能：", options:["增强人参补气之效","减轻人参的毒性","削弱人参的补气作用","与人参产生剧毒反应"], answer:2, explain:"相恶是指两药合用后，一药能使另一药原有功效降低甚至丧失，莱菔子能削弱人参的补气作用。"},
        {type:"single", q:"属于中药配伍禁忌、合用后能产生或增强毒性反应的配伍关系是：", options:["相须","相使","相恶","相反"], answer:3, explain:"相反是指两种药物合用后能产生或增强毒性反应或副作用，属于配伍禁忌，如十八反十九畏所列药物组合。"},
        {type:"multi", q:"属于中药配伍“七情”内容的有：", options:["单行","相须","相使","归经"], answer:[0,1,2], explain:"D项“归经”属于药性理论范畴，不属于配伍七情内容。"},
        {type:"multi", q:"下列配伍关系中，体现协同增效的有：", options:["相须","相使","相恶","相反"], answer:[0,1], explain:"C项“相恶”是功效相互削弱的关系，D项“相反”是产生毒性的配伍禁忌关系，二者均不体现协同增效。"},
        {type:"multi", q:"下列关于“相畏”“相杀”关系表述正确的有：", options:["二者是同一配伍关系从不同角度的表述","相畏指毒性被减轻","相杀指能减轻他药毒性","二者是完全独立无关的两种配伍关系"], answer:[0,1,2], explain:"D项错误，相畏与相杀实际上是同一配伍关系（一种药物的毒性被另一种药物减轻或消除）从不同角度的两种表述，并非相互独立。"},
        {type:"blank", q:"中药配伍关系中，合用后能使一种药物原有功效降低甚至丧失的关系，称为____。（请填二字）", answer:["相恶"], explain:"“相恶”是指两药合用后，一种药物能使另一种药物原有功效降低甚至丧失，如人参恶莱菔子。"},
        {type:"blank", q:"十八反、十九畏所列举的药物组合，属于配伍七情中的____关系，是临床用药的绝对禁忌。（请填二字）", answer:["相反"], explain:"“相反”是指两药合用后能产生或增强毒性反应或副作用，属于配伍禁忌，绝对不能配伍应用。"},
        {type:"case", q:"简述中药“七情配伍”中相须、相使与相畏、相杀在临床应用意义上的区别。", answer:"相须与相使体现的是药物配伍后协同增强疗效的关系：相须是指两种性能功效相类似的药物配合应用（如石膏配知母），可以相互增强原有疗效；相使是以一种药物为主、另一种药物为辅（如黄芪配茯苓），辅药能够提高主药的疗效。二者共同的临床意义在于指导医者通过合理配伍来增强复方的治疗效果，是组方配伍、增效减量的重要理论依据。相畏与相杀则体现的是药物配伍后减轻或消除毒副作用的关系：相畏是指一种药物的毒性能被另一种药物减轻或消除（如生半夏畏生姜），相杀则是从另一角度表述这一关系（如生姜杀半夏之毒），二者实际上是同一配伍关系的两种不同表述角度。其临床意义在于：在使用一些具有毒性或峻烈之性的药物时，可以通过配伍相畏相杀关系的药物来降低毒性、保证用药安全，是中医“减毒增效”用药思想的重要体现。", explain:""}
      ]
    },
    {title:"总论 · 用药禁忌", ready:true,
      lecture:[
        {type:"h4",text:"一、配伍禁忌"},
        {type:"p",text:"配伍禁忌，主要是指某些药物合用后会产生或增强毒性反应或副作用，属于中药“七情”配伍中的“相反”关系，临床应当避免配伍应用。历代医家在长期实践中总结出“十八反”“十九畏”作为配伍禁忌的代表性歌诀。“十八反”歌诀：本草明言十八反，半蒌贝蔹及攻乌，藻戟遂芫俱战草，诸参辛芍叛藜芦——即乌头（川乌、草乌、附子）反半夏、瓜蒌、贝母、白蔹、白及；甘草反甘遂、大戟、芫花、海藻；藜芦反人参、丹参、玄参、沙参、苦参、细辛、芍药。“十九畏”歌诀：硫黄原是火中精，朴硝一见便相争；水银莫与砒霜见，狼毒最怕密陀僧；巴豆性烈最为上，偏与牵牛不顺情；丁香莫与郁金见，牙硝难合荆三棱；川乌草乌不顺犀，人参最怕五灵脂；官桂善能调冷气，若逢石脂便相欺——即列举了硫黄与朴硝、水银与砒霜、狼毒与密陀僧、巴豆与牵牛子、丁香与郁金、牙硝（芒硝）与三棱、川乌草乌与犀角、人参与五灵脂、官桂（肉桂）与赤石脂等九组配伍禁忌的药物组合。需要注意的是，“十八反”“十九畏”并非绝对不可逾越，古今医家在特定情况下也有反畏并用的临床经验和实验研究报道，但作为一般用药原则，仍应严格遵守配伍禁忌，非有充分依据和特殊需要，不宜盲目尝试。"},
        {type:"h4",text:"二、妊娠用药禁忌"},
        {type:"p",text:"妊娠用药禁忌，是指某些药物具有损害胎儿、导致堕胎或影响母体健康的作用，妇女妊娠期间应当禁用或慎用。根据药物对胎儿及孕妇危害程度的不同，可分为禁用药和慎用药两类：禁用药，大多是毒性较强或药性猛烈的药物，如巴豆、牵牛子、大戟、芫花、甘遂、商陆、麝香、三棱、莪术、水蛭、虻虫、斑蝥、马钱子、川乌、草乌、雄黄、砒霜等；慎用药，包括通经祛瘀、行气破滞及辛热滑利之品，如桃仁、红花、大黄、枳实、附子、肉桂、干姜以及一些矿石类、有小毒的药物等。凡禁用药物，妊娠期间绝对不能使用；慎用药物则应根据孕妇病情的实际需要，慎重斟酌，非必要不宜使用。"},
        {type:"h4",text:"三、服药时的饮食禁忌"},
        {type:"p",text:"服药时的饮食禁忌，又称“食忌”，俗称“忌口”，是指服药期间对某些食物的禁忌。一般而言，服药期间应忌食生冷、油腻、辛辣、腥膻等不易消化或有特殊刺激性的食物，以及可能会影响药效发挥或与药物发生不良反应的食物。传统认为：服用解表透疹药时应忌食生冷、酸涩之品，以免影响透散发表；服用清热药时应忌食辛辣、油腻、煎炸之品；服用温补药时应忌食生冷寒凉之品；此外，古代文献还记载了一些特殊的食药禁忌，如甘草、黄连、桔梗、乌梅忌猪肉，鳖甲忌苋菜，薄荷忌鳖肉等，虽然部分传统食忌尚缺乏充分的现代科学依据，但作为传统用药经验，临床仍可参考。"}
      ],
      keypoints:[
        "配伍禁忌又称“相反”配伍，代表性歌诀为“十八反”“十九畏”。",
        "“十八反”核心内容：乌头反半夏、瓜蒌、贝母、白蔹、白及；甘草反甘遂、大戟、芫花、海藻；藜芦反人参、丹参、玄参、沙参、苦参、细辛、芍药（诸参辛芍叛藜芦）。",
        "“十九畏”核心内容需记住九组：硫黄与朴硝、水银与砒霜、狼毒与密陀僧、巴豆与牵牛、丁香与郁金、牙硝（芒硝）与三棱、川草乌与犀角、人参与五灵脂、官桂（肉桂）与赤石脂。",
        "十八反十九畏并非绝对不可逾越，但一般情况下仍应严格遵守配伍禁忌。",

        "妊娠慎用药举例：桃仁、红花、大黄、枳实、附子、肉桂、干姜等通经祛瘀、行气破滞、辛热滑利之品。",
        "服药饮食禁忌又称“食忌”“忌口”，一般忌食生冷、油腻、辛辣、腥膻等不易消化或有刺激性的食物。",
        "解表透疹药服用期间忌生冷酸涩；清热药服用期间忌辛辣油腻煎炸；温补药服用期间忌生冷寒凉。"

      quiz:[
        {type:"single", q:"“十八反”歌诀中，“诸参辛芍叛藜芦”的“诸参”不包括：", options:["人参","丹参","党参","沙参"], answer:2, explain:"十八反歌诀“诸参辛芍叛藜芦”中的“诸参”具体指人参、丹参、玄参、沙参、苦参，并不包括党参，这是常见易混淆考点。"},
        {type:"single", q:"甘草反下列哪组药物？", options:["半夏、瓜蒌、贝母","甘遂、大戟、芫花、海藻","人参、细辛、芍药","硫黄、朴硝"], answer:1, explain:"十八反歌诀中，甘草反甘遂、大戟、芫花、海藻。"},
        {type:"single", q:"“十九畏”中，人参畏：", options:["五灵脂","牵牛子","三棱","赤石脂"], answer:0, explain:"十九畏歌诀“人参最怕五灵脂”，即人参与五灵脂为配伍禁忌组合。"},

        {type:"single", q:"官桂（肉桂）在“十九畏”歌诀中畏：", options:["五灵脂","赤石脂","密陀僧","犀角"], answer:1, explain:"十九畏歌诀“官桂善能调冷气，若逢石脂便相欺”，即官桂（肉桂）与赤石脂为配伍禁忌组合。"},

        {type:"multi", q:"关于妊娠用药禁忌，下列说法正确的有：", options:["禁用药大多毒性较强或药性猛烈","慎用药包括通经祛瘀、行气破滞之品","慎用药应根据病情实际需要慎重斟酌","所有慎用药在妊娠期间均绝对不可使用"], answer:[0,1,2], explain:"D项错误，慎用药并非绝对禁止使用，而应根据孕妇病情的实际需要慎重斟酌决定是否使用。"},

        {type:"case", q:"简述“十八反”“十九畏”在临床用药中的意义及现代认识。", answer:"“十八反”“十九畏”是历代医家总结出的中药配伍禁忌代表性歌诀，分别列举了若干组合用后可能产生或增强毒性反应、不宜同时使用的药物组合，如乌头反半夏、甘草反甘遂、藜芦反人参等（十八反），以及人参畏五灵脂、川乌草乌畏犀角等（十九畏）。其临床意义在于警示医者在处方遣药、配伍组方时，应严格避免这些配伍禁忌药物组合同用，以保证患者用药安全，防止发生毒副反应。现代药理及临床研究对十八反十九畏进行了大量探索，发现部分“反药”组合在特定剂量、特定病证、特定配伍比例下并未表现出明显的毒性增强，甚至个别古方中确有反畏药物同用的记载（如甘遂半夏汤中甘草与甘遂同用），但总体而言，现有研究尚不能完全否定这些配伍禁忌的科学性和临床风险，因此作为一般性原则，临床用药仍应严格遵守十八反十九畏的配伍禁忌，非有充分依据、严密监护及特殊治疗需要，不应轻易尝试反畏药物同用。", explain:""}
      ]

    {title:"总论 · 剂量与用法", ready:true,
      lecture:[
        {type:"h4",text:"一、剂量"},
        {type:"p",text:"中药的剂量，是指临床应用时的用量，一般是指干燥后生药在汤剂中成人一日份的内服量，古代还常以“重量”（如两、钱、分等旧制单位，现已折算为公制克）来计量。确定中药剂量应考虑多种因素：药物性质与质地（毒性剧烈或作用峻猛的药物用量宜小，如砒霜、雄黄等；质地较轻的花叶类药物用量宜轻，质地较重的矿石贝壳类药物用量宜大；鲜品与干品换算时，鲜品用量一般应大于干品）；剂型与配伍（单味药或作为主药时用量可稍大，复方配伍中作为辅助药物时用量可适当减少；入汤剂用量一般较入丸散剂为大）；患者的体质、年龄、性别及病情（体质强壮者用量可稍大，体质虚弱、老人、儿童用量宜小；病情轻缓者用量宜小，病情深重者用量可适当增大）；季节及气候环境等因素也会影响临床用药剂量的确定。"},
        {type:"h4",text:"二、中药的用法"},
        {type:"p",text:"中药的用法主要包括给药途径、应用形式（剂型）及煎煮方法等。汤剂是中医临床最为常用的剂型，其煎煮方法直接影响药效的发挥，主要包括：煎药用具（宜选用陶瓷砂锅、搪瓷器皿等，忌用铁锅、铜锅，以免发生化学反应影响药效）；煎药用水与火候（一般加适量清水浸泡药物约30分钟后再煎煮，先用武火煮沸，后用文火慢煎）；特殊煎法：先煎（对于矿物、贝壳类质地坚硬、有效成分难以煎出的药物，如生石膏、龙骨、牡蛎，以及部分有毒药物如附子、乌头，需要先煎以充分煎出药效或减低毒性）；后下（对于气味芳香、久煎容易使有效成分挥发或破坏的药物，如薄荷、砂仁、豆蔻，宜在其他药物即将煎好前数分钟下锅）；包煎（对于含有绒毛、细小颗粒或糊化性较强、容易黏锅或刺激咽喉的药物，如旋覆花、车前子、蒲黄，宜用纱布包裹后再与其他药物同煎）；另煎（对于某些贵重药材，如人参、西洋参，宜单独煎煮取汁，再与其他药汁兑服，以充分利用药材、防止浪费）；烊化（对于胶类药物，如阿胶、鹿角胶，容易黏附于其他药物或锅底，宜单独加热溶化后再兑入煎好的药汁中服用）；冲服（对于某些贵重的粉末状药物或芳香易挥发的药物，如三七粉、麝香、牛黄，不宜与其他药物同煎，应研成细粉用煎好的药汁或温开水冲服）。此外，服药的时间（如空腹服、饭前服、饭后服、睡前服等）及服药的次数、温度（温服、热服、冷服）等，也应根据药物性质和病情需要适当选择。"}
      ],
      keypoints:[
        "确定中药剂量应考虑药物性质质地、剂型配伍、患者体质年龄病情及季节气候等多方面因素。",
        "毒性剧烈或作用峻猛的药物用量宜小；质地较轻（花叶类）用量宜轻，质地较重（矿石贝壳类）用量宜大。",
        "特殊煎法——先煎：矿物贝壳类（生石膏、龙骨、牡蛎）及部分有毒药物（附子、乌头）。",
        "特殊煎法——后下：气味芳香、久煎易挥发破坏的药物（薄荷、砂仁、豆蔻）。",
        "特殊煎法——包煎：含绒毛细小颗粒或黏性强、易刺激咽喉的药物（旋覆花、车前子、蒲黄）。",
        "特殊煎法——另煎：贵重药材（人参、西洋参），单独煎汁兑服，防止浪费。",
        "特殊煎法——烊化：胶类药物（阿胶、鹿角胶），单独加热溶化后兑入药汁。",
        "特殊煎法——冲服：贵重粉末或芳香易挥发药物（三七粉、麝香、牛黄），研粉用药汁或温开水冲服。",
        "煎药用具宜选陶瓷砂锅，忌用铁锅铜锅，以免发生化学反应影响药效；一般先武火煮沸后文火慢煎。"

        {type:"single", q:"三七粉、牛黄等贵重细料药，一般宜：", options:["同煎","先煎","烊化","研粉冲服"], answer:3, explain:"贵重细料粉末药不耐高温久煎且入煎造成浪费，应研成细粉用药汁或温开水冲服。"},
        {type:"single", q:"煎药用具一般不宜选用：", options:["陶瓷砂锅","搪瓷器皿","铁锅","砂锅"], answer:2, explain:"铁锅、铜锅等金属器具容易与药物发生化学反应，影响药效甚至产生不良反应，故煎药忌用。"},
        {type:"multi", q:"属于中药特殊煎法的有：", options:["先煎","后下","包煎","烊化"], answer:[0,1,2,3], explain:"中药特殊煎法主要包括先煎、后下、包煎、另煎、烊化、冲服等。"},
        {type:"multi", q:"确定中药剂量时应考虑的因素有：", options:["药物性质与质地","患者体质年龄病情","剂型与配伍关系","患者的文化程度"], answer:[0,1,2], explain:"D项“患者的文化程度”与中药剂量的确定无关，属于干扰项。"},
        {type:"multi", q:"下列关于特殊煎法与药物对应关系，正确的有：", options:["附子——先煎","薄荷——后下","人参——另煎","阿胶——冲服"], answer:[0,1,2], explain:"D项错误，阿胶应采用“烊化”法，而非“冲服”法；三七粉、牛黄等贵重细料粉末药才适宜冲服。"},
        {type:"blank", q:"人参、西洋参等贵重药材入汤剂时，宜采用____煎的方法，以充分利用药材、防止浪费。（请填一字）", answer:["另"], explain:"贵重药材宜单独煎煮取汁（另煎），再与其他药汁兑服，以充分利用药材有效成分。"},

        {type:"case", q:"某处方中含有生石膏30克、薄荷6克（后下）、旋覆花10克（包煎）、阿胶10克（烊化）、三七粉3克（冲服）。请说明该方中各特殊煎服法的理由。", answer:"该处方体现了中药汤剂中常见的几种特殊煎服法：生石膏为矿物类药材，质地坚硬、有效成分不易煎出，故需先煎，以延长煎煮时间、充分煎出药效；薄荷气味芳香，所含挥发性成分久煎容易挥发散失而降低药效，故需后下，在其他药物即将煎好前数分钟下锅；旋覆花表面附有绒毛，直接入煎易脱落混入药液，服用后可能刺激咽喉引起呛咳，故需用纱布包裹后包煎；阿胶为胶类药物，质地黏稠，若与其他药物同煎容易黏锅、影响其他药物的煎出，且高温久煎可能破坏其有效成分，故需单独加热烊化后再兑入煎好的药汁中服用；三七粉为贵重细料药，其有效成分不耐高温久煎，且入煎会造成浪费，故不与其他药物同煎，而应研成细粉，用煎好的药汁或温开水冲服。这些特殊煎服法的合理运用，能够最大限度地保证方中各味药物有效成分的煎出与稳定，从而保证临床疗效。", explain:""}

    {title:"第一章 解表药", ready:true,
      lecture:[
        {type:"h4",text:"一、解表药概述"},
        {type:"p",text:"凡以发散表邪、解除表证为主要功效的药物，称为解表药，又称发表药。解表药多具辛味，主入肺、膀胱经，能促进机体发汗，使表邪从汗而解，适用于外感六淫之邪所致的表证，症见恶寒发热、头身疼痛、无汗或汗出不畅、脉浮等。根据药性及主治病证的不同，解表药可分为发散风寒药（辛温解表药）与发散风热药（辛凉解表药）两类：发散风寒药性味多辛温，主治风寒表证；发散风热药性味多辛凉，主治风热表证。使用解表药应注意：中病即止，不可发汗太过，以免耗伤津液、损伤正气；表虚自汗、阴虚盗汗及疮疡日久、淋证、失血患者应慎用或禁用发汗力强的解表药；入汤剂不宜久煎，以免有效成分挥发而降低药效。"},
        {type:"h4",text:"二、发散风寒药（辛温解表药）"},
        {type:"p",text:"发散风寒药性味多辛温，主入肺、膀胱经，发汗解表作用较强，兼有散寒、宣肺、止痛、行气等功效，主治外感风寒表证，症见恶寒重、发热轻、无汗、头身疼痛、脉浮紧等，部分药物还可用于风寒袭肺之咳喘、风寒湿痹等病证。"},
        {type:"table", headers:["药物","性味归经","主要功效"],
          rows:[

            ["生姜","辛，微温；归肺、脾、胃经","解表散寒，温中止呕，温肺止咳"],
            ["荆芥","辛，微温；归肺、肝经","祛风解表，透疹消疮，止血（炒炭）"],
            ["防风","辛、甘，微温；归膀胱、肝、脾经","祛风解表，胜湿止痛，止痉"],

            ["白芷","辛，温；归胃、大肠、肺经","解表散寒，祛风止痛，宣通鼻窍，燥湿止带，消肿排脓"]
          ]
        },
        {type:"ul", items:[
          "麻黄：发汗解表要药，功能发汗解表、宣肺平喘、利水消肿，主治风寒表实证（恶寒发热、无汗而喘，代表方麻黄汤）、肺气壅遏之咳喘证以及风水水肿兼有表证者。煎服2～10克，发汗解表宜生用，止咳平喘蜜炙用。表虚自汗、阴虚盗汗及肺肾虚喘者忌用。",
          "桂枝：功能发汗解肌、温通经脉、助阳化气、平冲降气，无论表实无汗（配麻黄）或表虚有汗（配白芍）均可应用，兼治寒凝血滞之胸痹心痛、经闭痛经及痰饮水肿、心悸。煎服3～10克。辛温助热，外感热病、阴虚阳盛及出血证忌用，孕妇慎用。",
          "紫苏叶：功能解表散寒、行气和胃，主治风寒感冒兼胸脘气滞者，亦治风寒兼气滞之胎动不安、鱼蟹中毒之腹痛吐泻。煎服5～10克，不宜久煎。",
          "生姜：功能解表散寒、温中止呕、温肺止咳，素有“呕家圣药”之称，善治胃寒呕吐及肺寒咳嗽，并能解半夏、南星及鱼蟹之毒。煎服3～10克。热盛及阴虚内热者不宜多用。",
          "荆芥：药性平和，功能祛风解表、透疹消疮，兼能止血（炒炭），风寒风热表证均可配伍应用，善治麻疹不透、风疹瘙痒及疮疡初起。煎服5～10克，不宜久煎，止血宜炒炭用。",
          "防风：被称为“风药中之润剂”，功能祛风解表、胜湿止痛、止痉，风寒风热表证皆宜，兼治风湿痹痛、破伤风及脾虚肝旺之泄泻（配白术、白芍即痛泻要方）。煎服5～10克。",
          "羌活：气味雄烈，功能解表散寒、祛风胜湿、止痛，“善治上半身疼痛”，主治风寒表证头身疼痛较重及风寒湿痹。煎服3～10克，脾胃虚弱、阴血亏虚者慎用。",
          "白芷：辛温芳香，功能解表散寒、祛风止痛、宣通鼻窍、燥湿止带、消肿排脓，善治阳明经头痛（前额、眉棱骨痛）、鼻渊鼻塞、寒湿带下及疮痈肿毒。煎服3～10克。"
        ]},
        {type:"h4",text:"三、发散风热药（辛凉解表药）"},
        {type:"p",text:"发散风热药性味多辛凉，主入肺、肝经，发汗解表作用较发散风寒药缓和，兼有清热、利咽、透疹、明目等功效，主治外感风热表证，症见发热重、恶寒轻、咽痛口渴、脉浮数等，部分药物还可用于风热咳嗽、麻疹不透、目赤肿痛等病证。"},

        {type:"ul", items:[

          "菊花：功能疏散风热、平肝明目、清热解毒，善治肝阳上亢之头痛眩晕、肝经风热之目赤肿痛及疮痈肿毒。煎服5～10克。",
          "柴胡：少阳经要药，功能解表退热、疏肝解郁、升举阳气，主治寒热往来之少阳证（小柴胡汤）、肝郁胁痛及气虚下陷之脱肛、脏器下垂（配黄芪、升麻）。退热截疟宜生用大量，疏肝解郁宜醋炙，升阳举陷宜生用或酒炙。煎服3～10克。肝阳上亢、阴虚火旺者慎用。",

      keypoints:[
        "解表药分发散风寒药（辛温解表）与发散风热药（辛凉解表）两大类，寒热属性须与表证性质相对应。",
        "麻黄发汗解表力最强，为“发汗解表要药”，兼能宣肺平喘、利水消肿；表虚自汗、阴虚盗汗者忌用。",
        "桂枝发汗解肌力较麻黄缓和，无论表实表虚均可配伍应用，且能温通经脉、助阳化气、平冲降气；麻黄配桂枝（麻黄汤）是发汗解表的经典配伍。",

        "荆芥、防风药性平和，风寒风热表证均可配伍应用；荆芥炒炭长于止血，防风被称为“风药中之润剂”。",
        "羌活善治上半身疼痛，白芷善治阳明经头痛（前额、眉棱骨痛）——二者主治部位是重要鉴别考点。",
        "薄荷宜后下、不宜久煎，善疏散上焦风热、清利头目、疏肝行气。",
        "蝉蜕、桑叶、菊花均能疏散风热而明目：蝉蜕兼能解痉，桑叶兼能清肺润燥、凉血止血，菊花兼能平肝、清热解毒。",
        "柴胡为少阳经要药：退热截疟宜生用且量大，疏肝解郁宜醋炙，升阳举陷宜生用或酒炙——“一药三法”是高频考点。",
        "葛根善解肌退热兼治项背强痛，并能升阳止泻，治脾虚或湿热泄泻。",
        "使用解表药总原则：中病即止，不可发汗太过；入汤剂（尤其芳香类药物）不宜久煎。"

      quiz:[
        {type:"single", q:"发汗解表作用最强，被称为“发汗解表要药”的是：", options:["桂枝","麻黄","荆芥","防风"], answer:1, explain:"麻黄辛温发散力强，善开腠理透毛窍以发汗，故被称为发汗解表要药。"},
        {type:"single", q:"素有“呕家圣药”之称的药物是：", options:["生姜","半夏","陈皮","紫苏叶"], answer:0, explain:"生姜温中止呕功效显著，尤善治胃寒呕吐，故有“呕家圣药”之称。"},
        {type:"single", q:"善治上半身疼痛的发散风寒药是：", options:["白芷","羌活","防风","荆芥"], answer:1, explain:"羌活气味雄烈，善祛上半身风寒湿邪，故“善治上半身疼痛”。"},
        {type:"single", q:"柴胡疏肝解郁时，宜采用哪种炮制品？", options:["生用","酒炙","醋炙","盐炙"], answer:2, explain:"柴胡醋炙后引药入肝，可增强其疏肝解郁的功效；退热截疟宜生用大量，升阳举陷宜生用或酒炙。"},
        {type:"single", q:"既能疏散风热，又能明目退翳、解痉止痉的药物是：", options:["桑叶","菊花","蝉蜕","牛蒡子"], answer:2, explain:"蝉蜕甘寒质轻，除疏散风热、利咽透疹外，还能明目退翳、解痉，用治惊风抽搐、破伤风等。"},
        {type:"single", q:"葛根除解肌退热、生津止渴外，还能：", options:["平肝明目","升阳止泻","活血化瘀","安神定志"], answer:1, explain:"葛根能升发脾胃清阳之气，兼能升阳止泻，用治脾虚或湿热泄泻。"},
        {type:"single", q:"入汤剂时宜后下、不宜久煎的解表药是：", options:["麻黄","桂枝","薄荷","羌活"], answer:2, explain:"薄荷辛凉芳香，其有效成分为挥发性物质，久煎易挥发降效，故宜后下。"},
        {type:"multi", q:"下列属于发散风寒药（辛温解表药）的有：", options:["麻黄","桂枝","薄荷","荆芥"], answer:[0,1,3], explain:"C项“薄荷”性凉，属发散风热药，而非发散风寒药，故不选C。"},
        {type:"multi", q:"关于荆芥与防风的功效，下列表述正确的有：", options:["二者均能祛风解表","荆芥炒炭长于止血","防风能胜湿止痛、止痉","二者均能平肝明目"], answer:[0,1,2], explain:"D项错误，荆芥、防风均不具备平肝明目的功效，平肝明目是菊花等药的功效。"},
        {type:"multi", q:"柴胡的功效包括：", options:["解表退热","疏肝解郁","升举阳气","平肝息风"], answer:[0,1,2], explain:"D项“平肝息风”并非柴胡的功效，柴胡是解表退热、疏肝解郁、升阳要药，而非平肝息风药。"},
        {type:"blank", q:"麻黄汤中，麻黄配伍____以增强发汗解表之力。（请填药名二字）", answer:["桂枝"], explain:"麻黄配桂枝相须为用，可显著增强发汗解表、散寒止痛的功效，是麻黄汤的核心配伍。"},
        {type:"blank", q:"柴胡退热截疟宜____用，且用量宜大。（请填一字，提示炮制方式）", answer:["生"], explain:"柴胡生用且用量较大时，退热截疟之力较强；疏肝解郁宜醋炙，升阳举陷宜生用或酒炙。"},
        {type:"blank", q:"白芷善治阳明经头痛，尤其擅长治疗前额及____部位的疼痛。（请填三字）", answer:["眉棱骨"], explain:"白芷归胃、大肠、肺经，善入阳明经，故擅治前额及眉棱骨部位的头痛。"},
        {type:"case", q:"病例分析：患者恶寒发热，无汗，头身疼痛，脉浮紧，舌苔薄白。请选择合适的解表药物并说明配伍思路。", answer:"该患者证属风寒表实证（恶寒发热、无汗、头身疼痛、脉浮紧均为风寒束表、卫阳被遏、营阴郁滞的典型表现）。治疗当以辛温发汗、解表散寒为法，可选用麻黄配桂枝为核心配伍（如麻黄汤）：麻黄辛温发汗解表力强，善开腠理、透毛窍以发汗；桂枝辛甘而温，助麻黄发汗解表，又能温通经脉，二者相须为用，可显著增强发汗解表、散寒止痛的功效，切合本例风寒表实无汗的病机。此外还可酌加杏仁苦降肺气以助止咳平喘，炙甘草调和诸药，全方共奏发汗解表、宣肺平喘之功。", explain:""},
        {type:"case", q:"简述发散风寒药与发散风热药在药性、功效及主治方面的主要区别。", answer:"发散风寒药（辛温解表药）性味多辛温，主入肺、膀胱经，发汗解表作用较强，兼有散寒、宣肺、止痛等功效，主治外感风寒表证，症见恶寒重、发热轻、无汗、头身疼痛、脉浮紧，代表药物如麻黄、桂枝、荆芥、防风、羌活、白芷等；发散风热药（辛凉解表药）性味多辛凉，主入肺、肝经，发汗解表作用较发散风寒药缓和，兼有清热、利咽、透疹、明目等功效，主治外感风热表证，症见发热重、恶寒轻、咽痛口渴、脉浮数，代表药物如薄荷、牛蒡子、蝉蜕、桑叶、菊花、柴胡、葛根等。二者虽同属解表药范畴，但药性寒热有别，临床应根据表证的寒热属性辨证选用，不可混淆使用，否则可能贻误病情甚至加重病证。", explain:""}
      ]

    {title:"第二章 清热药", ready:true,
      lecture:[
        {type:"h4",text:"一、清热药概述"},
        {type:"p",text:"凡以清解里热、治疗里热证为主要功效的药物，称为清热药。清热药药性多寒凉，主入气分或血分，通过清热泻火、清热燥湿、清热解毒、清热凉血、清虚热等不同途径，治疗各种里热证候，如壮热烦渴、湿热泻痢、痈肿疮毒、温毒发斑、阴虚发热等。根据药性功效及主治病证的不同，清热药可分为清热泻火药、清热燥湿药、清热解毒药、清热凉血药、清虚热药五类。使用清热药应注意：苦寒药物易伤脾胃、损伤阳气，脾胃虚寒、食少便溏者慎用；寒凉药物易伤津化燥，阴虚津亏者应配伍养阴生津之品；此外，清热药久用或过量易伤阳气，应中病即止，不可长期大量使用。"},
        {type:"h4",text:"二、清热泻火药"},
        {type:"p",text:"清热泻火药性味多苦寒或甘寒，主入气分，长于清泄气分邪热，主治热病邪在气分之壮热、烦渴、汗出、脉洪大等实热证候，部分药物兼能清脏腑之火，治疗相应脏腑热盛证候。"},
        {type:"table", headers:["药物","性味归经","主要功效"],
          rows:[
            ["石膏","辛、甘，大寒；归肺、胃经","清热泻火，除烦止渴，收敛生肌（煅用）"],
            ["知母","苦、甘，寒；归肺、胃、肾经","清热泻火，滋阴润燥"],
            ["栀子","苦，寒；归心、肺、三焦经","泻火除烦，清热利湿，凉血解毒，消肿止痛（外用）"],
            ["夏枯草","辛、苦，寒；归肝、胆经","清肝泻火，明目，散结消肿"]
          ]
        },
        {type:"ul", items:[
          "石膏：辛甘大寒，为清泻肺胃气分实热之要药，功能清热泻火、除烦止渴，主治温病气分实热之壮热、烦渴、汗出、脉洪大（代表方白虎汤），以及肺热咳喘、胃火牙痛。煅石膏外用能收湿、生肌、敛疮。生用煎服15～60克，宜先煎；脾胃虚寒及阴虚内热者忌用。",
          "知母：苦甘而寒，功能清热泻火、滋阴润燥，既能清肺胃气分实热，又能滋肺肾之阴，常与石膏相须为用，主治热病烦渴、肺热燥咳、骨蒸潮热及内热消渴。煎服6～12克。脾虚便溏者不宜用。",
          "栀子：苦寒，功能泻火除烦、清热利湿、凉血解毒，主治热病心烦懊侬（栀子豉汤）、湿热黄疸、血热出血及热毒疮疡。煎服6～10克，外用生品适量。脾虚便溏者不宜多用。",
          "夏枯草：辛苦而寒，功能清肝泻火、明目、散结消肿，主治肝火上炎之目赤肿痛、头痛眩晕以及痰火郁结之瘰疬瘿瘤。煎服9～15克。脾胃虚弱者慎用。"
        ]},
        {type:"h4",text:"三、清热燥湿药"},
        {type:"p",text:"清热燥湿药性味多苦寒，苦能燥湿、寒能清热，主治湿热证，如湿温、黄疸、泻痢、带下、湿疹及脏腑湿热诸证。其中黄芩、黄连、黄柏合称“三黄”，是最为常用的清热燥湿药。"},
        {type:"table", headers:["药物","性味归经","主要功效"],
          rows:[
            ["黄芩","苦，寒；归肺、胆、脾、胃、大肠经","清热燥湿，泻火解毒，凉血止血，除热安胎"],
            ["黄连","苦，寒；归心、脾、胃、肝、胆、大肠经","清热燥湿，泻火解毒"],
            ["黄柏","苦，寒；归肾、膀胱、大肠经","清热燥湿，泻火解毒，退虚热"],
            ["龙胆草","苦，寒；归肝、胆经","清热燥湿，泻肝胆火"]
          ]
        },
        {type:"ul", items:[
          "黄芩：苦寒，善清上焦肺热及大肠湿热，功能清热燥湿、泻火解毒、凉血止血、除热安胎，主治湿温、黄疸、肺热咳嗽、痈肿疮毒、血热出血及胎热不安。煎服3～10克。清热多生用，安胎多炒用，止血多炒炭用。",

        {type:"case", q:"病例分析：患者高热，大汗出，烦渴引饮，面赤恶热，脉洪大。请分析证候并说明治疗药物选择依据。", answer:"该患者证属阳明气分实热证（即“四大症”：大热、大汗、大渴、脉洪大），病机为热邪炽盛、充斥气分、迫津外泄、耗伤津液。治疗当以辛寒清气、生津止渴为法，可选用石膏配知母为核心配伍（如白虎汤）：石膏辛甘大寒，善清泄肺胃气分实热，为君药；知母苦甘而寒，既能助石膏清热泻火，又能滋阴润燥，防止大热伤津，二药相须为用，清热除烦、生津止渴之力显著增强，切合本例气分热盛、津液耗伤的病机。", explain:""},
        {type:"case", q:"简述“三黄”（黄芩、黄连、黄柏）在清热燥湿方面的异同。", answer:"黄芩、黄连、黄柏三药性味均为苦寒，均能清热燥湿、泻火解毒，是清热燥湿药中最常用的三味药，故合称“三黄”，但三者各有侧重：黄芩主入肺、胆、脾、胃、大肠经，尤善清泄上焦肺热及大肠湿热，兼能凉血止血、清热安胎；黄连主入心、脾、胃经，苦寒之性最强，尤善清中焦胃肠湿热及心经实火，为治湿热泻痢、心火亢盛的要药；黄柏主入肾、膀胱、大肠经，性沉降下行，尤善清下焦湿热，且能退虚热，常用于下焦湿热之带下、淋证及阴虚火旺之骨蒸潮热。三药合用（如黄连解毒汤中黄芩、黄连、黄柏与栀子同用）能通泻三焦火热，是清热燥湿、泻火解毒的经典配伍。", explain:""}

    {title:"第三章 泻下药", ready:true,
      lecture:[
        {type:"h4",text:"一、泻下药概述"},
        {type:"p",text:"凡能引起腹泻或滑润大肠、促进排便，以通利大便为主要功效的药物，称为泻下药。泻下药性味多苦寒，或甘寒质润，或苦辛有毒，主入大肠经，主治大便秘结、胃肠积滞及水肿、痰饮等里实证候。根据药力峻缓及作用特点，泻下药可分为攻下药（泻下作用峻猛，兼能清热泻火）、润下药（质润多脂，能润滑大肠，泻下作用缓和）、峻下逐水药（药力峻猛，部分有毒，能引起剧烈腹泻，使体内潴留水湿从大小便排出）三类。使用泻下药应注意：中病即止，不可过量久服，以免损伤脾胃正气；年老体弱、脾胃虚弱、妊娠及经期妇女应慎用或禁用峻烈泻下药；峻下逐水药毒性较大，应严格控制剂量及用法。"},
