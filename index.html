    {title:"第五章 脉诊", ready:true,
      lecture:[
        {type:"h4",text:"一、脉诊概述"},
        {type:"p",text:"脉诊又称切脉，是医生用手指按触患者动脉搏动，通过感知脉象变化以诊察疾病的方法。现今临床通行的诊脉部位是“寸口诊法”，即切按腕后桡动脉搏动处，分为寸、关、尺三部，左手寸关尺分候心、肝、肾，右手寸关尺分候肺、脾、肾（命门）。正常脉象称为“平脉”或“常脉”，特点是三部有脉、不浮不沉、不快不慢（一息四至或五至，相当于60～90次/分）、从容和缓、节律均匀，且随四时气候、情志活动、体质差异等有一定生理性变化。"},
        {type:"h4",text:"二、诊脉方法"},
        {type:"ul", items:[
          "时间：诊脉宜选择患者情绪安定、活动之后已经平静的时间，古人认为清晨“平旦”之时诊脉最为准确，但临床实际中只要保证患者处于安静状态即可。",
          "体位：患者取坐位或仰卧位，手臂与心脏置于同一水平，手腕自然伸展、掌心向上，腕下垫脉枕。",
          "指法：医生用中指定关，食指定寸，无名指定尺，三指呈弓形斜按脉搏，布指疏密应根据患者身材调整；诊脉时又分“举、按、寻”三种指力，轻取为“举”（浮取），重按为“按”（沉取），不轻不重、左右推寻为“寻”（中取），三者结合以全面体察脉象变化。"
        ]},
        {type:"h4",text:"三、常见脉象及其主病"},
        {type:"table", headers:["脉象","脉象特征","主病"],
          rows:[
            ["浮脉","轻取即得，重按稍减而不空","主表证，亦见于虚阳外越"],
            ["沉脉","轻取不应，重按始得","主里证（有力为里实，无力为里虚）"],
            ["迟脉","脉来迟缓，一息不足四至（每分钟不足60次）","主寒证（有力为实寒，无力为虚寒）"],
            ["数脉","脉来急促，一息五至以上（每分钟90次以上）","主热证（有力为实热，无力为虚热）"],
            ["虚脉","三部脉举按皆无力，隐约不清","主虚证，气血不足"],
            ["实脉","三部脉举按皆有力，坚实有力","主实证，邪气亢盛"],
            ["滑脉","往来流利，如珠走盘，应指圆滑","主痰饮、食积、实热，亦见于妊娠（生理性）"],
            ["涩脉","往来艰涩不畅，如轻刀刮竹","主血少精伤、气滞血瘀"],
            ["洪脉","脉体宽大，来盛去衰，如波涛汹涌","主气分热盛（如阳明经证白虎汤证）"],
            ["细脉","脉细如线，但应指明显","主气血两虚，或诸虚劳损，或湿邪为病"],
            ["弦脉","端直以长，如按琴弦，指下挺然","主肝胆病、痛证、痰饮，亦见于老年健康人"],
            ["紧脉","脉来绷急，状如牵绳转索","主寒证、痛证、食积"],
            ["濡脉","浮而细软，轻取可得，重按不显","主虚证（气血不足），或湿邪困阻"],
            ["促脉","脉来数而时一止，止无定数","主阳盛实热，或气血痰食瘀滞"],
            ["结脉","脉来缓而时一止，止无定数","主阴盛气结、寒痰瘀血内停"],
            ["代脉","脉来一止，止有定数，良久方来","主脏气衰微，或疼痛、惊恐、跌仆损伤"],
            ["芤脉","浮大中空，如按葱管","主大量失血、伤阴之后"],
            ["革脉","浮而搏指，中空外坚，如按鼓皮","主亡血、失精、崩漏、半产"]
          ]
        },
        {type:"h4",text:"四、脉诊注意事项"},
        {type:"ul", items:[
          "脉症从舍：临床上脉象与症状表现有时相符（脉症相应），有时不符（脉症相反）。当脉症不符时，须辨别何为疾病本质的真实反映，从而决定“舍脉从症”或“舍症从脉”，不可拘泥一端。",
          "妇女脉与小儿脉的特殊性：妇女妊娠期脉象多见滑数流利，属生理现象；小儿寸口部位短小，临床多用“一指定三关”的方法诊察小儿脉象，且小儿脉搏较成人为快。",
          "四诊合参：脉诊虽为中医诊断特色鲜明的诊法，但仍须与望、闻、问三诊相结合，全面收集病情资料，不可单凭脉象妄下诊断。"
        ]}
      ],
      keypoints:[
        "现今通行的诊脉部位为寸口诊法：左手寸关尺分候心肝肾，右手寸关尺分候肺脾肾（命门）。",
        "正常脉象（平脉）特点：三部有脉、不浮不沉、不快不慢（一息四至或五至）、从容和缓、节律均匀。",
        "诊脉指法分举、按、寻三种：轻取为举（浮取），重按为按（沉取），不轻不重左右推寻为寻（中取）。",
        "浮脉主表证，沉脉主里证；迟脉主寒证，数脉主热证；虚脉主虚证，实脉主实证。",
        "滑脉主痰饮食积实热（亦见于妊娠），涩脉主血少精伤或气滞血瘀。",
        "洪脉主气分热盛，细脉主气血两虚，弦脉主肝胆病痛证痰饮。",
        "促、结、代三脉均为节律不整的脉象：促脉数而一止无定数（属阳盛实热），结脉缓而一止无定数（属阴盛气结），代脉一止有定数、良久方来（属脏气衰微）。",
        "临床上脉症不符时须辨别脉症从舍，不可拘泥一端；须四诊合参，不可单凭脉象妄下诊断。"
      ],
      quiz:[
        {type:"single", q:"寸口诊法中，左手寸关尺分候：", options:["肺脾肾","心肝肾","肺肝肾","心脾肾"], answer:1, explain:"寸口诊法左手寸关尺分候心、肝、肾，右手寸关尺分候肺、脾、肾（命门）。"},
        {type:"single", q:"轻取即得，重按稍减而不空，主表证的脉象是：", options:["沉脉","浮脉","迟脉","数脉"], answer:1, explain:"浮脉轻取即得、重按稍减而不空，是表证的典型脉象，邪气在表、正气抗邪于外，脉气应之而浮。"},
        {type:"single", q:"往来流利，如珠走盘，主痰饮食积实热（亦见于妊娠）的脉象是：", options:["涩脉","滑脉","弦脉","紧脉"], answer:1, explain:"滑脉往来流利、应指圆滑如珠走盘，主痰饮、食积、实热证，健康妇女妊娠期也常见滑脉，属生理现象。"},
        {type:"single", q:"脉来数而时一止、止无定数，主阳盛实热的脉象是：", options:["结脉","代脉","促脉","芤脉"], answer:2, explain:"促脉的特点是脉来急促而时有一止、止无定数，多主阳盛实热或气血痰食瘀滞。"},
        {type:"single", q:"脉来一止、止有定数、良久方来，主脏气衰微的脉象是：", options:["促脉","结脉","代脉","濡脉"], answer:2, explain:"代脉的特点是脉搏出现有规律的歇止、且歇止时间较长，多主脏气衰微，是病情较重的信号，亦可见于疼痛、惊恐等。"},
        {type:"multi", q:"诊脉指法中“举、按、寻”分别指：", options:["举——轻取，浮取","按——重按，沉取","寻——不轻不重、左右推寻","寻——指仅用一根手指诊脉"], answer:[0,1,2], explain:"D项对“寻”的解释错误，寻是指用不轻不重的指力、左右推寻以体察脉象变化的诊脉手法，而非指仅用一根手指诊脉。"},
        {type:"multi", q:"关于脉诊的正确说法包括：", options:["正常脉象一息四至或五至", "妇女妊娠期常见滑数脉属生理现象", "小儿常用一指定三关的方法诊脉", "临床可仅凭脉象诊断而无需结合其他三诊"], answer:[0,1,2], explain:"D项错误，脉诊须与望、闻、问三诊相结合、四诊合参，才能全面准确地判断病情，不可仅凭脉象妄下诊断。"},
        {type:"blank", q:"脉来端直以长，如按琴弦，指下挺然，称为____脉，主肝胆病、痛证、痰饮。（请填一字）", answer:["弦"], explain:"弦脉的特征是端直而长、指下挺然如按琴弦，多主肝胆疾病、各类痛证及痰饮病，亦可见于老年人的生理性脉象。"},
        {type:"blank", q:"临床上脉症不符时，须辨明当“舍脉从症”还是“____从脉”，不可拘泥一端。（请填二字）", answer:["舍症"], explain:"脉症从舍是中医脉诊中的重要辨证思路，当脉象与症状表现不一致时，需要判断哪一方更能真实反映疾病本质，从而决定取舍。"},
        {type:"case", q:"病例分析：患者高热面赤，大汗出，口渴喜冷饮，脉洪大有力。请分析脉症关系并说明辨证要点。", answer:"该患者高热面赤、大汗出、口渴喜冷饮，结合脉洪大有力，脉症表现高度一致，属于典型的“脉症相应”病例。从脉象分析，洪脉的特点是脉体宽大、来盛去衰、如波涛汹涌，主气分热盛，多见于阳明经证（如白虎汤证）；从症状分析，高热、面赤、大汗出、口渴喜冷饮，正是阳明气分热盛、里热炽盛、迫津外泄、热盛伤津的典型表现，即传统所述之“四大证”（大热、大汗、大渴、脉洪大）。本例脉象（洪大有力）与症状（壮热汗多口渴）相互印证，共同指向阳明气分热盛证的诊断，脉症合参更加确认了辨证的准确性，无需考虑“脉症从舍”的问题（因为脉症一致，不存在矛盾需要取舍）。这一病例说明，当脉象与症状表现相符时，二者互相佐证、能够增强辨证的可靠性；治疗当以清热生津为法，可选用白虎汤（石膏、知母、炙甘草、粳米）加减，充分体现了中医脉诊在四诊合参、综合辨证过程中的重要参考价值。", explain:""}
      ]
    },
    {title:"第六章 按诊", ready:true,
      lecture:[
        {type:"h4",text:"一、按诊概述"},
        {type:"p",text:"按诊是医生用手直接触摸、按压患者体表某些部位，以了解局部冷热、软硬、压痛、包块及其他异常变化的诊察方法，是望闻问切四诊中“切诊”的重要组成部分（切诊包括脉诊与按诊）。按诊主要内容包括按肌肤、按手足、按胸腹、按腧穴等。"},

        {type:"table", headers:["按诊部位/内容","异常表现","临床意义"],
          rows:[

            ["按肌肤（水肿）","按之凹陷、不能即起","属水肿（阳水或阴水，须结合起病急缓、兼症辨别）"],

            ["按胸腹","胸胁胀满疼痛，按之痛甚（拒按）","多属实证，气滞血瘀或痰热内结"],
            ["按胸腹","脘腹疼痛，喜温喜按（喜按）","多属虚证、寒证"],

        {type:"h4",text:"三、按诊的临床意义"},
        {type:"p",text:"按诊能够直接获取望诊、闻诊、问诊难以取得的病情信息，如体表温度的细微变化、腹部包块的软硬性质、疼痛的拒按或喜按等，对判断病证的寒热虚实、气血阴阳具有重要的补充诊断价值，尤其在腹部疾病、水肿、癥瘕积聚等病证的辨证中不可或缺，是四诊合参不可缺少的重要组成部分。"}

      keypoints:[

        "按之凹陷不能即起属水肿，按之凹陷举手即起属气肿。",

        "按诊能够获取望闻问诊难以取得的病情信息，对辨别寒热虚实具有重要补充诊断价值。"

      quiz:[

        {type:"single", q:"腹部按之有形，推之不移，痛有定处，多属：", options:["瘕聚（气滞）","癥积（血瘀）","水肿","气肿"], answer:1, explain:"癥积是指腹部包块推之不移、痛有定处的病证，病机属血瘀，病位在血分。"},
        {type:"single", q:"腹痛喜温喜按，多提示：", options:["实证","虚证、寒证","热证","血瘀证"], answer:1, explain:"喜按是虚证的特征表现，正气不足、按之则气血暂时充盈而痛减；喜温则提示寒证，得温则阳气通、疼痛缓解。"},
        {type:"multi", q:"关于按诊内容的说法，正确的有：", options:["按之凹陷举手即起属气肿","肌肤灼热多属阳证热证","胸胁胀满疼痛拒按多属实证","所有腹部包块无论性质都属同一种病机不需鉴别"], answer:[0,1,2], explain:"D项错误，腹部包块须根据推之移动与否、痛处固定与否等特征区分癥积（血瘀）与瘕聚（气滞），二者病机不同。"},
        {type:"blank", q:"切诊包括脉诊与____两部分。（请填一字）", answer:["按"], explain:"切诊是四诊之一，包括脉诊（切脉）与按诊两部分内容。"},
        {type:"case", q:"病例分析：患者下肢按之凹陷，举手不能即起，伴腰膝酸软，畏寒肢冷，小便不利。请分析按诊表现并说明辨证意义。", answer:"该患者下肢按之凹陷、举手不能即起，属于按诊中典型的水肿表现，提示体内水液停聚于肌肤腠理之间，按压后局部组织间隙的水液需要一定时间才能重新充盈复原，故凹陷不能立即恢复。结合患者伴见腰膝酸软、畏寒肢冷、小便不利等全身症状，可进一步判断此水肿证候的病机属于阳虚水泛（阴水），而非单纯的气分或实热水肿：腰膝酸软、畏寒肢冷提示肾阳虚衰、命门火衰，不能温煦腰膝及周身；小便不利则是肾阳不足、膀胱气化功能失常，水液不能正常代谢排出，进一步停聚肌肤而形成水肿。此按诊表现与全身症状相互印证，共同指向脾肾阳虚、水湿内停的核心病机，治疗当以温阳利水为法，可考虑选用真武汤一类温阳利水的方剂加减。这一病例说明，按诊所获得的直接触诊信息（如水肿凹陷恢复速度的快慢）能够为辨别病证的虚实寒热提供重要的客观依据，是问诊、望诊等其他诊法难以完全替代的诊断手段。", explain:""}
      ]
    },
    {title:"第七章 八纲辨证", ready:true,
      lecture:[
        {type:"h4",text:"一、八纲辨证概述"},
        {type:"p",text:"八纲，即表、里、寒、热、虚、实、阴、阳八个辨证纲领。八纲辨证是根据四诊所收集的病情资料，通过分析综合，辨别病变部位之深浅（表里）、病邪之性质（寒热）、邪正之盛衰（虚实），并归纳为病证类别之总纲（阴阳）的一种辨证方法。其中，阴阳是八纲的总纲，可以概括其余六纲：表、热、实属阳，里、寒、虚属阴。"},
        {type:"h4",text:"二、表里辨证"},
        {type:"table", headers:["证候","主要表现","辨证要点"],
          rows:[
            ["表证","恶寒发热并见，头身疼痛，脉浮，病程短","外邪侵袭肌表，病位浅、病情轻"],
            ["里证","但热不寒或但寒不热，脏腑症状明显（如咳喘、腹痛、呕泻等），脉沉","病邪深入脏腑，病位深、病情较重"]
          ]
        },
        {type:"h4",text:"三、寒热辨证"},
        {type:"table", headers:["证候","主要表现","辨证要点"],
          rows:[
            ["寒证","恶寒喜暖，面色白，肢冷蜷卧，口淡不渴，小便清长，大便稀溏，舌淡苔白，脉迟或紧","阴盛或阳虚，机体功能活动衰减"],
            ["热证","恶热喜冷，面色赤，肢体灼热，口渴喜冷饮，小便短赤，大便干结，舌红苔黄，脉数","阳盛或阴虚，机体功能活动亢进"]
          ]
        },
        {type:"h4",text:"四、虚实辨证"},
        {type:"table", headers:["证候","主要表现","辨证要点"],
          rows:[
            ["虚证","精神萎靡，形体消瘦或虚浮，声低息短，疼痛喜按，舌质淡嫩，脉细无力","正气不足，脏腑功能减退"],
            ["实证","精神亢奋，声高气粗，疼痛拒按，舌质苍老，脉实有力","邪气亢盛，正气未衰，邪正相争剧烈"]
          ]
        },
        {type:"h4",text:"五、阴阳辨证与八纲之间的相互关系"},
        {type:"p",text:"阴阳是八纲辨证的总纲：表、热、实证归属于阳证范畴；里、寒、虚证归属于阴证范畴。此外，阴阳还可用于概括更具体的证候，如亡阴证（大汗不止、汗热而黏、面赤身灼热、口渴喜冷饮）与亡阳证（大汗淋漓、汗冷而稀、面色苍白、四肢厥冷），是阴阳极度虚衰、正气将脱的危重证候。"},
        {type:"h4",text:"六、证候间的相兼、错杂、转化"},
        {type:"ul", items:[
          "证候相兼：指表里、寒热、虚实中同一层次或不同层次的证候同时存在，如表寒证、里热证、虚寒证、实热证等，是临床最常见的证候组合形式。",
          "证候错杂：指表里同病、寒热错杂、虚实夹杂等更为复杂的证候类型，如表寒里热证（外感风寒兼里热内郁）、上热下寒证、虚实夹杂证（正虚兼邪实）等，须仔细辨明主次先后。",
          "证候真假：指疾病发展到严重阶段，可能出现与疾病本质不符的假象，如真寒假热（阴盛格阳，内真寒外假热）、真热假寒（阳盛格阴，内真热外假寒）、真虚假实、真实假虚等，须透过现象抓住本质，不可被假象迷惑。",
          "证候转化：指病情发展过程中证候性质发生转变，如表证不解内传为里证（表证入里）、寒证日久化热（寒证转热）、热证迁延伤阳转寒（热证转寒）、实证日久转虚（实证转虚）等，反映了疾病发展的动态过程。"
        ]}
      ],
      keypoints:[
        "八纲即表、里、寒、热、虚、实、阴、阳，是辨别病位深浅、病邪性质、邪正盛衰的辨证总纲。",
        "阴阳是八纲的总纲：表、热、实属阳，里、寒、虚属阴。",
        "表证病位浅、病程短，特征为恶寒发热并见；里证病位深，脏腑症状明显。",
        "寒证为阴盛或阳虚，热证为阳盛或阴虚；虚证为正气不足，实证为邪气亢盛。",
        "亡阴证与亡阳证均为阴阳极度虚衰的危重证候：亡阴证汗热而黏、身灼热，亡阳证汗冷而稀、肢厥。",
        "证候可相兼（如表寒证、虚寒证）、错杂（如表寒里热证、虚实夹杂证）、转化（如表证入里、寒证转热）。",
        "证候真假（真寒假热、真热假寒等）须透过现象抓住疾病本质，不可被假象迷惑。"
      ],
      quiz:[
        {type:"single", q:"八纲辨证的总纲是：", options:["表里","寒热","虚实","阴阳"], answer:3, explain:"阴阳是八纲辨证的总纲，能够概括其余六纲：表、热、实属阳，里、寒、虚属阴。"},
        {type:"single", q:"恶寒发热并见，头身疼痛，脉浮，病程短，属于：", options:["表证","里证","虚证","实证"], answer:0, explain:"表证的典型特征是恶寒发热并见、头身疼痛、脉浮、病程较短，提示外邪侵袭肌表、病位较浅。"},
        {type:"single", q:"大汗淋漓，汗冷而稀，面色苍白，四肢厥冷，属于：", options:["亡阴证","亡阳证","实热证","表寒证"], answer:1, explain:"亡阳证的特征为大汗淋漓、汗质清冷而稀薄、面色苍白、四肢厥冷，是阳气暴脱的危重证候。"},
        {type:"single", q:"疾病本质为里真寒，但外在表现为面赤、烦躁等假热之象，属于：", options:["真热假寒","真寒假热","真虚假实","真实假虚"], answer:1, explain:"真寒假热（阴盛格阳）是指内在本质为阴寒极盛，但因虚阳被格拒于外而表现出面赤、烦躁等假热征象。"},
        {type:"multi", q:"属于阳证范畴的八纲要素有：", options:["表证","热证","实证","寒证"], answer:[0,1,2], explain:"D项寒证属阴证范畴，而非阳证；表、热、实证归属于阳证，里、寒、虚证归属于阴证。"},
        {type:"multi", q:"关于证候相兼、错杂、转化的说法，正确的有：", options:["表寒证属证候相兼的一种类型","表寒里热证属证候错杂","寒证日久化热属证候转化","所有疾病的证候都是单一固定、不会随病情发展而变化的"], answer:[0,1,2], explain:"D项错误，证候可以随着病情发展而相兼、错杂甚至转化，并非一成不变，临床辨证须动态把握疾病发展过程。"},
        {type:"blank", q:"疼痛喜按多属____证，疼痛拒按多属实证。（请填一字）", answer:["虚"], explain:"喜按提示正气不足、按之气血暂时充盈而痛减，是虚证的特征；拒按则提示邪实内盛，按之疼痛加剧，是实证的特征。"},
        {type:"blank", q:"疾病发展过程中，表证不解、病邪由表传里，称为表证____。（请填二字）", answer:["入里"], explain:"表证入里是证候转化的典型表现，指外邪未能及时驱散，逐渐深入脏腑而转为里证的病理过程。"},
        {type:"case", q:"病例分析：患者面红目赤，烦躁不安，口渴喜冷饮，但四肢厥冷，脉沉伏。请分析该证候的性质并说明辨证思路。", answer:"该患者表面看似寒热夹杂——既有面红目赤、烦躁不安、口渴喜冷饮等热象，又有四肢厥冷这一看似寒象的表现，需要运用八纲辨证中证候真假的辨析思路加以判断。仔细分析可见：患者虽有四肢厥冷，但脉象为沉伏（而非迟弱无力），且口渴喜冷饮、面红目赤、烦躁不安等症状皆为里热炽盛的典型表现，程度较重。这种“肢厥”实际上是里热邪气极盛、阳气被遏郁于内而不能布达四末所致的“热厥”，是真热假寒（阳盛格阴）的表现，而非真正的阳虚寒厥。其病机为里热极盛，阳气被遏，不能通达四肢，故见肢冷，但其本质仍是热证，四肢厥冷只是热邪深伏、格阴于外的假象。辨证的关键在于：真热证的肢冷虽冷但不过肘膝，且身寒而按之灼热，脉虽沉伏但按之有力且数，与真正虚寒证的脉微欲绝、按之无力截然不同；同时结合患者口渴喜冷饮、面赤烦躁等一派热象，可以确定证候的本质为里热炽盛证（热厥），治疗当以清热为法，而绝不可被四肢厥冷的假象迷惑而误用温里回阳之品，否则将助热伤阴、贻误病情。此案例充分体现了八纲辨证中辨别证候真假、透过现象抓住疾病本质的重要临床意义。", explain:""}
      ]
    },

            ["气滞证","胀闷疼痛，走窜不定，嗳气或矢气则舒，脉弦","气机郁滞不畅，多与情志不遂或痰湿食积有关"],
            ["气逆证","咳嗽喘促（肺气上逆），恶心呕吐嗳气（胃气上逆），头痛眩晕（肝气上逆）","气机升降失常，逆而向上"]

            ["血瘀证","疼痛如针刺，痛处固定拒按，肿块，面色紫暗，肌肤甲错，舌质紫暗或有瘀点瘀斑，脉涩","血行不畅，瘀阻脉络"],
            ["血热证","咳血吐血尿血等出血兼血色鲜红，心烦，或身热夜甚，舌红绛，脉数","热邪迫血妄行"],

        {type:"ul", items:[

          "气不摄血证：气虚不能统摄血液，导致各种出血（便血、崩漏等），兼见气虚证表现，治疗当补气摄血。",

        {type:"single", q:"疼痛如针刺，痛处固定拒按，肌肤甲错，舌质紫暗，属于：", options:["血虚证","血瘀证","血热证","血寒证"], answer:1, explain:"血瘀证的典型特征是刺痛、痛处固定拒按、肌肤甲错（皮肤粗糙如鳞甲）、舌质紫暗或有瘀点瘀斑。"},
        {type:"single", q:"大出血同时突然出现面色苍白、四肢厥冷、汗出、脉微欲绝，属于：", options:["气不摄血证","气随血脱证","血热证","气滞血瘀证"], answer:1, explain:"气随血脱证是大量出血导致气随之外脱的危急重症，是气血两脱的危重表现，须紧急救治。"},
        {type:"single", q:"胸胁积液、脘腹水声漉漉、咳喘倚息不得卧等，因停聚部位不同而表现各异的证候是：", options:["痰证","饮证","血瘀证","津液不足证"], answer:1, explain:"饮证是水液停聚于局部组织间隙或体腔所致，因停聚部位不同分为悬饮（胸胁）、痰饮（脘腹）、支饮（胸膈）等不同类型。"},
        {type:"multi", q:"属于气病辨证的证候有：", options:["气虚证","气陷证","气滞证","血瘀证"], answer:[0,1,2], explain:"D项血瘀证属血病辨证范畴，而非气病辨证，故不选D。"},
        {type:"multi", q:"关于气血关系的说法，正确的有：", options:["“气为血之帅，血为气之母”体现气血相互依存关系","气滞可导致血瘀","气虚不能统摄血液可致出血（气不摄血）","气血之间没有任何相互影响，各自独立"], answer:[0,1,2], explain:"D项错误，气与血之间关系密切、相互依存、相互影响，绝非各自独立，临床上常出现气血同病的复杂证候。"},
        {type:"blank", q:"气机上逆所致的咳嗽喘促、恶心呕吐、头痛眩晕等，属于____证。（请填二字）", answer:["气逆"], explain:"气逆证是气机升降失常、逆而向上所致，根据脏腑不同表现为肺气上逆（咳喘）、胃气上逆（呕恶嗳气）、肝气上逆（头痛眩晕）等。"},
        {type:"blank", q:"水液停聚，质地稠浊、可随气流窜全身、致病广泛的病理产物称为____。（请填一字）", answer:["痰"], explain:"痰是水液代谢障碍形成的病理产物，质地较稠浊，可随气机流窜全身、停聚脏腑经络各处，致病范围广泛，故有“百病多由痰作祟”之说。"},
        {type:"case", q:"病例分析：患者面色淡白，唇甲色淡，头晕眼花，心悸失眠，兼见神疲乏力，气短懒言，动则汗出加重，舌淡脉细弱。请分析证候并说明辨证要点。", answer:"该患者同时具备血虚证与气虚证的表现，属于气血两虚证，病机为气血两方面同时亏虚、相互影响。具体分析：面色淡白、唇甲色淡、头晕眼花、心悸失眠、舌淡，为典型血虚证的表现，提示血液不足、不能濡养头面官窍及心神；神疲乏力、气短懒言、动则汗出加重，为典型气虚证的表现，提示元气不足、脏腑功能减退、卫外不固；脉细弱，则是气血两虚、脉道失于充盈鼓动的共同表现。气血两虚证的形成，多因久病失于调养，或长期慢性失血（气随血耗），或饮食劳倦损伤脾胃（气血生化之源不足）所致，气虚与血虚往往相互影响、互为因果——气虚不能生血、行血，可加重血虚；血虚不能载气、养气，也可加重气虚，二者常同时并见，形成气血两虚的复合证候。治疗当以气血双补为法，可选用八珍汤（四君子汤合四物汤）一类方剂加减，体现了病性辨证中气血同病、须综合分析气血两方面病理变化的辨证思路。", explain:""}
      ]
    },
    {title:"第九章 脏腑辨证", ready:true,
      lecture:[
        {type:"h4",text:"一、脏腑辨证概述"},
        {type:"p",text:"脏腑辨证是根据脏腑的生理功能、病理表现，结合八纲、病性辨证的内容，对疾病进行定位、定性分析，从而确定证候的一种辨证方法，是中医辨证体系的核心方法之一，广泛用于内伤杂病的辨证论治。脏腑辨证须将脏腑的病位与寒热虚实、气血津液的病性有机结合。"},
        {type:"h4",text:"二、心与小肠病辨证"},
        {type:"table", headers:["证候","主要表现","治法举例"],
          rows:[
            ["心气虚证","心悸气短，动则加重，神疲乏力，自汗，舌淡，脉虚","补益心气"],
            ["心阳虚证","心气虚兼畏寒肢冷，心痛，面色苍白，脉微细","温补心阳"],
            ["心血虚证","心悸怔忡，失眠多梦，健忘，面色淡白，舌淡脉细","养血宁心"],
            ["心阴虚证","心悸，五心烦热，盗汗，颧红，舌红少津，脉细数","滋阴养心"],
            ["心火亢盛证","心烦失眠，口舌生疮，面赤口渴，小便黄赤，舌尖红，脉数","清心泻火"],
            ["心脉痹阻证","心悸怔忡，胸闷心痛，痛引肩背内臂，时发时止，舌质紫暗或有瘀斑","活血通脉（兼痰、兼寒、兼气滞随证化裁）"],
            ["痰蒙心神证","神识痴呆，意识模糊，甚则昏不知人，喉有痰声，舌苔白腻","豁痰开窍"],
            ["痰火扰神证","狂躁妄动，胡言乱语，甚则打人毁物，或高热神昏谵语，舌红苔黄腻","清热涤痰、开窍醒神"]
          ]
        },
        {type:"h4",text:"三、肺与大肠病辨证"},
        {type:"table", headers:["证候","主要表现","治法举例"],
          rows:[
            ["肺气虚证","咳喘无力，气短，动则加重，自汗畏风，易感冒，舌淡脉弱","补益肺气"],
            ["肺阴虚证","干咳少痰或痰中带血，午后潮热，盗汗，颧红，咽干，舌红少津","滋阴润肺"],
            ["风寒犯肺证","咳嗽，痰稀色白，鼻塞流清涕，恶寒发热，苔薄白，脉浮紧","疏风散寒，宣肺止咳"],
            ["风热犯肺证","咳嗽，痰黄质稠，鼻塞流浊涕，发热恶风，咽喉肿痛，苔薄黄，脉浮数","疏风清热，宣肺止咳"],
            ["痰热壅肺证","咳嗽气喘，痰黄质稠量多，胸痛，甚则咳吐脓血腥臭，舌红苔黄腻，脉滑数","清热化痰，宣肺止咳"],
            ["痰湿阻肺证","咳嗽痰多色白易咯，胸闷，甚则气喘，舌苔白腻，脉滑","燥湿化痰，理气止咳"],
            ["大肠湿热证","腹痛，泄泻或痢下赤白脓血，里急后重，肛门灼热，舌红苔黄腻","清热燥湿，调气行血"],
            ["大肠津亏证","大便干结难解，数日一行，口干咽燥，舌红少津","润肠通便"]
          ]
        },
        {type:"h4",text:"四、脾与胃病辨证"},
        {type:"table", headers:["证候","主要表现","治法举例"],
          rows:[
            ["脾气虚证","食少纳呆，腹胀便溏，神疲乏力，面色萎黄，舌淡苔白，脉缓弱","健脾益气"],
            ["脾阳虚证","脾气虚兼畏寒肢冷，腹痛喜温喜按，大便清稀，舌淡胖苔白滑","温中健脾"],
            ["脾虚气陷证","脘腹坠胀，或久泄脱肛，或内脏下垂，神疲乏力，舌淡脉弱","补中益气，升阳举陷"],
            ["脾不统血证","便血、崩漏或肌衄，兼脾气虚表现，舌淡脉弱","补脾摄血"],
            ["寒湿困脾证","脘腹痞闷，纳呆呕恶，肢体困重，大便溏薄，舌苔白腻，脉濡缓","温中化湿"],
            ["湿热蕴脾证","脘腹痞闷，纳呆呕恶，肢体困重，身目发黄鲜明，舌苔黄腻，脉濡数","清热利湿"],
            ["胃阴虚证","胃脘隐痛、灼痛，饥不欲食，口燥咽干，大便干结，舌红少津少苔","养阴益胃"],
            ["食滞胃脘证","脘腹胀满疼痛拒按，嗳腐吞酸，恶食呕吐，舌苔厚腻，脉滑","消食导滞"]
          ]
        },
        {type:"h4",text:"五、肝与胆病辨证"},
        {type:"table", headers:["证候","主要表现","治法举例"],
          rows:[
            ["肝气郁结证","胸胁胀痛，善太息，情志抑郁易怒，或乳房小腹胀痛，脉弦","疏肝解郁"],
            ["肝火上炎证","头痛眩晕，面红目赤，口苦口干，急躁易怒，耳鸣如潮，舌红苔黄，脉弦数","清肝泻火"],
            ["肝血虚证","头晕眼花，视物模糊，肢体麻木，爪甲不荣，月经量少色淡，舌淡脉细","补血养肝"],
            ["肝阴虚证","头晕耳鸣，两目干涩，胁肋隐痛，五心烦热，舌红少津，脉弦细数","滋阴养肝"],
            ["肝阳上亢证","眩晕耳鸣，头目胀痛，面红目赤，急躁易怒，腰膝酸软，舌红少苔，脉弦有力或弦细数","平肝潜阳"],
            ["肝风内动证","眩晕欲仆，肢体震颤或抽搐，语言謇涩，甚则突然昏倒、口眼㖞斜、半身不遂","平肝息风"],
            ["寒滞肝脉证","少腹牵引睾丸坠胀冷痛，得温痛减，畏寒肢冷，舌淡苔白，脉沉弦或迟","暖肝散寒"],
            ["胆郁痰扰证","惊悸失眠，眩晕，胸胁胀闷，口苦呕恶，舌苔黄腻，脉弦滑","清胆和胃，化痰安神"]
          ]
        },
        {type:"h4",text:"六、肾与膀胱病辨证"},
        {type:"table", headers:["证候","主要表现","治法举例"],
          rows:[
            ["肾阳虚证","腰膝酸冷，畏寒肢冷，精神萎靡，阳痿早泄，尿频清长或夜尿多，舌淡胖脉沉迟","温补肾阳"],
            ["肾阴虚证","腰膝酸软，五心烦热，盗汗颧红，眩晕耳鸣，遗精，舌红少津，脉细数","滋补肾阴"],
            ["肾精不足证","小儿发育迟缓，成人早衰，健忘恍惚，男子精少不育，女子经闭不孕，脉细弱","补肾填精"],
            ["肾气不固证","腰膝酸软，小便频数清长或余沥不尽，遗尿，滑精早泄，胎动易滑，脉沉弱","补肾固摄"],
            ["肾不纳气证","久病咳喘，呼多吸少，动则喘甚，气短不能续，自汗，舌淡脉沉弱","补肾纳气"],
            ["膀胱湿热证","尿频尿急，溺时涩痛，小便黄赤浑浊，或尿血，舌红苔黄腻，脉数","清热利湿通淋"]
          ]
        },
        {type:"p",text:"临床上脏腑病证常相互影响、多脏合病，如“心肾不交”（心火不能下交于肾、肾水不能上济于心，见心烦失眠、腰膝酸软、遗精）、“肝火犯肺”（肝火上炎、逆乘肺金，见胁痛、咳嗽阵作、痰中带血）、“脾肾阳虚”（脾阳肾阳同时虚衰，见五更泄泻、畏寒肢冷）、“肝郁脾虚”（肝气郁结、横逆犯脾，见胁痛、腹胀、便溏）等，须综合分析脏腑之间的相互关系，方能全面准确地辨证。"}
      ],
      keypoints:[
        "脏腑辨证是将脏腑病位与寒热虚实、气血津液病性结合的核心辨证方法，广泛用于内伤杂病。",
        "心病辨证：心气虚、心阳虚为虚寒；心阴虚、心火亢盛为虚热或实热；心脉痹阻为血瘀；痰蒙心神、痰火扰神为痰证。",
        "肺病风寒犯肺与风热犯肺以外感新病为主，肺气虚、肺阴虚以内伤久病为主；痰热壅肺与痰湿阻肺以痰邪寒热属性区分。",
        "脾胃病辨证：脾病多虚证（气虚、阳虚、气陷、不统血）或湿邪为患（寒湿、湿热），胃病多阴虚或食滞、胃寒胃热。",
        "肝胆病辨证：肝气郁结为气滞，肝火上炎为实火，肝阳上亢为上盛下虚，肝风内动为动摇不定之象，肝血虚肝阴虚为虚证。",
        "肾病多虚证（阳虚、阴虚、精不足、气不固、不纳气），膀胱病多湿热证（实证）。",
        "临床脏腑病证常相兼为病，如心肾不交、肝火犯肺、脾肾阳虚、肝郁脾虚等，须综合分析脏腑间相互关系。"
      ],
      quiz:[
        {type:"single", q:"心悸怔忡，胸闷心痛，痛引肩背内臂，时发时止，舌质紫暗或有瘀斑，属于：", options:["心气虚证","心血虚证","心脉痹阻证","心火亢盛证"], answer:2, explain:"心脉痹阻证以胸闷心痛、痛引肩背内臂、时发时止、舌紫暗或有瘀斑为特征，病机为心脉瘀阻不通。"},
        {type:"single", q:"咳嗽气喘，痰黄质稠量多，甚则咳吐脓血腥臭，舌红苔黄腻，属于：", options:["风寒犯肺证","痰湿阻肺证","痰热壅肺证","肺阴虚证"], answer:2, explain:"痰热壅肺证以咳嗽气喘、痰黄质稠量多、甚则咳吐脓血腥臭为特征，是痰热邪气壅塞肺脏的重证表现。"},
        {type:"single", q:"脘腹坠胀，久泄脱肛，或内脏下垂，神疲乏力，属于：", options:["脾气虚证","脾阳虚证","脾虚气陷证","脾不统血证"], answer:2, explain:"脾虚气陷证是脾气虚进一步发展、清阳不能升举所致，特征性表现为脘腹坠胀及内脏下垂（脱肛、子宫脱垂等）。"},
        {type:"single", q:"眩晕欲仆，肢体震颤或抽搐，甚则突然昏倒、口眼㖞斜、半身不遂，属于：", options:["肝气郁结证","肝阳上亢证","肝风内动证","肝血虚证"], answer:2, explain:"肝风内动证以动摇不定为特征，表现为眩晕欲仆、肢体震颤抽搐，甚则突然昏倒、口眼㖞斜、半身不遂，多见于中风等病证。"},
        {type:"single", q:"久病咳喘，呼多吸少，动则喘甚，气短不能续，属于：", options:["肺气虚证","肾不纳气证","痰湿阻肺证","肺阴虚证"], answer:1, explain:"肾不纳气证是肾气亏虚、摄纳无权所致，特征为呼多吸少、动则喘甚，是虚喘的重要病机之一，须与肺气虚所致的咳喘相鉴别。"},
        {type:"multi", q:"心火不能下交于肾、肾水不能上济于心，见心烦失眠、腰膝酸软、遗精的证候是：", options:["心肾不交证","肝火犯肺证","脾肾阳虚证","肝郁脾虚证"], answer:[0], explain:"心肾不交证是心肾水火既济关系失调所致，属肾阴不足、不能上济心火、心火独亢的复合证候。"},
        {type:"multi", q:"属于虚证的脏腑病证有：", options:["心气虚证","肾阳虚证","肺阴虚证","膀胱湿热证"], answer:[0,1,2], explain:"D项膀胱湿热证属实证（湿热邪气蕴结膀胱），而非虚证，故不选D。"},
        {type:"blank", q:"肝气郁结、横逆犯脾，导致胁痛、腹胀、便溏并见的证候称为____。（请填四字）", answer:["肝郁脾虚"], explain:"肝郁脾虚证是肝病传脾的典型病例，体现了中医脏腑相关理论中“见肝之病，知肝传脾”的辨证思路。"},
        {type:"blank", q:"胃阴虚证的特征性表现为胃脘隐痛灼痛、____不欲食。（请填二字）", answer:["饥不"], explain:"胃阴虚证因胃阴不足、虚火内扰，患者虽感饥饿但不欲进食，是与单纯脾气虚食少纳呆相鉴别的重要特征。"},
        {type:"case", q:"病例分析：患者胁肋胀痛，善太息，情志抑郁，兼见食少腹胀，大便溏薄，神疲乏力，舌淡苔白，脉弦缓。请分析证候并说明辨证思路。", answer:"该患者同时具备肝气郁结与脾气虚弱两方面的表现，属于肝郁脾虚证，是肝病传脾、木旺乘土的典型病例。具体分析：胁肋胀痛、善太息、情志抑郁，为肝气郁结的表现，因肝主疏泄、性喜条达，情志不遂则肝气郁滞、疏泄失常，气机不畅则见胁肋胀痛，善太息则是通过叹息以求气机暂时舒畅；食少腹胀、大便溏薄、神疲乏力、舌淡，为脾气虚弱的表现，因“肝木克脾土”，肝气郁结日久，横逆犯脾，脾失健运、清阳不升，故见食少腹胀、便溏乏力；脉弦缓，弦脉主肝郁，缓脉提示脾虚，二者相合印证了肝郁脾虚的复合病机。这一证候充分体现了《金匮要略》“见肝之病，知肝传脾，当先实脾”的脏腑相关理论——肝病最易传及脾脏，治疗时不仅要疏肝解郁以治肝之本，还应健脾益气以防传变、培补后天之本。治疗当以疏肝健脾为法，可选用逍遥散一类方剂加减，方中柴胡疏肝解郁，当归、白芍养血柔肝，白术、茯苓健脾益气，标本兼顾，切合本例肝郁脾虚的核心病机。", explain:""}

    {title:"第十章 六经辨证", ready:true,
      lecture:[
        {type:"h4",text:"一、六经辨证概述"},
        {type:"p",text:"六经辨证是东汉张仲景在《伤寒论》中创立的辨证方法，将外感病发展过程中的证候归纳为太阳、阳明、少阳、太阴、少阴、厥阴六个阶段（“六经”），用以阐明病邪之进退浅深、病位之表里、病性之寒热虚实。六经病证的传变一般遵循由表入里、由阳入阴的规律，但也存在合病、并病、直中等特殊传变形式。"},
        {type:"h4",text:"二、六经病证纲要"},
        {type:"table", headers:["六经病证","提纲证候","病机简述"],
          rows:[
            ["太阳病证","脉浮，头项强痛而恶寒","风寒外袭肌表，卫阳被遏，正邪交争于表，为外感病初起阶段"],
            ["阳明病证","身热，汗自出，不恶寒反恶热","邪入阳明，化热化燥，里热炽盛（阳明经证）或燥屎内结（阳明腑证）"],
            ["少阳病证","口苦，咽干，目眩","邪居半表半里，枢机不利，胆火上炎"],

            ["少阴病证","脉微细，但欲寐","心肾阳衰或阴虚火旺，为全身性虚衰的危重阶段"],
            ["厥阴病证","消渴，气上撞心，心中疼热，饥而不欲食","阴阳错杂，寒热混淆，肝失疏泄，多见厥热胜复"]
          ]
        },
        {type:"h4",text:"三、太阳病证候分类"},
        {type:"ul", items:[
          "太阳中风证：恶风发热，汗出，脉浮缓，为太阳表虚证，代表方桂枝汤。",
          "太阳伤寒证：恶寒发热，无汗而喘，脉浮紧，为太阳表实证，代表方麻黄汤。",
          "太阳蓄水证：小便不利，微热消渴，水入即吐，为膀胱气化不利、水蓄下焦，代表方五苓散。",
          "太阳蓄血证：少腹急结或硬满，如狂或发狂，为瘀热互结下焦，代表方桃核承气汤。"
        ]},
        {type:"h4",text:"四、阳明病证候分类"},
        {type:"ul", items:[
          "阳明经证：身大热，大汗出，大烦渴，脉洪大（“四大证”），为里热炽盛、弥漫全身而尚未与肠中糟粕相结，代表方白虎汤。",
          "阳明腑证：日晡潮热，腹满硬痛拒按，大便秘结，甚则谵语，为里热与肠中糟粕相结成实，代表方大承气汤。"

        {type:"h4",text:"五、六经病证的传变"},
        {type:"ul", items:[
          "循经传：病邪按六经顺序依次传变，如太阳传阳明、阳明传少阳等，是最常见的传变方式。",
          "越经传：病邪不按六经顺序、隔一经或数经传变，如太阳直接传少阴。",
          "表里传：相为表里的两经之间相互传变，如太阳传少阴（太阳与少阴相表里）。",
          "合病：两经或三经的病证同时出现，无先后次第之分，如太阳阳明合病。",

          "直中：病邪不经三阳经的传变阶段，起病即直入三阴经，多因正气素虚、病邪较盛所致，如直中太阴、直中少阴。"

        {type:"single", q:"太阳病的提纲证候是：", options:["口苦，咽干，目眩","脉浮，头项强痛而恶寒","脉微细，但欲寐","身热，汗自出，不恶寒反恶热"], answer:1, explain:"太阳病提纲为“脉浮，头项强痛而恶寒”，是外感病邪犯太阳、正邪交争于表的典型表现。"},

    {title:"第十一章 卫气营血辨证", ready:true,

        {type:"h4",text:"一、卫气营血辨证概述"},
        {type:"p",text:"卫气营血辨证是清代温病学家叶天士在《温热论》中创立的辨证方法，将外感温热病发展过程中的证候归纳为卫分、气分、营分、血分四个阶段，用以阐明温热病邪由表入里、由浅入深的传变规律及各阶段的证治特点。叶氏提出：“卫之后方言气，营之后方言血”，揭示了温热病邪由浅入深、由轻到重的一般传变次序。"},

            ["气分证","脏腑（肺、胃、肠、胆等）","壮热，不恶寒反恶热，汗多，口渴引饮，舌红苔黄，脉数有力","清热生津（代表方白虎汤）或通腑泄热（代表方大承气汤）"],
            ["营分证","心与心包","身热夜甚，心烦不寐，时有谵语，斑疹隐隐，舌质红绛，脉细数","清营透热（代表方清营汤）"],
            ["血分证","心、肝、肾（血分动血耗血）","身热灼手，躁扰不安或神昏谵语，斑疹密布，各种出血，舌质深绛，脉细数","凉血散血（代表方犀角地黄汤）"]
          ]

        {type:"h4",text:"三、卫气营血病证的传变规律"},
        {type:"ul", items:[
          "顺传：病邪按卫分→气分→营分→血分的次序依次传变，是温病发展的一般规律，反映病邪由表入里、由浅入深、正气逐渐不支的病理过程。",
          "逆传：病邪不按一般次序传变，如卫分之邪直接内陷心包（“逆传心包”），病情骤然加重，多见于温热病邪毒力较强、患者正气不足或素体阴虚之人，是病情凶险的表现。",

        {type:"h4",text:"四、卫气营血辨证与伤寒六经辨证的关系"},
        {type:"p",text:"卫气营血辨证与六经辨证同属外感病的辨证纲领，但适用范围有所不同：六经辨证长于阐明外感寒邪伤阳致病的传变规律，重在辨阳气之盛衰；卫气营血辨证长于阐明外感温热病邪伤阴致病的传变规律，重在辨阴液之存亡，二者相辅相成、互为补充，共同构成中医外感病辨证的完整体系。"}

      keypoints:[
        "卫气营血辨证是叶天士在《温热论》中创立的辨证方法，将温热病分为卫分、气分、营分、血分四个阶段。",

      quiz:[
        {type:"single", q:"卫气营血辨证是哪位医家在何书中创立的？", options:["张仲景《伤寒论》","叶天士《温热论》","吴鞠通《温病条辨》","王叔和《脉经》"], answer:1, explain:"卫气营血辨证是清代温病学家叶天士在《温热论》中创立的辨证方法，用以阐明温热病的传变规律及证治。"},
        {type:"single", q:"身热夜甚，心烦不寐，斑疹隐隐，舌质红绛，属于：", options:["卫分证","气分证","营分证","血分证"], answer:2, explain:"营分证以身热夜甚、心烦不寐、斑疹隐隐、舌质红绛为特征，病位在心与心包，是温热病邪深入阴分的表现。"},
        {type:"single", q:"病邪不按一般次序传变，卫分之邪直接内陷心包，病情骤然加重，称为：", options:["顺传","逆传","气血两燔","越经传"], answer:1, explain:"逆传是指温热病邪不按卫气营血一般传变次序、直接由卫分内陷心包的传变方式，病情凶险、变化迅速。"},
        {type:"single", q:"身热灼手，斑疹密布，各种出血并见，舌质深绛，属于：", options:["卫分证","气分证","营分证","血分证"], answer:3, explain:"血分证是温热病邪深入血分、耗血动血所致，特征为斑疹密布、多种出血并见、舌质深绛，病情最为深重。"},
        {type:"multi", q:"关于卫气营血辨证与六经辨证关系的说法，正确的有：", options:["二者同属外感病辨证纲领","六经辨证重在辨阳气盛衰","卫气营血辨证重在辨阴液存亡","二者内容完全相同、可互相替代"], answer:[0,1,2], explain:"D项错误，二者虽同属外感病辨证纲领，但各有侧重（六经辨伤寒、卫气营血辨温病），不能简单等同或相互替代，而是相辅相成的关系。"},
        {type:"blank", q:"叶天士提出“卫之后方言气，____之后方言血”，揭示温病传变次序。（请填一字）", answer:["营"], explain:"该论述完整表述为“卫之后方言气，营之后方言血”，揭示了温热病邪从卫分到气分再到营分、血分的一般传变次序。"},
        {type:"blank", q:"营分证治疗代表方清营汤，体现叶天士“入营犹可____转气”的治疗思想。（请填二字）", answer:["透热"], explain:"“透热转气”是指在清营凉血的同时，配伍轻清透泄之品，使营分邪热转出气分而解，是营分证治疗的重要思路。"},
        {type:"case", q:"病例分析：患者高热持续，斑疹密布全身，皮肤紫黑，兼见吐血、便血，神昏谵语，舌质深绛，脉细数。请分析证候归属并说明治疗思路。", answer:"该患者证候归属于卫气营血辨证中的血分证，是温热病邪深入发展的最深重阶段。病机为温热邪毒深入血分，热盛动血、耗血伤阴，且瘀热互结，症见高热持续（血分邪热极盛）、斑疹密布全身、皮肤紫黑（热毒深入血分、迫血妄行且血热互结成瘀，故斑色紫黑而非鲜红）、吐血便血（热毒灼伤血络，多部位出血是血分证“耗血动血”的典型特征）、神昏谵语（热毒深重，兼扰心神）、舌质深绛（血分热毒极盛的舌象特征），脉细数（阴血耗伤，邪热鸱张），均为血分证热毒炽盛、耗血动血、瘀热互结的典型表现，病情较营分证更为深重危急。治疗当以凉血散血、解毒开窍为法，可选用犀角地黄汤（水牛角代犀角、生地黄、芍药、牡丹皮）为基础方：水牛角清心凉血解毒为君，生地黄凉血滋阴为臣，芍药、牡丹皮清热凉血、活血散瘀为佐（体现“凉血散血”的治疗原则，既要清热凉血止血，又要防止血热成瘀而佐以活血散瘀之品，二者相反相成），并可根据神昏谵语程度配合安宫牛黄丸等凉开之剂以清热解毒开窍，切合本例血分证热毒炽盛、耗血动血、瘀热互结的核心病机。", explain:""}
      ]
    },
    {title:"第十二章 三焦辨证", ready:true,
      lecture:[
        {type:"h4",text:"一、三焦辨证概述"},
        {type:"p",text:"三焦辨证是清代温病学家吴鞠通在《温病条辨》中创立的辨证方法，以上焦、中焦、下焦作为温热病发展过程中三个不同阶段的辨证纲领，用以补充卫气营血辨证在阐明湿热类温病及温病后期证候方面的不足，尤其对湿热病邪传变过程的阐释更为系统全面。"},
        {type:"h4",text:"二、三焦病证纲要"},
        {type:"table", headers:["阶段","病位","主要表现","代表方举例"],
          rows:[
            ["上焦病证","肺、心包","发热，微恶风寒，咳嗽，口微渴（邪在肺卫）；或高热神昏谵语、舌謇肢厥（邪陷心包）","邪在肺卫用银翘散，邪陷心包用安宫牛黄丸"],
            ["中焦病证","脾、胃、大肠","阳明燥热证：身热面赤，腹满便秘，舌苔黄燥；或太阴湿热证：身热不扬，胸脘痞闷，苔黄腻","阳明燥热用白虎汤或承气汤类，太阴湿热用三仁汤类"],
            ["下焦病证","肝、肾","身热颧红，手足心热甚于手足背，口干舌燥，神倦耳聋，脉虚大；或手足蠕动甚则瘛疭，舌绛少苔","肾阴亏虚用加减复脉汤，虚风内动用大定风珠"]
          ]
        },
        {type:"h4",text:"三、三焦病证的传变规律"},
        {type:"p",text:"三焦病证的一般传变规律是自上而下，即温热病邪始于上焦（手太阴肺），进而传入中焦（阳明胃肠或太阴脾），最后传入下焦（肝肾），反映了温热病由浅入深、由实转虚的病理发展过程，其中：上焦病证多属病初，正气未衰；中焦病证多属病之极期，邪正相争剧烈；下焦病证多属病之后期，真阴耗损、虚风内动，是温病发展的终末阶段。此外，也存在病邪不按上中下次序传变的特殊情况（如邪犯上焦肺卫后逆传心包），临证须灵活辨析。"},
        {type:"h4",text:"四、三焦辨证与卫气营血辨证的关系"},
        {type:"p",text:"三焦辨证与卫气营血辨证均为温病学的重要辨证方法，二者从不同角度阐明温病的传变规律：卫气营血辨证按邪气深浅、病情轻重的横向层次辨证，重在反映病程阶段与病情轻重；三焦辨证按脏腑病位上下、纵向传变辨证，重在反映病变部位。临床应用中，二者常相互配合、结合运用，共同构成温病辨证的完整体系，如温病初起属上焦卫分证，进入中焦阳明多属气分证，深入下焦肝肾多属血分证或虚风内动之候。"}
      ],
      keypoints:[
        "三焦辨证是吴鞠通在《温病条辨》中创立的辨证方法，以上焦、中焦、下焦作为温病发展的三个阶段。",
        "上焦病证病位在肺、心包，邪在肺卫者证轻，邪陷心包者病情危重（高热神昏、舌謇肢厥）。",
        "中焦病证病位在脾胃大肠，分阳明燥热证（实热证）与太阴湿热证（湿热证）。",
        "下焦病证病位在肝肾，多为温病后期，真阴耗损或虚风内动，是病情深重的表现。",
        "三焦病证一般传变规律为自上而下：上焦→中焦→下焦，反映由浅入深、由实转虚的病理过程。",
        "三焦辨证与卫气营血辨证均为温病学重要辨证方法：卫气营血辨邪气深浅（横向），三焦辨脏腑病位（纵向），二者相辅相成。"
      ],
      quiz:[
        {type:"single", q:"三焦辨证是哪位医家在何书中创立的？", options:["叶天士《温热论》","吴鞠通《温病条辨》","张仲景《伤寒论》","王叔和《脉经》"], answer:1, explain:"三焦辨证是清代温病学家吴鞠通在《温病条辨》中创立的辨证方法。"},
        {type:"single", q:"高热神昏谵语，舌謇肢厥，属于三焦辨证中的：", options:["上焦病证（邪陷心包）","中焦病证","下焦病证","以上都不是"], answer:0, explain:"高热神昏谵语、舌謇肢厥是上焦病证中邪陷心包的表现，病位在心包，病情较邪在肺卫者更为危重。"},
        {type:"single", q:"手足心热甚于手足背，神倦耳聋，脉虚大，属于：", options:["上焦病证","中焦病证","下焦病证","以上都不是"], answer:2, explain:"手足心热甚于手足背是下焦肾阴亏虚证的特征性表现，反映温病后期真阴耗损的病理状态。"},
        {type:"single", q:"三焦病证的一般传变规律是：", options:["自下而上","自上而下","无规律可循","仅限于上焦不再传变"], answer:1, explain:"三焦病证一般传变规律为自上而下，即上焦→中焦→下焦，反映温病由浅入深、由实转虚的病理发展过程。"},
        {type:"multi", q:"关于三焦辨证与卫气营血辨证关系的说法，正确的有：", options:["二者均为温病学重要辨证方法","卫气营血辨证重在反映病程阶段与病情轻重","三焦辨证重在反映病变部位","二者完全独立、临床不可结合运用"], answer:[0,1,2], explain:"D项错误，二者临床常相互配合、结合运用，共同构成温病辨证的完整体系，并非完全独立不能结合。"},
        {type:"blank", q:"中焦病证分阳明____证与太阴湿热证两种类型。（请填二字）", answer:["燥热"], explain:"中焦病证根据病邪寒热燥湿性质不同，分为阳明燥热证（实热证）与太阴湿热证（湿热证）两种类型。"},
        {type:"case", q:"病例分析：温病后期患者身热颧红，手足心热甚于手足背，口干舌燥，神倦耳聋，舌绛少苔，脉虚大。请分析证候归属并说明治疗思路。", answer:"该患者证候归属于三焦辨证中的下焦病证（肾阴亏虚证），是温病发展到后期阶段的典型表现。病机为温热病邪深入下焦，久羁伤阴，肾阴严重耗损，症见身热颧红（阴虚内热、虚阳上浮）、手足心热甚于手足背（是肾阴虚发热的特征性表现，与外感表热手足背热甚于手足心不同，须仔细鉴别）、口干舌燥（阴液大伤，不能上承）、神倦耳聋（肾开窍于耳，肾精肾阴亏虚，耳窍失养）、舌绛少苔（阴液枯竭之象）、脉虚大（阴液大伤，虚阳外浮，脉气浮散而不敛），均为温病后期真阴耗损、肾阴亏虚的典型表现。治疗当以滋阴养液为法，可选用加减复脉汤一类方剂（生地黄、白芍、麦冬、阿胶、麻仁、炙甘草），大队甘寒滋润之品滋补真阴，以救治温病后期阴液大伤之候；若进一步出现手足蠕动、瘛疭等虚风内动征象，则应加用滋阴息风之品，可选用大定风珠加减，滋阴与潜阳息风并进。这一病例充分体现了三焦辨证在阐释温病后期下焦肝肾阴液耗损、指导滋阴救液治法方面的重要临床价值。", explain:""}
      ]
    },
    {title:"第十三章 诊断思维与病历书写", ready:true,
      lecture:[
        {type:"h4",text:"一、辨证思维的基本方法"},
        {type:"p",text:"中医诊断的过程，实质上是医生运用四诊收集病情资料，通过分析综合、去伪存真的思维过程，最终确立病证诊断的过程。这一过程须遵循一定的诊断思维方法，包括以下几个方面。"},
        {type:"ul", items:[
          "辨证求因（审证求因）：通过分析患者的症状体征，逆向推求疾病发生的病因，而非仅凭患者主观陈述的致病因素，因为很多情况下患者难以准确判断致病原因，须依靠医生通过分析当前证候特点来推断病因，这是中医病因学“审证求因”特色思路的具体体现。",
          "四诊合参：望、闻、问、切四诊各有其独特的诊察角度和价值，不能相互取代，必须综合运用四诊所得资料，全面分析，才能获得准确可靠的诊断结论，避免以偏概全。",
          "病证结合：既要辨病（明确疾病的诊断，把握疾病全过程的规律性），又要辨证（明确当前阶段的证候，把握疾病现阶段的特殊性），二者相互补充、缺一不可。",
          "动态辨证：疾病的发展变化是一个动态过程，证候也会随之演变，医生应根据病情变化随时调整诊断，不可拘泥于初诊时的固定认识，须树立“证候是动态变化的”辨证观念。"
        ]},
        {type:"h4",text:"二、辨证的一般步骤"},
        {type:"ul", items:[
          "收集病情资料：通过四诊全面收集患者的症状、体征等病情资料，力求资料的完整、准确、系统。",
          "分析病情资料：对收集到的资料进行归纳整理，运用八纲、病性、脏腑、六经、卫气营血、三焦等辨证方法分析病位、病性、邪正盛衰关系。",
          "综合判断，确立证候：在分析的基础上，综合各方面信息，去伪存真、去粗取精，最终确立完整、准确的证候诊断，为治法方药的确定提供依据。"
        ]},
        {type:"h4",text:"三、病历书写的意义与基本要求"},
        {type:"p",text:"病历（病案）是记录患者诊疗全过程的医疗文件，是临床诊疗、教学科研、医疗法律等多方面工作的重要依据。中医病历书写应做到客观、真实、准确、及时、完整，规范使用中医术语，条理清晰地记录四诊所见、辨证分析、治法方药及病情变化等内容。"},
        {type:"h4",text:"四、中医病历的基本格式（以门诊病历为例）"},
        {type:"table", headers:["项目","内容要点"],
          rows:[

            ["四诊摘要","望、闻、问、切四诊所收集到的具体病情资料，尤重舌象、脉象的记录"],
            ["辨证分析（辨病辨证）","根据四诊资料，运用相应辨证方法，分析病因病机，确立疾病诊断与证候诊断"],
            ["治法方药","根据辨证结果确立的治疗法则，以及所选方剂的具体药物组成、剂量、用法、医嘱等"]
          ]
        }
      ],
      keypoints:[
        "辨证求因（审证求因）是中医病因学特色思路，通过分析症状体征逆向推求病因。",
        "四诊合参强调望闻问切四诊综合运用、不可偏废；病证结合强调辨病与辨证相互补充。",

        "辨证的一般步骤为：收集病情资料→分析病情资料→综合判断确立证候。",

        "主诉应力求简明扼要，一般不超过20字，是病历中最重要的信息之一。"

      quiz:[

        {type:"single", q:"辨证的一般步骤是：", options:["综合判断→收集资料→分析资料","收集资料→分析资料→综合判断","分析资料→综合判断→收集资料","以上都不对"], answer:1, explain:"辨证的一般步骤为：先通过四诊收集病情资料，再运用相应辨证方法分析资料，最后综合判断确立证候诊断。"},
        {type:"single", q:"病历中记录患者就诊时最主要症状体征及持续时间、力求简明扼要的项目是：", options:["现病史","既往史","主诉","四诊摘要"], answer:2, explain:"主诉是病历中记录患者就诊时最主要症状体征及其持续时间的部分，要求简明扼要，一般不超过20字。"},
        {type:"multi", q:"中医诊断思维的基本方法包括：", options:["辨证求因","四诊合参","病证结合","单凭患者主观陈述判断病因而不加分析"], answer:[0,1,2], explain:"D项错误，中医诊断强调审证求因，即通过分析症状体征客观推求病因，而非单纯依赖患者主观陈述。"},
        {type:"multi", q:"中医病历书写的基本要求包括：", options:["客观真实","准确及时","完整规范", "可以随意使用非规范术语以求简便"], answer:[0,1,2], explain:"D项错误，病历书写应规范使用中医专业术语，不可随意使用非规范表述，以保证病历的严谨性和可读性。"},
        {type:"blank", q:"病历中记录本次疾病发生、发展、诊治全过程的项目称为____。（请填三字）", answer:["现病史"], explain:"现病史是病历的核心部分，详细记录本次疾病从起病到就诊的完整发展演变过程及诊治经过。"},
        {type:"blank", q:"证候是____变化的，医生应根据病情变化随时调整诊断。（请填一字）", answer:["动"], explain:"疾病证候并非一成不变，而是随着病情发展动态演变的，医生须树立动态辨证的诊断观念。"},
        {type:"case", q:"简述“审证求因”与直接询问病因相比，在中医诊断中的独特价值和意义。", answer:"“审证求因”是中医病因学诊断的特色思路，是指医生通过分析患者当前的症状、体征、舌脉等临床表现，运用中医理论逆向推求疾病发生的病因病机，而不是单纯依赖患者主观陈述的致病因素。这一思路的独特价值主要体现在以下几个方面：其一，许多疾病的真正病因是内在的、隐匽的，患者往往难以准确察觉或表述（如内伤七情、饮食劳倦、体质因素等致病因素常常是渐进积累、患者未必能明确意识到），仅凭患者主观陈述容易遗漏关键病因信息；其二，即使是外感病因，患者的主观描述也可能存在偏差（如误将风热当作风寒），而通过分析当前证候的寒热虚实等特征，医生能够更客观、更准确地判断病邪性质；其三，审证求因体现了中医“辨证论治”的整体思维方式，即不孤立地看待致病因素，而是将病因、病机、证候三者有机联系起来综合分析，使诊断更具系统性和科学性；其四，对于一些病因不明确或难以追溯的疑难杂病，审证求因提供了一条从“果”（症状表现）追溯“因”（病因病机）的可靠诊断路径，弥补了单纯问诊病史的局限性。因此，审证求因是中医诊断学区别于单纯病史询问的重要特色，也是中医辨证论治体系科学性、系统性的重要体现。", explain:""}
      ]
    }
  ]

            ["风热犯肺证","咳嗽气粗，痰黄质稠，咽痛口渴，身热恶风，苔薄黄，脉浮数","疏风清热，宣肺化痰","桑菊饮"],

        {type:"blank", q:"哮病发病的病理关键在于体内留有____，遇诱因触发。（请填二字）", answer:["伏痰"], explain:"哮病的病理关键是宿痰内伏于肺（“伏痰”），当受到外邪、饮食、情志、劳倦等诱因触发时，痰阻气道而发为哮病。"},
        {type:"blank", q:"肺痈溃脓期的代表方是千金____汤。（请填二字）", answer:["苇茎"], explain:"千金苇茎汤（苇茎、薏苡仁、桃仁、冬瓜仁）是治肺痈溃脓期痰热瘀毒蕴肺、咳吐脓血腥臭痰的经典代表方。"},
        {type:"case", q:"病例分析：患者干咳日久，咳声短促，痰少黏白，偶有痰中带血丝，午后潮热，颧红盗汗，形体消瘦，舌红少苔，脉细数。请分析证候并说明诊治思路。", answer:"该患者证候符合中医内科“咳嗽”病中的肺阴亏耗证，若结合传染性、病程长久及消瘦等特点，也高度符合“肺痨”的临床表现，二者病机相通、可综合分析。病机为肺阴亏耗，虚火内炽，肺失濡润、肺络受损，症见干咳、咳声短促、痰少黏白（肺阴不足，失于濡润，虚火灼津为痰但痰量不多）、痰中带血丝（阴虚火旺，灼伤肺络）、午后潮热、颧红盗汗（阴虚内热的典型表现，午后阳气渐衰、阴虚更显，虚火上炎则颧红，迫津外泄则盗汗）、形体消瘦（久病阴液精血耗损）、舌红少苔、脉细数（阴虚内热之象）。若病程绵长、具有传染性质，则当诊断为肺痨，证属肺阴亏损证，治疗当以滋阴润肺、清热杀虫为法，可选用月华丸加减（天冬、麦冬、生地黄、熟地黄、山药、百部、川贝母、阿胶等），滋阴润肺止咳；若以内伤咳嗽为主要诊断，肺阴亏耗证治疗可选用沙参麦冬汤加减，滋阴润肺、化痰止咳。无论何种诊断，治疗核心均在于滋养肺阴、清降虚火，佐以润肺化痰止咳，并应嘱患者注意休息调养、避免劳倦耗伤阴液，以促进康复。", explain:""}
      ]
    },
    {title:"第二章 心系病证", ready:true,
      lecture:[
        {type:"h4",text:"一、心悸"},
        {type:"p",text:"心悸是患者自觉心中悸动、惊惕不安、甚则不能自主的病证，轻者为惊悸（多因惊恐、劳累诱发，时发时止），重者为怔忡（终日悸动、稍劳即发，病情较重）。病因多为体虚劳倦、七情所伤、感受外邪、药食不当，病位在心，与肝、脾、肾、肺密切相关。"},
        {type:"table", headers:["证型","主症","治法","代表方"],
          rows:[
            ["心虚胆怯证","心悸不宁，善惊易恐，坐卧不安，少寐多梦，苔薄白，脉细略数或细弦","镇惊定志，养心安神","安神定志丸"],
            ["心血不足证","心悸气短，头晕目眩，面色无华，倦怠乏力，舌淡红，脉细弱","补血养心，益气安神","归脾汤"],
            ["阴虚火旺证","心悸易惊，心烦失眠，五心烦热，口干，盗汗，舌红少津，脉细数","滋阴清火，养心安神","天王补心丹合朱砂安神丸"],
            ["心阳不振证","心悸不安，胸闷气短，畏寒肢冷，面色苍白，舌淡苔白，脉沉细无力","温补心阳，安神定悸","桂枝甘草龙骨牡蛎汤合参附汤"],
            ["水饮凌心证","心悸眩晕，胸脘痞满，形寒肢冷，小便短少，下肢浮肿，舌淡胖苔白滑","振奋心阳，化气行水，宁心安神","苓桂术甘汤"],
            ["心血瘀阻证","心悸不安，胸闷不舒，心痛时作，痛如针刺，舌质紫暗或有瘀斑","活血化瘀，理气通络","桃仁红花煎"]
          ]

        {type:"h4",text:"二、胸痹"},
        {type:"p",text:"胸痹是以胸部憋闷、疼痛甚则胸痛彻背、短气为主要表现的病证，相当于现代医学的冠心病心绞痛。病机总属“阳微阴弦”，即上焦阳气不足、痰浊瘀血等阴邪痹阻胸阳，本虚标实为其病机特点。"},
        {type:"table", headers:["证型","主症","治法","代表方"],
          rows:[
            ["心血瘀阻证","心胸疼痛如刺，痛有定处，入夜尤甚，舌质紫暗或有瘀斑","活血化瘀，通脉止痛","血府逐瘀汤"],
            ["痰浊闭阻证","胸闷重而心痛微，痰多气短，肢体沉重，舌苔白腻或白滑","通阳泄浊，豁痰宣痹","瓜蒌薤白半夏汤"],
            ["阴寒凝滞证","卒然心痛如绞，遇寒而作，形寒肢冷，胸痛彻背","辛温通阳，开痹散寒","枳实薤白桂枝汤合当归四逆汤"],
            ["心气虚证","心胸隐痛，胸闷气短，动则尤甚，倦怠懒言，舌淡胖，脉虚细缓","补养心气，鼓动心脉","保元汤"],
            ["心肾阴虚证","心痛憋闷，心悸盗汗，心烦失眠，腰膝酸软，舌红少津","滋阴益肾，养心安神","左归饮合天王补心丹"],
            ["心肾阳虚证","心悸而痛，胸闷气短，畏寒肢冷，面色㿠白，舌淡胖苔白","温补阳气，振奋心阳","参附汤合右归饮"]

        {type:"h4",text:"三、不寐"},
        {type:"p",text:"不寐（失眠）是以经常不能获得正常睡眠为特征的病证，轻者入睡困难或睡而易醒，重者彻夜不眠。病因多为情志失常、饮食不节、劳逸失调、久病体虚等，导致阳不入阴、心神不安。"},
        {type:"table", headers:["证型","主症","治法","代表方"],

            ["心脾两虚证","不易入睡，多梦易醒，心悸健忘，头晕目眩，神疲食少，舌淡苔薄","补益心脾，养血安神","归脾汤"],

      keypoints:[
        "心悸轻者为惊悸（时发时止），重者为怔忡（终日悸动），病位在心，涉及肝脾肾肺。",
        "心悸证型：心虚胆怯、心血不足、阴虚火旺属虚（或虚中夹热），心阳不振、水饮凌心属阳虚水泛，心血瘀阻属实。",
        "胸痹病机总属“阳微阴弦”，本虚标实，本虚为心气心阳心阴不足，标实为痰浊、瘀血、阴寒痹阻胸阳。",
        "胸痹血瘀证代表方血府逐瘀汤，痰浊证代表方瓜蒌薤白半夏汤，阴寒凝滞证代表方枳实薤白桂枝汤合当归四逆汤。",
        "不寐病机核心为阳不入阴、心神不安，肝火扰心、痰热扰心属实证，心脾两虚、心肾不交、心胆气虚属虚证或虚实夹杂。",
        "心肾不交证代表方交泰丸配六味地黄丸，体现滋阴降火、交通心肾之法。"
      ],
      quiz:[
        {type:"single", q:"心悸不安，胸闷气短，畏寒肢冷，舌淡苔白，脉沉细无力，属于：", options:["心血不足证","阴虚火旺证","心阳不振证","心血瘀阻证"], answer:2, explain:"心阳不振证以心悸、畏寒肢冷、脉沉细无力为特征，病机为心阳虚衰、不能温运，治以温补心阳、安神定悸。"},
        {type:"single", q:"胸痹病机总属：", options:["阳盛阴衰","阳微阴弦","纯虚无实","纯实无虚"], answer:1, explain:"胸痹病机总属“阳微阴弦”，即上焦心阳不足（阳微），痰浊瘀血等阴邪痹阻胸阳（阴弦），本虚标实。"},
        {type:"single", q:"卒然心痛如绞，遇寒而作，形寒肢冷，属于胸痹的：", options:["心血瘀阻证","痰浊闭阻证","阴寒凝滞证","心气虚证"], answer:2, explain:"阴寒凝滞证以卒然心痛如绞、遇寒而作、形寒肢冷为特征，治以辛温通阳、开痹散寒。"},
        {type:"single", q:"心烦不寐，心悸多梦，腰膝酸软，五心烦热，梦遗，属于不寐的：", options:["肝火扰心证","痰热扰心证","心肾不交证","心胆气虚证"], answer:2, explain:"心肾不交证以心烦不寐、腰膝酸软、五心烦热、梦遗为特征，病机为肾阴不足、不能上济心火，治以滋阴降火、交通心肾。"},
        {type:"multi", q:"属于心悸虚证证型的有：", options:["心虚胆怯证","心血不足证","阴虚火旺证","心血瘀阻证"], answer:[0,1,2], explain:"D项心血瘀阻证属实证（或虚中夹实），而非单纯虚证，故不选D。"},
        {type:"multi", q:"关于胸痹的说法，正确的有：", options:["相当于现代医学的冠心病心绞痛","病机本虚标实","治疗须辨明本虚（气血阴阳）与标实（痰瘀寒）的主次","所有胸痹均属单纯实证，无需考虑正虚因素"], answer:[0,1,2], explain:"D项错误，胸痹病机为本虚标实，治疗时须综合考虑正虚与邪实两方面，不可仅从实证角度论治。"},
        {type:"blank", q:"不寐心肾不交证治疗代表方为六味地黄丸合____丸，体现交通心肾之法。（请填二字）", answer:["交泰"], explain:"交泰丸由黄连、肉桂组成，配伍六味地黄丸滋阴，共同发挥滋阴降火、交通心肾的功效，治疗心肾不交之不寐。"},
        {type:"blank", q:"心悸中，因水湿内停、上凌于心所致的证型称为____凌心证。（请填一字）", answer:["水"], explain:"水饮凌心证是脾肾阳虚、水湿内停、上凌于心所致，治以振奋心阳、化气行水，代表方苓桂术甘汤。"},
        {type:"case", q:"病例分析：患者心胸疼痛如刺，痛有定处，夜间尤甚，胸闷，舌质紫暗，脉涩。请分析证候并说明诊治思路。", answer:"该患者证候属于中医内科“胸痹”病中的心血瘀阻证，病机为心脉瘀阻、气血运行不畅，不通则痛，症见心胸疼痛如刺（瘀血阻滞脉络，血瘀特有的刺痛性质）、痛有定处（瘀血为有形之邪，阻滞部位固定不移，故疼痛部位固定）、夜间尤甚（夜间阳气内敛、血行相对缓慢，瘀血阻滞更甚，故疼痛夜间加重）、胸闷（瘀血阻滞胸中气机）、舌质紫暗、脉涩（均为血瘀之征）。治疗当以活血化瘀、通脉止痛为法，可选用血府逐瘀汤：方中桃仁、红花活血化瘀为君，当归、川芎、赤芍养血活血为臣，配伍柴胡疏肝解郁、枳壳桔梗一升一降调畅气机（体现“气行则血行”之理），牛膝引血下行，生地黄凉血养阴。全方活血化瘀与行气并行，切合本例心血瘀阻、胸阳痹阻的核心病机。临床应用时还应结合患者兼夹症状灵活加减，如兼见畏寒肢冷者可酌加桂枝、细辛以温通胸阳；兼见气短乏力等心气不足者可加黄芪、党参以补益心气，标本兼顾以提高疗效。", explain:""}
      ]
    },
    {title:"第三章 脑系病证", ready:true,

            ["肝阳上亢证","头胀痛而眩，心烦易怒，面红目赤，口苦，舌红苔黄，脉弦有力","平肝潜阳息风","天麻钩藤饮"],
            ["血虚头痛证","头痛隐隐，头晕眼花，面色少华，心悸，舌淡苔薄，脉细弱","养血滋阴，和络止痛","加味四物汤"],
            ["痰浊头痛证","头痛昏蒙，胸脘满闷，呕恶痰涎，苔白腻，脉滑或弦滑","健脾燥湿，化痰降逆","半夏白术天麻汤"],
            ["瘀血头痛证","头痛经久不愈，痛处固定，痛如锥刺，舌质紫暗或有瘀斑","活血化瘀，通窍止痛","通窍活血汤"],
            ["肾虚头痛证","头痛且空，眩晕耳鸣，腰膝酸软，神疲乏力，遗精带下，舌红少苔","养阴补肾，填精生髓","大补元煎"]

            ["气血亏虚证","眩晕动则加剧，劳累即发，面色㿠白，神疲懒言，心悸失眠，舌淡苔薄","补养气血，健运脾胃","归脾汤"],
            ["肾精不足证","眩晕日久，精神萎靡，腰膝酸软，耳鸣如蝉，健忘，舌淡红，脉细","补肾填精，充养脑髓","左归丸"],
            ["痰湿中阻证","眩晕，头重如蒙，胸闷恶心，食少多寐，苔白腻，脉濡滑","化痰祛湿，健脾和胃","半夏白术天麻汤"],
            ["瘀血阻窍证","眩晕，头痛，兼见健忘失眠，面唇紫暗，舌质紫暗或有瘀斑","祛瘀生新，活血通窍","通窍活血汤"]

        {type:"h4",text:"三、中风"},
        {type:"p",text:"中风是以突然昏仆、半身不遂、口舌㖞斜、言语謇涩为主要表现的病证，相当于现代医学的脑血管意外（脑卒中）。病机为在气血亏虚基础上，因劳倦、情志、饮食等诱因致使阴阳失调、气血逆乱、直冲犯脑。以是否神志昏蒙分为中经络（无神志改变）与中脏腑（神志昏蒙）两大类。"},

            ["中经络·风阳上扰证","平素头晕头痛，耳鸣目眩，突然发生口眼㖞斜、半身不遂","平肝潜阳，活血通络","天麻钩藤饮"],

            ["中脏腑·闭证（阴闭）","突然昏仆，不省人事，牙关紧闭，面白唇暗，静卧不烦，四肢不温","化痰息风，温开通窍","涤痰汤合苏合香丸"],
            ["中脏腑·脱证","突然昏仆，不省人事，目合口开，鼻鼾息微，手撒肢冷，二便自遗，脉细弱或脉微欲绝","益气回阳，救阴固脱","参附汤合生脉散"]

        {type:"h4",text:"四、痴呆与痫病"},
        {type:"ul", items:[
          "痴呆：是以呆傻愚笨、智能低下、善忘等为主要表现的疾病，病位在脑，与心、肝、脾、肾功能失调密切相关，主要证型有髓海不足证（七福饮）、脾肾两虚证（还少丹）、痰浊蒙窍证（洗心汤）、瘀血内阻证（通窍活血汤）等，病理性质多属本虚标实，本虚为肾精气血亏虚，标实为痰浊瘀血蒙蔽清窍。",
          "痫病：是以突然仆倒、口吐涎沫、四肢抽搐、双目上视、或口中怪叫、移时苏醒如常人为主要表现的发作性疾病，病机总属气机逆乱、痰浊瘀血阻滞脑窍，主要证型有风痰闭阻证（定痫丸）、痰火扰神证（龙胆泻肝汤合涤痰汤）、心脾两虚证（六君子汤合归脾汤）、心肾亏虚证（左归丸合天王补心丹），发作期以豁痰息风开窍为主，休止期以补虚培本为主。"
        ]}

        "眩晕病机可概括为“无风不作眩、无痰不作眩、无虚不作眩”，与肝脾肾三脏密切相关。",

        {type:"single", q:"眩晕理论中，“无痰不作眩”强调的病理因素是：", options:["风","痰","虚","火"], answer:1, explain:"“无痰不作眩”强调痰浊上蒙清窍是眩晕发病的重要病理因素之一，与“无风不作眩”“无虚不作眩”共同构成眩晕病机理论。"},
        {type:"single", q:"中风患者突然昏仆，不省人事，面白唇暗，静卧不烦，四肢不温，属于：", options:["中脏腑·闭证（阳闭）","中脏腑·闭证（阴闭）","中脏腑·脱证","中经络·风痰入络证"], answer:1, explain:"阴闭证以面白唇暗、静卧不烦、四肢不温为特征（与阳闭的面赤身热气粗相对），治以化痰息风、温开通窍，代表方涤痰汤合苏合香丸。"},
        {type:"single", q:"中风患者目合口开，鼻鼾息微，手撒肢冷，二便自遗，脉微欲绝，属于：", options:["中经络证","中脏腑·闭证","中脏腑·脱证","以上都不是"], answer:2, explain:"脱证是阳气暴脱的危重证候，特征为目合口开、手撒肢冷、二便自遗、脉微欲绝，治以益气回阳救阴固脱，代表方参附汤合生脉散。"},
        {type:"single", q:"痫病治疗原则是：", options:["发作期与休止期治法完全相同","发作期以豁痰息风开窍为主，休止期以补虚培本为主","仅在发作期治疗，休止期无需用药","仅需补虚，无需豁痰息风"], answer:1, explain:"痫病治疗须分期论治：发作期以豁痰息风开窍治标为主，休止期则以补益心脾肾等培本固元为主，标本兼顾。"},
        {type:"multi", q:"中风中经络的证型包括：", options:["风痰入络证","风阳上扰证","阴虚风动证","脱证"], answer:[0,1,2], explain:"D项脱证属中脏腑范畴，而非中经络证型，故不选D；中经络证型包括风痰入络、风阳上扰、阴虚风动等。"},
        {type:"multi", q:"关于痴呆病机的说法，正确的有：", options:["病位在脑","与心肝脾肾功能失调密切相关","病理性质多本虚标实","病理性质单纯属实，无虚可言"], answer:[0,1,2], explain:"D项错误，痴呆病理性质多属本虚标实，本虚为肾精气血亏虚，标实为痰浊瘀血蒙蔽清窍，并非单纯实证。"},
        {type:"blank", q:"中风病机为在气血亏虚基础上，因劳倦情志饮食等诱因致阴阳失调、气血逆乱、直冲犯____。（请填一字）", answer:["脑"], explain:"中风的核心病机是气血逆乱、直冲犯脑，导致脑窍闭塞或脑髓受损，从而出现突然昏仆、半身不遂等症状。"},

        {type:"case", q:"病例分析：患者突然昏仆，不省人事，牙关紧闭，两手握固，面赤身热，气粗，喉中痰鸣，舌红苔黄腻，脉弦滑数。请分析证候并说明诊治思路。", answer:"该患者证候属于中风病中脏腑·闭证之阳闭证，病机为肝阳暴张、痰火壅盛、上蒙清窍，气血随风阳痰火上冲犯脑，症见突然昏仆、不省人事（脑窍闭塞，神明失用）、牙关紧闭、两手握固（属闭证特征，邪气壅盛、内闭清窍，正气尚能与邪气相争，故见牙关紧闭、两手握固等实证表现，与脱证的目合口开、手撒肢冷截然不同）、面赤身热（阳热亢盛之象）、气粗、喉中痰鸣（痰热壅塞气道）、舌红苔黄腻、脉弦滑数（痰热内盛之象），综合分析可确诊为阳闭证，与阴闭证（面白唇暗、静卧不烦、痰声漉漉、苔白腻）的寒痰特性截然不同。治疗当以清肝息风、辛凉开窍为法，可选用羚角钩藤汤配合安宫牛黄丸：羚角钩藤汤以羚羊角、钩藤凉肝息风为君，配伍桑叶、菊花、生地黄、白芍、川贝母等清热平肝、增液舒筋；安宫牛黄丸清热解毒、开窍醒神，二方合用共奏清肝息风、豁痰开窍之功，切合本例阳闭证肝阳痰火上蒙清窍的核心病机。此为中风急症，须尽快救治，并密切观察病情变化，警惕由闭转脱的病势演变。", explain:""}

      quiz:[
        {type:"single", q:"胁肋隐痛，绵绵不休，口干咽燥，头晕目眩，舌红少苔，属于胁痛的：", options:["肝郁气滞证","肝胆湿热证","瘀血阻络证","肝阴不足证"], answer:3, explain:"肝阴不足证属“不荣则痛”，以隐痛绵绵、口干咽燥、舌红少苔为特征，治以养阴柔肝，代表方一贯煎。"},
        {type:"single", q:"身目俱黄，黄色晦暗如烟熏，畏寒神疲，属于黄疸的：", options:["阳黄·热重于湿证","阳黄·急黄证","阴黄·寒湿阻遏证","阳黄·湿重于热证"], answer:2, explain:"阴黄以黄色晦暗如烟熏为特征性表现，与阳黄的黄色鲜明如橘子色形成鲜明对比，治以温中化湿健脾和胃。"},

        {type:"single", q:"鼓胀中腹大胀满形似蛙腹、朝宽暮急、畏寒肢冷，属于：", options:["气滞湿阻证","水热蕴结证","脾肾阳虚证","肝肾阴虚证"], answer:2, explain:"脾肾阳虚证以腹大胀满形似蛙腹、朝宽暮急、畏寒肢冷为特征，治以温补脾肾、化气利水，代表方附子理苓汤。"},
        {type:"multi", q:"鼓胀以标实为主的证型有：", options:["气滞湿阻证","水湿困脾证","瘀结水留证","脾肾阳虚证"], answer:[0,1,2], explain:"D项脾肾阳虚证以本虚为主，而非标实为主，故不选D；气滞湿阻、水湿困脾、瘀结水留证均以标实证候突出。"},
        {type:"multi", q:"关于黄疸的说法，正确的有：", options:["阳黄多因湿热为患，色泽鲜明","阴黄多因寒湿为患，色泽晦暗","急黄是阳黄的危重变证","阴黄与阳黄的治法完全相同，无需区分"], answer:[0,1,2], explain:"D项错误，阴黄与阳黄病性寒热相反，治法迥异（阳黄清热利湿，阴黄温中化湿），必须仔细鉴别，不可混淆。"},
        {type:"blank", q:"鼓胀相当于现代医学的____腹水。（请填三字）", answer:["肝硬化"], explain:"鼓胀是以腹部胀大如鼓为特征的病证，相当于现代医学的肝硬化腹水，病机为气滞血瘀水停互结。"},
        {type:"blank", q:"胁痛的病机可分为“不通则痛”与“不____则痛”两大类型。（请填一字）", answer:["荣"], explain:"“不通则痛”指气滞血瘀湿热等邪实阻滞导致的疼痛，“不荣则痛”指肝阴血不足、失于濡养所致的隐痛，二者病机迥异。"},
        {type:"case", q:"病例分析：患者身目俱黄，黄色鲜明如橘子色，发热口渴，腹胀胁痛，大便秘结，小便黄赤，苔黄腻，脉弦数。请分析证候并说明诊治思路。", answer:"该患者证候属于黄疸病中阳黄的热重于湿证，病机为湿热蕴结中焦，热邪偏盛，胆汁不循常道、外溢肌肤，症见身目俱黄、黄色鲜明如橘子色（阳黄的特征性表现，湿热熏蒸、热重于湿则黄色格外鲜明）、发热口渴（热邪偏盛，伤及津液）、腹胀胁痛（湿热蕴结中焦，肝胆气机不畅）、大便秘结（热邪伤津，兼腑气不通）、小便黄赤（湿热下注膀胱）、苔黄腻、脉弦数（湿热内蕴、热势较盛之象），均为阳黄热重于湿证的典型表现。治疗当以清热通腑、利湿退黄为法，可选用茵陈蒿汤：方中重用茵陈清热利湿退黄为君，栀子清热降火、通利三焦为臣，大黄泻热逐瘀、通利大便，使湿热之邪从二便排出为佐。三药相配、前后分消，使蕴结中焦的湿热之邪从大小便排出，则黄疸自退，切合本例阳黄热重于湿证的核心病机。因本方力专清热利湿通便，效果显著，被誉为治疗湿热黄疸的“退黄第一方”，临床应用广泛。", explain:""}

    {title:"第六章 肾系病证", ready:true,
      lecture:[
        {type:"h4",text:"一、水肿"},
        {type:"p",text:"水肿是体内水液潴留、泛溢肌肤、以头面眼睑、四肢、腹背甚至全身浮肿为主要表现的病证，病位在肺脾肾，与三焦气化密切相关，分阳水（发病较急，多属实证）与阴水（病程较长，多属虚证或虚实夹杂）。"},
        {type:"table", headers:["证型","主症","治法","代表方"],
          rows:[
            ["风水相搏证","眼睑浮肿，继则四肢及全身皆肿，来势迅速，兼恶寒发热，苔薄白，脉浮","疏风清热，宣肺行水","越婢加术汤"],
            ["湿毒浸淫证","眼睑浮肿，延及全身，皮肤疮痍，甚则溃烂，恶风发热，小便不利","宣肺解毒，利湿消肿","麻黄连翘赤小豆汤合五味消毒饮"],
            ["水湿浸渍证","全身水肿，按之没指，小便短少，身体困重，胸闷纳呆，苔白腻","健脾化湿，通阳利水","五皮饮合胃苓汤"],
            ["湿热壅盛证","遍体浮肿，皮肤绷急光亮，胸脘痞闷，烦热口渴，小便短赤，苔黄腻","分利湿热","疏凿饮子"],
            ["脾阳虚衰证","身肿日久，腰以下为甚，按之凹陷不易恢复，脘腹胀闷，纳减便溏","温运脾阳，以利水湿","实脾饮"],
            ["肾阳衰微证","水肿反复消长不已，腰以下肿甚，按之凹陷不起，畏寒肢冷，腰膝酸软","温肾助阳，化气行水","济生肾气丸合真武汤"]
          ]

        {type:"h4",text:"二、淋证与癃闭"},
        {type:"ul", items:[
          "淋证：是以小便频急、淋沥不尽、尿道疼痛、少腹拘急引痛为主要表现的病证，病位在肾与膀胱，病机为湿热蕴结下焦，膀胱气化不利。分热淋（湿热下注，八正散）、石淋（湿热蕴结、煎熬成石，石韦散）、血淋（热伤血络，小蓟饮子）、气淋（气机郁滞，沉香散）、膏淋（脾肾亏虚、湿浊下注，程氏萆薢分清饮）、劳淋（脾肾两虚，无比山药丸）六种，其中热淋、石淋、血淋、气淋实证居多，膏淋、劳淋多属虚证或虚实夹杂。",
          "癃闭：是以小便量少、点滴而出，甚则闭塞不通为主要表现的病证，病情较轻者称“癃”，病情较重、小便点滴不出者称“闭”。病机为膀胱气化功能失常，主要证型有膀胱湿热证（八正散）、肺热壅盛证（清肺饮）、肝郁气滞证（沉香散）、浊瘀阻塞证（代抵当丸）、脾气不升证（补中益气汤合春泽汤）、肾阳衰惫证（济生肾气丸），治疗须辨明虚实寒热，实证以清热利湿、行气活血为主，虚证以补脾益肾、助阳化气为主。"
        ]},
        {type:"h4",text:"三、遗精与阳痿"},
        {type:"table", headers:["病证/证型","主症","治法","代表方"],
          rows:[
            ["遗精·君相火旺证","少寐多梦，梦则遗精，甚则不因梦而遗，心烦头晕，口苦，尿黄，舌红苔黄","清心安神，滋阴降火","黄连清心饮合三才封髓丹"],
            ["遗精·湿热下注证","遗精频作，或尿时有精液外流，小便黄赤浑浊，口苦口黏，舌苔黄腻","清热利湿，分清泄浊","程氏萆薢分清饮"],
            ["遗精·肾虚不固证","遗精频作，甚则滑精，腰膝酸软，头晕耳鸣，精神萎靡，舌淡苔白","补肾固精","金锁固精丸合水陆二仙丹"],
            ["阳痿·命门火衰证","阳事不举，或举而不坚，精薄清冷，畏寒肢冷，腰膝酸软","温肾壮阳，兴阳起痿","赞育丸"],
            ["阳痿·心脾两虚证","阳事不举，心悸不寐，食少倦怠，面色不华，舌淡苔薄","补益心脾","归脾汤"],
            ["阳痿·肝郁不舒证","阳事不举，或临房举而不坚，胸胁胀闷，情志抑郁，善太息","疏肝解郁","逍遥散"]

        "水肿分阳水（发病急，多实证，如风水相搏、水湿浸渍、湿热壅盛）与阴水（病程长，多虚证，如脾阳虚衰、肾阳衰微）。",

      quiz:[
        {type:"single", q:"眼睑浮肿，继则四肢及全身皆肿，来势迅速，兼恶寒发热，属于水肿的：", options:["风水相搏证","水湿浸渍证","脾阳虚衰证","肾阳衰微证"], answer:0, explain:"风水相搏证起病急骤、眼睑先肿、兼见表证（恶寒发热），治以疏风清热、宣肺行水，代表方越婢加术汤。"},
        {type:"single", q:"水肿反复消长不已，腰以下肿甚，畏寒肢冷，腰膝酸软，属于：", options:["湿毒浸淫证","湿热壅盛证","脾阳虚衰证","肾阳衰微证"], answer:3, explain:"肾阳衰微证以水肿反复消长、腰以下肿甚、畏寒肢冷、腰膝酸软为特征，治以温肾助阳化气行水，代表方济生肾气丸合真武汤。"},
        {type:"single", q:"淋证中因湿热蕴结煎熬成石所致的类型是：", options:["热淋","石淋","血淋","气淋"], answer:1, explain:"石淋是湿热蕴结下焦、煎熬尿液成石所致，代表方石韦散，常伴排尿中断、腰腹绞痛等症状。"},
        {type:"single", q:"“癃”与“闭”的区别在于：", options:["病位不同","癃病情较轻（小便量少点滴而出），闭病情较重（小便闭塞不通）","癃属虚证，闭属实证","二者无任何区别，可混用"], answer:1, explain:"癃闭中“癃”指病情较轻、小便不畅但仍能点滴排出，“闭”指病情较重、小便完全闭塞不通，二者程度不同。"},
        {type:"single", q:"遗精频作，甚则滑精，腰膝酸软，头晕耳鸣，属于：", options:["君相火旺证","湿热下注证","肾虚不固证","以上都不是"], answer:2, explain:"肾虚不固证以遗精滑精、腰膝酸软、头晕耳鸣、精神萎靡为特征，属虚证，治以补肾固精。"},
        {type:"multi", q:"属于淋证实证类型的有：", options:["热淋","石淋","血淋","劳淋"], answer:[0,1,2], explain:"D项劳淋属虚证（脾肾两虚），而非实证，故不选D；热淋、石淋、血淋、气淋多属实证。"},
        {type:"multi", q:"关于阳痿证型的说法，正确的有：", options:["命门火衰证治以温肾壮阳","心脾两虚证治以补益心脾","肝郁不舒证治以疏肝解郁","所有阳痿均应径直温肾壮阳而不需辨证"], answer:[0,1,2], explain:"D项错误，阳痿病因病机多样，须辨明脏腑气血阴阳虚实而分别论治，并非所有阳痿都属肾阳不足，滥用温肾壮阳药反而可能贻误病情。"},
        {type:"blank", q:"水肿中，发病较急、多属实证的类型称为____水。（请填一字）", answer:["阳"], explain:"阳水发病较急、病程较短，多因外邪侵袭所致，属实证；阴水病程较长，多因脏腑虚损所致，属虚证或虚实夹杂。"},
        {type:"blank", q:"癃闭中因脾虚清阳不升所致的证型，代表方为补中益气汤合____散。（请填二字）", answer:["春泽"], explain:"脾气不升证治以补中益气、升清降浊，代表方补中益气汤合春泽汤（五苓散加人参），标本兼顾。"},
        {type:"case", q:"病例分析：患者小便频急，淋沥不尽，尿道灼热疼痛，小便黄赤浑浊，口苦口黏，舌苔黄腻，脉滑数。请分析证候并说明诊治思路。", answer:"该患者证候属于淋证中的热淋，病机为湿热蕴结下焦，膀胱气化不利，症见小便频急、淋沥不尽（湿热下注膀胱，气化失常）、尿道灼热疼痛（湿热蕴结、灼伤膀胱及尿道脉络）、小便黄赤浑浊（湿热下注，秽浊之邪随尿液排出）、口苦口黏（湿热内蕴，上蒸口腔）、舌苔黄腻、脉滑数（湿热内盛之象），均为湿热蕴结下焦、膀胱气化不利的典型表现。治疗当以清热利湿通淋为法，可选用八正散：方中车前子、瞿麦、萹蓄、木通清热利水通淋为主药，配伍栀子清泄三焦之火，大黄泻热通便（使湿热之邪部分从大便分消），滑石清热利湿，炙甘草调和诸药并缓急止痛。全方力专清热泻火、利水通淋，切合本例热淋湿热蕴结下焦的核心病机。治疗期间还应嘱患者多饮水以助湿热之邪从小便排出，忌食辛辣刺激、肥甘厚味之品，以防湿热内生加重病情，并注意个人卫生以防反复感染。", explain:""}

    {title:"第七章 气血津液病证", ready:true,
      lecture:[
        {type:"h4",text:"一、郁证"},
        {type:"p",text:"郁证是因情志不舒、气机郁滞所致，以心情抑郁、情绪不宁、胸胁胀满、易怒欲哭或咽中如有异物梗塞等为主要表现的一类病证，病位主要在肝，涉及心脾。"},
        {type:"table", headers:["证型","主症","治法","代表方"],
          rows:[
            ["肝气郁结证","精神抑郁，胸胁胀满疼痛，善太息，脘闷嗳气，脉弦","疏肝解郁，理气畅中","柴胡疏肝散"],
            ["气郁化火证","急躁易怒，胸胁胀满，口苦而干，或头痛目赤，嘈杂吞酸，舌红苔黄","清肝泻火，解郁和胃","丹栀逍遥散"],
            ["痰气郁结证（梅核气）","咽中如有物梗塞，咯之不出，吞之不下，胸部满闷，舌苔白腻","行气开郁，化痰散结","半夏厚朴汤"],
            ["心神失养证（脏躁）","精神恍惚，心神不宁，多疑易惊，悲忧善哭，喜怒无常","甘润缓急，养心安神","甘麦大枣汤"],
            ["心脾两虚证","多思善虑，心悸胆怯，失眠健忘，纳差倦怠，面色不华","健脾养心，补益气血","归脾汤"],
            ["心肾阴虚证","情绪不宁，心悸，心烦，失眠，五心烦热，腰膝酸软，男子遗精","滋养心肾","天王补心丹合六味地黄丸"]
          ]
        },
        {type:"h4",text:"二、血证"},
        {type:"p",text:"血证是血液不循常道，或上溢于口鼻诸窍，或下泄于前后二阴，或渗出肌肤所形成的疾病总称，包括鼻衄、齿衄、咳血、吐血、便血、尿血、紫斑等。病因多为外感邪热、情志过极、饮食不节、劳倦体虚等，病机总不离火热熏灼及气虚不摄两大类。"},
        {type:"table", headers:["病证/证型","主症","治法","代表方"],
          rows:[
            ["咳血·燥热伤肺证","喉痒咳嗽，痰中带血或纯血鲜红，口干鼻燥，苔薄黄少津","清热润肺，宁络止血","桑杏汤"],
            ["咳血·肝火犯肺证","咳嗽阵作，痰中带血或纯血鲜红，胸胁引痛，急躁易怒，口苦，舌红苔黄","清肝泻火，凉血止血","泻白散合黛蛤散"],
            ["吐血·胃热壅盛证","脘腹胀闷灼痛，吐血色红或紫暗，常夹食物残渣，口臭便秘，舌红苔黄腻","清胃泻火，化瘀止血","泻心汤合十灰散"],
            ["便血·肠道湿热证","便血色红，大便不畅或稀溏，腹痛，口苦，苔黄腻","清化湿热，凉血止血","地榆散合槐角丸"],
            ["尿血·下焦湿热证","小便黄赤灼热，尿血鲜红，或伴心烦口渴，舌红苔黄","清热利湿，凉血止血","小蓟饮子"],
            ["紫斑·血热妄行证","皮肤出现青紫斑点或斑块，色鲜红或紫红，常伴发热，口渴，便秘","清热解毒，凉血止血","十灰散"],
            ["紫斑·气不摄血证","反复发生肌衄，紫斑色淡，神疲乏力，食欲不振，舌淡苔白","补气摄血","归脾汤"]
          ]
        },
        {type:"h4",text:"三、消渴"},
        {type:"p",text:"消渴是以多饮、多食、多尿、形体消瘦或尿有甜味为主要表现的病证，相当于现代医学的糖尿病，病位主要在肺、胃、肾，病机为阴虚为本、燥热为标，二者互为因果，据病变脏腑及主症偏重分上消（肺热津伤，肺主治节，代表方消渴方）、中消（胃热炽盛，代表方玉女煎）、下消（肾阴亏虚或阴阳两虚，代表方六味地黄丸或金匮肾气丸）三消，但临床往往三消症状同时存在，须辨明主次。"},
        {type:"h4",text:"四、汗证与内伤发热"},
        {type:"ul", items:[
          "汗证：是由于阴阳失调、腠理不固所致的以汗液外泄失常为主要表现的病证，分自汗（不因外界环境因素影响，日间时时汗出，动辄益甚，多属气虚阳虚，代表方玉屏风散）与盗汗（睡时汗出，醒后即止，多属阴虚内热，代表方当归六黄汤）两大类。",
          "内伤发热：是以脏腑功能失调、气血阴阳亏虚为基本病机所致的发热病证，与外感发热的鉴别要点是起病缓慢、病程较长、发热常呈低热或潮热，多不伴恶寒。主要证型有气虚发热证（补中益气汤）、血虚发热证（归脾汤）、阴虚发热证（清骨散）、阳虚发热证（金匮肾气丸）、气郁发热证（丹栀逍遥散）、血瘀发热证（血府逐瘀汤）、痰湿郁热证（黄连温胆汤）。"
        ]},
        {type:"h4",text:"五、虚劳"},
        {type:"p",text:"虚劳是以脏腑亏损、气血阴阳虚衰为主要病机，以久虚不复、症状繁多为临床特征的多种慢性虚损性疾病的总称。辨证以气、血、阴、阳虚损为纲，五脏虚候为目，主要证型有肺气虚证（补肺汤）、心血虚证（养心汤）、脾气虚证（加味四君子汤）、肝血虚证（四物汤）、肾阴虚证（左归丸）、肾阳虚证（右归丸）等，治疗以补益为基本原则，重视调理脾肾（脾为后天之本，肾为先天之本），并强调补益药物须根据虚损脏腑及气血阴阳性质精准选用，不可盲目一味峻补。"}
      ],
      keypoints:[
        "郁证病位主要在肝，涉及心脾，梅核气（痰气郁结证）代表方半夏厚朴汤，脏躁（心神失养证）代表方甘麦大枣汤。",
        "血证病机总不离火热熏灼与气虚不摄两大类，实证多因火热迫血妄行，虚证多因气虚不能摄血。",
        "消渴分上消（肺热，代表方消渴方）、中消（胃热，代表方玉女煎）、下消（肾虚，代表方六味地黄丸或金匮肾气丸），病机总属阴虚为本、燥热为标。",
        "汗证自汗多属气虚阳虚（代表方玉屏风散），盗汗多属阴虚内热（代表方当归六黄汤）。",
        "内伤发热与外感发热的鉴别要点：内伤发热起病缓慢、病程长、多不伴恶寒，常呈低热或潮热。",
        "虚劳辨证以气血阴阳虚损为纲、五脏虚候为目，治疗重视调理脾肾（后天之本与先天之本）。"

      quiz:[
        {type:"single", q:"咽中如有物梗塞，咯之不出，吞之不下，属于郁证的：", options:["肝气郁结证","气郁化火证","痰气郁结证（梅核气）","心神失养证"], answer:2, explain:"痰气郁结证即梅核气，以咽中异物感、咯吐不出吞咽不下为特征，治以行气开郁化痰散结，代表方半夏厚朴汤。"},
        {type:"single", q:"精神恍惚，悲忧善哭，喜怒无常，属于郁证的：", options:["肝气郁结证","心神失养证（脏躁）","心脾两虚证","心肾阴虚证"], answer:1, explain:"心神失养证即脏躁，以精神恍惚、悲忧善哭、喜怒无常为特征，治以甘润缓急养心安神，代表方甘麦大枣汤。"},
        {type:"single", q:"消渴病机总属：", options:["阳盛为本，阴虚为标","阴虚为本，燥热为标","单纯气虚","单纯血瘀"], answer:1, explain:"消渴病机总属阴虚为本、燥热为标，二者互为因果，贯穿疾病发展的全过程。"},
        {type:"single", q:"不因外界环境因素影响，日间时时汗出，动辄益甚，多属：", options:["盗汗","自汗","战汗","黄汗"], answer:1, explain:"自汗是不因外界环境影响、日间时时汗出、活动后加重的出汗异常，多属气虚阳虚，代表方玉屏风散。"},
        {type:"single", q:"内伤发热与外感发热的主要鉴别要点是：", options:["内伤发热起病急骤","内伤发热起病缓慢、病程长、多不伴恶寒","内伤发热必兼恶寒","二者无法鉴别"], answer:1, explain:"内伤发热起病缓慢、病程较长，发热常呈低热或潮热，多不伴恶寒，这与外感发热起病急骤、多伴恶寒的特点截然不同。"},
        {type:"multi", q:"血证的病机不离以下哪两大类：", options:["火热熏灼","气虚不摄","单纯外伤","单纯情志因素"], answer:[0,1], explain:"C、D两项虽可作为诱因，但血证的核心病机总不离火热熏灼（迫血妄行）与气虚不摄（不能统摄血液）两大类。"},
        {type:"multi", q:"关于虚劳的说法，正确的有：", options:["辨证以气血阴阳虚损为纲，五脏虚候为目","治疗重视调理脾肾", "脾为后天之本，肾为先天之本","治疗可不辨虚损性质而一味使用峻补之品"], answer:[0,1,2], explain:"D项错误，虚劳治疗应根据虚损脏腑及气血阴阳性质精准选用补益药物，不可盲目一味峻补，以免虚不受补或补之不当。"},
        {type:"blank", q:"消渴三消中，上消病位主要在____，代表方消渴方。（请填一字）", answer:["肺"], explain:"上消以肺热津伤为主要病机，主症以多饮为突出表现，代表方消渴方，清热润肺、生津止渴。"},
        {type:"blank", q:"盗汗多属阴虚内热，代表方为当归____汤。（请填二字）", answer:["六黄"], explain:"当归六黄汤滋阴泻火、固表止汗，是治疗阴虚火旺盗汗的代表方，被誉为“治盗汗之圣药”。"},
        {type:"case", q:"病例分析：患者多饮多尿，尿有甜味，形体消瘦，腰膝酸软，头晕耳鸣，五心烦热，舌红少苔，脉细数。请分析证候并说明诊治思路。", answer:"该患者证候属于消渴病中的下消（肾阴亏虚证），病机为肾阴不足，固摄无权，津液直趋于下，症见多饮多尿（肾阴亏虚，肾主水液代谢的功能失常，且阴虚生内热，饮水自救故多饮，肾失固摄故多尿）、尿有甜味（肾虚不能固摄精微，精微物质随尿液下泄）、形体消瘦（阴精亏耗，肌肉失于濡养）、腰膝酸软、头晕耳鸣（肾阴不足，腰膝及清窍失养）、五心烦热（阴虚内热之象）、舌红少苔、脉细数（阴虚火旺之象），均为肾阴亏虚、下消证候的典型表现。治疗当以滋补肾阴、润燥止渴为法，可选用六味地黄丸加减：方中重用熟地黄滋肾填精为君，山茱萸补肝肾涩精气，山药补脾益肾为臣（“三补”），配伍泽泻利湿泄浊、牡丹皮清泻虚热、茯苓淡渗脾湿为佐（“三泻”），三补三泻、补中寓泻，切合本例肾阴亏虚为主的下消证候。若病情进一步发展出现畏寒肢冷等阳虚征象，则提示阴损及阳、转为阴阳两虚证，治疗当改用金匮肾气丸，在滋阴基础上少佐温阳之品，体现“阴中求阳”的治疗思路，随病情动态变化灵活调整治法方药。", explain:""}

    {title:"第八章 肢体经络病证", ready:true,
      lecture:[
        {type:"h4",text:"一、痹证"},
        {type:"p",text:"痹证是由于风、寒、湿、热等邪气闭阻经络、导致气血运行不畅所致，以肢体关节肌肉疼痛、酸楚、重着、麻木、屈伸不利甚至关节肿大变形为主要表现的病证。据感邪偏胜及病程分为风寒湿痹（行痹、痛痹、着痹）、风湿热痹与痰瘀痹阻、久痹正虚等类型。"},
        {type:"table", headers:["证型","主症","治法","代表方"],
          rows:[
            ["行痹（风邪偏盛）","肢体关节酸痛，游走不定，屈伸不利，或见恶风发热，苔薄白，脉浮","祛风通络，散寒除湿","防风汤"],
            ["痛痹（寒邪偏盛）","肢体关节疼痛较剧，痛有定处，遇寒加重，得热痛减，苔薄白，脉弦紧","散寒通络，祛风除湿","乌头汤"],
            ["着痹（湿邪偏盛）","肢体关节重着酸痛，肿胀散漫，麻木不仁，活动不利，苔白腻，脉濡缓","除湿通络，祛风散寒","薏苡仁汤"],
            ["风湿热痹证","关节肌肉疼痛，局部红肿灼热，痛不可触，得冷则舒，可涉及一个或多个关节，伴发热口渴","清热通络，祛风除湿","白虎加桂枝汤合宣痹汤"],
            ["痰瘀痹阻证","痹证日久不愈，关节肿大变形，屈伸不利，皮下有硬结或瘀斑，舌质紫暗","化痰祛瘀，搜风通络","双合汤"],
            ["肝肾亏虚证","痹证日久，关节肿大变形，屈伸不利，腰膝酸软，形体消瘦，甚则肌肉萎缩","培补肝肾，舒筋止痛","独活寄生汤"]
          ]
        },
        {type:"h4",text:"二、痉证与痿证"},
        {type:"ul", items:[
          "痉证：是以项背强直、四肢抽搐甚至角弓反张为主要表现的病证，病因多为邪壅经络、热甚发痉或阴血亏损、筋脉失养。主要证型有邪壅经络证（羌活胜湿汤）、肝经热盛证（羚角钩藤汤）、阳明热盛证（白虎汤合增液承气汤）、心营热盛证（清营汤）、瘀血内阻证（通窍活血汤）、阴血亏虚证（四物汤合大定风珠），治疗当分清外感与内伤、实证与虚证。",
          "痿证：是以肢体筋脉弛缓、软弱无力，甚则肌肉萎缩或瘫痪为主要表现的病证，病位在筋脉肌肉，与肺、胃、肝、肾密切相关，古有“治痿独取阳明”之说，强调调理脾胃在痿证治疗中的重要地位。主要证型有肺热津伤证（清燥救肺汤）、湿热浸淫证（加味二妙散）、脾胃虚弱证（参苓白术散）、肝肾亏损证（虎潜丸）、脉络瘀阻证（圣愈汤合补阳还五汤）。"
        ]},
        {type:"h4",text:"三、腰痛与颤证"},
        {type:"table", headers:["病证/证型","主症","治法","代表方"],
          rows:[
            ["腰痛·寒湿腰痛证","腰部冷痛重着，转侧不利，静卧痛不减，遇阴雨天加重","散寒行湿，温经通络","甘姜苓术汤"],
            ["腰痛·湿热腰痛证","腰部疼痛，重着而热，暑湿阴雨天加重，小便短赤","清热利湿，舒筋止痛","四妙丸"],

let curSubject = null, curChapter = null;

function renderSidebar(){
  const box = document.getElementById('subject-list');
  box.innerHTML = '';
  SUBJECTS.forEach((s,si)=>{
    const div = document.createElement('div');
    div.className='subject';
    div.id='subj-'+si;
    const readyChapters = s.chapters.filter(c=>c.ready).length;
    div.innerHTML = `
      <div class="subject-head" onclick="toggleSubject(${si})">
        <span>${s.name}<span class="badge ${s.ready?'ready':'building'}">${s.ready? (readyChapters+'/'+s.chapters.length+' 已完成') : '建设中'}</span></span>
        <span class="arrow">▶</span>
      </div>
      <div class="chapter-list">
        ${s.chapters.map((c,ci)=>`<div class="chapter-item" data-si="${si}" data-ci="${ci}" onclick="openChapter(${si},${ci})"><span class="dot"></span>${c.title}</div>`).join('')}
      </div>`;
    box.appendChild(div);
  });
}

function toggleSubject(si){
  document.getElementById('subj-'+si).classList.toggle('open');
}

function renderHomeGrid(){
  const grid = document.getElementById('subject-grid');
  grid.innerHTML = SUBJECTS.map((s,si)=>{
    const readyChapters = s.chapters.filter(c=>c.ready).length;
    return `<div class="subject-card" onclick="toggleSubject(${si}); document.getElementById('subj-${si}').scrollIntoView({behavior:'smooth'});">
      <h3>${s.name} <span class="badge ${s.ready?'ready':'building'}">${s.ready?'已上线':'建设中'}</span></h3>
      <p>${s.desc}</p>
      <div class="stat">共 ${s.chapters.length} 章节 · 已完成 ${readyChapters} 章</div>
    </div>`;
  }).join('');
}

function showHome(){
  curSubject=null;curChapter=null;
  document.getElementById('welcome').style.display='block';
  document.getElementById('chapter-view').style.display='none';
  document.querySelectorAll('.chapter-item').forEach(e=>e.classList.remove('active'));
  document.getElementById('sidebar').classList.remove('show');
}

function openChapter(si,ci){
  curSubject=si;curChapter=ci;
  const s = SUBJECTS[si], c = s.chapters[ci];
  document.getElementById('welcome').style.display='none';
  document.getElementById('chapter-view').style.display='block';
  document.querySelectorAll('.chapter-item').forEach(e=>e.classList.remove('active'));
  const el = document.querySelector(`.chapter-item[data-si="${si}"][data-ci="${ci}"]`);
  if(el) el.classList.add('active');
  document.getElementById('crumb').innerHTML = `<b>${s.name}</b> ／ ${c.title}`;
  document.getElementById('chapter-title').textContent = c.title;
  document.getElementById('sidebar').classList.remove('show');

  if(!c.ready){
    document.getElementById('tabs').style.display='none';
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('panel-lecture').classList.add('active');
    document.getElementById('panel-lecture').innerHTML = `
      <div class="placeholder-box">
        <div class="icon">🚧</div>
        <div style="font-size:15px;color:var(--red-deep);font-weight:600;margin-bottom:6px;">本章内容建设中</div>
        <div>《${s.name}》「${c.title}」的完整讲义、重点提示与模拟测试正在整理上线，敬请期待。</div>
      </div>`;
    document.getElementById('panel-keypoints').innerHTML='';
    document.getElementById('panel-quiz').innerHTML='';
    switchTab('lecture');
    return;
  }
  document.getElementById('tabs').style.display='flex';
  renderLecture(c);
  renderKeypoints(c);
  renderQuiz(c);
  switchTab('lecture');
}

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
}

function renderLecture(c){
  const box = document.getElementById('panel-lecture');
  let html = '<div class="lecture-block">';
  (c.lecture||[]).forEach(block=>{
    if(block.type==='h4') html += `<h4>${block.text}</h4>`;
    else if(block.type==='p') html += `<p>${block.text}</p>`;
    else if(block.type==='ul') html += `<ul>${block.items.map(i=>`<li>${i}</li>`).join('')}</ul>`;
    else if(block.type==='table'){
      html += '<table><tr>'+block.headers.map(h=>`<th>${h}</th>`).join('')+'</tr>';
      block.rows.forEach(r=>{ html += '<tr>'+r.map(x=>`<td>${x}</td>`).join('')+'</tr>'; });
      html += '</table>';
    }
  });
  html += '</div>';
  box.innerHTML = html;
}

function renderKeypoints(c){
  const box = document.getElementById('panel-keypoints');
  box.innerHTML = `<ul class="keypoint-list">${(c.keypoints||[]).map(k=>`<li>${k}</li>`).join('')}</ul>`;
}

function renderQuiz(c){
  const box = document.getElementById('panel-quiz');
  let html = `<div class="quiz-toolbar">
    <button onclick="gradeQuiz()">提交并批改</button>
    <button class="secondary" onclick="resetQuiz()">重做本章测试</button>
    <span id="quiz-score"></span>
  </div><div id="quiz-questions">`;
  (c.quiz||[]).forEach((q,qi)=>{
    html += `<div class="q-card" id="q-${qi}" data-type="${q.type}">
      <div class="q-head"><span class="q-tag">${tagName(q.type)} 第${qi+1}题</span>${q.q}</div>`;
    if(q.type==='single' || q.type==='multi'){
      const inputType = q.type==='single'?'radio':'checkbox';
      html += q.options.map((op,oi)=>`<label class="q-opt"><input type="${inputType}" name="q${qi}" value="${oi}"> ${String.fromCharCode(65+oi)}. ${op}</label>`).join('');
    } else if(q.type==='blank'){
      html += `<div class="q-blank"><input type="text" id="q${qi}-input" placeholder="请输入答案"></div>`;
    } else if(q.type==='case'){
      html += `<div class="q-case"><textarea id="q${qi}-input" placeholder="请输入你的思路/答案要点（仅供自我检验，不参与自动判分）"></textarea>
      <div><button class="case-reveal-btn" onclick="toggleExplain(${qi})">查看参考答案</button></div>`;
    }
    html += `<div class="q-explain" id="q${qi}-explain"><b>参考答案与解析：</b>${q.explain}</div></div>`;
  });
  html += '</div>';
  box.innerHTML = html;
}

function tagName(t){
  return {single:'单选题',multi:'多选题',blank:'填空题',case:'简答/病例分析'}[t]||'题目';
}

function toggleExplain(qi){
  const e = document.getElementById('q'+qi+'-explain');
  e.style.display = (e.style.display==='block')?'none':'block';
}

function gradeQuiz(){
  const c = SUBJECTS[curSubject].chapters[curChapter];
  let correct=0, gradable=0;
  (c.quiz||[]).forEach((q,qi)=>{
    const card = document.getElementById('q-'+qi);
    card.classList.remove('correct','wrong');
    const oldTag = card.querySelector('.q-result-tag'); if(oldTag) oldTag.remove();
    if(q.type==='single'){
      gradable++;
      const sel = card.querySelector(`input[name="q${qi}"]:checked`);
      const ok = sel && parseInt(sel.value)===q.answer;
      markCard(card, ok, qi);
      if(ok) correct++;
    } else if(q.type==='multi'){
      gradable++;
      const sels = Array.from(card.querySelectorAll(`input[name="q${qi}"]:checked`)).map(x=>parseInt(x.value)).sort();
      const ans = [...q.answer].sort();
      const ok = sels.length===ans.length && sels.every((v,i)=>v===ans[i]);
      markCard(card, ok, qi);
      if(ok) correct++;
    } else if(q.type==='blank'){
      gradable++;
      const val = (document.getElementById('q'+qi+'-input').value||'').trim();
      const ok = q.answer.some(a=>a.trim()===val && val!=='');
      markCard(card, ok, qi);
      if(ok) correct++;
    } else if(q.type==='case'){
      document.getElementById('q'+qi+'-explain').style.display='block';
    }
  });
  document.getElementById('quiz-score').textContent = gradable? `客观题得分：${correct} / ${gradable}` : '';
}

function markCard(card, ok, qi){
  card.classList.add(ok?'correct':'wrong');
  const tag = document.createElement('span');
  tag.className='q-result-tag '+(ok?'correct':'wrong');
  tag.textContent = ok?'✓ 正确':'✗ 错误';
  card.querySelector('.q-head').appendChild(tag);
  document.getElementById('q'+qi+'-explain').style.display='block';
}

function resetQuiz(){
  const c = SUBJECTS[curSubject].chapters[curChapter];
  renderQuiz(c);
}

function onSearch(){
  const kw = document.getElementById('search-input').value.trim().toLowerCase();
  document.querySelectorAll('.subject').forEach((div,si)=>{
    const s = SUBJECTS[si];
    let subjectMatch = s.name.toLowerCase().includes(kw);
    let anyChapterMatch=false;
    div.querySelectorAll('.chapter-item').forEach((item,ci)=>{
      const match = kw==='' || s.name.toLowerCase().includes(kw) || s.chapters[ci].title.toLowerCase().includes(kw);
      item.style.display = match? 'block':'none';
      if(match) anyChapterMatch=true;
    });
    div.style.display = (kw===''||anyChapterMatch)? 'block':'none';
    if(kw!=='' && anyChapterMatch) div.classList.add('open');
  });
}

renderSidebar();
renderHomeGrid();
</script>
</body>
</html>
