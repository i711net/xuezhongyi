        {type:"p",text:"凡以温里祛寒、治疗里寒证为主要功效的药物，称为温里药，又称祛寒药。温里药性味多辛热，主入脾、胃、肾、心经，能温散里寒、助阳益火，主治里寒证，如脾胃虚寒之脘腹冷痛、呕吐泄泻，心肾阳虚之亡阳厥逆、肢冷脉微，以及寒凝经脉之疼痛等。使用温里药应注意：本类药物多辛热燥烈，易耗伤阴液、助火生热，阴虚火旺、热证及孕妇当忌用或慎用；部分药物有毒（如附子），应严格控制剂量及炮制。"},
        {type:"table", headers:["药物","性味归经","主要功效"],
          rows:[
            ["附子","辛、甘，大热，有毒；归心、肾、脾经","回阳救逆，补火助阳，散寒止痛"],
            ["干姜","辛，热；归脾、胃、肾、心、肺经","温中散寒，回阳通脉，温肺化饮"],
            ["肉桂","辛、甘，大热；归肾、脾、心、肝经","补火助阳，散寒止痛，温经通脉，引火归元"],
            ["吴茱萸","辛、苦，热，有小毒；归肝、脾、胃、肾经","散寒止痛，降逆止呕，助阳止泻"],
            ["花椒","辛，温；归脾、胃、肾经","温中止痛，杀虫止痒"],
            ["丁香","辛，温；归脾、胃、肺、肾经","温中降逆，散寒止痛，温肾助阳"],

        {type:"ul", items:[
          "附子：辛甘大热，有毒，为“回阳救逆第一品药”，功能回阳救逆、补火助阳、散寒止痛，主治亡阳证（四肢厥逆、脉微欲绝，代表方四逆汤）、肾阳虚衰之畏寒肢冷、阳痿宫冷，以及寒痹疼痛。煎服3～15克，宜先煎0.5～1小时以减低毒性；孕妇忌用；反半夏、瓜蒌、贝母、白蔹、白及（十八反）。",
          "干姜：辛热，功能温中散寒、回阳通脉、温肺化饮，主治脾胃虚寒之脘腹冷痛、呕吐泄泻，亡阳厥逆（常与附子相须为用，“附子无干姜不热”），以及寒饮咳喘。煎服3～10克。",
          "肉桂：辛甘大热，功能补火助阳、散寒止痛、温经通脉、引火归元，主治肾阳不足、命门火衰之畏寒肢冷、腰膝冷痛，虚阳上浮之戴阳证（引火归元），以及寒凝血滞之痛经、阴疽流注。煎服1～5克，宜后下或研末冲服，不宜久煎。孕妇及血热出血者忌用；畏赤石脂。",
          "吴茱萸：辛苦而热，有小毒，功能散寒止痛、降逆止呕、助阳止泻，主治厥阴头痛、寒疝腹痛，胃寒呕吐（尤宜肝胃不和之呕吐吞酸，如左金丸配黄连），以及脾肾阳虚之五更泄泻（配补骨脂、肉豆蔻、五味子，即四神丸）。煎服1.5～4.5克。阴虚有热者忌用。",
          "花椒：辛温，功能温中止痛、杀虫止痒，主治脾胃虚寒之脘腹冷痛、呕吐泄泻，兼治虫积腹痛及湿疹瘙痒（外用）。煎服3～6克。",
          "丁香：辛温芳香，功能温中降逆、散寒止痛、温肾助阳，为治胃寒呕吐呃逆之要药（配柿蒂、人参，如丁香柿蒂汤），亦治脾胃虚寒之脘腹冷痛及肾虚阳痿。煎服1～3克。畏郁金。",
          "小茴香：辛温，功能散寒止痛、理气和胃，主治寒疝腹痛、睾丸偏坠胀痛及脾胃虚寒之脘腹冷痛、食少呕吐。煎服3～6克。"
        ]}

        {type:"case", q:"病例分析：患者四肢厥冷，冷汗淋漓，面色苍白，脉微欲绝。请分析证候并说明治疗药物选择依据。", answer:"该患者证属亡阳证（阳气暴脱），病机为阳气衰微欲脱、不能温煦四末、鼓动血脉，症见四肢厥冷、冷汗淋漓、面色苍白、脉微欲绝，均为阳气欲脱的危重表现。治疗当以回阳救逆为法，急当选用附子为核心药物（如四逆汤，附子配干姜、炙甘草）：附子辛甘大热，为“回阳救逆第一品药”，能迅速温壮周身阳气、挽救垂危之阳气；干姜辛热，功能温中散寒、回阳通脉，与附子相须为用，即“附子无干姜不热”，可显著增强回阳救逆之力；炙甘草甘缓和中，能缓解附子的毒烈之性并调和诸药。三药合用，共奏回阳救逆之功，切合本例阳气暴脱的危重病机，务必及时救治，以免阴阳离决。", explain:""}

        {type:"case", q:"病例分析：患者咳血，血色鲜红，伴颧红盗汗，潮热咳嗽，舌红少苔。请分析证候并说明止血药物选择依据。", answer:"该患者证属阴虚肺热、灼伤肺络之咳血证，病机为肺肾阴虚、虚火内炽、损伤肺络、迫血妄行，症见咳血色鲜红、颧红盗汗、潮热、舌红少苔，均为阴虚内热之象。治疗当以凉血止血、滋阴润肺为法，可选用白及为核心止血药物：白及苦甘涩微寒，质黏而涩，收敛止血、消肿生肌，尤善治肺胃出血，对于肺痨咯血、咳血尤为适宜；同时可配伍白茅根、仙鹤草等凉血止血或收敛止血之品以增强止血之效，并配伍百合、麦冬、沙参等滋阴润肺之品以治其阴虚内热之本，标本兼顾。", explain:""},
        {type:"case", q:"简述止血药“止血不留瘀”这一使用原则的含义及临床意义。", answer:"“止血不留瘀”是指在选用止血药治疗各种出血病证时，应注意避免单纯运用收敛止血作用强而无化瘀作用的药物，以防止血液瘀滞体内、形成瘀血，加重或引发新的病变。其含义在于：出血的同时，体内往往已存在血液运行不畅或已离经的瘀血，若单纯使用大剂量收敛涩滞的止血药（如仙鹤草、白及等），虽能止血，但可能使离经之血凝聚成瘀，反而阻滞经脉、影响新血的生成与运行，甚至导致出血反复不止。因此，临床用药时应根据具体病情，适当选用兼具化瘀作用的止血药（如三七、茜草、蒲黄），或在收敛止血药基础上酌加少量活血化瘀之品，做到止血而不留瘀、化瘀而不伤正，这对提高止血疗效、防止瘀血内停具有重要的临床指导意义。", explain:""}

    {title:"第十二章 活血化瘀药", ready:true,

        {type:"h4",text:"一、活血化瘀药概述"},
        {type:"p",text:"凡以通畅血行、消散瘀血为主要功效的药物，称为活血化瘀药，又称活血祛瘀药。活血化瘀药性味多辛苦温，主入心、肝经，能通畅血行、消散瘀血，主治血行不畅及瘀血内阻所致的各种病证，如胸胁刺痛、癥瘕积聚、经闭痛经、跌打损伤、疮痈肿痛等。根据药力强弱及功效特点，活血化瘀药可分为活血止痛药、活血调经药、活血疗伤药、破血消癥药四类，药力由轻至重依次递增。使用活血化瘀药应注意：本类药物多能耗血动血，月经过多者及孕妇当忌用或慎用破血消癥类药物；活血化瘀药易耗伤正气，体虚者应配伍补益药物。"},

      quiz:[
        {type:"single", q:"被称为“血中气药”，善治头痛的活血药是：", options:["丹参","川芎","红花","桃仁"], answer:1, explain:"川芎活血行气、祛风止痛，尤善治头痛，有“头痛不离川芎”之说，故称“血中气药”。"},
        {type:"single", q:"“一味丹参散，功同四物汤”形容的药物是：", options:["川芎","丹参","当归","熟地黄"], answer:1, explain:"丹参活血调经、祛瘀止痛，功效广泛，故有“一味丹参散，功同四物汤”之说。"},

        {type:"single", q:"为伤科要药，善治跌打损伤、筋骨折伤，破血逐瘀、续筋接骨的药物是：", options:["骨碎补","土鳖虫","三棱","莪术"], answer:1, explain:"土鳖虫咸寒，破血逐瘀、续筋接骨，是伤科治疗骨折损伤的要药。"},

        {type:"multi", q:"下列相须配伍组合，属于教材经典配伍的有：", options:["乳香配没药","红花配桃仁","莪术配三棱","川芎配丹参"], answer:[0,1,2], explain:"D项“川芎配丹参”并非教材特别强调的经典相须配伍组合，而乳香配没药、红花配桃仁、莪术配三棱均是活血化瘀药中的经典相须配伍。"},
        {type:"blank", q:"川芎素有“____不离川芎”之说，善治多种头痛。（请填二字）", answer:["头痛"], explain:"川芎善治各种头痛，无论外感内伤均可配伍应用，故有“头痛不离川芎”之说。"},
        {type:"blank", q:"丹参在“十八反”中反____。（请填药名二字）", answer:["藜芦"], explain:"十八反歌诀“诸参辛芍叛藜芦”，其中“诸参”包括丹参，故丹参反藜芦。"},
        {type:"blank", q:"牛膝生用偏于活血通经、利水通淋，____用则偏于补肝肾、强筋骨。（请填炮制方式二字）", answer:["酒炙"], explain:"牛膝生用长于活血利水，经酒炙或蒸制后则偏于补益肝肾、强壮筋骨。"},
        {type:"case", q:"病例分析：患者跌打损伤，局部肿胀疼痛、瘀青明显。请分析适宜选用的活血化瘀药物及配伍思路。", answer:"该患者证属跌打损伤所致的瘀血肿痛证，病机为外伤导致局部脉络损伤、血溢脉外、瘀滞不散，不通则痛，故见局部肿胀疼痛、瘀青明显。治疗当以活血化瘀、消肿止痛为法，可选用乳香配没药为核心配伍：乳香辛苦而温，活血行气止痛、消肿生肌；没药功效与乳香相似，长于散血祛瘀、消肿止痛，二者相须为用，能显著增强活血化瘀、消肿止痛的功效，是治疗跌打损伤瘀肿疼痛的经典配伍。此外还可酌加土鳖虫破血逐瘀、续筋接骨，以及三七化瘀止血、活血定痛（若兼有出血则尤为适宜），全方共奏活血化瘀、消肿止痛之功，切合本例跌打损伤、瘀血阻滞的病机。", explain:""},
        {type:"case", q:"简述活血化瘀药按药力强弱分类的四个层次及其临床意义。", answer:"活血化瘀药按其药力由轻至重、作用范围由局部到全身，可分为四个层次：活血止痛药，药力相对温和，以行气活血止痛为主，广泛用于各种气滞血瘀之痛证，如川芎、延胡索、郁金等；活血调经药，兼能调理经血，善治妇科月经不调、经闭痛经及产后瘀阻等证，如丹参、红花、桃仁、牛膝等；活血疗伤药，善治跌打损伤、筋骨折伤等外伤瘀血病证，兼能续筋接骨，如土鳖虫、骨碎补等；破血消癥药，药力最为峻猛，专治癥瘕积聚等顽固性瘀血重证，如莪术、三棱等。这种分类体现了中医“辨证选药”的思想，临床应根据瘀血证候的部位、程度及兼夹病情的轻重缓急，选择相应层次的活血化瘀药物，做到药证相符，避免药力不及或过于峻猛而伤及正气。", explain:""}
      ]
    },
    {title:"第十三章 化痰止咳平喘药", ready:true,
      lecture:[
        {type:"h4",text:"一、化痰止咳平喘药概述"},
        {type:"p",text:"凡以祛痰或消痰为主要功效的药物，称为化痰药；以制止或减轻咳嗽喘息为主要功效的药物，称为止咳平喘药，二者常相须为用，合称化痰止咳平喘药。痰、咳、喘三者关系密切，痰壅每致气逆而作咳作喘，咳喘每易伴随生痰，故化痰药物中不少兼有止咳平喘之功，止咳平喘药中亦有不少兼能化痰，临床应根据病证兼夹情况合理选用。根据药性功效不同，化痰药可分为温化寒痰药（性偏温燥，适用于寒痰、湿痰证）与清化热痰药（性偏寒凉，适用于热痰证）两类。使用化痰止咳平喘药应注意：辨明痰之寒热属性及咳喘之虚实，对证选药；麻疹初起、咳嗽多痰者应慎用敛肺止咳之品，以免恋邪。"},

            ["白芥子","辛，温；归肺经","温肺化痰，利气散结，通络止痛"],
            ["旋覆花","苦、辛、咸，微温；归肺、胃经","降气化痰，降逆止呕"]
          ]
        },
        {type:"ul", items:[
          "半夏：辛温，有毒，为燥湿化痰要药，功能燥湿化痰、降逆止呕、消痞散结，主治湿痰寒痰之咳嗽（配陈皮、茯苓，如二陈汤），胃气上逆之呕吐（素有“止呕要药”之称），以及痰阻气滞之胸脘痞闷、梅核气（配厚朴、苏叶，即半夏厚朴汤）。煎服3～10克，一般宜炮制后使用；生半夏毒性较大，内服须经炮制，反乌头（十八反）。",
          "天南星：苦辛而温，有毒，功能燥湿化痰、祛风止痉、散结消肿，善治顽痰咳嗽及风痰所致的中风痰壅、口眼㖞斜、癫痫惊风。煎服3～10克，多制用；生天南星多外用，孕妇忌用。",
          "白芥子：辛温，功能温肺化痰、利气散结、通络止痛，善治寒痰壅肺之咳喘胸闷，以及痰湿流注经络之肢体麻木疼痛（配苏子、莱菔子，即三子养亲汤）。煎服3～6克。",
          "旋覆花：苦辛咸微温，为“诸花皆升，旋覆独降”的例外，功能降气化痰、降逆止呕，善治痰饮壅肺之咳喘及胃气上逆之嗳气呕吐（配代赭石，如旋覆代赭汤）。煎服3～10克，包煎（因有绒毛易刺激咽喉）。"
        ]},

          rows:[

        {type:"ul", items:[
          "川贝母：苦甘微寒，功能清热化痰、润肺止咳、散结消痈，善治肺热燥咳、虚劳咳嗽（尤宜阴虚燥咳），兼治瘰疬疮痈、乳痈肺痈。煎服3～10克。反乌头（十八反）。",
          "瓜蒌：甘微苦而寒，功能清热化痰、宽胸散结、润肠通便，善治痰热咳嗽及胸痹结胸（配薤白，如瓜蒌薤白白酒汤），兼治肠燥便秘及痈肿疮毒。煎服9～15克。反乌头（十八反）。脾虚便溏者慎用。",

          "竹茹：甘微寒，功能清热化痰、除烦止呕，善治痰热咳嗽及胃热呕吐、妊娠恶阻，兼治心烦不寐（配枳实、半夏、陈皮，如温胆汤）。煎服5～10克。"

            ["紫苏子","辛，温；归肺、大肠经","降气化痰，止咳平喘，润肠通便"],

        {type:"ul", items:[

          "紫苏子：辛温，功能降气化痰、止咳平喘、润肠通便，善治痰壅气逆之咳喘痰多（配白芥子、莱菔子，即三子养亲汤），兼治肠燥便秘。煎服3～10克。",

        {type:"blank", q:"半夏生品有毒，内服须经____后使用。（请填二字）", answer:["炮制"], explain:"半夏生品毒性较大，一般不作内服，须经炮制（如制成法半夏、姜半夏、清半夏）后方可内服。"},

        {type:"blank", q:"桔梗被称为“诸药之____”，能引药上行、载药上浮。（请填二字）", answer:["舟楫"], explain:"桔梗善引导药力上行，作用于肺及咽喉部位，故被称为“诸药之舟楫”。"},
        {type:"case", q:"病例分析：患者咳嗽痰黄质稠，胸闷气喘，口渴咽干，舌红苔黄腻。请分析证候并说明治疗药物选择依据。", answer:"该患者证属痰热壅肺证，病机为热邪炼液成痰、痰热互结、壅塞肺络、肺失宣降，症见咳嗽痰黄质稠、胸闷气喘、口渴咽干、舌红苔黄腻，均为痰热内蕴之象。治疗当以清热化痰、宣肺止咳为法，可选用川贝母、瓜蒌等清化热痰药为核心：川贝母苦甘微寒，清热化痰、润肺止咳，善治肺热燥咳；瓜蒌甘寒，清热化痰、宽胸散结，善治痰热壅肺之胸闷咳嗽。二药配伍再酌加桔梗宣肺祛痰、桑白皮泻肺平喘，共奏清热化痰、宽胸止咳平喘之功，切合本例痰热壅肺的核心病机。", explain:""},
        {type:"case", q:"简述半夏、天南星在燥湿化痰方面的功效特点及使用注意事项。", answer:"半夏与天南星均为辛温燥烈之品，功能燥湿化痰，常同用于湿痰、寒痰壅盛之证，但二者各有侧重：半夏偏重于降逆和胃，善治痰饮或胃寒所致的呕吐（素有“止呕要药”之称），兼能消痞散结，主治胸脘痞闷、梅核气；天南星则偏重于祛风解痉，善治顽痰咳嗽及风痰壅盛所致的中风痰壅、口眼㖞斜、癫痫惊风等证。二者的使用注意事项相似：均属有毒之品，生品毒性较大，一般不作内服，内服须经严格炮制（如制半夏、制南星）方可使用，且孕妇应当忌用或慎用，以免损伤胎元；半夏反乌头，属十八反配伍禁忌，处方时应避免与川乌、草乌、附子同用。", explain:""}

        {type:"single", q:"大承气汤所体现的治法是：", options:["汗法","和法","下法","消法"], answer:2, explain:"大承气汤峻下热结，主治阳明腑实之燥屎内结重证，属下法的代表方剂。"},

        {type:"multi", q:"下法与消法的区别在于：", options:["下法作用峻猛迅速，消法作用和缓渐消","下法适用于积滞轻浅之证，消法适用于燥屎瘀血重证","二者均可祛除体内有形之邪，但作用性质不同","下法多用于急重之证，消法多用于慢性积聚"], answer:[0,2,3], explain:"B项表述错误，恰恰相反：下法适用于燥屎、瘀血等急重里实证，消法适用于气血痰食水虫等积滞渐成、病势较缓之证。"},

        {type:"case", q:"病例分析：患者恶寒发热并见，胸胁苦满，口苦咽干，心烦喜呕，不欲饮食，脉弦。请分析证候归属的治法，并说明理由。", answer:"该患者证属邪犯少阳证，病机为外邪由表内传，邪踞少阳半表半里，枢机不利，胆火上炎，症见寒热往来（恶寒发热并见）、胸胁苦满、口苦咽干、心烦喜呕、不欲饮食、脉弦，为少阳病提纲证的典型表现。因邪在半表半里，既不可发汗（邪不全在表），又不可攻下或催吐（邪不全在里），当采用和法治疗，以和解少阳、疏利枢机为治则，代表方为小柴胡汤（柴胡、黄芩、半夏、人参、甘草、生姜、大枣），方中柴胡疏散少阳之邪、黄芩清泄少阳之热，一散一清、和解少阳，配伍半夏和胃降逆、人参甘草大枣扶正达邪，切合本例病机，体现了“方从法出、法随证立”的组方原则。", explain:""}
      ]
    },
    {title:"总论 · 方剂的分类", ready:true,
      lecture:[
        {type:"h4",text:"一、方剂分类方法的历史演变"},
        {type:"p",text:"历代医家对方剂的分类方法不尽相同，主要有以下几种：按病证分类（如《五十二病方》按病证列方）、按组成分类（如“七方”说）、按治法分类（现行教材通用方法）、按祖方分类（以某一经典方为“祖方”，罗列其加减化裁的系列方）等，其中以治法分类因条理清晰、便于临床掌握而成为现代方剂学教材的主流分类方式。"},
        {type:"h4",text:"二、七方说"},
        {type:"p",text:"“七方”之说源于《黄帝内经》“奇之不去则偶之”等论述，后世医家将方剂按组方特点归纳为大、小、缓、急、奇、偶、复七类：大方（药味多或药量大，主治邪气强盛之重证）、小方（药味少而力专，主治病势轻浅之证）、缓方（药性平和、力量和缓，多用于治疗慢性久病或需长期调理者）、急方（药力峻猛、奏效迅速，用于急重病证）、奇方（单数药味组成，或单一药味为主）、偶方（双数药味组成，两药相配以增效或制其偏性）、复方（两方或数方相合而成，用于病情复杂、证候兼夹者）。"},
        {type:"h4",text:"三、现行治法分类（教材通用二十二类）"},
        {type:"table", headers:["类别","功用简述","代表方"],
          rows:[
            ["解表剂","发汗解表，治疗表证","麻黄汤、桂枝汤"],
            ["泻下剂","通导大便，排除积滞、水饮","大承气汤、麻子仁丸"],
            ["和解剂","和解少阳、调和肝脾等","小柴胡汤、逍遥散"],
            ["清热剂","清解里热","白虎汤、清营汤"],
            ["祛暑剂","祛除暑邪","清暑益气汤"],
            ["温里剂","温里祛寒","理中丸、四逆汤"],
            ["表里双解剂","表里同治","大柴胡汤"],
            ["补益剂","补益人体气血阴阳","四君子汤、六味地黄丸"],
            ["安神剂","安定神志","天王补心丹、朱砂安神丸"],
            ["开窍剂","开窍醒神","安宫牛黄丸、苏合香丸"],
            ["理气剂","调理气机","越鞠丸、苏子降气汤"],
            ["理血剂","调理血分（活血或止血）","血府逐瘀汤、黄土汤"],
            ["治风剂","疏散外风或平息内风","川芎茶调散、天麻钩藤饮"],
            ["祛湿剂","化湿利水","平胃散、五苓散"],
            ["祛痰剂","消除痰饮","二陈汤、温胆汤"],
            ["消食剂","消食导滞","保和丸"],
            ["涌吐剂","涌吐痰涎宿食","瓜蒂散"]
          ]
        },
        {type:"p",text:"以上分类以治法为纲、以病证为目，兼顾了理论体系的完整性与临床实用性，是当代方剂学教材普遍采用的分类体系（部分教材还单列固涩剂、驱虫剂、治燥剂、痈疡剂等，具体章节数因版本而略有差异）。"}
      ],
      keypoints:[
        "方剂分类方法主要有按病证、按组成（七方说）、按治法、按祖方分类等，现行教材以治法分类为主。",
        "“七方”指大、小、缓、急、奇、偶、复七类，是按组方特点（药味多少、药力强弱、单复配伍等）进行的分类。",
        "大方药味多或药量大，主治邪气强盛之重证；小方药味少而力专，主治病势轻浅之证。",
        "急方药力峻猛奏效迅速，用于急重病证；缓方药性平和，多用于慢性久病调理。",
        "现行方剂学教材常分为解表、泻下、和解、清热、温里、补益等约二十余类，以治法为纲。",
        "分类方法的选择应服务于临床实用与教学系统性的需要，不同教材版本在具体类别划分上可能略有差异。"
      ],
      quiz:[
        {type:"single", q:"现行方剂学教材普遍采用的分类方法是：", options:["按病证分类","按治法分类","按祖方分类","按剂型分类"], answer:1, explain:"以治法分类条理清晰、便于临床掌握与教学系统化，是现代方剂学教材的主流分类方式。"},
        {type:"single", q:"“七方”说中，药力峻猛、奏效迅速，用于急重病证的是：", options:["大方","小方","缓方","急方"], answer:3, explain:"急方药力峻猛、见效迅速，适用于病势急重之证，需迅速控制病情发展。"},
        {type:"single", q:"药味少而力专，主治病势轻浅之证的是：", options:["大方","小方","偶方","复方"], answer:1, explain:"小方药味精简、作用专一，适用于病情单纯、病势较轻的证候。"},
        {type:"multi", q:"“七方”所包含的分类有：", options:["大方","奇方","复方","汗方"], answer:[0,1,2], explain:"D项“汗方”不属于七方之列；七方为大、小、缓、急、奇、偶、复七类。"},
        {type:"blank", q:"“七方”之说源于《____》“奇之不去则偶之”等论述。（请填四字）", answer:["黄帝内经"], explain:"七方分类理论最早可追溯至《黄帝内经》中关于组方原则的相关论述。"},
        {type:"case", q:"简述“七方”中缓方与急方的区别及各自的临床应用特点。", answer:"缓方与急方是“七方”分类中根据药力强弱、见效快慢划分的一对相对概念。缓方的特点是药性平和、药力和缓，多选用作用温和的药物、配伍恰当、剂量适中，服药后奏效较为缓慢但持久，适用于慢性久病或病情较轻、需长期调理培本的证候，如许多补益剂即属缓方范畴，服药讲究细水长流、缓图其功；急方则药力峻猛、组方精炼、药量较重，服药后奏效迅速，适用于病情危急、病势凶险、须速战速决的证候，如回阳救逆、峻下热结等急重病证的治疗多选用急方，力求药到病除、迅速控制病势。临床遣方立法时，当根据病情缓急、体质强弱等具体情况灵活选择缓方或急方，做到“急则治其标，缓则治其本”。", explain:""}
      ]
    },
    {title:"总论 · 方剂的组成与变化", ready:true,
      lecture:[
        {type:"h4",text:"一、方剂的组成原则——君臣佐使"},
        {type:"p",text:"方剂并非药物的简单堆砌，而是遵循一定组方结构原则的有机配伍整体，此即“君臣佐使”理论，最早见于《黄帝内经》“主病之谓君，佐君之谓臣，应臣之谓使”的论述。"},
        {type:"table", headers:["组方角色","含义","举例（麻黄汤）"],
          rows:[
            ["君药","针对主病或主证起主要治疗作用的药物，药力居方中之首","麻黄——发汗解表、宣肺平喘，针对风寒表实证的主要病机"],
            ["臣药","辅助君药加强治疗主病主证作用的药物，或针对兼病兼证起主要治疗作用的药物","桂枝——助麻黄发汗解表，且能温经散寒"],
            ["佐药","佐助药（协助君臣药加强治疗作用或治疗次要症状）、佐制药（消除或减弱君臣药的毒烈之性）、反佐药（病重邪甚拒药时，用与君药性味相反而又能在治疗中起相成作用的药物）","杏仁——佐助麻黄、桂枝宣降肺气以助平喘"],
            ["使药","引经药（引导诸药直达病所）或调和药（调和方中诸药）","甘草——调和诸药，兼护胃气"]
          ]
        },
        {type:"p",text:"需要说明的是，一首方剂中君药通常只有一味或两味（药力集中、突出重点），臣、佐、使药则可根据病情需要酌情增减；并非每方都必须四药俱全，有些精简小方仅有君臣或君佐，运用时应灵活理解、不可拘泥。"},
        {type:"h4",text:"二、方剂的变化形式"},
        {type:"p",text:"方剂的运用绝非固定不变，须根据患者体质强弱、病情轻重缓急及兼夹证候的不同，在基础方（成方）的基础上灵活化裁，主要有以下三种变化形式："},
        {type:"ul", items:[
          "药味加减变化：在君药不变的前提下，随兼证增减臣、佐药，如桂枝汤兼见喘证者，加厚朴、杏仁以降气平喘（即桂枝加厚朴杏子汤），体现“方证相应、随证加减”的原则。",
          "药量增减变化：药味不变而药量改变，可使方剂的功用主治发生明显变化，如小承气汤（大黄、厚朴、枳实）与厚朴三物汤药味相同而君臣药量比例不同，前者以大黄为君重在通便泄热，后者以厚朴为君重在行气除满，主治各有侧重。",
          "剂型更换变化：药味、药量不变而更换剂型，可改变药力峻缓，如理中丸改为汤剂（人参汤），汤剂较丸剂吸收快、奏效速，故适用于病情较急者；丸者缓也，适用于病情较缓、需长期调治者。"
        ]}
      ],
      keypoints:[
        "君臣佐使理论最早见于《黄帝内经》，是方剂组方结构的核心原则。",
        "君药：针对主病主证起主要治疗作用，药力居方中之首，一般药味精简。",
        "臣药：辅助君药加强治疗主病主证的作用，或治疗兼病兼证。",
        "佐药分佐助药、佐制药、反佐药三类，分别起协助增效、制约毒性烈性、反佐从治的作用。",
        "使药包括引经药与调和药，其中甘草是方剂中最常见的调和诸药之使药。",
        "方剂的变化形式包括药味加减变化、药量增减变化、剂型更换变化三种。",
        "药量改变即使药味不变，也可使方剂的主治功用发生明显变化（如小承气汤与厚朴三物汤）。",
        "剂型更换可改变药力峻缓，“汤者荡也，丸者缓也”即概括了不同剂型的作用特点差异。"
      ],
      quiz:[
        {type:"single", q:"方剂中针对主病或主证起主要治疗作用、药力居方中之首的药物是：", options:["君药","臣药","佐药","使药"], answer:0, explain:"君药是针对疾病的主要病机、起主要治疗作用的药物，是方剂的核心，药力通常居方中之首。"},
        {type:"single", q:"用于消除或减弱君臣药毒烈之性的佐药称为：", options:["佐助药","佐制药","反佐药","使药"], answer:1, explain:"佐制药专门用于制约或消除方中君臣药的毒性或峻烈之性，以保证用药安全。"},
        {type:"single", q:"方剂中能调和诸药、兼护胃气的常用使药是：", options:["甘草","黄芪","人参","茯苓"], answer:0, explain:"甘草性平味甘，能调和方中多种药物的偏性，是方剂中最常用的调和诸药之使药。"},
        {type:"single", q:"小承气汤与厚朴三物汤药味相同而主治不同，体现的方剂变化形式是：", options:["药味加减变化","药量增减变化","剂型更换变化","以上都不是"], answer:1, explain:"两方药味均为大黄、厚朴、枳实，但君臣药量比例不同（小承气汤重用大黄为君，厚朴三物汤重用厚朴为君），导致功用主治侧重不同，属药量增减变化。"},
        {type:"multi", q:"佐药的作用包括：", options:["佐助药——协助君臣药加强治疗作用","佐制药——制约君臣药的毒烈之性","反佐药——病重拒药时的反治配伍","使药——引经或调和诸药"], answer:[0,1,2], explain:"D项属使药的作用范畴，而非佐药；佐药主要包括佐助、佐制、反佐三类作用。"},
        {type:"multi", q:"方剂的变化形式包括：", options:["药味加减变化","药量增减变化","剂型更换变化","君药地位不可更改的固定变化"], answer:[0,1,2], explain:"D项非方剂变化形式的表述，方剂变化的三种主要形式为药味加减、药量增减、剂型更换。"},
        {type:"blank", q:"君臣佐使理论最早见于《____》。（请填四字）", answer:["黄帝内经"], explain:"《黄帝内经》最早提出“主病之谓君，佐君之谓臣，应臣之谓使”的组方结构理论。"},
        {type:"blank", q:"“汤者荡也，____者缓也”，概括了不同剂型作用峻缓的差异。（请填一字）", answer:["丸"], explain:"汤剂吸收快、药力猛，故曰“汤者荡也”；丸剂吸收缓慢、药力和缓，故曰“丸者缓也”。"},
        {type:"case", q:"以桂枝汤加厚朴、杏仁治疗太阳中风兼喘证为例，说明方剂药味加减变化的临床意义。", answer:"桂枝汤本为治疗太阳中风表虚证的基础方，由桂枝、芍药、生姜、大枣、甘草组成，功能解肌发表、调和营卫，主治恶风发热、汗出、脉浮缓等证。若患者在此基础上兼见喘咳症状（宿有喘疾，又感风寒而诱发，或表证兼肺气上逆），单用桂枝汤已不能针对喘证病机，此时在保持君药桂枝、臣药芍药不变（仍以解肌发表、调和营卫为基本治法）的前提下，加入厚朴、杏仁二味作为佐药，厚朴长于降气平喘、杏仁善于降气止咳平喘，二药相配增强了原方降气平喘之功，即成桂枝加厚朴杏子汤，功能解肌发表、降气平喘，恰好切合太阳中风兼喘证的复合病机。这一实例充分体现了方剂药味加减变化“随兼证加减臣佐、君药不变”的基本原则，也说明了方剂运用绝非刻板不变，而应根据患者具体证候灵活化裁，做到“方证相应”。", explain:""}
      ]

        {type:"case", q:"简述为何理中丸证情较急时改用汤剂（人参汤）而非仍用丸剂。", answer:"理中丸由人参、白术、干姜、甘草组成，功能温中祛寒、补气健脾，主治中焦虚寒证。丸剂药力和缓、吸收缓慢，适用于病情较缓、需长期调养的慢性中焦虚寒证候；但若患者中焦虚寒程度较重、病势较急（如突发吐利腹痛、四肢不温等），此时若仍用丸剂，因其奏效缓慢，恐难以及时控制病情发展。故临床遇病情较急者，可将理中丸改为汤剂服用（即人参汤，药味、药量基本不变，仅更换剂型），因汤剂吸收快、奏效迅速，能更迅速地发挥温中祛寒、补气健脾的作用，及时控制病势。这正是“剂型更换变化”在临床实践中的具体运用，体现了中医方剂应用“辨证选择剂型、随病情缓急而变通”的灵活性原则。", explain:""}

    {title:"总论 · 方剂的用法", ready:true,

        {type:"ul", items:[

          "服药温度：一般汤剂宜温服；解表剂、温里剂宜热服（借药力发挥辛温发散或温里散寒之功，且服后往往需啜热粥或加衣被以助汗出）；清热剂、止血剂宜偏凉服或冷服（尤其病情属真热假寒者，需反佐凉服以防格拒）。",

        {type:"case", q:"病例分析：某患者服用解表发汗方剂后大汗不止，随即出现汗出不止、恶风、肢体倦怠等症。请分析原因并说明正确服药方法。", answer:"该患者服用解表方剂后出现大汗不止、恶风倦怠等症，属于发汗太过、耗伤卫阳津液所致的变证，其根本原因在于服药及药后调护方法不当：一是可能药后过度啜粥、加被保暖导致发汗过度；二是患者本身正气不足而药力偏于峻烈，未能中病即止。正确的服用方法应当是：解表剂宜热服，服药后可适当啜热粥、加衣被以助卫阳、鼓舞汗出，但应密切观察汗出情况，以遍身微微潮润有汗（“漐漐微似有汗”）为度即应停止，不可任其持续大汗淋漓；一旦见汗出病解或汗出较多，应及时减少剂量或暂停后续用药，并可嘱患者避风保暖、适当补充水分，防止因过度发汗而进一步耗伤卫阳与津液，导致病情转生他变。这一病例说明，方剂的临床应用不仅要注重方药本身的配伍，更要重视正确的服药方法与药后调护，二者同等重要。", explain:""}

    {title:"第一章 解表剂", ready:true,
      lecture:[
        {type:"h4",text:"一、解表剂概述"},
        {type:"p",text:"凡以解表药为主组成，具有发汗、解肌、透疹等作用，治疗表证的方剂，统称解表剂。属于“八法”中的汗法，主治外感六淫之邪初起、病邪在肌表的表证。根据病邪性质及体质差异，分为辛温解表（治外感风寒表证）、辛凉解表（治外感风热表证）、扶正解表（治正虚外感表证）三类。使用解表剂应注意：中病即止，不可发汗太过以免伤津耗气；服后避风寒、啜热粥以助药力；表证兼里证者应视具体情况表里同治或先表后里。"},
        {type:"h4",text:"二、辛温解表剂"},
        {type:"table", headers:["方剂","组成（节选）","功用","主治"],
          rows:[
            ["麻黄汤","麻黄、桂枝、杏仁、炙甘草","发汗解表，宣肺平喘","外感风寒表实证：恶寒发热、无汗而喘、头身疼痛、脉浮紧"],
            ["桂枝汤","桂枝、芍药、生姜、大枣、炙甘草","解肌发表，调和营卫","外感风寒表虚证：恶风发热、汗出、脉浮缓"],

        {type:"ul", items:[
          "麻黄汤：被誉为“发汗第一峻药”“伤寒第一方”，君药麻黄发汗解表、宣肺平喘，臣以桂枝助麻黄发汗解表并温经通脉、增强解表之力，佐以杏仁降利肺气以助平喘（麻黄宣肺、杏仁降肺，一宣一降增强平喘之效），使以炙甘草调和诸药并缓和麻桂峻烈之性。四药合用，发汗解表力强，专为外感风寒表实证而设，凡表虚自汗、体虚外感者均当禁用或慎用，孕妇及素体虚弱者慎用。",

          "九味羌活汤：以“分经论治”思想组方，羌活为君，散太阳经风寒湿邪，配伍防风、苍术、细辛、白芷等祛风散寒除湿，兼佐生地黄、黄芩清泄里热以防诸药辛温太过化燥伤津，为治外感风寒湿邪兼有里热证的代表方，体现表里同治、散清兼顾的配伍特点。",
          "小青龙汤：外散风寒、内化水饮，麻黄、桂枝解表散寒，干姜、细辛、半夏温肺化饮、燥湿化痰，五味子、白芍敛肺止咳、防诸药辛散太过耗伤肺气，是治外寒里饮证（外感风寒兼素有痰饮内停）的代表方，尤宜咳喘痰多清稀、遇寒加重者。",

        {type:"single", q:"被誉为“辛凉平剂”，主治温病初起卫分证的方剂是：", options:["桑菊饮","银翘散","麻杏石甘汤","九味羌活汤"], answer:1, explain:"银翘散辛凉透表、清热解毒之力较强，为治温病初起的代表方，被誉为“辛凉平剂”。"},

        {type:"multi", q:"关于败毒散的说法正确的有：", options:["以小量人参配伍解表祛湿药益气扶正","喻嘉言称其治痢方法为“逆流挽舟”法","主治气虚外感风寒湿表证","仅能用于表证，绝不可用于痢疾"], answer:[0,1,2], explain:"D项错误，败毒散化裁后亦可用治外邪陷里所致的痢疾初起，即所谓“逆流挽舟”法，故不选D。"},

        {type:"blank", q:"桂枝汤服后需啜____以助药力、温覆取微汗。（请填二字）", answer:["热粥"], explain:"桂枝汤服后啜热稀粥，借谷气以充养汗源、鼓舞胃气以助药力发汗，是本方独特的服法要求。"},
        {type:"case", q:"病例分析：患者恶寒发热，无汗，头身疼痛，咳嗽气喘，舌苔薄白，脉浮紧。请分析证候并说明选方依据。", answer:"该患者证属外感风寒表实证，病机为风寒之邪束表、卫阳被遏、肺气失宣，症见恶寒发热、无汗、头身疼痛、咳嗽气喘、舌苔薄白、脉浮紧，均为风寒袭表、腠理闭塞、肺失宣降的典型表现（无汗为表实的关键辨证要点，与表虚有汗证相鉴别）。治疗当以辛温发汗、宣肺平喘为法，应选用麻黄汤：方中麻黄为君，发汗解表、宣肺平喘，为治疗本证之要药；臣以桂枝助麻黄发汗解表、温经通脉，增强散寒解表之力；佐以杏仁降利肺气，与麻黄一宣一降，加强平喘之效；使以炙甘草调和诸药、缓和麻桂峻烈之性、防止发汗太过。四药合用，共奏发汗解表、宣肺平喘之功，切合本例风寒束表、肺失宣降的核心病机，为对证之方。", explain:""}

    {title:"第二章 泻下剂", ready:true,
      lecture:[
        {type:"h4",text:"一、泻下剂概述"},
        {type:"p",text:"凡以泻下药为主组成，具有通导大便、排除肠胃积滞、荡涤实热或攻逐水饮等作用，治疗里实证的方剂，统称泻下剂，属“八法”中的下法。根据证候性质不同，分为寒下（治里热积滞实证）、温下（治里寒积滞实证）、润下（治肠燥津亏之便秘）、逐水（治水饮壅盛于里之实证）、攻补兼施（治里实正虚兼见之证）五类。使用注意：应辨清病性寒热虚实，中病即止，不可过量久服以免损伤脾胃正气；年老体弱、孕妇及妇女经期慎用峻下逐水之品。"},

        {type:"table", headers:["方剂","组成（节选）","功用","主治"],
          rows:[

            ["大陷胸汤","大黄、芒硝、甘遂","泻热逐水","水热互结之结胸证：心下痛，按之石硬，或从心下至少腹硬满疼痛拒按"]
          ]
        },
        {type:"ul", items:[
          "大承气汤：为寒下剂之代表方，君以大黄峻下热结、荡涤肠胃，臣以芒硝软坚润燥、助大黄泻下，佐以枳实、厚朴行气消痞除满、并助硝黄推荡积滞。四药相合，泻下与行气并重，痞满燥实四证悉除，为“峻下热结”的代表方，凡阳明腑实重证皆可运用；煎服法讲究先煎枳实、厚朴，后下大黄，芒硝溶服，以充分发挥泻下之力。",
          "大陷胸汤：以大黄、芒硝泻热破结，配伍甘遂峻逐水饮，三药相合泻热与逐水并行，主治水热互结于胸腹之结胸重证，药力峻猛，非水热互结之实证不可轻用。"
        ]},

            ["温脾汤","大黄、附子、干姜、人参、甘草","攻下冷积，温补脾阳","脾阳不足，冷积内停证：便秘或久痢赤白，腹痛喜温喜按，脐下绞结"]

          "温脾汤：从张仲景四逆汤化裁而来，以附子、干姜温补脾阳，配伍大黄攻下冷积，佐以人参、甘草益气健脾以扶助正气，是温下寒积、兼顾脾阳不足的代表方，善治脾阳虚衰而冷积内停之久利赤白或大便秘结者，体现攻补兼施、温下并用的组方特点。"

        {type:"table", headers:["方剂","组成（节选）","功用","主治"],
          rows:[

            ["济川煎","当归、牛膝、肉苁蓉、泽泻、升麻、枳壳","温肾益精，润肠通便","肾虚精亏，肠燥便秘证：大便秘结，小便清长，腰膝酸软"]

        {type:"ul", items:[
          "麻子仁丸：即小承气汤加麻子仁、芍药、杏仁蜜丸而成，以麻子仁润肠通便为君，配伍杏仁降气润肠、芍药养阴和里，佐以小承气汤（大黄、枳实、厚朴）轻下热结、行气通便，药性较大承气汤和缓，制成丸剂取其缓下之意，善治胃肠燥热、脾津不足（脾约）所致的大便干结兼小便频数。",
          "济川煎：以“寓通于补、以补为通”立法，肉苁蓉、当归温肾润肠养血，牛膝补肾且性善下行，配伍少量升麻升清以助降浊、枳壳降气宽肠以助通便（一升一降体现升降相因的配伍思路），泽泻渗利小便以泄肾浊，全方补肾精、润肠燥而不伤正，善治肾虚精亏（尤宜老年、产后或病后津亏之肠燥便秘）。"

            ["黄龙汤","大黄、芒硝、枳实、厚朴、人参、当归、甘草","泻热通便，补气养血","阳明腑实兼气血不足证：大便秘结，脘腹胀满，身热口渴，神疲少气"]

        {type:"ul", items:[

        "大黄附子汤、温脾汤均属温下剂，将泻下药与温里药配伍，治疗寒积里实证。",

        "济川煎“寓通于补”，温肾益精、润肠通便，善治肾虚精亏之肠燥便秘，尤宜老年、产后或病后。",
        "十枣汤以芫花、甘遂、大戟峻下逐水，佐大枣护胃缓毒，为“峻药缓用”的配伍范例，体虚孕妇忌用。",
        "黄龙汤即大承气汤加人参、当归、甘草而成，泻下与补益并行，治阳明腑实兼气血不足证。",
        "泻下剂应用需辨清寒热虚实，中病即止，年老体弱、孕妇经期慎用峻下逐水之品。"

        {type:"single", q:"大承气汤所主治的“痞满燥实”俱全证候属于：", options:["少阳病","太阴病","阳明腑实证","少阴寒化证"], answer:2, explain:"大承气汤主治阳明腑实证，症见痞（脘腹胀闷）、满（腹部胀满）、燥（大便干结）、实（腹痛拒按）四证俱备的重证。"},

        {type:"single", q:"由小承气汤加麻子仁、芍药、杏仁制成蜜丸的润下方剂是：", options:["济川煎","麻子仁丸","十枣汤","黄龙汤"], answer:1, explain:"麻子仁丸即小承气汤（大黄、枳实、厚朴）加麻子仁、芍药、杏仁并制成蜜丸而成，功能润肠泄热、行气通便。"},
        {type:"single", q:"“寓通于补、以补为通”，善治肾虚精亏肠燥便秘的方剂是：", options:["麻子仁丸","济川煎","大黄附子汤","十枣汤"], answer:1, explain:"济川煎以肉苁蓉、当归温肾润肠养血为主，配伍升麻、枳壳升降相因以助通便，体现寓通于补之法，尤宜肾虚精亏之肠燥便秘。"},
        {type:"single", q:"十枣汤中大枣的配伍意义是：", options:["增强逐水泻下之力","缓和诸药毒性、益气护胃","发汗解表","清热解毒"], answer:1, explain:"十枣汤中芫花、甘遂、大戟三药峻猛有毒，佐以大枣煎汤送服可缓和诸药毒性并益气护胃，防止逐水伤正，是“峻药缓用”的配伍范例。"},
        {type:"multi", q:"属于泻下剂分类的有：", options:["寒下","温下","润下","解表"], answer:[0,1,2], explain:"D项解表不属于泻下剂分类，而是独立的一类方剂；泻下剂分寒下、温下、润下、逐水、攻补兼施五类。"},
        {type:"multi", q:"关于泻下剂的使用注意，正确的有：", options:["应辨清寒热虚实","中病即止，不可过量久服","年老体弱、孕妇慎用峻下逐水之品","所有泻下剂均可长期连续服用不受限制"], answer:[0,1,2], explain:"D项错误，泻下剂尤其是峻下、逐水类方剂药力猛烈，绝不可长期连续服用，须中病即止以防损伤正气。"},
        {type:"blank", q:"黄龙汤即大承气汤加人参、____、甘草而成。（请填二字）", answer:["当归"], explain:"黄龙汤在大承气汤（大黄、芒硝、枳实、厚朴）基础上加人参、当归、甘草，泻下与补益气血并行。"},
        {type:"blank", q:"大黄附子汤以大黄配伍附子、____，体现温药与下药并用之法。（请填二字）", answer:["细辛"], explain:"大黄附子汤由大黄、附子、细辛组成，温里散寒药与泻下药并用，主治寒积里实证。"},
        {type:"case", q:"病例分析：老年患者大便秘结数日一行，粪质不干但排出困难，小便清长，腰膝酸软，畏寒肢冷，舌淡苔白。请分析证候并说明选方依据。", answer:"该患者证属肾虚精亏、肠燥便秘证，病机为年老体衰、肾阳肾精亏虚，肾主二便的功能减退，肠道失于阳气温煦推动，症见大便秘结但粪质不干（并非燥热伤津之大便干结，而是阳气不足、推动无力所致的排出困难）、小便清长、腰膝酸软、畏寒肢冷、舌淡苔白，均为肾虚精亏、下元不足之象。治疗当以温肾益精、润肠通便为法，可选用济川煎为方剂：方中肉苁蓉温肾益精、润肠通便，当归养血润肠，二者共为君臣；牛膝补肾强腰且性善下行，引药力下达；升麻少量升举清阳以防肠腑气机下陷太过，枳壳降气宽肠以助大便通降，一升一降相反相成；泽泻渗利小便、泄肾浊而不伤肾精。全方温而不燥、补而不滞、寓通于补，切合本例肾虚精亏、肠燥便秘（虚性便秘）的核心病机，较之单纯苦寒攻下之剂更为适宜。", explain:""}
      ]

    {title:"第三章 和解剂", ready:true,
      lecture:[
        {type:"h4",text:"一、和解剂概述"},
        {type:"p",text:"凡以疏通调和为主要作用，治疗少阳病、肝脾（胃）不和、肠胃寒热错杂等证的方剂，统称和解剂，属“八法”中的和法。和解剂药性平和，配伍不寒不热、不峻不缓，既不同于汗、吐、下法之专事攻邪，又不同于补法之专事扶正，而是通过调和的方式使邪气得解、脏腑功能恢复协调，分为和解少阳、调和肝脾、调和肠胃三类。使用注意：凡病邪在肌表未入少阳，或病已入里成实者，均不宜用和解剂，以免贻误病情。"},
        {type:"h4",text:"二、和解少阳剂"},
        {type:"table", headers:["方剂","组成（节选）","功用","主治"],
          rows:[
            ["小柴胡汤","柴胡、黄芩、半夏、人参、甘草、生姜、大枣","和解少阳","伤寒少阳证：寒热往来，胸胁苦满，心烦喜呕，不欲饮食，口苦咽干目眩，脉弦"],
            ["大柴胡汤","柴胡、黄芩、芍药、半夏、枳实、大黄、生姜、大枣","和解少阳，内泻热结","少阳阳明合病：往来寒热，胸胁苦满，呕不止，郁郁微烦，心下满痛或痞硬，大便不解"],
            ["蒿芩清胆汤","青蒿、黄芩、竹茹、半夏、茯苓、陈皮、枳壳、碧玉散","清胆利湿，和胃化痰","少阳湿热痰浊证：寒热如疟，寒轻热重，胸胁胀痛，口苦膈闷，吐酸苦水或呕黄涎黏沫"]
          ]
        },
        {type:"ul", items:[
          "小柴胡汤：为和解少阳的代表方，君以柴胡疏散少阳半表之邪，臣以黄芩清泄少阳半里之热，柴芩相配、一散一清，共解少阳邪热；佐以半夏、生姜和胃降逆止呕，人参、大枣、甘草益气扶正、既能鼓舞正气抗邪外出、又可防邪内传。全方寒热并用、攻补兼施、升降协调，充分体现和解少阳的组方特色，凡邪在半表半里之少阳病皆可加减化裁运用。",
          "大柴胡汤：即小柴胡汤去人参、甘草，加芍药、枳实、大黄而成，兼有和解与泻下双重作用，善治少阳邪未解而阳明里实已成的少阳阳明合病，体现“和法与下法并用”的配伍思路，凡少阳证兼见心下痞硬、大便不通等里实征象者可选用本方表里双解。",
          "蒿芩清胆汤：以青蒿、黄芩为君清透少阳邪热，配伍竹茹、半夏、陈皮、枳壳和胃化痰降逆，茯苓、碧玉散（滑石、甘草、青黛）清热利湿，善治少阳湿热痰浊互结之证，其寒热往来以寒轻热重为特点，与小柴胡汤证的单纯少阳邪热不同，兼夹湿热痰浊是本证的病机关键。"
        ]},
        {type:"h4",text:"三、调和肝脾剂"},
        {type:"table", headers:["方剂","组成（节选）","功用","主治"],
          rows:[
            ["四逆散","柴胡、芍药、枳实、甘草","透邪解郁，疏肝理脾","阳郁厥逆证及肝脾不和证：手足不温，或胁肋胀痛，脘腹疼痛，脉弦"],
            ["逍遥散","柴胡、当归、白芍、白术、茯苓、炙甘草、薄荷、生姜","疏肝解郁，养血健脾","肝郁血虚脾弱证：胁肋胀痛，头痛目眩，口燥咽干，神疲食少，月经不调，乳房胀痛"],
            ["痛泻要方","白术、白芍、陈皮、防风","补脾柔肝，祛湿止泻","脾虚肝旺之痛泻：肠鸣腹痛，大便泄泻，泻必腹痛，泻后痛缓，或每因情志不畅诱发"]
          ]
        },
        {type:"ul", items:[
          "四逆散：柴胡疏肝解郁、透邪外出，芍药养血敛阴、柔肝止痛，枳实理气解郁、泄热破结，甘草调和诸药，四药相配升降并用、气血兼顾，是调和肝脾的基础方，后世许多疏肝理脾方剂（如逍遥散）均由此方化裁而来。",
          "逍遥散：由四逆散化裁而来，以柴胡疏肝解郁为君，当归、白芍养血柔肝为臣，佐以白术、茯苓健脾益气、薄荷少量透达肝经郁热、生姜温胃和中，为疏肝解郁、养血健脾的代表方，尤宜妇女肝郁血虚脾弱之月经不调、乳房胀痛等证，临床应用极为广泛。",
          "痛泻要方：白术健脾燥湿治本，白芍柔肝缓急止痛，陈皮理气醒脾和中，配伍少量防风升散肝经郁滞、且能燥湿以助止泻（又称“风药能胜湿”），四药合用补脾与柔肝并进，是治脾虚肝旺之痛泻（“痛责之肝，泻责之脾”）的代表方，尤宜情志不畅诱发或加重之腹痛泄泻。"
        ]},
        {type:"h4",text:"四、调和肠胃剂"},
        {type:"table", headers:["方剂","组成（节选）","功用","主治"],
          rows:[
            ["半夏泻心汤","半夏、黄芩、黄连、干姜、人参、炙甘草、大枣","寒热平调，消痞散结","寒热错杂之痞证：心下痞满不痛，呕吐，肠鸣下利，舌苔腻而微黄"]
          ]
        },
        {type:"ul", items:[
          "半夏泻心汤：由小柴胡汤去柴胡、生姜，加黄连、干姜化裁而成，以半夏和胃降逆消痞为君，黄芩、黄连苦寒泄热、干姜辛温散寒（辛开苦降、寒热并用），佐以人参、大枣、炙甘草益气和中，是调和肠胃、治疗中焦寒热错杂痞证的代表方，凡上热下寒、脾胃升降失常之心下痞满兼呕吐肠鸣下利者皆可加减应用，体现“辛开苦降”的经典配伍思路。"
        ]}
      ],
      keypoints:[
        "和解剂属和法范畴，分和解少阳、调和肝脾、调和肠胃三类，药性平和、不寒不热、不峻不缓。",
        "小柴胡汤为和解少阳代表方，柴芩相配一散一清；病邪在表未入少阳或已成里实者不宜使用和解剂。",
        "大柴胡汤即小柴胡汤去人参甘草加芍药枳实大黄而成，兼和解与泻下之功，治少阳阳明合病。",
        "蒿芩清胆汤治少阳湿热痰浊证，寒热往来以寒轻热重为特点，与小柴胡汤证有别。",
        "四逆散是调和肝脾的基础方，后世逍遥散等方多由此化裁而来。",
        "逍遥散疏肝解郁、养血健脾，是妇科肝郁血虚脾弱证的常用代表方，临床应用极广。",
        "痛泻要方治脾虚肝旺之痛泻，“痛责之肝，泻责之脾”，防风在此方中体现“风药能胜湿”之意。",
        "半夏泻心汤由小柴胡汤化裁而成，体现“辛开苦降、寒热并用”思路，治中焦寒热错杂之痞证。"
      ],
      quiz:[
        {type:"single", q:"和解少阳的代表方，以柴胡、黄芩为君臣相配的方剂是：", options:["四逆散","小柴胡汤","逍遥散","半夏泻心汤"], answer:1, explain:"小柴胡汤以柴胡疏散少阳之邪为君，黄芩清泄少阳之热为臣，一散一清，是和解少阳的代表方。"},
        {type:"single", q:"即小柴胡汤去人参、甘草，加芍药、枳实、大黄而成的方剂是：", options:["大柴胡汤","蒿芩清胆汤","痛泻要方","四逆散"], answer:0, explain:"大柴胡汤由小柴胡汤化裁而来，兼有和解少阳与内泻热结的双重作用，治少阳阳明合病。"},
        {type:"single", q:"调和肝脾的基础方，后世逍遥散等方多由其化裁而来的是：", options:["四逆散","半夏泻心汤","蒿芩清胆汤","痛泻要方"], answer:0, explain:"四逆散由柴胡、芍药、枳实、甘草组成，是调和肝脾的基础方，配伍思路为后世多首疏肝健脾方剂所借鉴。"},
        {type:"single", q:"“痛责之肝，泻责之脾”所描述的病证，其代表方剂是：", options:["逍遥散","痛泻要方","半夏泻心汤","大柴胡汤"], answer:1, explain:"痛泻要方治脾虚肝旺之痛泻，白术补脾治本、白芍柔肝止痛，体现“痛责之肝，泻责之脾”的病机认识。"},
        {type:"single", q:"体现“辛开苦降、寒热并用”配伍思路，治中焦寒热错杂痞证的方剂是：", options:["半夏泻心汤","小柴胡汤","四逆散","蒿芩清胆汤"], answer:0, explain:"半夏泻心汤以黄芩黄连苦寒泄热、干姜辛温散寒，辛开苦降、寒热并调，是治中焦寒热错杂痞证的代表方。"},
        {type:"multi", q:"属于调和肝脾剂的有：", options:["四逆散","逍遥散","痛泻要方","小柴胡汤"], answer:[0,1,2], explain:"D项小柴胡汤属和解少阳剂，而非调和肝脾剂，故不选D。"},
        {type:"multi", q:"和解剂的使用注意事项正确的有：", options:["病邪在肌表未入少阳者不宜使用","病已入里成实者不宜单纯使用和解剂","和解剂药性平和，不寒不热不峻不缓","和解剂可用于一切表证与里实证而无需辨证"], answer:[0,1,2], explain:"D项错误，和解剂仅适用于邪在半表半里、肝脾不和或肠胃寒热错杂等特定证候，并非可用于一切表证或里实证。"},
        {type:"blank", q:"逍遥散由____化裁而来，加当归、白芍、白术、茯苓、薄荷等药物。（请填二字）", answer:["四逆散"], explain:"逍遥散在四逆散调和肝脾的基础上，加入养血健脾之品，扩展为疏肝解郁、养血健脾的常用方。"},
        {type:"blank", q:"痛泻要方中防风的配伍意义体现了“风药能____”的用药思路。（请填一字）", answer:["胜"], explain:"防风为风药，兼能燥湿、升散肝经郁滞，古人有“风能胜湿”之说，故此方中防风兼具止泻之功。"},
        {type:"case", q:"病例分析：女性患者情志抑郁，胁肋胀痛，胸闷太息，月经不调，经期乳房胀痛，神疲食少，舌淡苔薄，脉弦细。请分析证候并说明选方依据。", answer:"该患者证属肝郁血虚脾弱证，病机为情志不遂、肝气郁结、日久耗伤肝血且横逆犯脾，症见胁肋胀痛、胸闷太息（肝气郁滞）、月经不调、经期乳房胀痛（肝血不足、肝郁气滞冲任失调）、神疲食少（肝郁犯脾、脾失健运）、脉弦细（肝郁血虚之象），病机涉及肝郁、血虚、脾弱三个方面，相互影响。治疗当以疏肝解郁、养血健脾为法，可选用逍遥散：方中柴胡疏肝解郁为君；当归、白芍养血柔肝为臣，与柴胡相配则疏肝而不伤阴、养血而不滞气；佐以白术、茯苓健脾益气、以杜生痰之源，薄荷少量透达肝经郁热、生姜和胃；甘草调和诸药。全方肝脾同调、气血兼顾，切合本例肝郁血虚脾弱、冲任失调的核心病机，是妇科此类证候的常用首选方。", explain:""}
      ]
    },
    {title:"第四章 清热剂", ready:true,
      lecture:[
        {type:"h4",text:"一、清热剂概述"},
        {type:"p",text:"凡以清热药为主组成，具有清热、泻火、凉血、解毒等作用，治疗里热证的方剂，统称清热剂，属“八法”中的清法。根据里热证的病位、性质不同，分为清气分热、清营凉血、清热解毒、清脏腑热、清虚热五类。使用注意：应辨清热证之虚实、在气在血、脏腑部位，避免寒凉太过损伤脾胃阳气；表证未解、里热未成者不宜早用清热剂；素体阳虚或脾胃虚寒者慎用苦寒之品。"},
        {type:"h4",text:"二、清气分热剂"},
        {type:"table", headers:["方剂","组成（节选）","功用","主治"],
          rows:[
            ["白虎汤","石膏、知母、炙甘草、粳米","清热生津","阳明气分热盛证：壮热面赤，烦渴引饮，大汗出，脉洪大有力"]
          ]
        },
        {type:"ul", items:[
          "白虎汤：为清气分热的代表方，君以石膏辛甘大寒，清热泻火、除烦止渴，臣以知母苦寒质润，助石膏清热并滋阴润燥，佐以粳米、炙甘草益胃护津、防大寒伤中。四药相配，清热而不伤阴、生津而不敛邪，是治疗阳明气分热盛（“四大证”——大热、大汗、大渴、脉洪大）的经典方，凡气分热盛而津液已伤者皆可加减化裁。"
        ]},
        {type:"h4",text:"三、清营凉血剂"},
        {type:"table", headers:["方剂","组成（节选）","功用","主治"],
          rows:[
            ["清营汤","水牛角、生地黄、玄参、麦冬、金银花、连翘、黄连、竹叶心、丹参","清营解毒，透热养阴","热入营分证：身热夜甚，神烦少寐，时有谵语，斑疹隐隐，舌绛而干，脉细数"],
            ["犀角地黄汤","水牛角、生地黄、芍药、牡丹皮","清热解毒，凉血散瘀","热入血分证：身热谵语，斑色紫黑，或吐血、衄血、便血，舌绛起刺"]
          ]
        },
        {type:"ul", items:[
          "清营汤：以水牛角（代犀角）、生地黄清营凉血解毒为君，配伍玄参、麦冬滋阴生津，佐以金银花、连翘、黄连清热解毒并透热转气（使营分邪热转出气分而解），丹参活血散瘀防热与血结、竹叶心清心除烦。全方清营解毒与透热养阴并重，体现叶天士“入营犹可透热转气”的治疗思想，是治热入营分证的代表方。",
          "犀角地黄汤：以水牛角（代犀角）清心凉血解毒为君，生地黄凉血滋阴为臣，佐以芍药、牡丹皮清热凉血、活血散瘀（凉血与散瘀并用，防止血受热灼而凝滞成瘀），善治热入血分、迫血妄行之各种出血证及热瘀互结之斑疹紫黑，体现“凉血散瘀、耗血动血须凉血散血”的治血分热证原则。"
        ]},
        {type:"h4",text:"四、清热解毒剂"},
        {type:"table", headers:["方剂","组成（节选）","功用","主治"],
          rows:[
            ["黄连解毒汤","黄连、黄芩、黄柏、栀子","泻火解毒","三焦火毒热盛证：大热烦躁，口燥咽干，错语不眠，或吐血衄血，或身热下利，舌红苔黄，脉数有力"],
            ["凉膈散","连翘、大黄、芒硝、栀子、黄芩、薄荷、竹叶、甘草、蜂蜜","泻火通便，清上泄下","上中二焦邪郁生热证：胸膈烦热，面赤唇焦，口舌生疮，大便秘结，小便短赤"],
            ["仙方活命饮","金银花、防风、白芷、当归尾、赤芍、乳香、没药、穿山甲、皂角刺、贝母、天花粉、陈皮、甘草","清热解毒，消肿溃坚，活血止痛","阳证痈疡肿毒初起：红肿焮痛，或身热凛寒，苔薄白或黄，脉数有力"]
          ]
        },
        {type:"ul", items:[
          "黄连解毒汤：黄连清泻心火为君（兼泻中焦之火），黄芩清泻上焦之火为臣，黄柏清泻下焦之火，栀子通泻三焦之火并导热下行，四药皆大苦大寒，合用则彻上彻下、三焦通泻，是清热解毒、泻火之基础方，凡火毒炽盛、三焦俱热之证均可运用，然纯用苦寒，中病即止，不宜久服以免化燥伤阴或损伤脾胃。",
          "凉膈散：以大黄、芒硝通腑泄热为主，配伍连翘、黄芩、栀子清上焦邪热，薄荷、竹叶轻清透散，体现“以下代清、清上泄下”的独特治法思路——通过泻下大肠郁热，使上焦邪热随之而下泄，即“釜底抽薪”之法，善治上中二焦火热炽盛、大便秘结之证。",
          "仙方活命饮：被誉为“疮疡之圣药，外科之首方”，以金银花清热解毒为君，当归尾、赤芍、乳香、没药活血止痛、穿山甲、皂角刺溃坚消肿，配伍白芷、防风疏风散结、贝母、天花粉清热化痰散结、陈皮理气行滞，共奏清热解毒、消肿溃坚、活血止痛之功，为治阳证痈疡肿毒（无论未成脓或已成脓）初起的代表方，体现“消、托、补”外科三法中“消法”的具体运用。"
        ]},
        {type:"h4",text:"五、清脏腑热剂"},
        {type:"table", headers:["方剂","组成（节选）","功用","主治"],
          rows:[
            ["龙胆泻肝汤","龙胆草、黄芩、栀子、泽泻、木通、车前子、当归、生地黄、柴胡、甘草","清泻肝胆实火，清利肝经湿热","肝胆实火上炎证：头痛目赤，胁痛口苦；肝经湿热下注证：阴肿阴痒，筋痿阴汗，小便淋浊，带下黄臭"],
            ["泻白散","地骨皮、桑白皮、炙甘草、粳米","清泻肺热，止咳平喘","肺热咳喘证：气喘咳嗽，皮肤蒸热，日晡尤甚"],
            ["清胃散","黄连、生地黄、牡丹皮、当归、升麻","清胃凉血","胃火牙痛证：牙痛牵引头脑，面颊发热，其齿喜冷恶热，或牙宣出血，或唇舌腮颊肿痛"],
            ["芍药汤","芍药、当归、黄连、黄芩、大黄、木香、槟榔、官桂、甘草","清热燥湿，调气和血","湿热痢疾：腹痛便脓血，赤白相兼，里急后重，肛门灼热"],
            ["白头翁汤","白头翁、黄连、黄柏、秦皮","清热解毒，凉血止痢","热毒痢疾：腹痛，里急后重，肛门灼热，下痢脓血，赤多白少"]
          ]
        },
        {type:"ul", items:[
          "龙胆泻肝汤：以龙胆草大苦大寒、清泻肝胆实火并利肝经湿热为君，黄芩、栀子助君药清热泻火为臣，佐以泽泻、木通、车前子渗湿泄热，配伍生地黄、当归养血滋阴以防苦寒渗利伤阴（“泻中有补”），柴胡疏肝并引诸药入肝经、甘草调和诸药，体现“泻中寓补、标本兼顾”的组方智慧，凡肝胆实火或肝经湿热所致上下诸证皆可加减应用。",
          "泻白散：桑白皮泻肺清热为君，地骨皮助君药清泻肺中伏热为臣，佐以粳米、甘草养胃和中、防泻肺伤及脾胃。全方药性平和，清泻肺热而不伤正，善治肺热咳喘之轻证，尤宜阴伤不著之肺热咳喘。",
          "清胃散：黄连直折胃火为君，生地黄、牡丹皮凉血滋阴，当归养血和血，升麻清热解毒并引诸药入阳明经、兼能升散透发郁热（“火郁发之”），善治胃火上攻之牙痛牙宣诸证。",
          "芍药汤：以黄连、黄芩清热燥湿为君，大黄泻热导滞，木香、槟榔行气导滞（体现“行血则便脓自愈，调气则后重自除”的治痢原则），当归、芍药养血和血、缓急止痛，佐以少量肉桂反佐以防苦寒伤中并助血行，善治湿热痢疾，是“调气和血”治痢法的代表方。",
          "白头翁汤：白头翁清热解毒、凉血止痢为君，黄连、黄柏清热燥湿解毒为臣佐，秦皮清热解毒并收涩止痢，四药合用力专清热解毒凉血，善治热毒深陷血分之痢疾（下痢脓血、赤多白少），与芍药汤同治痢疾，但白头翁汤长于清热解毒凉血、芍药汤长于调气和血，临证需辨证选用。"
        ]},
        {type:"h4",text:"六、清虚热剂"},
        {type:"table", headers:["方剂","组成（节选）","功用","主治"],
          rows:[
            ["青蒿鳖甲汤","青蒿、鳖甲、细生地、知母、丹皮","养阴透热","温病后期，阴液已伤，邪伏阴分证：夜热早凉，热退无汗，舌红苔少，脉细数"],
            ["当归六黄汤","当归、生地黄、熟地黄、黄芩、黄连、黄柏、黄芪","滋阴泻火，固表止汗","阴虚火旺之盗汗：发热盗汗，面赤心烦，口干唇燥，大便干结，小便黄赤"]
          ]
        },
        {type:"ul", items:[
          "青蒿鳖甲汤：鳖甲滋阴退热、入络搜邪为君，青蒿芳香透络、引邪外出为臣，二药相配“先入后出”——鳖甲入阴分帮助青蒿深入病所，青蒿领邪外出而不伤鳖甲滋阴之功，佐以生地黄、知母、牡丹皮滋阴凉血清热，是治温病后期邪伏阴分（夜热早凉、热退无汗）的代表方，体现“养阴透热、先入后出”的独特配伍思路。",
          "当归六黄汤：当归、生地黄、熟地黄滋阴养血为君，黄芩、黄连、黄柏泻火除烦为臣，倍量黄芪益气固表为佐使（“阳加于阴谓之汗”，重用黄芪既能固表止汗，又能协同滋阴药益气生津），全方滋阴与泻火并进、兼固表止汗，为治阴虚火旺盗汗的代表方，被誉为“治盗汗之圣药”。"
        ]}
      ],
      keypoints:[
        "清热剂属清法范畴，分清气分热、清营凉血、清热解毒、清脏腑热、清虚热五类。",
        "白虎汤治阳明气分热盛“四大证”（大热大汗大渴脉洪大），石膏知母清热生津，粳米甘草护胃。",
        "清营汤体现叶天士“入营犹可透热转气”思想，治热入营分证。",
        "犀角地黄汤凉血与散瘀并用，体现“热入血分需凉血散血”的治疗原则。",
        "黄连解毒汤为大苦大寒之剂，三焦火毒俱清，但不宜久服以免化燥伤阴。",
        "凉膈散“以下代清、釜底抽薪”，通过泻下大肠郁热而使上焦邪热随之而解。",
        "仙方活命饮被誉为“疮疡之圣药、外科之首方”，是治阳证痈疡初起的代表方。",
        "龙胆泻肝汤“泻中有补”，配伍生地黄、当归养血滋阴以防苦寒渗利伤阴。",
        "芍药汤体现“行血则便脓自愈，调气则后重自除”的治痢原则；白头翁汤长于清热解毒凉血。",
        "青蒿鳖甲汤“先入后出”，鳖甲入阴分助青蒿深入，青蒿领邪外出而不伤鳖甲之功。",
        "当归六黄汤重用黄芪固表止汗，被誉为“治盗汗之圣药”。"
      ],
      quiz:[
        {type:"single", q:"治阳明气分热盛“大热、大汗、大渴、脉洪大”四大证的代表方是：", options:["黄连解毒汤","白虎汤","清营汤","犀角地黄汤"], answer:1, explain:"白虎汤以石膏、知母为主药，清热生津，是治阳明气分热盛四大证的经典代表方。"},
        {type:"single", q:"体现叶天士“入营犹可透热转气”思想的方剂是：", options:["犀角地黄汤","清营汤","黄连解毒汤","泻白散"], answer:1, explain:"清营汤在清营凉血药中配伍金银花、连翘、黄连等清热解毒之品，意在使营分邪热转出气分而解，正是“透热转气”思想的体现。"},
        {type:"single", q:"被誉为“疮疡之圣药，外科之首方”的是：", options:["凉膈散","仙方活命饮","黄连解毒汤","龙胆泻肝汤"], answer:1, explain:"仙方活命饮清热解毒、消肿溃坚、活血止痛，是治阳证痈疡肿毒初起的代表方，被誉为“疮疡之圣药，外科之首方”。"},
        {type:"single", q:"“以下代清、釜底抽薪”体现了哪首方剂的治法思路？", options:["凉膈散","白虎汤","清胃散","当归六黄汤"], answer:0, explain:"凉膈散以大黄、芒硝通腑泄热，使上焦邪热随大肠郁热一并泻下而解，体现“以下代清、釜底抽薪”的独特治法。"},
        {type:"single", q:"被誉为“治盗汗之圣药”，重用黄芪固表止汗的方剂是：", options:["青蒿鳖甲汤","当归六黄汤","泻白散","清胃散"], answer:1, explain:"当归六黄汤滋阴泻火兼固表止汗，方中倍用黄芪益气固表，被誉为“治盗汗之圣药”。"},
        {type:"single", q:"“先入后出”配伍思路——鳖甲入阴分助药力深入、青蒿领邪外出，体现于：", options:["清营汤","犀角地黄汤","青蒿鳖甲汤","龙胆泻肝汤"], answer:2, explain:"青蒿鳖甲汤中鳖甲滋阴入络搜邪、青蒿透络引邪外出，二药相配体现“先入后出”的治疗思路，善治温病后期邪伏阴分证。"},
        {type:"multi", q:"治疗湿热或热毒痢疾的方剂有：", options:["芍药汤","白头翁汤","龙胆泻肝汤","黄连解毒汤"], answer:[0,1], explain:"C、D两项虽同为清热剂，但主治并非痢疾：龙胆泻肝汤治肝胆实火及肝经湿热证，黄连解毒汤治三焦火毒热盛证；芍药汤、白头翁汤才是治痢疾的代表方。"},
        {type:"multi", q:"关于黄连解毒汤的说法正确的有：", options:["由黄连、黄芩、黄柏、栀子组成","为大苦大寒之剂，三焦火毒并清","可长期大量连续服用而无碍", "过用久服易化燥伤阴或损伤脾胃"], answer:[0,1,3], explain:"C项错误，本方大苦大寒，纯清无补，不宜久服，以免化燥伤阴、损伤脾胃阳气。"},
        {type:"blank", q:"清胃散中升麻的配伍意义除清热解毒外，还体现“____发之”的治疗思路。（请填一字）", answer:["火郁"], explain:"升麻兼能升散透发，配伍于清胃散中体现“火郁发之”的治法——通过升散透发使郁伏之胃火得以透达而解。"},
        {type:"blank", q:"芍药汤治痢体现“行血则便脓自愈，____则后重自除”的治疗原则。（请填二字）", answer:["调气"], explain:"该原则强调治疗痢疾须兼顾调理气血：行血活血则脓血便自愈，调畅气机则里急后重之症自除。"},
        {type:"case", q:"病例分析：患者身热夜甚，心烦不寐，时有谵语，皮肤斑疹隐隐可见，口渴不甚，舌绛而干，脉细数。请分析证候并说明选方依据。", answer:"该患者证属热入营分证，病机为温热邪气由气分深入营分，营阴被灼、心神被扰、邪热窜扰血络，症见身热夜甚（营阴属阴，夜间阳气入阴，与邪热相搏则热势更甚）、心烦不寐、时有谵语（热扰心神）、斑疹隐隐（热窜血络，但尚未及血分动血之重证）、口渴不甚（营阴受损但津液未如气分热盛证般大量耗伤，故渴不甚）、舌绛而干、脉细数，均为热入营分、营阴耗伤的典型表现。治疗当以清营解毒、透热养阴为法，可选用清营汤：方中水牛角、生地黄清营凉血解毒为君；玄参、麦冬滋阴生津为臣，助生地黄养阴；配伍金银花、连翘、黄连清热解毒，且能透泄营分邪热转出气分而解（透热转气），丹参清热凉血活血、防止热与血结，竹叶心清心除烦。全方清营解毒与透热养阴并进，切合本例热入营分、气营两清的核心病机。", explain:""}
      ]
    },
    {title:"第五章 祛暑剂", ready:true,
      lecture:[
        {type:"h4",text:"一、祛暑剂概述"},
        {type:"p",text:"凡以祛暑药为主组成，具有祛除暑邪作用，治疗暑病的方剂，统称祛暑剂。暑为夏季主气，其性炎热升散，且暑多夹湿，故治暑之法，除清热之外，常需兼顾解表、益气、利湿等法，分为祛暑解表、祛暑清热、祛暑益气、祛暑利湿等类型。使用注意：暑病最耗气伤津，治暑不可一味苦寒直折，应重视顾护津气；暑月感寒（阴暑）与暑热本证（阳暑）治法迥异，须仔细鉴别。"},
        {type:"table", headers:["方剂","组成（节选）","功用","主治"],
          rows:[
            ["香薷散","香薷、白扁豆、厚朴","祛暑解表，化湿和中","阴暑证：暑月乘凉饮冷，外感于寒，内伤于湿：恶寒发热，头重身痛，无汗，胸脘痞闷，泛恶吐泻"],
            ["新加香薷饮","香薷、金银花、鲜扁豆花、厚朴、连翘","祛暑解表，清热化湿","暑温夹湿，卫气同病证：发热头痛，恶寒无汗，口渴面赤，胸闷不舒"],
            ["清暑益气汤（王氏方）","西洋参、石斛、麦冬、黄连、竹叶、荷梗、知母、甘草、粳米、西瓜翠衣","清暑益气，养阴生津","暑热气津两伤证：身热汗多，口渴心烦，小便短赤，体倦少气，精神不振，脉虚数"],
            ["六一散","滑石、甘草","清暑利湿","暑湿证：身热烦渴，小便不利，或泄泻"]
          ]
        },
        {type:"ul", items:[
          "香薷散：香薷发汗解表、祛暑化湿，被誉为“夏月之麻黄”，配伍白扁豆健脾化湿、厚朴行气除满化湿，善治阴暑证（暑天乘凉饮冷，外感风寒兼内伤湿滞），本方辛温，仅适用于阴暑，暑热炽盛之阳暑证禁用；煎服宜冷服，取“热者寒之”反佐之意以防格拒。",
          "新加香薷饮：即香薷散去白扁豆，加金银花、连翘、鲜扁豆花而成，减弱原方辛温之性、增强清热之力，善治暑温夹湿而卫分表证较著、里热已显者，较香薷散更适用于暑热偏重之证。",
          "清暑益气汤（王孟英方，与李东垣清暑益气汤同名异方）：以西洋参益气养阴生津为君，石斛、麦冬、知母助君药养阴生津，西瓜翠衣、荷梗、竹叶清热解暑，黄连清心泄热，甘草粳米益胃和中，全方清暑热而不伤正、益气阴而不恋邪，善治暑热耗伤气津之证，尤宜暑热日久、气阴两伤而暑湿不甚者。",
          "六一散：滑石与甘草以六比一的比例配伍而成（故名“六一”），滑石清热利湿、通利小便，导暑湿从小便而出，甘草益气和中、调和滑石之寒滑，二药相配清暑利湿而不伤正，是治暑湿证的基础方，可加辰砂名益元散、加薄荷名鸡苏散、加青黛名碧玉散，随证化裁广泛应用于暑湿病证。"
        ]}
      ],
      keypoints:[
        "祛暑剂治疗暑病，暑多夹湿，治暑常需兼顾解表、益气、利湿等法。",
        "香薷散被誉为“夏月之麻黄”，善治阴暑证，暑热阳暑证禁用；服法宜冷服以防格拒。",
        "新加香薷饮即香薷散去扁豆加银翘而成，较原方清热力更强，适用于暑温夹湿卫气同病证。",
        "王氏清暑益气汤以西洋参为君，清暑益气、养阴生津，主治暑热耗伤气津证，与李东垣清暑益气汤同名异方需注意区分。",
        "六一散由滑石、甘草六比一配伍而成，清暑利湿；随证加味可化裁为益元散、鸡苏散、碧玉散。",
        "治暑病应重视顾护津气，不可一味苦寒直折损伤正气。"
      ],
      quiz:[
        {type:"single", q:"被誉为“夏月之麻黄”的方剂是：", options:["六一散","香薷散","清暑益气汤","新加香薷饮"], answer:1, explain:"香薷散以香薷为君，发汗解表祛暑力强，作用类似麻黄之于风寒表证，故被誉为“夏月之麻黄”。"},
        {type:"single", q:"由滑石、甘草以六比一比例配伍而成的方剂是：", options:["新加香薷饮","六一散","清暑益气汤","香薷散"], answer:1, explain:"六一散由滑石六份、甘草一份组成，故名“六一散”，功能清暑利湿。"},
        {type:"single", q:"以西洋参为君药，主治暑热气津两伤证的方剂是：", options:["香薷散","六一散","清暑益气汤（王氏方）","新加香薷饮"], answer:2, explain:"王氏清暑益气汤以西洋参益气养阴生津为君，配伍石斛、麦冬等，主治暑热耗伤气津之证。"},
        {type:"single", q:"香薷散主治的“阴暑证”，其病机特点是：", options:["单纯暑热炽盛","暑月乘凉饮冷，外感风寒兼内伤湿滞","纯粹阴虚内热","单纯脾胃气虚"], answer:1, explain:"阴暑证多因夏月贪凉饮冷，外感风寒之邪，内伤生冷湿滞所致，与单纯暑热炽盛的阳暑证不同，故治法用辛温之香薷散而非苦寒清暑之品。"},
        {type:"multi", q:"六一散随证加味化裁的方剂包括：", options:["加辰砂名益元散","加薄荷名鸡苏散","加青黛名碧玉散","加黄连名黄连解毒汤"], answer:[0,1,2], explain:"D项黄连解毒汤是独立成方，并非六一散的化裁方；六一散加辰砂为益元散、加薄荷为鸡苏散、加青黛为碧玉散。"},
        {type:"blank", q:"香薷散治阴暑证，服法宜____服，以防药病格拒。（请填一字）", answer:["冷"], explain:"香薷散药性偏温，但暑病本有内热，故服用时宜冷服，取“热因寒用”反佐之法以防格拒。"},
        {type:"case", q:"病例分析：患者夏日贪凉，恶寒发热，头重身痛，无汗，胸脘痞闷，恶心呕吐，舌苔白腻。请分析证候并说明选方依据。", answer:"该患者证属阴暑证（暑月感寒夹湿），病机为夏月贪凉饮冷、外感风寒之邪、内伤生冷湿滞，卫阳被遏、脾胃气机升降失常，症见恶寒发热、无汗（外感风寒，腠理闭塞）、头重身痛（寒湿困阻肌表）、胸脘痞闷、恶心呕吐、舌苔白腻（湿滞中焦、脾胃升降失司），均为阴暑兼湿的典型表现，需注意与单纯暑热炽盛之阳暑证鉴别（阳暑当见壮热汗多、心烦口渴等热象，而非本例之恶寒无汗）。治疗当以祛暑解表、化湿和中为法，可选用香薷散：方中香薷发汗解表、祛暑化湿为君，白扁豆健脾化湿为臣，厚朴行气除满、燥湿和中为佐，三药相配外散风寒、内化湿滞，切合本例阴暑兼湿的核心病机；煎服宜冷服，以防寒温格拒。", explain:""}
      ]
    },
    {title:"第六章 温里剂", ready:true,
      lecture:[
        {type:"h4",text:"一、温里剂概述"},
        {type:"p",text:"凡以温热药为主组成，具有温里助阳、散寒通脉等作用，治疗里寒证的方剂，统称温里剂，属“八法”中的温法。根据寒邪所在部位及病情轻重不同，分为温中祛寒、回阳救逆、温经散寒三类。使用注意：应辨清寒邪深浅及阳气盛衰，真寒假热或真热假寒证须仔细鉴别，误用温热药有助火伤阴之弊；素体阴虚或内有郁热者慎用。"},
        {type:"h4",text:"二、温中祛寒剂"},
        {type:"table", headers:["方剂","组成（节选）","功用","主治"],

            ["理中丸","人参、干姜、白术、炙甘草","温中祛寒，补气健脾","脾胃虚寒证：脘腹疼痛喜温喜按，呕吐便溏，畏寒肢冷，或阳虚失血，或小儿慢惊，或病后喜唾涎沫"],
            ["小建中汤","饴糖、桂枝、芍药、生姜、大枣、炙甘草","温中补虚，和里缓急","中焦虚寒，肝脾不和证：腹中拘急疼痛，喜温喜按，神疲乏力，或伴心悸、虚烦不宁、面色无华"],
            ["吴茱萸汤","吴茱萸、人参、生姜、大枣","温中补虚，降逆止呕","肝胃虚寒，浊阴上逆证：食后欲呕，或呕吐酸水，或巅顶头痛，胸满脘痛，畏寒肢凉"]
          ]
        },
        {type:"ul", items:[
          "理中丸：以干姜温中祛寒为君，人参补气健脾为臣，佐以白术健脾燥湿，使以炙甘草调和诸药并益气和中，四药合用温补并行，是温中祛寒的基础方，可随证化裁——若病情较急可改丸为汤（即人参汤，取汤者荡也之意增强药力），阳虚甚者加附子（即附子理中丸），凡中焦脾胃虚寒之证均可以此为基础方灵活加减。",
          "小建中汤：即桂枝汤倍芍药加饴糖而成，重用饴糖温中补虚、缓急止痛为君，桂枝温阳散寒，芍药养血敛阴、与桂枝相配调和阴阳、且倍量善于缓急止痛，佐以生姜温胃、大枣补脾，使以甘草调和诸药。全方温中有补、阴阳并调，善治中焦虚寒兼肝脾不和之腹痛，为“建中”法的代表方，体现“甘温建中、酸甘化阴”的配伍思路。",
          "吴茱萸汤：吴茱萸温中散寒、降逆止呕并能疏肝下气为君，生姜温胃散寒、降逆止呕为臣，佐以人参、大枣补虚益胃，四药相配温中补虚与降逆并举，善治肝胃虚寒、浊阴上逆之呕吐及巅顶头痛（厥阴头痛），是肝、胃、肾（少阴）三经虚寒浊阴上逆诸证的常用方，凡见畏寒肢凉、呕吐清水、头痛巅顶者皆可考虑运用。"
        ]},
        {type:"h4",text:"三、回阳救逆剂"},
        {type:"table", headers:["方剂","组成（节选）","功用","主治"],
          rows:[
            ["四逆汤","附子、干姜、炙甘草","回阳救逆","少阴病，心肾阳衰寒厥证：四肢厥逆，恶寒蜷卧，神衰欲寐，面色苍白，呕吐腹痛，下利清谷，脉微细"],
            ["参附汤","人参、附子","回阳，益气，固脱","阳气暴脱证：四肢厥冷，冷汗淋漓，呼吸微弱，脉微欲绝"]

        {type:"ul", items:[

          "参附汤：仅人参、附子二味组成，人参大补元气、固脱生津，附子回阳救逆、温壮元阳，二药相配益气与回阳并举，是抢救阳气暴脱危证的经典方（现代常用于心源性休克等急重症的中医急救配合治疗），较四逆汤更侧重于气脱与阳脱并见的危重证候。"

        {type:"h4",text:"四、温经散寒剂"},

        "黄芪桂枝五物汤即桂枝汤去甘草倍生姜加黄芪而成，善治气虚血滞之血痹证。"

      quiz:[
        {type:"single", q:"为温中祛寒基础方，病情较急可改丸为汤（人参汤）的方剂是：", options:["小建中汤","理中丸","吴茱萸汤","四逆汤"], answer:1, explain:"理中丸由人参、干姜、白术、炙甘草组成，是温中祛寒的基础方，病急者可改为汤剂服用以增强药力。"},
        {type:"single", q:"即桂枝汤倍芍药加饴糖而成，体现“甘温建中”之法的方剂是：", options:["小建中汤","当归四逆汤","黄芪桂枝五物汤","吴茱萸汤"], answer:0, explain:"小建中汤在桂枝汤基础上倍用芍药并加饴糖，重在温中补虚、缓急止痛，是“建中”法的代表方。"},
        {type:"single", q:"“附子无干姜不热”所描述的配伍关系体现于：", options:["理中丸","四逆汤","参附汤","小建中汤"], answer:1, explain:"四逆汤中附子与干姜相须为用，干姜可增强附子回阳救逆之力，故有“附子无干姜不热”之说。"},
        {type:"single", q:"善治肝胃虚寒、浊阴上逆之巅顶头痛（厥阴头痛）的方剂是：", options:["吴茱萸汤","当归四逆汤","参附汤","黄芪桂枝五物汤"], answer:0, explain:"吴茱萸汤温中补虚、降逆止呕，善治肝胃虚寒、浊阴循肝经上逆所致的巅顶头痛及呕吐清水。"},
        {type:"single", q:"治血虚寒凝之厥证，与治阳衰阴盛寒厥的四逆汤病机不同的方剂是：", options:["当归四逆汤","参附汤","理中丸","小建中汤"], answer:0, explain:"当归四逆汤治营血虚弱、寒凝经脉所致的血虚寒厥证，与四逆汤所治阳气衰微、阴寒内盛的寒厥病机不同，二者虽同治“厥”但病机迥异。"},
        {type:"multi", q:"属于回阳救逆剂的有：", options:["四逆汤","参附汤","理中丸","当归四逆汤"], answer:[0,1], explain:"C项理中丸属温中祛寒剂，D项当归四逆汤属温经散寒剂，均非回阳救逆剂，故不选C、D。"},
        {type:"multi", q:"关于温里剂使用注意事项，正确的有：", options:["应辨清寒邪深浅及阳气盛衰","真寒假热或真热假寒证须仔细鉴别","素体阴虚或内有郁热者慎用","温里剂可不辨证候一律用于所有畏寒怕冷患者"], answer:[0,1,2], explain:"D项错误，畏寒怕冷也可能由阳郁不能外达等其他病机所致，并非皆属里寒证，须仔细辨证后方可使用温里剂。"},
        {type:"blank", q:"黄芪桂枝五物汤即桂枝汤去甘草倍____加黄芪而成。（请填二字）", answer:["生姜"], explain:"黄芪桂枝五物汤在桂枝汤基础上去甘草、倍用生姜并加入黄芪，益气温经、和血通痹，善治血痹证。"},
        {type:"blank", q:"参附汤由人参、____二味组成，用于抢救阳气暴脱危证。（请填一字）", answer:["附"], explain:"参附汤仅由人参、附子两味药组成，益气与回阳并举，是抢救阳气暴脱的经典急救方。"},
        {type:"case", q:"病例分析：患者四肢厥冷，恶寒蜷卧，精神萎靡欲寐，下利清谷，呕吐腹痛，面色苍白，脉微细。请分析证候并说明选方依据。", answer:"该患者证属少阴病心肾阳衰寒厥证，病机为心肾阳气衰微、阴寒之邪独盛于内，阳气不能外达温煦四末、亦不能温运脾胃、鼓动血脉，症见四肢厥逆、恶寒蜷卧（阳虚不能温煦肢体）、精神萎靡欲寐（阳虚神失所养，此为少阴病提纲证“但欲寐”的表现）、下利清谷、呕吐腹痛（阳虚不能温煦脾胃、腐熟水谷）、面色苍白、脉微细（阳气衰微、鼓动无力），均属阴寒内盛、阳气衰微欲脱的危重表现。治疗当以回阳救逆为法，急当选用四逆汤：方中附子大辛大热，直入少阴，破阴寒回阳气，为君药；干姜温中散寒，助附子破阴回阳，二药相须为用，其效更著；炙甘草益气补中，并能缓和姜附燥烈之性，防止其“散阳伤阴”之弊，兼能延长药效。三药合用，药简力专，共奏回阳救逆之功，切合本例心肾阳衰、阴寒内盛的危重病机，若病情危急、气阳两脱者，可加人参名四逆加人参汤以增强益气固脱之力。", explain:""}
      ]
    },
    {title:"第七章 表里双解剂", ready:true,
      lecture:[
        {type:"h4",text:"一、表里双解剂概述"},
        {type:"p",text:"凡兼有表里同治作用，能同时解除表证与里证的方剂，统称表里双解剂。适用于表证未解、里证已生，表里同病的证候。根据表里证候性质的不同组合（表寒里热、表实里实、表寒里实等），临床须仔细辨明表里主次、寒热虚实，酌情配伍解表药与治里药，使表里双解、内外分消。使用注意：若表证虽解而里证未成，或里证虽重而表证已罢，则不宜使用表里双解之法，应分别治之。"},
        {type:"table", headers:["方剂","组成（节选）","功用","主治"],
          rows:[
            ["葛根芩连汤","葛根、黄芩、黄连、炙甘草","解表清里","协热下利证：身热，下利臭秽，肛门灼热，胸脘烦热，口干作渴，或喘而汗出，舌红苔黄，脉数或促"],
            ["防风通圣散","防风、荆芥、麻黄、薄荷、川芎、当归、白芍、连翘、栀子、黄芩、石膏、桔梗、滑石、甘草、大黄、芒硝、白术","疏风解表，泻热通便","风热壅盛，表里俱实证：憎寒壮热，头目昏眩，目赤睛痛，口苦咽干，大便秘结，小便短赤，以及疮疡肿毒、肠风痔漏等"]
          ]
        },
        {type:"ul", items:[
          "葛根芩连汤：葛根解肌透表、清热生津并升发脾胃清阳止利为君，黄芩、黄连苦寒清热燥湿、坚阴止利为臣，佐以炙甘草调和诸药、护胃安中。全方外解肌表之邪、内清肠胃之热，善治外感表证未解、邪热入里迫肠所致的协热下利证，为表里双解、外疏内清的代表方，体现“逆流挽舟”之外的另一种表里同治思路——邪热已从表入里，故重在清里为主兼以解表。",
          "防风通圣散：组方庞大而配伍精巧，以防风、荆芥、麻黄、薄荷疏风解表，石膏、黄芩、栀子、连翘清热泻火，大黄、芒硝通便泄热，滑石利水通淋，当归、川芎、白芍养血活血，白术健脾，桔梗、甘草宣肺利咽和中。全方汗、下、清、利四法俱备，表里同治、气血兼顾，是治风热壅盛、表里俱实证的代表方，临床凡外感风热兼里热便秘及多种疮疡肿毒属表里俱实者皆可加减运用。"
        ]}
      ],
      keypoints:[
        "表里双解剂适用于表证未解、里证已成的表里同病证候，须辨明表里主次、寒热虚实。",
        "若单纯表证未及里，或单纯里证而表已解，均不宜使用表里双解之法，应分而治之。",
        "葛根芩连汤外解肌表、内清肠热，善治外感表证未解、邪热入里迫肠之协热下利证。",
        "防风通圣散组方庞大，汗、下、清、利四法俱备，是治风热壅盛、表里俱实证的代表方。",
        "防风通圣散除外感表里俱实证外，还可加减用治多种疮疡肿毒、肠风痔漏等病证。"
      ],
      quiz:[
        {type:"single", q:"外解肌表之邪、内清肠胃之热，善治协热下利证的方剂是：", options:["葛根芩连汤","防风通圣散","大柴胡汤","黄连解毒汤"], answer:0, explain:"葛根芩连汤以葛根解表升清、黄芩黄连清热燥湿止利，是治外感表证未解、邪热入里所致协热下利的代表方。"},
        {type:"single", q:"组方中汗、下、清、利四法俱备，被广泛用于风热壅盛表里俱实证及多种疮疡肿毒的方剂是：", options:["葛根芩连汤","防风通圣散","小柴胡汤","理中丸"], answer:1, explain:"防风通圣散组方庞大精巧，兼具解表、泻下、清热、利湿之功，汗下清利四法俱备，是治风热壅盛表里俱实证的代表方。"},
        {type:"single", q:"表里双解剂的适用证候是：", options:["单纯表证未及里者","表证未解、里证已成的表里同病证候","单纯里证而表已解者","一切外感病证均可使用"], answer:1, explain:"表里双解剂专为表证未解、里证已生的表里同病证候而设，若表里只有一端者，应分别治之，不宜滥用。"},
        {type:"multi", q:"关于防风通圣散的说法正确的有：", options:["组方涵盖疏风解表、清热泻火、通便利湿等多种治法","可加减用治疮疡肿毒、肠风痔漏等病证","仅能用于单纯表证而无里证者","体现表里同治、气血兼顾的组方思路"], answer:[0,1,3], explain:"C项错误，防风通圣散专为表里俱实证而设，若单纯表证而无里实者，无需使用本方之泻下通便诸药。"},
        {type:"blank", q:"葛根芩连汤中葛根除解肌透表外，还能升发脾胃清阳以____。（请填一字，指止泻作用）", answer:["止"], explain:"葛根既能解肌透表退热，又能升发脾胃清阳止泻，一药兼具表里两方面的治疗作用，是本方组方的关键药物。"},
        {type:"case", q:"病例分析：患者外感发热未解，继而出现下利臭秽，肛门灼热，胸脘烦热，口干作渴，舌红苔黄，脉数。请分析证候并说明选方依据。", answer:"该患者证属协热下利证，病机为外感表邪未解，邪热内迫大肠，表里同病、以里热为主，症见身热（表邪未解）、下利臭秽、肛门灼热（邪热迫肠、湿热下注）、胸脘烦热、口干作渴（里热炽盛，津液受灼）、舌红苔黄、脉数（里热之象），为表证未罢而邪热已内迫大肠的表里同病证候。治疗当以解表清里为法，可选用葛根芩连汤：方中葛根解肌透表、生津止渴，并能升发脾胃清阳而止泻，为君药，一药兼顾表里；黄芩、黄连苦寒，清热燥湿、坚阴止利，为臣药，直清肠中邪热；炙甘草调和诸药、护胃和中。三药合用，外解未罢之表邪、内清已成之里热，表里同治、内外分消，切合本例协热下利的核心病机。", explain:""}
      ]
    },
    {title:"第八章 补益剂", ready:true,
      lecture:[
        {type:"h4",text:"一、补益剂概述"},
        {type:"p",text:"凡以补益药为主组成，具有补养人体气血阴阳等作用，治疗各种虚证的方剂，统称补益剂，属“八法”中的补法。根据虚证性质不同，分为补气、补血、气血双补、补阴、补阳、阴阳并补六类。使用注意：应辨清气血阴阳虚损之偏重，避免虚不受补或误补益疾；补益剂药性多滋腻，易碍脾胃运化，常需配伍理气健脾之品；实证或表邪未解者不宜滥用补益剂，以防“闭门留寇”。"},
        {type:"h4",text:"二、补气剂"},
        {type:"table", headers:["方剂","组成（节选）","功用","主治"],
          rows:[
            ["四君子汤","人参、白术、茯苓、炙甘草","益气健脾","脾胃气虚证：面色萎白，语声低微，气短乏力，食少便溏，舌淡苔白，脉虚弱"],
            ["参苓白术散","人参、茯苓、白术、山药、白扁豆、莲子肉、砂仁、薏苡仁、桔梗、甘草","益气健脾，渗湿止泻","脾虚湿盛证：饮食不化，胸脘痞闷，肠鸣泄泻，四肢乏力，形体消瘦，舌淡苔白腻"],
            ["补中益气汤","黄芪、人参、白术、炙甘草、当归、陈皮、升麻、柴胡","补中益气，升阳举陷","脾虚气陷证：饮食减少，体倦肢软，少气懒言，或脏器下垂，或长期低热，或气虚发热"],
            ["生脉散","人参、麦冬、五味子","益气生津，敛阴止汗","气阴两伤证：汗多神疲，体倦气短，咽干口渴，脉虚数；久咳伤肺，气阴两虚证"],
            ["玉屏风散","黄芪、白术、防风","益气固表止汗","表虚自汗证：汗出恶风，面色㿠白，舌淡苔薄白，脉浮虚；亦治体虚易感风邪者"]
          ]
        },
        {type:"ul", items:[
          "四君子汤：为补气基础方，人参大补元气为君，白术健脾燥湿为臣，茯苓渗湿健脾为佐，炙甘草调和诸药为使，四药性味平和，补而不峻、温而不燥，是治脾胃气虚的基础方，后世众多补气方剂多由此化裁而成（如六君子汤、香砂六君子汤等）。",
          "参苓白术散：即四君子汤加山药、白扁豆、莲子肉、薏苡仁、砂仁、桔梗而成，补气健脾之中兼渗湿止泻、行气和胃，尤宜脾虚兼湿盛之食少便溏，桔梗于此方中除宣肺利气外，尚有“培土生金”“载药上行”之意，使全方补脾之力上达于肺。",
          "补中益气汤：黄芪补气升阳、固表为君，人参、白术、炙甘草健脾益气为臣，佐以当归养血和营、陈皮理气和胃，使以少量升麻、柴胡升举下陷之清阳。全方补气与升阳并举，是“甘温除热”法及“升阳举陷”法的代表方，凡中气下陷之脏器下垂或气虚发热者皆可运用。",
          "生脉散：人参大补元气、生津止渴为君，麦冬养阴生津、清心除烦为臣，五味子敛肺止汗、生津固脱为佐，三药合用一补一润一敛，益气养阴、生津止汗，善治气阴两伤之汗多神疲及久咳肺虚气阴两伤之证，现代亦常用于心气阴两虚之心悸气短。",
          "玉屏风散：黄芪益气固表为君，白术健脾益气助黄芪固表为臣，佐以少量防风走表祛风、与黄芪相配则固表而不留邪、祛风而不伤正（“补中寓散、散中寓补”），善治表虚自汗及体虚易感风邪者，是益气固表的代表方，长期服用可增强卫外功能、减少反复感冒。"
        ]},

            ["当归补血汤","黄芪、当归","补气生血","血虚发热证：肌热面赤，烦渴欲饮，脉洪大而虚，重按无力；亦治妇人经期、产后血虚发热头痛"],
            ["归脾汤","人参、白术、黄芪、当归、茯神、炙甘草、远志、酸枣仁、木香、龙眼肉","益气补血，健脾养心","心脾气血两虚证：心悸怔忡，健忘失眠，食少体倦，或脾不统血之便血、崩漏"]

        {type:"ul", items:[
          "四物汤：为补血调血基础方，熟地黄滋阴补血为君，当归养血活血为臣，白芍养血敛阴、川芎活血行气为佐，四药相配补中有行、补而不滞，是治营血虚滞的基础方，妇科调经方剂多以此为基础加减化裁。",
          "当归补血汤：以大剂量黄芪配伍少量当归（比例五比一），黄芪补气升阳、大补脾肺之气以资生血之源为君，当归养血和营为臣，体现“阳生阴长、有形之血生于无形之气”的中医理论——重用补气药以生血，是“补气生血法”的经典代表，善治血虚发热证（症似白虎汤证但脉洪大而虚、重按无力，须仔细鉴别，误用白虎汤则更伤中气）。",
          "归脾汤：人参、白术、黄芪补气健脾为君臣，当归、龙眼肉养血为佐，茯神、远志、酸枣仁宁心安神，木香理气醒脾、防补药滋腻碍胃，全方心脾同治、气血并补，体现“补脾以生血、益气以摄血”的思路，善治心脾气血两虚之心悸失眠及脾不统血之出血证。"
        ]},
        {type:"h4",text:"四、气血双补剂"},

            ["炙甘草汤","炙甘草、生姜、人参、生地黄、桂枝、阿胶、麦冬、麻仁、大枣","益气滋阴，通阳复脉","阴血阳气虚弱，心脉失养证：脉结代，心动悸，虚羸少气，舌光少苔，或质干而瘦小"]

        {type:"ul", items:[
          "八珍汤：即四君子汤合四物汤而成，气血双补，是治气血两虚证的基础方，广泛用于病后体虚、术后调理及多种慢性虚损性疾病的辅助治疗。",
          "炙甘草汤：又名复脉汤，以炙甘草益气补中为君，配伍人参、大枣益气，生地黄、麦冬、阿胶、麻仁滋阴养血，桂枝、生姜温阳通脉，全方气血阴阳并补，尤重滋阴养血与温通阳气并行，善治阴血阳气俱虚、心脉失养之脉结代、心动悸，是治疗心律失常类病证的经典名方。"

            ["一贯煎","北沙参、麦冬、当归、生地黄、枸杞子、川楝子","滋阴疏肝","肝肾阴虚，肝气郁滞证：胸脘胁痛，吞酸吐苦，咽干口燥，舌红少津，脉细弱或虚弦"],
            ["大补阴丸","熟地黄、龟甲、黄柏、知母","滋阴降火","阴虚火旺证：骨蒸潮热，盗汗遗精，咳嗽咯血，足膝疼热，心烦易怒"]

        {type:"ul", items:[
          "六味地黄丸：熟地黄滋肾填精为君，山茱萸补肝肾、涩精气，山药补脾益肾为臣（“三补”），配伍泽泻利湿泄浊、牡丹皮清泻虚热、茯苓淡渗脾湿为佐（“三泻”），三补三泻、补中寓泻，补而不腻，是滋补肾阴的基础方，众多补阴名方（如知柏地黄丸、杞菊地黄丸、麦味地黄丸）均由此化裁而来。",
          "一贯煎：以生地黄、枸杞子滋补肝肾之阴为君，配伍北沙参、麦冬、当归滋阴养血为臣，佐以少量川楝子疏肝理气、条达肝木（大队滋阴药中佐一味疏肝药，滋阴而不滞气、疏肝而不伤阴），善治肝肾阴虚、肝气郁滞所致的胁肋疼痛，体现“阴虚肝郁证”的独特治法。",
          "大补阴丸：熟地黄、龟甲滋阴填精、壮水制火为君臣，黄柏、知母苦寒降火为佐，体现“培本清源、滋阴与降火并重”之意，善治阴虚火旺程度较重之骨蒸潮热、遗精咯血等证。"
        ]},

        {type:"ul", items:[
          "肾气丸：又名金匮肾气丸，于六味地黄丸基础上加少量桂枝、附子而成，体现“少火生气”“阴中求阳”的组方思想——在大队滋阴药中少佐温阳之品，取“少火生气”之意，微微生火以鼓舞肾气，而非峻补大热之品，是补阳剂中“阴中求阳”配伍思路的典范。",
          "右归丸：于肾气丸基础上去泽泻、牡丹皮、茯苓等“三泻”之品，加枸杞子、杜仲、菟丝子、鹿角胶、当归温补肾阳、填精益髓，纯补无泻，善治肾阳不足、命门火衰程度较重之证，与肾气丸相较，本方补阳之力更为峻猛纯粹。",
          "地黄饮子：熟地黄、山茱萸、肉苁蓉、附子、肉桂滋肾阴、补肾阳并用（阴阳并补），佐以石斛、麦冬、五味子滋养肺肾之阴以防温阳药伤阴，石菖蒲、远志、茯苓开窍化痰以通心窍，善治肾阴阳两虚、痰浊上蒙心窍所致的喑痱证（舌强不能言、足废不能用），是阴阳并补兼开窍化痰的代表方。"

      keypoints:[

        "四君子汤为补气基础方，性味平和，后世众多补气方剂由此化裁而来。",

        "六味地黄丸“三补三泻”，是滋补肾阴基础方；一贯煎大队滋阴药中佐川楝子疏肝，治阴虚肝郁证。",
        "肾气丸体现“阴中求阳、少火生气”思想，于滋阴药中少佐桂附以微微生火；右归丸补阳之力较肾气丸更峻猛纯粹。",

      quiz:[
        {type:"single", q:"为补气基础方，性味平和，后世众多补气方剂多由此化裁的是：", options:["四君子汤","参苓白术散","补中益气汤","生脉散"], answer:0, explain:"四君子汤由人参、白术、茯苓、炙甘草组成，性味平和，是补气健脾的基础方。"},
        {type:"single", q:"体现“甘温除热”“升阳举陷”法，善治脏器下垂及气虚发热的方剂是：", options:["四君子汤","补中益气汤","玉屏风散","归脾汤"], answer:1, explain:"补中益气汤重用黄芪配伍升麻、柴胡升举清阳，是甘温除热、升阳举陷法的代表方。"},
        {type:"single", q:"重用黄芪配伍少量当归，体现“补气生血法”的方剂是：", options:["四物汤","当归补血汤","归脾汤","八珍汤"], answer:1, explain:"当归补血汤以黄芪与当归五比一配伍，重用黄芪补气以资生血之源，体现“阳生阴长、补气生血”的理论。"},
        {type:"single", q:"“三补三泻”的组方结构体现于：", options:["肾气丸","六味地黄丸","大补阴丸","一贯煎"], answer:1, explain:"六味地黄丸以熟地黄、山茱萸、山药为“三补”，泽泻、牡丹皮、茯苓为“三泻”，三补三泻、补中寓泻。"},
        {type:"single", q:"体现“阴中求阳、少火生气”组方思想，于滋阴方基础上少佐桂枝附子的方剂是：", options:["右归丸","肾气丸","地黄饮子","大补阴丸"], answer:1, explain:"肾气丸于六味地黄丸基础上少佐桂枝、附子，取“少火生气”之意，微微生火以鼓舞肾气，是阴中求阳的经典代表。"},
        {type:"single", q:"大队滋阴药中佐以川楝子疏肝理气，治阴虚肝郁胁痛的方剂是：", options:["六味地黄丸","一贯煎","大补阴丸","地黄饮子"], answer:1, explain:"一贯煎以生地黄、枸杞子等滋补肝肾之阴，佐少量川楝子疏肝理气，滋阴而不滞气，善治肝肾阴虚兼肝气郁滞之胁痛。"},
        {type:"multi", q:"由四君子汤化裁或合方而成的方剂有：", options:["参苓白术散","八珍汤","归脾汤","肾气丸"], answer:[0,1], explain:"C项归脾汤虽含四君子汤部分药物思路但并非直接化裁而成；D项肾气丸与四君子汤无关，属补阳剂。参苓白术散是四君子汤加味而成，八珍汤是四君子汤合四物汤而成。"},
        {type:"multi", q:"关于炙甘草汤（复脉汤）的说法正确的有：", options:["气血阴阳并补","善治脉结代、心动悸","以炙甘草为君药益气补中","仅能补气，不具滋阴养血之功"], answer:[0,1,2], explain:"D项错误，本方除益气外，还配伍生地黄、麦冬、阿胶、麻仁等大量滋阴养血药物，是气血阴阳并补之剂。"},
        {type:"blank", q:"右归丸于肾气丸基础上去泽泻、牡丹皮、____等“三泻”之品，加强温补肾阳之力。（请填二字）", answer:["茯苓"], explain:"右归丸去肾气丸中泽泻、牡丹皮、茯苓三味渗利泄浊之品，纯补无泻，温补肾阳、填精益髓之力更为纯粹峻猛。"},
        {type:"blank", q:"地黄饮子善治____证，症见舌强不能言、足废不能用。（请填一字）", answer:["喑痱"], explain:"喑痱证为肾虚精气亏虚、痰浊上蒙心窍所致，症见舌强喑哑不能言、下肢痿废不能用，地黄饮子阴阳并补兼开窍化痰，是治此证的代表方。"},
        {type:"case", q:"病例分析：患者面色萎黄，心悸失眠，健忘多梦，食少体倦，兼见月经淋漓不尽，色淡质稀，舌淡苔白，脉细弱。请分析证候并说明选方依据。", answer:"该患者证属心脾气血两虚兼脾不统血证，病机为思虑过度或久病耗伤，损及心脾，心血不足则心神失养，脾气亏虚则健运失职、且统摄血液功能减退，症见面色萎黄、心悸失眠、健忘多梦（心血不足，心神失养）、食少体倦（脾气亏虚，运化无力）、月经淋漓不尽、色淡质稀（脾不统血，冲任不固）、舌淡苔白、脉细弱，均为心脾气血两虚、脾不统血的典型表现。治疗当以益气补血、健脾养心为法，可选用归脾汤：方中人参、黄芪、白术益气健脾为君臣，以资气血生化之源；当归、龙眼肉养血和营；茯神、远志、酸枣仁宁心安神；木香理气醒脾，防大队补益药滋腻碍胃；炙甘草调和诸药。全方心脾同治、气血并补，且能补脾以固摄统血之权，切合本例心脾气血两虚兼脾不统血的核心病机，可望心神得养、脾气得健、统血有权，则诸症自愈。", explain:""}
      ]
    },
    {title:"第九章 固涩剂", ready:true,
      lecture:[
        {type:"h4",text:"一、固涩剂概述"},
        {type:"p",text:"凡以收涩药为主组成，具有收敛固涩作用，治疗气血精津耗散滑脱之证的方剂，统称固涩剂。适用于久病体虚、正气不固所致的自汗盗汗、久咳虚喘、久泻久痢、遗精滑精、崩漏带下等滑脱不禁之证。固涩剂重在治标，临床常需配伍相应补虚药物标本兼顾以治其本。使用注意：凡外邪未解或内有湿热积滞者忌用固涩剂，以防恋邪留寇。"},
        {type:"table", headers:["方剂","组成（节选）","功用","主治"],
          rows:[
            ["牡蛎散","黄芪、麻黄根、牡蛎、浮小麦","敛阴止汗，益气固表","体虚自汗盗汗证：常自汗出，夜卧尤甚，心悸惊惕，短气烦倦，舌淡红，脉细弱"],

        {type:"ul", items:[
          "安宫牛黄丸：以牛黄清心解毒、化痰息风为君，麝香开窍醒神为臣，配伍犀角（水牛角代）、黄连、黄芩、栀子清热解毒泻火，朱砂、珍珠镇心安神，郁金、冰片芳香开窍，雄黄解毒。全方清热解毒与开窍醒神并重，为凉开三宝之首，善治邪热内陷心包之高热神昏，药力最为峻猛。",
          "紫雪：以清热药（石膏、寒水石、滑石、芒硝、硝石）与开窍息风药（水牛角、羚羊角、麝香）配伍，清热泻火之力尤强，且长于息风止痉，善治热闭痉厥证（高热神昏兼见惊厥抽搐者），三宝之中尤以本方息风止痉之力最著。",

        {type:"single", q:"治疗寒闭证，与凉开三宝寒热性质相反的开窍剂代表方是：", options:["安宫牛黄丸","苏合香丸","紫雪","至宝丹"], answer:1, explain:"苏合香丸为温开代表方，配伍多味温里理气药，善治寒凝气滞、痰浊内阻之寒闭证。"},

        {type:"case", q:"病例分析：患者高热神昏，烦躁谵语，舌謇肢厥，舌红绛，脉数。请分析证候并说明选方依据。", answer:"该患者证属邪热内陷心包证，病机为温热邪气深入营血、内陷心包，蒙蔽清窍、扰乱心神，症见高热神昏、烦躁谵语（热闭心包，心神被扰）、舌謇肢厥（热深厥深，热邪深伏则四肢反见厥冷，但此为真热假寒之象，非阳虚寒厥）、舌红绛、脉数（热入营血之象），均为热闭心包重证的典型表现。治疗当以清热解毒、开窍醒神为法，可选用安宫牛黄丸：方中牛黄清心解毒、化痰息风为君；麝香芳香开窍、通达十二经为臣，二药相配开窍醒神之力尤著；配伍犀角（水牛角代）、黄连、黄芩、栀子清热解毒泻火，直折内陷之邪热；朱砂、珍珠镇心安神；郁金、冰片芳香辟秽、协助开窍。全方清热解毒与开窍醒神并重，切合本例邪热内陷心包的核心病机，为凉开三宝中药力最峻、清热解毒力最强之方，适用于热闭神昏的急重病例。", explain:""}

    {title:"第十二章 理气剂", ready:true,
      lecture:[
        {type:"h4",text:"一、理气剂概述"},
        {type:"p",text:"凡以理气药为主组成，具有行气或降气作用，治疗气滞或气逆病证的方剂，统称理气剂。分为行气剂（治气机郁滞证，如肝气郁滞、脾胃气滞、寒凝气滞等）与降气剂（治肺胃气逆证，如肺气上逆之咳喘、胃气上逆之呕吐呃逆）两类。使用注意：理气药多辛温香燥，易耗气伤阴，中病即止，不宜过量久服；素体气虚阴亏者慎用。"},
        {type:"h4",text:"二、行气剂"},
        {type:"table", headers:["方剂","组成（节选）","功用","主治"],
          rows:[
            ["越鞠丸","香附、川芎、苍术、栀子、神曲","行气解郁","六郁证：胸膈痞闷，脘腹胀痛，嗳腐吞酸，恶心呕吐，饮食不消"],
            ["半夏厚朴汤","半夏、厚朴、茯苓、生姜、苏叶","行气散结，降逆化痰","梅核气：咽中如有物阻，咯吐不出，吞咽不下，胸膈满闷，或咳或呕"],
            ["瓜蒌薤白白酒汤","瓜蒌、薤白、白酒","通阳散结，行气祛痰","胸痹：胸中气塞，喘息咳唾，短气，胸背痛，苔白腻，脉沉弦或紧"],
            ["天台乌药散","乌药、木香、小茴香、青皮、高良姜、槟榔、川楝子、巴豆（同炒去巴豆）","行气疏肝，散寒止痛","寒凝气滞之小肠疝气：少腹引控睾丸而痛，或少腹疼痛，苔白，脉沉弦"],
            ["暖肝煎","当归、枸杞子、小茴香、肉桂、乌药、沉香、茯苓、生姜","温补肝肾，行气止痛","肝肾不足，寒滞肝脉证：睾丸冷痛，或小腹疼痛，畏寒喜暖，舌淡苔白，脉沉迟"]
          ]
        },
        {type:"ul", items:[
          "越鞠丸：为治“六郁”（气、血、痰、火、湿、食）之总方，香附行气解郁以治气郁为君（气畅则血行、痰化、火散、湿去、食消，故以治气郁为主导），川芎活血祛瘀以治血郁，苍术燥湿健脾以治湿郁，栀子清热泻火以治火郁，神曲消食导滞以治食郁，五药相配、五郁并治，体现“气畅则诸郁自解”的治疗思路，为疏肝解郁、调畅气机的代表方。",
          "半夏厚朴汤：半夏化痰散结、降逆和胃为君，厚朴行气开郁、降逆除满为臣，佐以茯苓渗湿健脾助化痰、生姜辛温散结和胃降逆，苏叶芳香行气、理肺舒肝，全方辛以行气、苦以降逆、佐淡渗以祛湿，善治情志不遂、痰气互结所致的梅核气（咽中如有物阻），是治疗此证的经典代表方。",
          "瓜蒌薤白白酒汤：瓜蒌利气宽胸、涤痰散结为君，薤白通阳散结、行气止痛为臣，白酒辛温走散、行气活血以助药势，三药相配通阳散结与行气祛痰并行，善治胸痹（胸阳不振、痰浊闭阻所致的胸闷胸痛），是治胸痹的基础方，后世化裁出瓜蒌薤白半夏汤、枳实薤白桂枝汤等系列方剂。",
          "天台乌药散：乌药行气疏肝、散寒止痛为君，配伍木香、青皮、小茴香、高良姜行气散寒，槟榔下气导滞，川楝子（经巴豆同炒去巴豆以增强其行气散结之力而不用巴豆峻泻之性）疏肝理气泄热，全方以大队辛温行气散寒药为主，善治寒凝肝脉、气滞不通之疝气疼痛。",
          "暖肝煎：肉桂、小茴香温肾暖肝散寒为君，当归、枸杞子养血补肝肾为臣，佐以乌药、沉香行气止痛，茯苓、生姜温胃和中，全方温补与行气并行，善治肝肾不足兼寒滞肝脉之睾丸冷痛，与天台乌药散同治疝气，但本方重在温补肝肾之本、兼以行气散寒，天台乌药散则纯以行气散寒治标为主，二者虚实有别。"
        ]},
        {type:"h4",text:"三、降气剂"},
        {type:"table", headers:["方剂","组成（节选）","功用","主治"],
          rows:[
            ["苏子降气汤","紫苏子、半夏、当归、炙甘草、前胡、厚朴、肉桂、生姜、大枣","降气平喘，祛痰止咳","上实下虚之咳喘证：痰涎壅盛，咳喘短气，胸膈满闷，或腰疼脚软，肢体倦怠，或肢体浮肿，苔白滑或白腻"],
            ["定喘汤","白果、麻黄、苏子、甘草、款冬花、杏仁、桑白皮、黄芩、半夏","宣降肺气，清热化痰","风寒外束，痰热内蕴证：哮喘咳嗽，痰多气急，痰稠色黄，或微恶风寒，舌苔黄腻，脉滑数"],
            ["旋覆代赭汤","旋覆花、代赭石、人参、生姜、半夏、炙甘草、大枣","降逆化痰，益气和胃","胃虚痰阻气逆证：心下痞硬，噫气不除，或呕吐呃逆，舌淡苔白滑，脉弦而虚"],
            ["橘皮竹茹汤","橘皮、竹茹、大枣、生姜、甘草、人参","降逆止呃，益气清热","胃虚有热之呃逆证：呃逆或呕吐，舌红嫩，脉虚数"]
          ]

        {type:"ul", items:[
          "苏子降气汤：紫苏子降气平喘、祛痰止咳为君，配伍半夏、厚朴、前胡降气化痰，佐以肉桂温补下元、纳气归肾（治疗“下虚”之本），当归养血润燥并治咳逆上气，生姜、大枣、炙甘草调和脾胃。全方上下并治，以降气化痰治上实为主，兼温补下元治下虚为辅，善治上实下虚之咳喘（痰壅于上、肾阳虚于下），体现“治上顾下、标本兼顾”的组方思路。",
          "定喘汤：麻黄宣肺平喘为君，白果收敛肺气、化痰定喘，与麻黄相配一散一收、既增平喘之效又防麻黄过于耗散，苏子、半夏、款冬花降气化痰，杏仁、桑白皮、黄芩清泄肺热，甘草调和诸药。全方宣散风寒与清化痰热并行，善治外有风寒、内蕴痰热之哮喘，是治疗此类寒包火哮喘证的常用方。",
          "旋覆代赭汤：旋覆花降气化痰、消痞散结为君，代赭石重镇降逆为臣（二药相配，旋覆花质轻主宣散、代赭石质重主降镇，一宣一降增强降逆化痰之功），佐以半夏、生姜化痰和胃降逆，人参、大枣、炙甘草益气补虚。全方降逆化痰与益气和胃并行，善治胃气虚弱、痰浊内阻之心下痞硬、嗳气不除。",
          "橘皮竹茹汤：橘皮理气和胃、竹茹清热止呕为君臣，佐以人参、甘草、大枣益气健脾和胃，生姜和胃降逆，全方清热与益气和胃并行，药性较为平和，善治胃虚有热之呃逆呕吐，尤宜久病或大病之后胃气未复、余热未清者。"
        ]}

      quiz:[
        {type:"single", q:"治疗“六郁”，以香附行气解郁为君药的方剂是：", options:["半夏厚朴汤","越鞠丸","天台乌药散","暖肝煎"], answer:1, explain:"越鞠丸以香附为君治气郁，兼治血郁、湿郁、火郁、食郁，为治六郁的代表方。"},
        {type:"single", q:"善治梅核气（咽中如有物阻，咯吐不出，吞咽不下）的方剂是：", options:["瓜蒌薤白白酒汤","半夏厚朴汤","苏子降气汤","橘皮竹茹汤"], answer:1, explain:"半夏厚朴汤行气散结、降逆化痰，是治疗梅核气的经典代表方。"},
        {type:"single", q:"通阳散结、行气祛痰，是治疗胸痹基础方的是：", options:["瓜蒌薤白白酒汤","定喘汤","旋覆代赭汤","天台乌药散"], answer:0, explain:"瓜蒌薤白白酒汤以瓜蒌、薤白、白酒组成，通阳散结、行气祛痰，是治胸痹的基础方。"},
        {type:"single", q:"治上实下虚之咳喘证，体现“治上顾下”思路的方剂是：", options:["定喘汤","苏子降气汤","旋覆代赭汤","橘皮竹茹汤"], answer:1, explain:"苏子降气汤以降气化痰治上实为主，配伍肉桂温补下元治下虚为辅，体现治上顾下、标本兼顾的思路。"},
        {type:"single", q:"旋覆花与代赭石相配的意义是：", options:["一宣一降，增强降逆化痰之功","单纯增强补气之力","单纯用于清热","单纯用于活血化瘀"], answer:0, explain:"旋覆花质轻主宣散化痰，代赭石质重主镇降逆气，二药相配一宣一降，增强降逆化痰、消痞散结之效。"},
        {type:"multi", q:"属于降气剂的方剂有：", options:["苏子降气汤","定喘汤","旋覆代赭汤","越鞠丸"], answer:[0,1,2], explain:"D项越鞠丸属行气剂（治六郁），而非降气剂，故不选D。"},
        {type:"multi", q:"关于暖肝煎与天台乌药散的说法正确的有：", options:["二者均可用于治疗疝气疼痛", "暖肝煎重在温补肝肾之本兼行气散寒", "天台乌药散纯以行气散寒治标为主", "二者组方及适应证完全相同，可互相替代使用"], answer:[0,1,2], explain:"D项错误，暖肝煎针对肝肾不足兼寒滞肝脉的虚证或虚实夹杂证，天台乌药散针对单纯寒凝气滞的实证，二者虚实有别，不可随意替代。"},
        {type:"blank", q:"定喘汤中麻黄与____相配，一散一收，增强平喘之效又防耗散太过。（请填二字）", answer:["白果"], explain:"定喘汤以麻黄宣肺平喘，白果收敛肺气，二药一散一收，既增强平喘之效，又能制约麻黄辛散耗气之弊。"},
        {type:"blank", q:"越鞠丸中苍术燥湿健脾，专门针对六郁中的____郁。（请填一字）", answer:["湿"], explain:"六郁为气、血、痰、火、湿、食六种郁滞，方中苍术燥湿健脾正对应治疗湿郁。"},
        {type:"case", q:"病例分析：患者咳喘痰多，胸膈满闷，腰膝酸软，肢体倦怠，下肢轻度浮肿，苔白腻。请分析证候并说明选方依据。", answer:"该患者证属上实下虚之咳喘证，病机为痰涎壅盛于上、肾阳亏虚于下，肺气失于肃降、肾不纳气，症见咳喘痰多、胸膈满闷（痰涎壅肺，肺失宣降，属上实）、腰膝酸软、肢体倦怠、下肢轻度浮肿（肾阳不足，肾不纳气、气化失常，水湿泛溢，属下虚），苔白腻为痰湿内蕴之征，全证呈现“上实下虚”的复合病机特点。治疗当以降气平喘、祛痰止咳兼顾温补下元为法，可选用苏子降气汤：方中紫苏子降气平喘、祛痰止咳为君；半夏、厚朴、前胡助君药降气化痰为臣；肉桂温补下元、纳气归肾，针对肾阳虚衰之本；当归养血润燥，且能治疗咳逆上气；生姜、大枣、炙甘草调和脾胃、益气扶正。全方标本兼顾，以治上实为主、兼顾下虚，切合本例上实下虚之咳喘的核心病机。", explain:""}
      ]
    },
    {title:"第十三章 理血剂", ready:true,
      lecture:[
        {type:"h4",text:"一、理血剂概述"},
        {type:"p",text:"凡以理血药为主组成，具有活血化瘀或止血作用，治疗血瘀或出血病证的方剂，统称理血剂。分为活血祛瘀剂（治瘀血内阻之各种病证）与止血剂（治各种原因所致的出血证）两类。使用注意：活血祛瘀剂易耗血动血，妇女月经过多、孕妇均应慎用或忌用；止血剂应辨明出血之寒热虚实，单纯止涩恐留瘀，需酌情配伍化瘀之品，以防“止血留瘀”之弊。"},
        {type:"h4",text:"二、活血祛瘀剂"},
        {type:"table", headers:["方剂","组成（节选）","功用","主治"],
          rows:[
            ["桃核承气汤","桃仁、大黄、桂枝、炙甘草、芒硝","逐瘀泻热","下焦蓄血证：少腹急结，小便自利，神志如狂，甚则烦躁谵语，至夜发热；经闭痛经属瘀热互结者"],
            ["血府逐瘀汤","桃仁、红花、当归、生地黄、川芎、赤芍、牛膝、桔梗、柴胡、枳壳、甘草","活血化瘀，行气止痛","胸中血瘀证：胸痛，头痛日久不愈，痛如针刺而有定处，或呃逆日久不止，或内热瞀闷，或心悸失眠急躁"],
            ["补阳还五汤","黄芪、当归尾、赤芍、地龙、川芎、桃仁、红花","补气，活血，通络","中风后气虚血瘀证：半身不遂，口眼㖞斜，语言謇涩，口角流涎，小便频数或遗尿不禁，舌淡苔白，脉缓"],
            ["复元活血汤","柴胡、天花粉、当归、红花、甘草、穿山甲、大黄、桃仁","活血祛瘀，疏肝通络","跌打损伤，瘀血阻滞证：胁肋瘀肿疼痛，痛不可忍"],
            ["生化汤","全当归、川芎、桃仁、干姜、炙甘草","养血祛瘀，温经止痛","产后血虚受寒，瘀血阻滞证：恶露不行，小腹冷痛"],
            ["失笑散","五灵脂、蒲黄","活血祛瘀，散结止痛","瘀血停滞证：心腹刺痛，或产后恶露不行，或月经不调、少腹急痛"]
          ]
        },
        {type:"ul", items:[
          "桃核承气汤：即调胃承气汤（大黄、芒硝、甘草）加桃仁、桂枝而成，桃仁活血破瘀为君，大黄下瘀泻热为臣，佐以桂枝通利血脉、助桃仁活血，芒硝软坚泄热，炙甘草缓和诸药峻烈之性。全方逐瘀与泻热并行，善治下焦蓄血证（瘀热互结膀胱），是治蓄血证及血热互结痛经经闭的常用方。",
          "血府逐瘀汤：为王清任活血化瘀名方，桃仁、红花活血化瘀为君，当归、川芎、赤芍养血活血为臣，配伍生地黄凉血养阴、牛膝引血下行，佐以柴胡疏肝解郁、枳壳、桔梗一升一降调畅气机（桔梗载药上行、牛膝引血下行，一升一降形成全身气血循环）。全方活血化瘀与行气并行，体现“气行则血行”之理，是治胸中血瘀证的代表方，临床应用极为广泛。",
          "补阳还五汤：重用黄芪大补脾胃元气为君（用量可达君药之外诸药总量数倍），意在气旺以促血行、瘀去络通，当归尾活血养血、川芎、赤芍、桃仁、红花活血化瘀，地龙通经活络，全方益气活血通络，体现“气虚血瘀”的病机认识及“大量补气、少量活血”的独特配伍比例，善治中风后气虚血瘀之半身不遂。",
          "复元活血汤：柴胡疏肝行气、引药入肝经为君，配伍穿山甲、大黄、桃仁、红花破血逐瘀，当归养血活血，天花粉清热润燥、消肿散结，全方活血祛瘀与疏肝通络并行，善治跌打损伤后瘀血阻滞胁肋之肿痛，体现“瘀去新生、气行血活”的治伤思路。",
          "生化汤：全当归养血活血为君，川芎助当归活血行气，桃仁活血祛瘀，佐以炮姜温经散寒止痛，炙甘草调和诸药，全方养血与祛瘀并行、佐以温经，善治产后血虚受寒兼瘀血阻滞之恶露不行、小腹冷痛，是妇科产后调理的常用方。",
          "失笑散：五灵脂、蒲黄二药等量相配，均入肝经血分，一为虫类祛瘀止痛、一为草木行血消瘀，相须为用，活血祛瘀、散结止痛之力颇著，善治瘀血内阻各种痛证，因药后瘀去痛止，患者不禁欣然而笑，故名“失笑散”。"
        ]},
        {type:"h4",text:"三、止血剂"},
        {type:"table", headers:["方剂","组成（节选）","功用","主治"],
          rows:[
            ["十灰散","大蓟、小蓟、荷叶、侧柏叶、茅根、茜草、山栀、大黄、牡丹皮、棕榈皮（各烧灰存性）","凉血止血","血热妄行之出血证：呕血，咯血，嗽血，衄血"],
            ["咳血方","青黛、瓜蒌仁、海粉、山栀子、诃子","清肝宁肺，凉血止血","肝火犯肺之咳血证：咳嗽痰稠带血，咯吐不爽，胸胁作痛，心烦易怒"],
            ["小蓟饮子","小蓟、生地黄、滑石、木通、蒲黄、藕节、淡竹叶、当归、栀子、炙甘草","凉血止血，利水通淋","下焦瘀热之血淋、尿血证：尿中带血，小便频数，赤涩热痛"],
            ["槐花散","槐花、侧柏叶、荆芥穗、枳壳","清肠止血，疏风行气","肠风脏毒下血证：便前出血，或便后出血，血色鲜红或暗红，苔黄脉数"],
            ["黄土汤","灶心黄土（伏龙肝）、白术、附子、甘草、地黄、阿胶、黄芩","温阳健脾，养血止血","脾阳不足，脾不统血证：大便下血，先便后血，以及吐血、衄血、崩漏等，血色暗淡，四肢不温，面色萎黄"]
          ]
        },
        {type:"ul", items:[
          "十灰散：以大蓟、小蓟、荷叶、侧柏叶、茅根、茜草等多味凉血止血药烧炭存性入药（炒炭可增强收涩止血之力），配伍山栀子、牡丹皮清热凉血、大黄导热下行，全方力专凉血止血，善治血热妄行之多种出血证（呕血咯血衄血），属止血剂中“急则治标”的代表方。",
          "咳血方：青黛、山栀子清肝泻火为君，配伍瓜蒌仁、海粉清热化痰润肺，诃子敛肺止咳，全方清肝宁肺、凉血止血并行，善治肝火犯肺、灼伤肺络之咳血证，尤宜情志不遂、肝郁化火诱发者。",
          "小蓟饮子：小蓟凉血止血、利尿通淋为君，配伍生地黄凉血养阴、蒲黄、藕节助止血，滑石、木通、淡竹叶清热利湿通淋，栀子清泄三焦之火，当归养血活血（防单纯止血留瘀），全方凉血止血与利水通淋并行，善治下焦瘀热蕴结之血淋、尿血。",
          "槐花散：槐花清肠凉血止血为君，配伍侧柏叶助槐花凉血止血，荆芥穗疏风理血（“治风先治血，血行风自灭”），枳壳行气宽肠，四药合用清肠止血兼疏风行气，善治肠风脏毒下血（多因风热或湿热蕴结肠道，损伤肠络所致的便血）。",
            "黄土汤：灶心黄土（伏龙肝）温中收涩止血为君，配伍白术、附子温阳健脾以治本（脾阳虚衰为出血之根本病机），佐以地黄、阿胶滋阴养血止血、黄芩清热止血（防姜附术燥热伤阴动血），全方寒热并用、标本兼顾，体现“热者寒之、寒者热之”与“阴中求阳、阳中求阴”的配伍智慧，善治脾阳不足、脾不统血之远血（先便后血）及各种虚寒性出血证。"
        ]}
      ],
      keypoints:[
        "理血剂分活血祛瘀剂与止血剂两类；活血祛瘀剂妇女经期、孕妇慎用，止血剂需防单纯止涩留瘀。",
        "桃核承气汤即调胃承气汤加桃仁、桂枝而成，治下焦蓄血证。",
        "血府逐瘀汤活血与行气并行，体现“气行则血行”，桔梗载药上行、牛膝引血下行，是治胸中血瘀的代表方。",
        "补阳还五汤重用黄芪，体现“气虚血瘀”病机及“大量补气、少量活血”的配伍比例，治中风后气虚血瘀。",
        "生化汤养血祛瘀兼温经，是妇科产后调理常用方；失笑散五灵脂配蒲黄相须为用，善治瘀血痛证。",
        "十灰散多味凉血止血药炒炭存性，力专止血，属“急则治标”代表方。",
        "咳血方治肝火犯肺之咳血；小蓟饮子凉血止血与利水通淋并行，治下焦瘀热之血淋尿血。",
        "槐花散体现“治风先治血，血行风自灭”思路，治肠风脏毒下血。",
        "黄土汤寒热并用、标本兼顾，温阳健脾与滋阴止血同施，治脾阳不足、脾不统血之远血。"
      ],
      quiz:[
        {type:"single", q:"即调胃承气汤加桃仁、桂枝而成，治下焦蓄血证的方剂是：", options:["血府逐瘀汤","桃核承气汤","补阳还五汤","生化汤"], answer:1, explain:"桃核承气汤在调胃承气汤（大黄、芒硝、甘草）基础上加桃仁、桂枝，逐瘀泻热，治下焦蓄血证。"},
        {type:"single", q:"体现“气行则血行”，以桔梗载药上行、牛膝引血下行的方剂是：", options:["血府逐瘀汤","失笑散","黄土汤","咳血方"], answer:0, explain:"血府逐瘀汤活血化瘀兼行气，桔梗与牛膝一升一降，调畅全身气血，是治胸中血瘀证的代表方。"},
        {type:"single", q:"重用黄芪、体现“气虚血瘀”病机的方剂是：", options:["复元活血汤","补阳还五汤","生化汤","十灰散"], answer:1, explain:"补阳还五汤重用黄芪大补元气，意在气旺促血行、瘀去络通，善治中风后气虚血瘀之半身不遂。"},
        {type:"single", q:"五灵脂与蒲黄相须为用，因药后瘀去痛止而得名的方剂是：", options:["失笑散","槐花散","小蓟饮子","黄土汤"], answer:0, explain:"失笑散由五灵脂、蒲黄等量组成，活血祛瘀止痛效佳，患者服后瘀去痛止不禁欣然而笑，故名“失笑散”。"},
        {type:"single", q:"寒热并用、标本兼顾，治脾阳不足、脾不统血之远血的方剂是：", options:["黄土汤","十灰散","咳血方","槐花散"], answer:0, explain:"黄土汤以灶心黄土、白术、附子温阳健脾治本，配伍地黄、阿胶、黄芩滋阴清热止血，寒热并用、标本兼顾。"},
        {type:"multi", q:"属于止血剂的方剂有：", options:["十灰散","咳血方","小蓟饮子","血府逐瘀汤"], answer:[0,1,2], explain:"D项血府逐瘀汤属活血祛瘀剂，而非止血剂，故不选D。"},
        {type:"multi", q:"关于理血剂使用注意，正确的有：", options:["活血祛瘀剂孕妇慎用或忌用","止血剂应防单纯止涩留瘀","可酌情配伍化瘀之品以防止血留瘀","妇女月经过多者可放心大量使用活血祛瘀剂而无需顾虑"], answer:[0,1,2], explain:"D项错误，妇女月经过多者应慎用或禁用活血祛瘀剂，以免加重出血。"},
        {type:"blank", q:"槐花散体现“治风先治血，____自灭”的用药思路。（请填二字）", answer:["血行"] , explain:"方中荆芥穗疏风理血，体现“治风先治血，血行风自灭”的经典治法思想，善治肠风下血。"},
        {type:"blank", q:"补阳还五汤中黄芪用量远大于其他活血药，体现“大量补气、少量____”的配伍特点。（请填二字）", answer:["活血"], explain:"方中重用黄芪补气，配伍相对小量的活血化瘀药，形成“大量补气、少量活血”的独特配伍比例，以气旺促血行。"},

    {title:"第十四章 治风剂", ready:true,

        {type:"h4",text:"一、治风剂概述"},

    {title:"第十五章 治燥剂", ready:true,
      lecture:[
        {type:"h4",text:"一、治燥剂概述"},
        {type:"p",text:"凡以轻宣辛散或甘凉滋润药物为主组成，治疗燥证的方剂，统称治燥剂。燥证有外燥（外感秋令燥邪）与内燥（脏腑津液亏耗）之分，外燥又有温燥、凉燥之别。据此，治燥剂分为轻宣外燥剂（治外感燥邪）与滋阴润燥剂（治脏腑津亏内燥）两类。使用注意：治燥应以“润”为原则，忌用辛香燥烈之品重伤津液；温燥、凉燥治法有别，温燥宜辛凉甘润，凉燥宜辛温甘润，须仔细鉴别。"},
        {type:"h4",text:"二、轻宣外燥剂"},
        {type:"table", headers:["方剂","组成（节选）","功用","主治"],
          rows:[
            ["杏苏散","苏叶、杏仁、半夏、茯苓、前胡、桔梗、枳壳、陈皮、甘草、生姜、大枣","轻宣凉燥，理肺化痰","外感凉燥证：恶寒无汗，头微痛，咳嗽痰稀，鼻塞咽干，苔白脉弦"],
            ["桑杏汤","桑叶、杏仁、沙参、浙贝母、豆豉、栀子皮、梨皮","轻宣温燥，润肺止咳","外感温燥证（轻证）：身热不甚，干咳无痰，或痰少而黏，咽干口渴，舌红苔薄白而燥，脉浮数"],
            ["清燥救肺汤","桑叶、石膏、人参、甘草、胡麻仁、阿胶、麦冬、杏仁、枇杷叶","清燥润肺，养阴益气","温燥伤肺，气阴两伤证：身热头痛，干咳无痰，气逆而喘，咽喉干燥，鼻燥，心烦口渴，舌干少苔，脉虚大而数"]
          ]
        },
        {type:"ul", items:[
          "杏苏散：苏叶轻宣凉燥、解表为君，杏仁降利肺气、润燥止咳为臣，配伍前胡助苏叶解表宣肺，半夏、茯苓、陈皮、桔梗、枳壳理气化痰，甘草、生姜、大枣调和脾胃。全方轻苦微温、宣肺化痰，善治外感凉燥（症似风寒表证而兼见津液不足之咳嗽痰稀咽干），凉燥证类似风寒轻证，故治法与辛温解表剂有相通之处，但须兼顾理肺化痰润燥。",
          "桑杏汤：桑叶、豆豉轻宣透表为君，杏仁降利肺气止咳为臣，配伍沙参、浙贝母润肺止咳化痰，栀子皮清泄肺热，梨皮润燥生津。全方药性轻清，善治外感温燥轻证（津伤不甚），是治温燥初起的常用方，与杏苏散一治凉燥、一治温燥，性味寒温迥异，临证须仔细区分。",

    {title:"第十六章 祛湿剂", ready:true,
      lecture:[
        {type:"h4",text:"一、祛湿剂概述"},
        {type:"p",text:"凡以祛湿药为主组成，具有化湿利水、通淋泄浊等作用，治疗水湿病证的方剂，统称祛湿剂。湿邪为患，因证候寒热虚实及病位不同，分为燥湿和胃、清热祛湿、利水渗湿、温化寒湿、祛风胜湿五类。使用注意：祛湿剂多辛温香燥或甘淡渗利，易伤阴津，阴虚津亏者慎用；应辨清湿邪之寒热属性及兼夹（夹表、夹食、夹暑等）。"},

            ["藿香正气散","藿香、紫苏、白芷、大腹皮、茯苓、白术、陈皮、半夏曲、厚朴、桔梗、甘草、生姜、大枣","解表化湿，理气和中","外感风寒，内伤湿滞证：霍乱吐泻，恶寒发热，头痛，胸膈满闷，脘腹疼痛，舌苔白腻"],
            ["茵陈蒿汤","茵陈、栀子、大黄","清热利湿退黄","湿热黄疸（阳黄）：一身面目俱黄，黄色鲜明，腹微满，口中渴，小便不利，苔黄腻，脉沉数或滑数有力"],
            ["八正散","车前子、瞿麦、萹蓄、滑石、栀子、炙甘草、木通、大黄","清热泻火，利水通淋","湿热淋证：尿频尿急，溺时涩痛，淋沥不畅，小腹急满，口燥咽干"],
            ["三仁汤","杏仁、白蔻仁、薏苡仁、半夏、厚朴、通草、滑石、竹叶","宣畅气机，清利湿热","湿温初起及暑温夹湿之邪在气分证：头痛恶寒，身重疼痛，午后身热，胸闷不饥，舌白不渴，脉弦细而濡"]
          ]
        },
        {type:"ul", items:[
          "平胃散：苍术燥湿运脾为君，厚朴行气化湿、消胀除满为臣，佐以陈皮理气和胃、燥湿化痰，甘草调和诸药，为治湿滞脾胃的基础方，后世众多化裁方（如不换金正气散、藿香正气散均含平胃散之意）皆由此方发展而来。",
          "藿香正气散：藿香解表化湿、和中止呕为君，配伍紫苏、白芷助藿香解表化湿，半夏曲、陈皮、厚朴、大腹皮理气化湿和中，白术、茯苓健脾渗湿，桔梗宣肺利膈，甘草、生姜、大枣调和脾胃。全方解表与化湿和中并行，善治外感风寒兼内伤湿滞之霍乱吐泻，是治夏月胃肠型感冒的常用效方。",
          "茵陈蒿汤：重用茵陈清热利湿退黄为君，栀子清热降火、通利三焦为臣，大黄泻热逐瘀、通利大便使湿热从大便而出为佐，三药相配、前后分消，使湿热之邪从二便排出，是治湿热黄疸（阳黄）的基础方，因其效佳，被誉为“退黄第一方”。",
          "八正散：车前子、瞿麦、萹蓄、木通、滑石清热利水通淋为主，栀子清泄三焦之火，大黄泻热通便，炙甘草调和诸药并缓急止痛，全方力专清热泻火、利水通淋，善治湿热淋证之尿频尿急、溺时涩痛。",
          "三仁汤：杏仁宣利上焦肺气，白蔻仁畅中焦脾胃之气，薏苡仁渗利下焦湿浊，三仁合用宣通上中下三焦气机（“治湿不利小便非其治也”，且“气化则湿亦化”），配伍半夏、厚朴助中焦化湿，滑石、通草、竹叶淡渗利湿清热，善治湿温初起、邪在气分而湿重于热之证，体现“宣上、畅中、渗下”三焦分消的治湿思路。"
        ]},

            ["真武汤","茯苓、芍药、白术、生姜、附子","温阳利水","脾肾阳虚水泛证：小便不利，四肢沉重疼痛，腹痛下利，或肢体浮肿，畏寒肢厥，舌淡胖苔白滑，脉沉细"],
            ["实脾散","厚朴、白术、木瓜、木香、草果仁、大腹子、附子、白茯苓、干姜、炙甘草、生姜、大枣","温阳健脾，行气利水","脾肾阳虚，水湿内停之阴水证：身半以下肿甚，手足不温，口中不渴，胸腹胀满，大便溏薄，舌苔白腻，脉沉迟"]

        {type:"ul", items:[

        {type:"case", q:"病例分析：患者小便不利，头痛微热，烦渴欲饮，饮水后即呕吐，舌苔白，脉浮。请分析证候并说明选方依据。", answer:"该患者证属膀胱气化不利之蓄水证，病机为外邪循经入腑，膀胱气化功能受阻，水蓄下焦而津液不能上承，症见小便不利（膀胱气化不利，水液停蓄）、头痛微热（表邪未解）、烦渴欲饮（气化不行，津液不能上承而口渴，但因内有蓄水，饮入之水不能正常输布）、水入即吐（即“水逆证”，饮水后因水湿内停、胃气上逆而随即呕吐）、舌苔白、脉浮（表证未罢之象），均为太阳表邪未解、膀胱蓄水的典型表现。治疗当以利水渗湿、温阳化气为法，兼以解表，可选用五苓散：方中泽泻利水渗湿为君；茯苓、猪苓助君药加强利水渗湿之力；白术健脾运湿；桂枝温阳化气以助膀胱气化功能恢复，且能兼解表邪。全方利水与化气并行、兼顾解表，切合本例膀胱气化不利兼表邪未解的核心病机，服后气化得复、水道通调，则小便自利、烦渴呕吐诸症自愈。", explain:""}

    {title:"第十七章 祛痰剂", ready:true,
      lecture:[
        {type:"h4",text:"一、祛痰剂概述"},
        {type:"p",text:"凡以祛痰药为主组成，具有消除痰饮作用，治疗各种痰病的方剂，统称祛痰剂。根据痰之寒热燥湿及兼夹不同，分为燥湿化痰、清热化痰、润燥化痰、温化寒痰、治风化痰五类。使用注意：“脾为生痰之源，肺为贮痰之器”，治痰当重视健脾以治本；痰证每兼见气滞，故化痰剂常配伍理气药，体现“治痰先治气，气顺则痰消”之理；燥痰忌燥、湿痰忌润，须辨证选方。"},
        {type:"table", headers:["方剂","组成（节选）","功用","主治"],
          rows:[
            ["二陈汤","半夏、橘红、茯苓、炙甘草","燥湿化痰，理气和中","湿痰证：咳嗽痰多色白易咯，胸膈痞闷，恶心呕吐，肢体困倦，或头眩心悸，舌苔白滑或腻，脉滑"],
            ["温胆汤","半夏、竹茹、枳实、陈皮、茯苓、炙甘草","理气化痰，和胃利胆","胆郁痰扰证：虚烦不宁，失眠多梦，或呕吐呃逆，或惊悸不宁，眩晕，苔白腻，脉弦滑"],
            ["清气化痰丸","瓜蒌仁、陈皮、黄芩、杏仁、枳实、茯苓、胆南星、制半夏","清热化痰，理气止咳","痰热咳嗽证：咳嗽气喘，咯痰黄稠，胸膈痞满，甚则气急呕恶，舌质红，苔黄腻，脉滑数"],
            ["小陷胸汤","黄连、半夏、瓜蒌实","清热化痰，宽胸散结","痰热互结证（小结胸病）：心下痞闷，按之则痛，或咳痰黄稠，舌苔黄腻，脉滑数"],
            ["贝母瓜蒌散","贝母、瓜蒌、天花粉、茯苓、橘红、桔梗","润肺清热，理气化痰","燥痰咳嗽证：咳嗽呛急，咯痰不爽，涩而难出，咽喉干燥哽痛，苔白而干"],
            ["三子养亲汤","紫苏子、白芥子、莱菔子","温肺化痰，降气消食","痰壅气滞食积证：咳嗽喘逆，痰多胸痞，食少难消，舌苔白腻，脉滑"],
            ["半夏白术天麻汤","半夏、天麻、茯苓、橘红、白术、甘草","化痰息风，健脾祛湿","风痰上扰证：眩晕头痛，胸闷呕恶，舌苔白腻，脉弦滑"]
          ]
        },
        {type:"ul", items:[
          "二陈汤：为祛痰剂之基础方，半夏燥湿化痰、降逆和胃为君，橘红理气燥湿化痰为臣（气顺则痰消），佐以茯苓健脾渗湿治其生痰之本，使以炙甘草调和诸药。本方治湿痰之基础方，后世众多化痰方剂皆由此化裁而来（如温胆汤、导痰汤等），体现“燥湿化痰、治痰先治气”的组方核心思路。",
          "温胆汤：即二陈汤去乌梅、生姜（原方有姜），加竹茹、枳实而成，半夏、陈皮、茯苓、甘草燥湿化痰健脾，竹茹清热化痰、除烦止呕，枳实降气化痰消痞，全方温凉并用（以化痰理气为主，兼清胆热），善治胆郁痰扰之虚烦不宁、惊悸不眠，是治痰热扰心、心胆失和诸证的常用方，命名“温胆”实为“凉而不寒、温而不燥”的平和之意。",
          "清气化痰丸：瓜蒌仁、胆南星清热化痰为君，配伍黄芩助清痰热，陈皮、杏仁、枳实理气宽胸、降气化痰，茯苓、半夏健脾燥湿化痰以治本，全方清热化痰与理气并行，善治痰热壅肺之咳嗽气喘、痰黄稠。",
          "小陷胸汤：瓜蒌实清热涤痰、宽胸散结为君，黄连清热泻火为臣，半夏化痰散结、和胃降逆为佐，三药相配清热化痰散结之力集中，善治痰热互结心下之小结胸病（较大陷胸汤证轻，无水饮结聚，仅痰热互结）。",
          "贝母瓜蒌散：贝母、瓜蒌润肺化痰止咳为君，配伍天花粉助润燥生津，橘红、茯苓理气健脾化痰，桔梗宣肺祛痰利咽，全方润燥与化痰并行，善治燥痰咳嗽（痰少而黏、难于咯出，咽喉干燥），与二陈汤治湿痰迥异，燥痰忌辛燥、宜润燥化痰。",
          "三子养亲汤：紫苏子降气化痰平喘为君，白芥子温肺化痰、利气散结为臣，莱菔子消食导滞、降气化痰为佐，三药皆种子入药、药性平和，全方降气化痰与消食并行，善治老年人痰壅气滞兼食积之咳喘痰多，因用药平和适宜奉养老人而得名“养亲”。",
          "半夏白术天麻汤：半夏燥湿化痰、天麻息风止眩为君（“无痰不作眩”“治风先治痰”，二药相配化痰息风止眩效佳），配伍白术、茯苓、橘红健脾燥湿化痰以治生痰之本，甘草调和诸药，全方化痰息风与健脾祛湿并行，善治风痰上扰之眩晕头痛，是治痰饮眩晕的经典代表方。"
        ]}

    {title:"第十九章 驱虫剂", ready:true,

        {type:"case", q:"病例分析：患者腹痛时发时止，得食而呕，甚则吐出蛔虫，手足厥冷，烦闷不安。请分析证候并说明选方依据。", answer:"该患者证属脏寒蛔厥证，病机为肠道虚寒、蛔虫内扰，蛔虫因肠道寒冷而不能安伏，上窜入膈，扰动气机，症见腹痛时发时止（蛔虫窜动，气机逆乱）、得食而呕、甚则吐出蛔虫（蛔虫闻食臭而上扰，随呕吐排出）、手足厥冷（蛔厥导致阳气不能通达四末）、烦闷不安（蛔虫内扰，气机不畅），均为脏寒蛔虫内扰、蛔厥的典型表现。治疗当以温脏安蛔为法，可选用乌梅丸：方中重用乌梅味酸为君，取“蛔得酸则静”之意以安蛔止痛；配伍细辛、干姜、附子、蜀椒、桂枝等辛热之品温脏祛寒，取“蛔得辛则伏”之意，使蛔虫伏而不动；黄连、黄柏苦寒，取“蛔得苦则下”之意，导蛔虫下行；佐以人参、当归补气养血，扶助正气。全方酸辛苦并用、寒热并调，切合本例脏寒蛔虫内扰、气机逆乱的核心病机，是治蛔厥证的经典有效方剂。", explain:""}

    {title:"第二十一章 痈疡剂", ready:true,
      lecture:[
        {type:"h4",text:"一、痈疡剂概述"},
        {type:"p",text:"凡以清热解毒、消肿排脓、活血化瘀等药物为主组成，治疗痈疽疮疡病证的方剂，统称痈疡剂。中医外科将痈疡的治疗大法概括为“消、托、补”三法：初起未成脓者以消法为主（清热解毒、活血消肿以促使肿疡消散），已成脓未溃者以托法为主（补益气血、托毒外出以助脓成早溃），溃后气血亏虚者以补法为主（补益气血以助新肌生长、疮口早日愈合）。使用注意：应根据痈疡所处阶段（初起、成脓、溃后）辨证选方，不可一味清热解毒而忽视扶正托毒。"},
        {type:"table", headers:["方剂","组成（节选）","功用","主治"],

            ["四妙勇安汤","金银花、玄参、当归、甘草","清热解毒，活血止痛","脱疽：患肢红肿热痛，溃烂，甚则趾节脱落，舌红脉数"],
            ["大黄牡丹汤","大黄、牡丹皮、桃仁、冬瓜仁、芒硝","泻热破瘀，散结消肿","肠痈初起，湿热瘀滞证：右少腹疼痛拒按，甚则局部肿痞，或右足屈而不伸，伸则疼痛加剧，小便自调，或时时发热，自汗恶寒，舌苔薄腻或黄，脉滑数"],

        {type:"ul", items:[
          "阳和汤：熟地黄、鹿角胶温补精血为君，肉桂、姜炭温阳散寒通滞为臣，佐以白芥子祛皮里膜外之痰、麻黄辛温达表以宣通阳气（少量麻黄配大队温补药，散中有补、补中兼通，是“阳和”通滞的关键），生甘草解毒调药。全方温阳补血与散寒通滞并行，善治阴疽（阳虚寒凝、气血凝滞肌肉筋骨所致的漫肿无头、皮色不变之证），是治阴证疮疡的代表方，与治阳证疮疡的仙方活命饮寒热虚实迥异，须辨明阴阳属性而选方。",
          "五味消毒饮：金银花清热解毒为君，配伍野菊花、蒲公英、紫花地丁、紫背天葵子五味清热解毒药同用（“五味消毒”即指五种清热解毒之品合用），力专清热解毒、消散疔疮，善治疔疮初起、红肿热痛之阳证实热证。",

          "大黄牡丹汤：大黄泻热破瘀为君，牡丹皮凉血散瘀助大黄，佐以桃仁活血祛瘀、冬瓜仁清肠排脓利湿，芒硝软坚散结助大黄泻下，全方泻热与逐瘀并行，善治肠痈初起属湿热瘀滞者（类似急性阑尾炎初期），是外科内治法治肠痈的代表方。",
          "苇茎汤：苇茎清肺泄热为君，薏苡仁清肺排脓、利湿为臣，佐以桃仁活血逐瘀、冬瓜仁清热化痰排脓，全方清肺化痰与逐瘀排脓并行，善治肺痈（肺部脓肿类疾病）痰热瘀结之咳吐脓血腥臭痰，是治肺痈的经典代表方。"

        {type:"single", q:"以五种清热解毒药合用，善治疔疮初起阳证实热证的方剂是：", options:["五味消毒饮","四妙勇安汤","苇茎汤","大黄牡丹汤"], answer:0, explain:"五味消毒饮由金银花、野菊花、蒲公英、紫花地丁、紫背天葵子五味清热解毒药组成，力专清热解毒消疔。"},

        {type:"case", q:"病例分析：患者右少腹疼痛拒按，右足屈而不伸，伸则疼痛加剧，时时发热，自汗恶寒，舌苔黄腻，脉滑数。请分析证候并说明选方依据。", answer:"该患者证属肠痈初起、湿热瘀滞证，病机为湿热之邪蕴结肠道，气血壅滞、瘀热互结，症见右少腹疼痛拒按（湿热瘀滞局部，气血不通则痛）、右足屈而不伸、伸则痛剧（腹痛牵及下肢，患者被迫屈曲以减轻疼痛，是肠痈的特征性表现）、时时发热、自汗恶寔（湿热蕴结、营卫失和）、舌苔黄腻、脉滑数（湿热内蕴之象），均为肠痈初起、湿热瘀滞的典型表现，与现代医学急性阑尾炎初期的临床表现相似。治疗当以泻热破瘀、散结消肿为法，可选用大黄牡丹汤：方中大黄泻热破瘀、荡涤肠腑湿热瘀滞为君；牡丹皮凉血散瘀，助大黄清泄瘀热为臣；桃仁活血祛瘀，冬瓜仁清肠排脓利湿，均为佐药；芒硝软坚散结，助大黄泻下通腑。全方泻热与逐瘀并行，使肠道湿热瘀滞之邪得以荡涤消散，切合本例肠痈初起、湿热瘀滞的核心病机，为外科内治法治疗肠痈的经典有效方剂。", explain:""}

      lecture:[
        {type:"h4",text:"一、中医诊断学的定义与主要内容"},
        {type:"p",text:"中医诊断学是根据中医学的理论体系，研究诊察病情、判断病种、辨别证候的基础理论、基本知识和基本技能的一门学科，是中医基础理论与临床各科之间的桥梁课程。其主要内容包括四诊（望、闻、问、切）、八纲辨证、病性辨证、脏腑辨证及六经、卫气营血、三焦等辨证方法，以及诊断思维与病历书写规范。"},
        {type:"h4",text:"二、中医诊断的基本原理"},
        {type:"table", headers:["基本原理","内涵"],

            ["见微知著","机体局部的细微变化，可反映整体的生理病理信息，如舌诊、脉诊、面诊皆体现此理"],
            ["以常达变","掌握正常的生理常度（常色、常脉、常态等），才能诊察出异常的病理变化（变色、病脉、病态等），以常衡变而识病"]
          ]
        },
        {type:"h4",text:"三、中医诊断的基本原则"},
        {type:"ul", items:[
          "整体审察：诊察疾病应将局部病变与全身状况相结合，将患者与其所处的自然环境、社会环境相结合，全面收集病情资料，不可孤立看待某一症状体征。",
          "诊法合参：望、闻、问、切四诊各有其独特作用，不能相互取代，临床应四诊并用、综合分析，即“四诊合参”，方能全面准确地获取病情资料。",
          "病证结合：辨病与辨证相结合，既要明确疾病的诊断（病名），又要辨清当前阶段的证候（证型），二者相辅相成，方能全面把握疾病的本质与发展规律。"

        {type:"single", q:"我国现存最早的脉学专著是：", options:["《黄帝内经》","《脉经》","《温热论》","《温病条辨》"], answer:1, explain:"西晋王叔和所著《脉经》是我国现存最早的脉学专著，确立了寸口诊法作为脉诊的主要方法。"},
        {type:"single", q:"望、闻、问、切四诊综合运用、不可偏废，体现的诊断原则是：", options:["整体审察","诊法合参","病证结合","司外揣内"], answer:1, explain:"诊法合参（四诊合参）强调望闻问切四诊各有独特作用，须综合运用才能全面准确地获取病情资料。"},
        {type:"multi", q:"中医诊断的基本原理包括：", options:["司外揣内","见微知著","以常达变","辨证论治"], answer:[0,1,2], explain:"D项辨证论治属于中医临床诊疗的基本特点范畴，而非中医诊断学的基本原理；诊断基本原理为司外揣内、见微知著、以常达变。"},
        {type:"blank", q:"中医诊断学的基本原则包括整体审察、诊法合参、____结合。（请填二字）", answer:["病证"], explain:"病证结合强调辨病与辨证相结合，全面把握疾病的诊断与当前阶段的证候特点。"},
        {type:"case", q:"简述“见微知著”这一诊断原理在中医舌诊、脉诊中的具体体现。", answer:"“见微知著”是指机体某些局部的细微变化，能够反映全身整体的生理病理信息，这一原理在中医舌诊与脉诊中体现得尤为突出。舌为心之苗，又通过经络与五脏六腑密切相连，舌面不同部位分候不同脏腑（如舌尖候心肺、舌中候脾胃、舌根候肾、舌边候肝胆），通过观察舌质、舌苔的细微变化（如舌色、舌形、苔色、苔质），即可窥测全身脏腑气血津液的盛衰及病邪之寒热虚实，这正是“舌为脏腑之外候”“见微知著”的具体运用。脉诊亦然，寸口部位虽仅方寸之地，却是手太阴肺经原穴所在，为“脉之大会”，且肺朝百脉、脾胃为气血生化之源，寸口一脉可候全身脏腑气血的盛衰变化，通过寸、关、尺三部分候不同脏腑（左手寸关尺分候心肝肾，右手寸关尺分候肺脾肾），以微小的脉动变化推知全身整体的病理状态。二者均是中医“见微知著”诊断思想在具体诊法中的生动体现，也是中医整体观念在诊断学中的重要落实。", explain:""}
      ]
    },
    {title:"第一章 望诊", ready:true,
      lecture:[
        {type:"h4",text:"一、望诊概述"},
        {type:"p",text:"望诊是医生运用视觉，对患者全身、局部及排出物等进行有目的观察，以了解病情、诊察疾病的方法，居四诊之首。望诊内容主要包括：望神、望色、望形态、望头面五官、望皮肤、望排出物（痰、涕、呕吐物、二便等）、望小儿指纹等。"},
        {type:"h4",text:"二、望神"},
        {type:"p",text:"神是人体生命活动的总体现，望神即通过观察患者的精神意识、面目表情、语言呼吸、肢体动作等，判断脏腑精气盛衰及病情轻重预后。"},
        {type:"table", headers:["神志状态","主要表现","临床意义"],
          rows:[
            ["得神（有神）","神志清楚，目光明亮，面色荣润，语言清晰，反应灵敏，动作自如","精气充盛，脏腑功能正常，病轻预后良好"],
            ["少神（神气不足）","精神不振，两目乏神，面色少华，肢体倦怠，动作迟缓","正气不足，多见于虚证或疾病恢复期"],
            ["失神（无神）","精神萎靡，目光晦暗，面色晦暗无华，反应迟钝，语言错乱或神昏","精气大伤，脏腑功能衰败，病重预后不良"],
            ["假神","久病重病之人，突然出现精神暂时好转的假象（如突然目光转亮、想进食、言语清亮）","脏腑精气衰竭殆尽，阴阳即将离决的危候，古称“回光返照”“残灯复明”"],
            ["神乱","焦虑恐惧，狂躁不安，淡漠痴呆，猝然昏仆等神志失常表现","多见于癫、狂、痫及脏躁等病证，脏腑功能失调、神机受扰"]
          ]
        },
        {type:"h4",text:"三、望色"},
        {type:"p",text:"望色即观察患者面部皮肤的色泽变化，以判断脏腑气血的盛衰及病邪之性质。中医将面部颜色分为青、赤、黄、白、黑五种，称为“五色诊”，各色分别对应不同脏腑及病理性质。"},
        {type:"table", headers:["面色","主病","机理简述"],
          rows:[
            ["青色","主寒证、痛证、瘀血证、惊风证","经脉阻滞，气血运行不畅，或阳气虚衰、寒凝血瘀所致"],
            ["赤色","主热证，亦见于戴阳证（真寒假热之虚阳浮越）","血得热则行，热盛使脉络扩张、气血充盈于面所致；戴阳证则为虚阳上越所致"],
            ["黄色","主脾虚证、湿证","脾失健运，气血生化不足，或湿邪内蕴、脾胃升降失常，气血不能上荣于面"],
            ["白色","主虚证（气虚、血虚、阳虚）、寒证、失血证","气血不能上荣于面，或阳气虚衰不能温煦、推动血行所致"],
            ["黑色","主肾虚证、寒证、水饮证、瘀血证","肾阳虚衰，水寒不化，血失温养而瘀滞，或肾精久耗、颜面失荣所致"]
          ]
        },
        {type:"p",text:"望色还需分辨“善色”与“恶色”：凡五色光明润泽者为善色，提示脏腑精气未衰，病情较轻，预后较好；凡五色晦暗枯槁者为恶色，提示脏腑精气已衰，病情较重，预后较差。"},
        {type:"h4",text:"四、望形态"},
        {type:"ul", items:[
          "望形体：观察患者体形之强弱胖瘦。形体强壮者，多气血充盛、抗病力强；形体瘦弱者，多气血不足、抗病力弱；形体肥胖者常兼痰湿；形体消瘦者常兼阴虚内热。",
          "望姿态：观察患者的动静姿态、体位。如坐卧喜静、蜷卧向里者多属阴证、寒证、虚证；坐卧喜动、烦躁不安、仰卧伸展者多属阳证、热证、实证；四肢抽搐、震颤者多属肝风内动；半身不遂者多属中风。"
        ]},
        {type:"h4",text:"五、望头面五官"},
        {type:"ul", items:[
          "望头发：发黄干枯、稀疏易脱多属精血不足；小儿发结如穗、枯黄不泽多属疳积。",
          "望目：目为肝之窍，又为“心之使”，五脏六腑之精气皆上注于目。目赤肿痛多属肝火上炎或风热外袭；目眦淡白多属血虚；瞳孔散大多属肾精耗竭之危候（或药物中毒），瞳孔缩小多属肝胆火炽或中毒。",
          "望鼻：鼻为肺之窍。鼻塞流清涕多属外感风寒；鼻塞流浊涕多属外感风热或肺热；鼻翼煽动多属肺热壅盛之喘证重证。",
          "望耳：耳为肾之窍，又为“宗脉之所聚”。耳廓瘦薄干枯多属肾精亏虚；耳内流脓（脓耳）多属肝胆湿热或肾阴亏虚、虚火上炎。",
          "望口唇：口唇淡白多属血虚；口唇青紫多属血瘀或寒凝气血不通；口角流涎多见于小儿脾虚湿盛或中风患者。",
          "望齿龈：牙齿干燥如枯骨多属肾阴枯竭、精不上荣；牙龈红肿疼痛多属胃火上炎；牙龈出血多属胃热伤络或脾不统血。"
        ]}
      ],
      keypoints:[
        "望诊居四诊之首，主要内容包括望神、望色、望形态、望头面五官、望皮肤、望排出物、望小儿指纹等。",
        "望神分得神、少神、失神、假神、神乱五种状态；假神是脏腑精气衰竭殆尽、阴阳离决的危候，古称“回光返照”。",
        "五色诊：青主寒证痛证瘀血证惊风证，赤主热证（戴阳证除外），黄主脾虚证湿证，白主虚证寒证失血证，黑主肾虚证寒证水饮证瘀血证。",
        "面色分善色（光明润泽，预后较好）与恶色（晦暗枯槁，预后较差）。",
        "目为肝之窍，又为心之使，瞳孔散大多属肾精耗竭之危候。",
        "鼻为肺之窍，鼻翼煽动多属肺热壅盛之喘证重证。",
        "耳为肾之窍，又为宗脉之所聚。"
      ],
      quiz:[
        {type:"single", q:"久病重病之人突然出现精神暂时好转的假象，古称“回光返照”，属于：", options:["得神","少神","失神","假神"], answer:3, explain:"假神是脏腑精气衰竭殆尽、阴阳即将离决前出现的短暂虚假好转征象，是病情危重、预后不良的信号。"},
        {type:"single", q:"面色青主：", options:["热证","寒证、痛证、瘀血证、惊风证","脾虚证、湿证","肾虚证"], answer:1, explain:"青色主寒证、痛证、瘀血证、惊风证，多因经脉阻滞、气血运行不畅或阳气虚衰寒凝血瘀所致。"},
        {type:"single", q:"瞳孔散大，多提示：", options:["肝火上炎","血虚","肾精耗竭之危候","脾虚湿盛"], answer:2, explain:"瞳孔散大多属肾精耗竭之危候（亦见于药物中毒），是病情危重的表现，临床应高度重视。"},
        {type:"single", q:"鼻翼煽动多属：", options:["外感风寒","外感风热","肺热壅盛之喘证重证","肾虚水泛"], answer:2, explain:"鼻翼煽动是肺热壅盛、呼吸急促费力的表现，多见于喘证重症，临床意义重大，须密切关注。"},
        {type:"multi", q:"望神的内容包括判断以下哪些状态：", options:["得神","少神","失神","切脉"], answer:[0,1,2], explain:"D项切脉属于脉诊范畴，而非望神的内容；望神主要判断得神、少神、失神、假神、神乱等状态。"},
        {type:"multi", q:"关于面色的善色与恶色，正确的说法是：", options:["善色为光明润泽，提示脏腑精气未衰、预后较好","恶色为晦暗枯槁，提示脏腑精气已衰、预后较差","面色鲜明有光泽者属善色","面色的善恶与预后判断无关"], answer:[0,1,2], explain:"D项错误，面色的善恶是判断病情轻重及预后的重要依据，与预后判断密切相关。"},
        {type:"blank", q:"面色赤主热证，但真寒假热之虚阳浮越所致的面赤称为____证。（请填二字）", answer:["戴阳"], explain:"戴阳证是指下焦真寒极重、虚阳被格拒于上而出现的面赤，属真寒假热之证，与实热证的面赤病机截然不同，须仔细鉴别。"},
        {type:"blank", q:"耳为肾之窍，又为“____之所聚”。（请填二字）", answer:["宗脉"], explain:"耳不仅为肾之窍，还是全身经脉汇聚之处，故称“宗脉之所聚”，望耳可反映肾及全身经脉气血的状况。"},
        {type:"case", q:"病例分析：患者久病卧床，本已精神萎靡、目光晦暗，突然出现精神转佳、目光转亮、欲进食的现象。请分析这一现象的临床意义。", answer:"该患者久病卧床，此前表现为精神萎靡、目光晦暗，属于中医望神中的“失神”状态，提示脏腑精气已经严重耗损、功能趋于衰败。此时突然出现精神转佳、目光转亮、欲进食等看似病情好转的表现，实际上并非真正的病情缓解，而属于望神中的“假神”现象，中医称之为“回光返照”或“残灯复明”。其病理机制是：久病之人脏腑精气已极度衰竭，阴阳行将离决，在阴阳离决的最后关头，体内残存的阳气突然浮越于外，呈现出一种“假性好转”的虚假征象，如同油灯将尽时突然爆发出的一闪亮光。这一现象是病情极其危重、预后凶险的重要警示信号，绝不可误判为病情好转而掉以轻心，临床上一旦观察到假神表现，应高度警惕，并及时告知患者家属病情的危重性质，做好相应的救治与心理准备。这也充分体现了中医望神诊法“见微知著”、通过外在细微征象推断内在脏腑精气存亡状态的诊断价值。", explain:""}
      ]
    },
    {title:"第二章 望舌", ready:true,
      lecture:[
        {type:"h4",text:"一、望舌概述"},
        {type:"p",text:"望舌又称舌诊，是通过观察舌质（舌体）与舌苔的变化以诊察疾病的方法，是中医望诊的重要组成部分，也是中医诊断特色鲜明、临床价值较高的诊法之一。舌通过经络与五脏六腑密切联系，舌面不同部位分候不同脏腑：舌尖候心肺，舌中候脾胃，舌根候肾，舌两边候肝胆，为临床辨证提供重要依据。正常舌象为“淡红舌、薄白苔”，简称“舌淡红、苔薄白”。"},
        {type:"h4",text:"二、望舌质"},
        {type:"table", headers:["舌质变化","主要表现","临床意义"],
          rows:[
            ["淡白舌","舌色较正常浅淡，甚则全无血色","主气血两虚、阳虚证"],
            ["红舌","舌色较正常红，甚则鲜红","主热证（实热或虚热）"],
            ["绛舌","舌色较红舌更深，呈深红色","主热入营血或阴虚火旺重证"],
            ["青紫舌","舌色青紫或紫暗，或有瘀点瘀斑","主血瘀证，亦可见于寒凝或热盛"],
            ["胖大舌","舌体较正常肥大，甚至伸出口外","主水湿痰饮内停，或脾肾阳虚"],
            ["瘦薄舌","舌体较正常瘦小而薄","主气血两虚或阴虚火旺"],
            ["齿痕舌","舌体边缘有牙齿压迫的痕迹","多与胖大舌并见，主脾虚湿盛"],
            ["裂纹舌","舌面出现深浅不一的裂沟","主阴血亏虚、津液耗损，或脾虚湿浸"]
          ]
        },
        {type:"h4",text:"三、望舌苔"},
        {type:"p",text:"舌苔的观察包括苔色与苔质两方面。苔色主要有白、黄、灰黑三种，分别对应不同的病邪性质；苔质则从厚薄、润燥、腐腻、剥落等方面判断病邪深浅及津液盛衰。"},
        {type:"table", headers:["苔色/苔质","主要表现","临床意义"],
          rows:[
            ["白苔","苔色发白","主表证、寒证，亦可见于正常人（薄白苔）"],
            ["黄苔","苔色发黄，深浅不一（淡黄、深黄、焦黄）","主里证、热证，黄色越深表示热邪越重"],
            ["灰黑苔","苔色呈灰或黑色","主里证，或为里热炽盛，或为寒湿内盛，需结合润燥辨其寒热属性"],
            ["厚苔","苔质较厚，不能透过苔隙见到舌质","主邪盛入里，或食积、痰湿内停"],
            ["薄苔","苔质较薄，能透过苔隙隐约见到舌质","主外感初起，病邪在表，或病情轻浅"],
            ["润苔","舌面润泽有津","主津液未伤"],
            ["燥苔","舌面干燥少津，甚则舌苔干裂","主津液已伤，热盛伤津或阴液亏虚"],
            ["腻苔","苔质颗粒细腻致密，紧贴舌面，刮之不易脱落","主湿浊、痰饮、食积内停"],
            ["剥落苔","舌苔部分或全部剥脱，剥脱处光滑无苔","主胃气匮乏、胃阴枯竭或气血两虚"]
          ]
        },
        {type:"h4",text:"四、舌诊的临床意义与注意事项"},
        {type:"ul", items:[
          "舌诊综合运用：舌质与舌苔须综合分析，如“舌红苔黄”多主实热证，“舌淡苔白”多主虚寒证，“舌红少苔或无苔”多主阴虚火旺，须四诊合参、全面辨证。",
          "望舌辨别病位深浅：舌苔的厚薄可反映病邪的深浅轻重，苔薄多为病邪在表或病情初起，苔厚多为病邪入里或病情较重。",
          "望舌注意事项：望舌宜在充足的自然光线下进行，光线不足或有色光线会影响舌色判断；伸舌姿势要自然，不宜过分用力伸舌，以免影响舌体气血运行而改变舌色；进食或饮水后（尤其食用某些染色食物后）应间隔一定时间再行望舌，以免染苔（假苔）影响判断。"
        ]}
      ],
      keypoints:[
        "正常舌象为“淡红舌、薄白苔”，简称舌淡红苔薄白。",
        "舌面分候脏腑：舌尖候心肺，舌中候脾胃，舌根候肾，舌两边候肝胆。",

      quiz:[
        {type:"single", q:"正常舌象是：", options:["红舌黄苔","淡红舌薄白苔","绛舌燥苔","胖大舌腻苔"], answer:1, explain:"正常舌象为舌色淡红、舌苔薄白，简称“淡红舌、薄白苔”，是脏腑功能正常、气血津液充盛的表现。"},

        {type:"single", q:"舌色较红舌更深，呈深红色，主热入营血或阴虚火旺重证的是：", options:["淡白舌","红舌","绛舌","青紫舌"], answer:2, explain:"绛舌色较红舌更深，多主热入营血分或阴虚火旺的重证，病情较红舌所主证候更为深重。"},
        {type:"single", q:"苔质颗粒细腻致密，紧贴舌面刮之不易脱落，主湿浊痰饮食积的是：", options:["厚苔","腻苔","剥落苔","燥苔"], answer:1, explain:"腻苔颗粒细腻致密、紧贴舌面，主湿浊、痰饮、食积内停等病理产物阻滞。"},
        {type:"single", q:"舌苔部分或全部剥脱，剥脱处光滑无苔，主：", options:["表证初起","湿浊内停","胃气匮乏、胃阴枯竭","实热证"], answer:2, explain:"剥落苔提示胃气匮乏或胃阴枯竭，也可见于气血两虚，是胃气胃阴严重受损的表现。"},
        {type:"multi", q:"望舌应注意的事项包括：", options:["宜在充足自然光线下进行","伸舌姿势应自然，不宜过分用力","进食或饮水后应间隔一定时间再望舌以防染苔","可在任何光线条件下望舌而不影响判断结果"], answer:[0,1,2], explain:"D项错误，光线条件（尤其有色光线或光线不足）会明显影响舌色的准确判断，望舌应尽量选择充足的自然光线。"},
        {type:"multi", q:"关于苔色苔质的说法，正确的有：", options:["白苔多主表证寒证","黄苔多主里证热证，颜色越深热邪越重","厚苔多主邪盛入里或食积痰湿","舌苔的厚薄与病邪深浅无关"], answer:[0,1,2], explain:"D项错误，舌苔厚薄恰恰是判断病邪深浅轻重的重要指标之一，苔薄多为病邪在表或病情初起，苔厚多为病邪入里或病情较重。"},
        {type:"blank", q:"舌苔厚薄可反映病邪的____深浅，苔薄多为病邪在表，苔厚多为病邪入里。（请填一字）", answer:["位"], explain:"舌苔的厚薄变化能够反映邪气所在病位的深浅层次，是判断疾病发展阶段的重要参考。"},
        {type:"blank", q:"齿痕舌多与____舌并见，主脾虚湿盛。（请填二字）", answer:["胖大"], explain:"齿痕舌是舌体边缘受牙齿压迫留下的痕迹，多因舌体胖大受牙齿挤压所致，故常与胖大舌同时出现，共同提示脾虚湿盛的病机。"},
        {type:"case", q:"病例分析：患者舌质淡胖，边有齿痕，舌苔白腻，脘腹胀满，肢体困重，大便溏薄。请分析舌象所反映的病机并说明其临床意义。", answer:"该患者舌质淡胖、边有齿痕、舌苔白腻，结合脘腹胀满、肢体困重、大便溏薄等全身症状，舌象所反映的病机为脾虚湿盛证。具体分析：舌质淡，提示气血不足、阳气不振，气血不能充分濡养舌体；舌体胖大，是水湿痰饮内停、或脾肾阳虚不能运化水湿、水湿上泛于舌所致；舌边齿痕，多与胖大舌并见，是舌体因水湿停聚而胖大，受牙齿挤压形成压痕，进一步印证脾虚湿盛的病机；舌苔白腻，白主寒证或病邪未化热，腻苔主湿浊内停，白腻苔合参提示体内寒湿或水湿痰饮壅盛。综合舌象与全身症状（脘腹胀满为湿阻气机，肢体困重为湿性重浊困阻肢体，大便溏薄为脾虚运化失职、水湿下注肠道），可确诊为脾虚湿盛证，其病机核心是脾气亏虚、运化失职，导致水湿内停，充分体现了舌诊“见微知著”，通过舌象细微变化即可准确反映整体脏腑气血水湿状态的诊断价值，为临床辨证提供了直观而重要的依据。", explain:""}
      ]
    },

        {type:"single", q:"神识不清、语言重复、声音低弱断续，多属正气大伤危重虚证的是：", options:["谵语","郑声","狂言","呓语"], answer:1, explain:"郑声是神识不清且语言重复、声低断续的表现，提示心神散乱、正气衰竭，是危重虚证的信号。"},
        {type:"single", q:"咳声重浊、痰多易咯，多提示：", options:["肺阴虚燥咳","实证痰湿阻肺","气虚咳嗽","肾不纳气"], answer:1, explain:"咳声重浊有力且痰多易咯，多属邪实内盛、痰湿阻肺之实证。"},

        {type:"case", q:"病例分析：患者昏迷状态下语言重复，声音低弱断续，时断时续，脉微欲绝。请分析这一表现的临床意义。", answer:"该患者昏迷状态下出现语言重复、声音低弱断续的表现，属于中医闻诊中的“郑声”。郑声的病机是心气大伤、精神散乱、心神失养，与谵语（实证、热扰心神）的病机截然不同——郑声属于虚证范畴，是正气极度虚衰、心神即将涣散的表现。结合患者脉微欲绝（阳气衰微、气血将脱之象），二者相互印证，共同提示患者正处于阴阳离决、正气欲脱的危重阶段。这一闻诊表现与望诊中的“失神”“假神”所反映的病机本质相似，均指向脏腑精气严重衰败的危重预后。临床上一旦发现郑声与脉微欲绝并见，应高度警惕病情危重，及时采取回阳固脱等急救措施，并向患者家属交代病情的严重性，这也体现了中医闻诊在判断疾病预后、协助临床急救决策方面的重要价值。", explain:""}

    {title:"第四章 问诊", ready:true,
      lecture:[
        {type:"h4",text:"一、问诊概述"},
        {type:"p",text:"问诊是医生通过询问患者或陪诊者，了解疾病的发生、发展、治疗经过、现在症状及其他与疾病相关情况的诊察方法，是四诊中获取病情资料最直接、最重要的手段之一。明代医家张景岳总结历代问诊经验，编成《十问歌》：“一问寒热二问汗，三问头身四问便，五问饮食六胸腹，七聋八渴俱当辨，九问旧病十问因，再兼服药参机变，妇女尤必问经期，迟速闭崩皆可见”，后世又补充“再添片语告儿科，天花麻疹全占验”，成为问诊的经典纲领。"},
        {type:"h4",text:"二、问寒热"},

            ["但寒不热","但觉怕冷，不发热","多属里寒证"],
            ["但热不寒","但觉发热，不怕冷（或反恶热）","多属里热证，又分壮热、潮热、微热等"],

        {type:"multi", q:"关于疼痛性质的辨证，正确的说法有：", options:["胀痛多属气滞","冷痛多属寒证","灼痛多属热证","所有疼痛性质均提示同一种病机不需鉴别"], answer:[0,1,2], explain:"D项错误，不同性质的疼痛提示不同的病机（气滞、血瘀、寒、热、虚、湿等），临床须仔细鉴别疼痛性质以辨证。"},
        {type:"blank", q:"大汗淋漓兼见汗冷、肢厥，多属____证，是虚脱危候。（请填二字）", answer:["亡阳"], explain:"亡阳证是阳气暴脱的危重证候，表现为大汗淋漓、汗质清冷、四肢厥冷，须紧急救治。"},
        {type:"blank", q:"月经先期、量多、色深红质稠，多属____证。（请填一字）", answer:["热"], explain:"月经先期、量多、色深红质稠，多因血热内扰、迫血妄行、冲任不固所致，属血热证。"},
        {type:"case", q:"病例分析：患者自诉胃脘部隐隐作痛，痛势绵绵，喜温喜按，饥饿时痛甚，食后稍缓，伴神疲乏力，舌淡苔白。请分析疼痛性质所反映的病机。", answer:"该患者胃脘部疼痛表现为隐隐作痛、痛势绵绵，属于问诊疼痛性质辨证中的“隐痛”，隐痛多提示虚证，为精气血亏虚、脏腑组织失于濡养温煦所致。结合患者疼痛喜温喜按（虚证、寒证的典型特点，喜温提示阳气不足、得温则舒，喜按提示正虚不耐攻伐、按之则气血暂时得以充盈而痛减）、饥饿时痛甚食后稍缓（提示中气不足，进食后气血得谷气充养而疼痛暂时缓解，饥饿时气血更显不足则疼痛加重）、神疲乏力（气虚之象）、舌淡苔白（气虚或阳虚之象），综合分析可判断此患者证属脾胃虚寒证，病机为脾胃阳气不足、中焦失于温煦、胃络失养，因而出现隐痛喜温喜按的疼痛特点。这一病例充分体现了问诊中疼痛性质与全身症状相互参照、综合辨证的重要性，仅凭单一疼痛特点尚不足以确诊，须结合喜恶、诱因、伴随症状及舌脉等全面信息才能准确辨证。", explain:""}
