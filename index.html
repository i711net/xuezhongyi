        {type:"p",text:"凡以温里祛寒、治疗里寒证为主要功效的药物，称为温里药，又称祛寒药。温里药性味多辛热，主入脾、胃、肾、心经，能温散里寒、助阳益火，主治里寒证，如脾胃虚寒之脘腹冷痛、呕吐泄泻，心肾阳虚之亡阳厥逆、肢冷脉微，以及寒凝经脉之疼痛等。使用温里药应注意：本类药物多辛热燥烈，易耗伤阴液、助火生热，阴虚火旺、热证及孕妇当忌用或慎用；部分药物有毒（如附子），应严格控制剂量及炮制。"},
        {type:"table", headers:["药物","性味归经","主要功效"],
          rows:[
            ["附子","辛、甘，大热，有毒；归心、肾、脾经","回阳救逆，补火助阳，散寒止痛"],
            ["干姜","辛，热；归脾、胃、肾、心、肺经","温中散寒，回阳通脉，温肺化饮"],
            ["肉桂","辛、甘，大热；归肾、脾、心、肝经","补火助阳，散寒止痛，温经通脉，引火归元"],
            ["吴茱萸","辛、苦，热，有小毒；归肝、脾、胃、肾经","散寒止痛，降逆止呕，助阳止泻"],
            ["花椒","辛，温；归脾、胃、肾经","温中止痛，杀虫止痒"],
            ["丁香","辛，温；归脾、胃、肺、肾经","温中降逆，散寒止痛，温肾助阳"],

        {type:"ul", items:[
          "附子：辛甘大热，有毒，为“回阳救逆第一品药”，功能回阳救逆、补火助阳、散寒止痛，主治亡阳证（四肢厥逆、脉微欲绝，代表方四逆汤）、肾阳虚衰之畏寒肢冷、阳痿宫冷，以及寒痹疼痛。煎服3～15克，宜先煎0.5～1小时以减低毒性；孕妇忌用；反半夏、瓜蒌、贝母、白蔹、白及（十八反）。",
          "干姜：辛热，功能温中散寒、回阳通脉、温肺化饮，主治脾胃虚寒之脘腹冷痛、呕吐泄泻，亡阳厥逆（常与附子相须为用，“附子无干姜不热”），以及寒饮咳喘。煎服3～10克。",
          "肉桂：辛甘大热，功能补火助阳、散寒止痛、温经通脉、引火归元，主治肾阳不足、命门火衰之畏寒肢冷、腰膝冷痛，虚阳上浮之戴阳证（引火归元），以及寒凝血滞之痛经、阴疽流注。煎服1～5克，宜后下或研末冲服，不宜久煎。孕妇及血热出血者忌用；畏赤石脂。",
          "吴茱萸：辛苦而热，有小毒，功能散寒止痛、降逆止呕、助阳止泻，主治厥阴头痛、寒疝腹痛，胃寒呕吐（尤宜肝胃不和之呕吐吞酸，如左金丸配黄连），以及脾肾阳虚之五更泄泻（配补骨脂、肉豆蔻、五味子，即四神丸）。煎服1.5～4.5克。阴虚有热者忌用。",
          "花椒：辛温，功能温中止痛、杀虫止痒，主治脾胃虚寒之脘腹冷痛、呕吐泄泻，兼治虫积腹痛及湿疹瘙痒（外用）。煎服3～6克。",
          "丁香：辛温芳香，功能温中降逆、散寒止痛、温肾助阳，为治胃寒呕吐呃逆之要药（配柿蒂、人参，如丁香柿蒂汤），亦治脾胃虚寒之脘腹冷痛及肾虚阳痿。煎服1～3克。畏郁金。",
          "小茴香：辛温，功能散寒止痛、理气和胃，主治寒疝腹痛、睾丸偏坠胀痛及脾胃虚寒之脘腹冷痛、食少呕吐。煎服3～6克。"
        ]}

        {type:"case", q:"病例分析：患者四肢厥冷，冷汗淋漓，面色苍白，脉微欲绝。请分析证候并说明治疗药物选择依据。", answer:"该患者证属亡阳证（阳气暴脱），病机为阳气衰微欲脱、不能温煦四末、鼓动血脉，症见四肢厥冷、冷汗淋漓、面色苍白、脉微欲绝，均为阳气欲脱的危重表现。治疗当以回阳救逆为法，急当选用附子为核心药物（如四逆汤，附子配干姜、炙甘草）：附子辛甘大热，为“回阳救逆第一品药”，能迅速温壮周身阳气、挽救垂危之阳气；干姜辛热，功能温中散寒、回阳通脉，与附子相须为用，即“附子无干姜不热”，可显著增强回阳救逆之力；炙甘草甘缓和中，能缓解附子的毒烈之性并调和诸药。三药合用，共奏回阳救逆之功，切合本例阳气暴脱的危重病机，务必及时救治，以免阴阳离决。", explain:""}

        {type:"case", q:"病例分析：患者咳血，血色鲜红，伴颧红盗汗，潮热咳嗽，舌红少苔。请分析证候并说明止血药物选择依据。", answer:"该患者证属阴虚肺热、灼伤肺络之咳血证，病机为肺肾阴虚、虚火内炽、损伤肺络、迫血妄行，症见咳血色鲜红、颧红盗汗、潮热、舌红少苔，均为阴虚内热之象。治疗当以凉血止血、滋阴润肺为法，可选用白及为核心止血药物：白及苦甘涩微寒，质黏而涩，收敛止血、消肿生肌，尤善治肺胃出血，对于肺痨咯血、咳血尤为适宜；同时可配伍白茅根、仙鹤草等凉血止血或收敛止血之品以增强止血之效，并配伍百合、麦冬、沙参等滋阴润肺之品以治其阴虚内热之本，标本兼顾。", explain:""},
        {type:"case", q:"简述止血药“止血不留瘀”这一使用原则的含义及临床意义。", answer:"“止血不留瘀”是指在选用止血药治疗各种出血病证时，应注意避免单纯运用收敛止血作用强而无化瘀作用的药物，以防止血液瘀滞体内、形成瘀血，加重或引发新的病变。其含义在于：出血的同时，体内往往已存在血液运行不畅或已离经的瘀血，若单纯使用大剂量收敛涩滞的止血药（如仙鹤草、白及等），虽能止血，但可能使离经之血凝聚成瘀，反而阻滞经脉、影响新血的生成与运行，甚至导致出血反复不止。因此，临床用药时应根据具体病情，适当选用兼具化瘀作用的止血药（如三七、茜草、蒲黄），或在收敛止血药基础上酌加少量活血化瘀之品，做到止血而不留瘀、化瘀而不伤正，这对提高止血疗效、防止瘀血内停具有重要的临床指导意义。", explain:""}

    {title:"第十二章 活血化瘀药", ready:true,

        {type:"h4",text:"一、活血化瘀药概述"},
        {type:"p",text:"凡以通畅血行、消散瘀血为主要功效的药物，称为活血化瘀药，又称活血祛瘀药。活血化瘀药性味多辛苦温，主入心、肝经，能通畅血行、消散瘀血，主治血行不畅及瘀血内阻所致的各种病证，如胸胁刺痛、癥瘕积聚、经闭痛经、跌打损伤、疮痈肿痛等。根据药力强弱及功效特点，活血化瘀药可分为活血止痛药、活血调经药、活血疗伤药、破血消癥药四类，药力由轻至重依次递增。使用活血化瘀药应注意：本类药物多能耗血动血，月经过多者及孕妇当忌用或慎用破血消癥类药物；活血化瘀药易耗伤正气，体虚者应配伍补益药物。"},

      quiz:[
        {type:"single", q:"被称为“血中气药”，善治头痛的活血药是：", options:["丹参","川芎","红花","桃仁"], answer:1, explain:"川芎活血行气、祛风止痛，尤善治头痛，有“头痛不离川芎”之说，故称“血中气药”。"},
        {type:"single", q:"“一味丹参散，功同四物汤”形容的药物是：", options:["川芎","丹参","当归","熟地黄"], answer:1, explain:"丹参活血调经、祛瘀止痛，功效广泛，故有“一味丹参散，功同四物汤”之说。"},

        {type:"single", q:"为伤科要药，善治跌打损伤、筋骨折伤，破血逐瘀、续筋接骨的药物是：", options:["骨碎补","土鳖虫","三棱","莪术"], answer:1, explain:"土鳖虫咸寒，破血逐瘀、续筋接骨，是伤科治疗骨折损伤的要药。"},

        {type:"multi", q:"下列相须配伍组合，属于教材经典配伍的有：", options:["乳香配没药","红花配桃仁","莪术配三棱","川芎配丹参"], answer:[0,1,2], explain:"D项“川芎配丹参”并非教材特别强调的经典相须配伍组合，而乳香配没药、红花配桃仁、莪术配三棱均是活血化瘀药中的经典相须配伍。"},
        {type:"blank", q:"川芎素有“____不离川芎”之说，善治多种头痛。（请填二字）", answer:["头痛"], explain:"川芎善治各种头痛，无论外感内伤均可配伍应用，故有“头痛不离川芎”之说。"},
        {type:"blank", q:"丹参在“十八反”中反____。（请填药名二字）", answer:["藜芦"], explain:"十八反歌诀“诸参辛芍叛藜芦”，其中“诸参”包括丹参，故丹参反藜芦。"},
        {type:"blank", q:"牛膝生用偏于活血通经、利水通淋，____用则偏于补肝肾、强筋骨。（请填炮制方式二字）", answer:["酒炙"], explain:"牛膝生用长于活血利水，经酒炙或蒸制后则偏于补益肝肾、强壮筋骨。"},
        {type:"case", q:"病例分析：患者跌打损伤，局部肿胀疼痛、瘀青明显。请分析适宜选用的活血化瘀药物及配伍思路。", answer:"该患者证属跌打损伤所致的瘀血肿痛证，病机为外伤导致局部脉络损伤、血溢脉外、瘀滞不散，不通则痛，故见局部肿胀疼痛、瘀青明显。治疗当以活血化瘀、消肿止痛为法，可选用乳香配没药为核心配伍：乳香辛苦而温，活血行气止痛、消肿生肌；没药功效与乳香相似，长于散血祛瘀、消肿止痛，二者相须为用，能显著增强活血化瘀、消肿止痛的功效，是治疗跌打损伤瘀肿疼痛的经典配伍。此外还可酌加土鳖虫破血逐瘀、续筋接骨，以及三七化瘀止血、活血定痛（若兼有出血则尤为适宜），全方共奏活血化瘀、消肿止痛之功，切合本例跌打损伤、瘀血阻滞的病机。", explain:""},
        {type:"case", q:"简述活血化瘀药按药力强弱分类的四个层次及其临床意义。", answer:"活血化瘀药按其药力由轻至重、作用范围由局部到全身，可分为四个层次：活血止痛药，药力相对温和，以行气活血止痛为主，广泛用于各种气滞血瘀之痛证，如川芎、延胡索、郁金等；活血调经药，兼能调理经血，善治妇科月经不调、经闭痛经及产后瘀阻等证，如丹参、红花、桃仁、牛膝等；活血疗伤药，善治跌打损伤、筋骨折伤等外伤瘀血病证，兼能续筋接骨，如土鳖虫、骨碎补等；破血消癥药，药力最为峻猛，专治癥瘕积聚等顽固性瘀血重证，如莪术、三棱等。这种分类体现了中医“辨证选药”的思想，临床应根据瘀血证候的部位、程度及兼夹病情的轻重缓急，选择相应层次的活血化瘀药物，做到药证相符，避免药力不及或过于峻猛而伤及正气。", explain:""}
      ]
    },
    {title:"第十三章 化痰止咳平喘药", ready:true,
      lecture:[
        {type:"h4",text:"一、化痰止咳平喘药概述"},
        {type:"p",text:"凡以祛痰或消痰为主要功效的药物，称为化痰药；以制止或减轻咳嗽喘息为主要功效的药物，称为止咳平喘药，二者常相须为用，合称化痰止咳平喘药。痰、咳、喘三者关系密切，痰壅每致气逆而作咳作喘，咳喘每易伴随生痰，故化痰药物中不少兼有止咳平喘之功，止咳平喘药中亦有不少兼能化痰，临床应根据病证兼夹情况合理选用。根据药性功效不同，化痰药可分为温化寒痰药（性偏温燥，适用于寒痰、湿痰证）与清化热痰药（性偏寒凉，适用于热痰证）两类。使用化痰止咳平喘药应注意：辨明痰之寒热属性及咳喘之虚实，对证选药；麻疹初起、咳嗽多痰者应慎用敛肺止咳之品，以免恋邪。"},

            ["白芥子","辛，温；归肺经","温肺化痰，利气散结，通络止痛"],
            ["旋覆花","苦、辛、咸，微温；归肺、胃经","降气化痰，降逆止呕"]
          ]
        },
        {type:"ul", items:[
          "半夏：辛温，有毒，为燥湿化痰要药，功能燥湿化痰、降逆止呕、消痞散结，主治湿痰寒痰之咳嗽（配陈皮、茯苓，如二陈汤），胃气上逆之呕吐（素有“止呕要药”之称），以及痰阻气滞之胸脘痞闷、梅核气（配厚朴、苏叶，即半夏厚朴汤）。煎服3～10克，一般宜炮制后使用；生半夏毒性较大，内服须经炮制，反乌头（十八反）。",
          "天南星：苦辛而温，有毒，功能燥湿化痰、祛风止痉、散结消肿，善治顽痰咳嗽及风痰所致的中风痰壅、口眼㖞斜、癫痫惊风。煎服3～10克，多制用；生天南星多外用，孕妇忌用。",
          "白芥子：辛温，功能温肺化痰、利气散结、通络止痛，善治寒痰壅肺之咳喘胸闷，以及痰湿流注经络之肢体麻木疼痛（配苏子、莱菔子，即三子养亲汤）。煎服3～6克。",
          "旋覆花：苦辛咸微温，为“诸花皆升，旋覆独降”的例外，功能降气化痰、降逆止呕，善治痰饮壅肺之咳喘及胃气上逆之嗳气呕吐（配代赭石，如旋覆代赭汤）。煎服3～10克，包煎（因有绒毛易刺激咽喉）。"
        ]},

          rows:[

        {type:"ul", items:[
          "川贝母：苦甘微寒，功能清热化痰、润肺止咳、散结消痈，善治肺热燥咳、虚劳咳嗽（尤宜阴虚燥咳），兼治瘰疬疮痈、乳痈肺痈。煎服3～10克。反乌头（十八反）。",
          "瓜蒌：甘微苦而寒，功能清热化痰、宽胸散结、润肠通便，善治痰热咳嗽及胸痹结胸（配薤白，如瓜蒌薤白白酒汤），兼治肠燥便秘及痈肿疮毒。煎服9～15克。反乌头（十八反）。脾虚便溏者慎用。",

          "竹茹：甘微寒，功能清热化痰、除烦止呕，善治痰热咳嗽及胃热呕吐、妊娠恶阻，兼治心烦不寐（配枳实、半夏、陈皮，如温胆汤）。煎服5～10克。"

            ["紫苏子","辛，温；归肺、大肠经","降气化痰，止咳平喘，润肠通便"],

        {type:"ul", items:[

          "紫苏子：辛温，功能降气化痰、止咳平喘、润肠通便，善治痰壅气逆之咳喘痰多（配白芥子、莱菔子，即三子养亲汤），兼治肠燥便秘。煎服3～10克。",

        {type:"blank", q:"半夏生品有毒，内服须经____后使用。（请填二字）", answer:["炮制"], explain:"半夏生品毒性较大，一般不作内服，须经炮制（如制成法半夏、姜半夏、清半夏）后方可内服。"},

        {type:"blank", q:"桔梗被称为“诸药之____”，能引药上行、载药上浮。（请填二字）", answer:["舟楫"], explain:"桔梗善引导药力上行，作用于肺及咽喉部位，故被称为“诸药之舟楫”。"},
        {type:"case", q:"病例分析：患者咳嗽痰黄质稠，胸闷气喘，口渴咽干，舌红苔黄腻。请分析证候并说明治疗药物选择依据。", answer:"该患者证属痰热壅肺证，病机为热邪炼液成痰、痰热互结、壅塞肺络、肺失宣降，症见咳嗽痰黄质稠、胸闷气喘、口渴咽干、舌红苔黄腻，均为痰热内蕴之象。治疗当以清热化痰、宣肺止咳为法，可选用川贝母、瓜蒌等清化热痰药为核心：川贝母苦甘微寒，清热化痰、润肺止咳，善治肺热燥咳；瓜蒌甘寒，清热化痰、宽胸散结，善治痰热壅肺之胸闷咳嗽。二药配伍再酌加桔梗宣肺祛痰、桑白皮泻肺平喘，共奏清热化痰、宽胸止咳平喘之功，切合本例痰热壅肺的核心病机。", explain:""},
        {type:"case", q:"简述半夏、天南星在燥湿化痰方面的功效特点及使用注意事项。", answer:"半夏与天南星均为辛温燥烈之品，功能燥湿化痰，常同用于湿痰、寒痰壅盛之证，但二者各有侧重：半夏偏重于降逆和胃，善治痰饮或胃寒所致的呕吐（素有“止呕要药”之称），兼能消痞散结，主治胸脘痞闷、梅核气；天南星则偏重于祛风解痉，善治顽痰咳嗽及风痰壅盛所致的中风痰壅、口眼㖞斜、癫痫惊风等证。二者的使用注意事项相似：均属有毒之品，生品毒性较大，一般不作内服，内服须经严格炮制（如制半夏、制南星）方可使用，且孕妇应当忌用或慎用，以免损伤胎元；半夏反乌头，属十八反配伍禁忌，处方时应避免与川乌、草乌、附子同用。", explain:""}

let curSubject = null, curChapter = null;

function renderSidebar(){
  const box = document.getElementById('subject-list');
  box.innerHTML = '';
  SUBJECTS.forEach((s,si)=>{
    const div = document.createElement('div');
    div.className='subject';
    div.id='subj-'+si;
    const readyChapters = s.chapters.filter(c=>c.ready).length;
    div.innerHTML = `
      <div class="subject-head" onclick="toggleSubject(${si})">
        <span>${s.name}<span class="badge ${s.ready?'ready':'building'}">${s.ready? (readyChapters+'/'+s.chapters.length+' 已完成') : '建设中'}</span></span>
        <span class="arrow">▶</span>
      </div>
      <div class="chapter-list">
        ${s.chapters.map((c,ci)=>`<div class="chapter-item" data-si="${si}" data-ci="${ci}" onclick="openChapter(${si},${ci})"><span class="dot"></span>${c.title}</div>`).join('')}
      </div>`;
    box.appendChild(div);
  });
}

function toggleSubject(si){
  document.getElementById('subj-'+si).classList.toggle('open');
}

function renderHomeGrid(){
  const grid = document.getElementById('subject-grid');
  grid.innerHTML = SUBJECTS.map((s,si)=>{
    const readyChapters = s.chapters.filter(c=>c.ready).length;
    return `<div class="subject-card" onclick="toggleSubject(${si}); document.getElementById('subj-${si}').scrollIntoView({behavior:'smooth'});">
      <h3>${s.name} <span class="badge ${s.ready?'ready':'building'}">${s.ready?'已上线':'建设中'}</span></h3>
      <p>${s.desc}</p>
      <div class="stat">共 ${s.chapters.length} 章节 · 已完成 ${readyChapters} 章</div>
    </div>`;
  }).join('');
}

function showHome(){
  curSubject=null;curChapter=null;
  document.getElementById('welcome').style.display='block';
  document.getElementById('chapter-view').style.display='none';
  document.querySelectorAll('.chapter-item').forEach(e=>e.classList.remove('active'));
  document.getElementById('sidebar').classList.remove('show');
}

function openChapter(si,ci){
  curSubject=si;curChapter=ci;
  const s = SUBJECTS[si], c = s.chapters[ci];
  document.getElementById('welcome').style.display='none';
  document.getElementById('chapter-view').style.display='block';
  document.querySelectorAll('.chapter-item').forEach(e=>e.classList.remove('active'));
  const el = document.querySelector(`.chapter-item[data-si="${si}"][data-ci="${ci}"]`);
  if(el) el.classList.add('active');
  document.getElementById('crumb').innerHTML = `<b>${s.name}</b> ／ ${c.title}`;
  document.getElementById('chapter-title').textContent = c.title;
  document.getElementById('sidebar').classList.remove('show');

  if(!c.ready){
    document.getElementById('tabs').style.display='none';
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('panel-lecture').classList.add('active');
    document.getElementById('panel-lecture').innerHTML = `
      <div class="placeholder-box">
        <div class="icon">🚧</div>
        <div style="font-size:15px;color:var(--red-deep);font-weight:600;margin-bottom:6px;">本章内容建设中</div>
        <div>《${s.name}》「${c.title}」的完整讲义、重点提示与模拟测试正在整理上线，敬请期待。</div>
      </div>`;
    document.getElementById('panel-keypoints').innerHTML='';
    document.getElementById('panel-quiz').innerHTML='';
    switchTab('lecture');
    return;
  }
  document.getElementById('tabs').style.display='flex';
  renderLecture(c);
  renderKeypoints(c);
  renderQuiz(c);
  switchTab('lecture');
}

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
}

function renderLecture(c){
  const box = document.getElementById('panel-lecture');
  let html = '<div class="lecture-block">';
  (c.lecture||[]).forEach(block=>{
    if(block.type==='h4') html += `<h4>${block.text}</h4>`;
    else if(block.type==='p') html += `<p>${block.text}</p>`;
    else if(block.type==='ul') html += `<ul>${block.items.map(i=>`<li>${i}</li>`).join('')}</ul>`;
    else if(block.type==='table'){
      html += '<table><tr>'+block.headers.map(h=>`<th>${h}</th>`).join('')+'</tr>';
      block.rows.forEach(r=>{ html += '<tr>'+r.map(x=>`<td>${x}</td>`).join('')+'</tr>'; });
      html += '</table>';
    }
  });
  html += '</div>';
  box.innerHTML = html;
}

function renderKeypoints(c){
  const box = document.getElementById('panel-keypoints');
  box.innerHTML = `<ul class="keypoint-list">${(c.keypoints||[]).map(k=>`<li>${k}</li>`).join('')}</ul>`;
}

function renderQuiz(c){
  const box = document.getElementById('panel-quiz');
  let html = `<div class="quiz-toolbar">
    <button onclick="gradeQuiz()">提交并批改</button>
    <button class="secondary" onclick="resetQuiz()">重做本章测试</button>
    <span id="quiz-score"></span>
  </div><div id="quiz-questions">`;
  (c.quiz||[]).forEach((q,qi)=>{
    html += `<div class="q-card" id="q-${qi}" data-type="${q.type}">
      <div class="q-head"><span class="q-tag">${tagName(q.type)} 第${qi+1}题</span>${q.q}</div>`;
    if(q.type==='single' || q.type==='multi'){
      const inputType = q.type==='single'?'radio':'checkbox';
      html += q.options.map((op,oi)=>`<label class="q-opt"><input type="${inputType}" name="q${qi}" value="${oi}"> ${String.fromCharCode(65+oi)}. ${op}</label>`).join('');
    } else if(q.type==='blank'){
      html += `<div class="q-blank"><input type="text" id="q${qi}-input" placeholder="请输入答案"></div>`;
    } else if(q.type==='case'){
      html += `<div class="q-case"><textarea id="q${qi}-input" placeholder="请输入你的思路/答案要点（仅供自我检验，不参与自动判分）"></textarea>
      <div><button class="case-reveal-btn" onclick="toggleExplain(${qi})">查看参考答案</button></div>`;
    }
    html += `<div class="q-explain" id="q${qi}-explain"><b>参考答案与解析：</b>${q.explain}</div></div>`;
  });
  html += '</div>';
  box.innerHTML = html;
}

function tagName(t){
  return {single:'单选题',multi:'多选题',blank:'填空题',case:'简答/病例分析'}[t]||'题目';
}

function toggleExplain(qi){
  const e = document.getElementById('q'+qi+'-explain');
  e.style.display = (e.style.display==='block')?'none':'block';
}

function gradeQuiz(){
  const c = SUBJECTS[curSubject].chapters[curChapter];
  let correct=0, gradable=0;
  (c.quiz||[]).forEach((q,qi)=>{
    const card = document.getElementById('q-'+qi);
    card.classList.remove('correct','wrong');
    const oldTag = card.querySelector('.q-result-tag'); if(oldTag) oldTag.remove();
    if(q.type==='single'){
      gradable++;
      const sel = card.querySelector(`input[name="q${qi}"]:checked`);
      const ok = sel && parseInt(sel.value)===q.answer;
      markCard(card, ok, qi);
      if(ok) correct++;
    } else if(q.type==='multi'){
      gradable++;
      const sels = Array.from(card.querySelectorAll(`input[name="q${qi}"]:checked`)).map(x=>parseInt(x.value)).sort();
      const ans = [...q.answer].sort();
      const ok = sels.length===ans.length && sels.every((v,i)=>v===ans[i]);
      markCard(card, ok, qi);
      if(ok) correct++;
    } else if(q.type==='blank'){
      gradable++;
      const val = (document.getElementById('q'+qi+'-input').value||'').trim();
      const ok = q.answer.some(a=>a.trim()===val && val!=='');
      markCard(card, ok, qi);
      if(ok) correct++;
    } else if(q.type==='case'){
      document.getElementById('q'+qi+'-explain').style.display='block';
    }
  });
  document.getElementById('quiz-score').textContent = gradable? `客观题得分：${correct} / ${gradable}` : '';
}

function markCard(card, ok, qi){
  card.classList.add(ok?'correct':'wrong');
  const tag = document.createElement('span');
  tag.className='q-result-tag '+(ok?'correct':'wrong');
  tag.textContent = ok?'✓ 正确':'✗ 错误';
  card.querySelector('.q-head').appendChild(tag);
  document.getElementById('q'+qi+'-explain').style.display='block';
}

function resetQuiz(){
  const c = SUBJECTS[curSubject].chapters[curChapter];
  renderQuiz(c);
}

function onSearch(){
  const kw = document.getElementById('search-input').value.trim().toLowerCase();
  document.querySelectorAll('.subject').forEach((div,si)=>{
    const s = SUBJECTS[si];
    let subjectMatch = s.name.toLowerCase().includes(kw);
    let anyChapterMatch=false;
    div.querySelectorAll('.chapter-item').forEach((item,ci)=>{
      const match = kw==='' || s.name.toLowerCase().includes(kw) || s.chapters[ci].title.toLowerCase().includes(kw);
      item.style.display = match? 'block':'none';
      if(match) anyChapterMatch=true;
    });
    div.style.display = (kw===''||anyChapterMatch)? 'block':'none';
    if(kw!=='' && anyChapterMatch) div.classList.add('open');
  });
}

renderSidebar();
renderHomeGrid();
